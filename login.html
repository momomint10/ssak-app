<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>싹싹 — 로그인</title>
<meta name="theme-color" content="#FF385C">
<link rel="stylesheet" href="design.css">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
  color: #191F28;
  min-height: 100vh;
  background: #FFF8F5;  /* 사진 로드 전 fallback */
}
body { position: relative; overflow-x: hidden; }

/* ── 배경 사진 (Gemini 자체 생성) + 따뜻한 그라데이션 오버레이 ── */
.bg-photo {
  position: fixed; inset: 0; z-index: 0;
  background-image: url('img/hero-mascot.png');
  background-size: auto 140%;   /* 이미지를 140%로 키워 머리 영역이 화면 밖으로 */
  background-position: center bottom;  /* 턱 아래(로고/분무기/집 모형)만 노출 */
  background-repeat: no-repeat;
}
.bg-overlay {
  position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(180deg,
    rgba(255, 248, 245, 0.02) 0%,
    rgba(255, 234, 232, 0.12) 35%,
    rgba(255, 224, 220, 0.32) 70%,
    rgba(255, 240, 244, 0.62) 100%);
}
/* sparkle 장식 (코랄/민트 별 입자) */
.bg-sparkle {
  position: fixed; z-index: 1; pointer-events: none;
  opacity: 1;
  filter: drop-shadow(0 2px 6px rgba(255,255,255,.55));
}
.bg-sparkle.s1 { top: 90px; left: 38px; }
.bg-sparkle.s2 { top: 140px; right: 46px; }
.bg-sparkle.s3 { top: 200px; left: 130px; }

.shell {
  position: relative; z-index: 2;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 28px 24px 32px;  /* 상단 padding 축소 — 브랜드 타이포 더 위로 */
  display: flex;
  flex-direction: column;
}
.brand {
  text-align: center;
  margin: 12px 0 24px;
}
.brand h1 {
  font-size: 64px;          /* 38 → 64px (브랜드명 대폭 강조) */
  font-weight: 900;
  color: #191F28;
  letter-spacing: -0.05em;
  line-height: 1;
  margin-bottom: 8px;
  /* 강력한 다중 흰 그림자 — 사진 위에서 또렷이 떠보임 */
  text-shadow:
    0 2px 4px rgba(255,255,255,1),
    0 4px 24px rgba(255,255,255,0.95),
    0 0 40px rgba(255,255,255,0.6);
}
.brand p {
  font-size: 14px;
  color: #C92A4A;
  font-weight: 800;
  letter-spacing: 0.10em;
  margin-top: 6px;
  text-shadow:
    0 1px 3px rgba(255,255,255,0.9),
    0 0 16px rgba(255,255,255,0.6);
}

/* ── 글라스 카드 ── */
.card {
  background: rgba(255, 255, 255, 0.32);
  backdrop-filter: blur(44px) saturate(220%);
  -webkit-backdrop-filter: blur(44px) saturate(220%);
  border: 2px solid rgba(255, 255, 255, 0.95);
  border-radius: 26px;
  padding: 26px 22px 22px;
  box-shadow:
    0 32px 72px rgba(20, 30, 50, 0.22),
    0 10px 28px rgba(255, 56, 92, 0.18),
    inset 0 2px 0 rgba(255,255,255,1);
}
.card-title {
  font-size: 18px; font-weight: 700;
  color: #191F28; margin-bottom: 8px;
  letter-spacing: -0.01em;
}
.card-desc {
  font-size: 13.5px; color: #4E5968;
  line-height: 1.6; margin-bottom: 20px;
}

label {
  display: block;
  font-size: 11px; font-weight: 700;
  color: #4E5968;
  margin-bottom: 6px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
input[type="tel"], input[type="text"] {
  width: 100%;
  padding: 15px 14px;
  font-size: 17px;
  font-family: inherit;
  font-weight: 600;
  color: #191F28;
  border: 2px solid rgba(255, 255, 255, 0.95);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.22);
  backdrop-filter: blur(18px) saturate(200%);
  -webkit-backdrop-filter: blur(18px) saturate(200%);
  outline: none;
  letter-spacing: 0.5px;
  box-shadow: inset 0 1px 2px rgba(20,30,50,.04), 0 3px 10px rgba(20,30,50,.06);
  transition: border-color .15s, background .15s;
}
input:focus {
  border-color: var(--c-pr, #FF385C);
  background: rgba(255, 255, 255, 0.85);
}
input[disabled] { background: rgba(245, 245, 245, 0.7); color: #999; }
input::placeholder { color: #8B95A1; font-weight: 500; }

.btn {
  width: 100%;
  padding: 16px;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  border: none;
  border-radius: 14px;
  background: linear-gradient(180deg, #FF5070 0%, #FF385C 100%);
  color: #fff;
  cursor: pointer;
  margin-top: 14px;
  min-height: 56px;
  letter-spacing: -0.01em;
  box-shadow:
    0 10px 26px rgba(255, 56, 92, 0.32),
    inset 0 1px 0 rgba(255,255,255,.22);
  transition: transform 0.12s cubic-bezier(0.16,1,0.3,1), box-shadow 0.18s;
}
.btn:active { transform: scale(0.98); }
.btn:disabled {
  background: linear-gradient(180deg, #DCE2E8 0%, #C7CFD8 100%);
  cursor: not-allowed;
  box-shadow: none;
}
.btn.ghost {
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  color: #FF385C;
  border: 1.5px solid rgba(255, 56, 92, 0.35);
  box-shadow: 0 4px 12px rgba(20,30,50,.06);
}
.btn-link {
  background: none;
  border: none;
  color: var(--c-pr, #FF385C);
  font-size: 13px;
  font-weight: 700;
  padding: 8px;
  cursor: pointer;
  font-family: inherit;
}

.hint {
  font-size: 12.5px;
  color: #4E5968;
  margin-top: 14px;
  line-height: 1.6;
  text-align: center;
}
.hint b { color: var(--c-pr, #FF385C); }

.timer {
  display: inline-block;
  font-variant-numeric: tabular-nums;
  font-weight: 700;
  color: var(--c-pr, #FF385C);
}

.alert {
  background: rgba(255, 240, 244, 0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: #C92A4A;
  padding: 12px 14px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  margin-top: 12px;
  display: none;
  border: 1px solid rgba(255, 56, 92, 0.2);
}
.alert.on { display: block; }
.alert.info {
  background: rgba(239, 246, 255, 0.85);
  color: #1E40AF;
  border-color: rgba(30, 64, 175, 0.2);
}
.alert.ok {
  background: rgba(236, 253, 245, 0.85);
  color: #047857;
  border-color: rgba(4, 120, 87, 0.2);
}

.bottom {
  text-align: center;
  margin-top: auto;
  padding-top: 24px;
  font-size: 11.5px;
  color: #4E5968;
  font-weight: 600;
  opacity: 0.75;
}
.bottom small { display: block; line-height: 1.6; }
</style>
<script src="utils.js"></script>
</head>
<body>

<!-- 글라스모피즘 배경 레이어 -->
<div class="bg-photo" aria-hidden="true"></div>
<div class="bg-overlay" aria-hidden="true"></div>
<svg class="bg-sparkle s1" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2L13.5 9.5L21 11L13.5 12.5L12 20L10.5 12.5L3 11L10.5 9.5L12 2Z" fill="#FF385C"/></svg>
<svg class="bg-sparkle s2" width="10" height="10" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2L13.5 9.5L21 11L13.5 12.5L12 20L10.5 12.5L3 11L10.5 9.5L12 2Z" fill="#14B8A6"/></svg>
<svg class="bg-sparkle s3" width="12" height="12" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2L13.5 9.5L21 11L13.5 12.5L12 20L10.5 12.5L3 11L10.5 9.5L12 2Z" fill="#FF385C" opacity=".6"/></svg>

<div class="shell">

  <div class="brand">
    <h1>싹싹</h1>
    <p>CLEAN · CARE · CONNECT</p>
  </div>

  <!-- Step 1: 휴대폰 번호 -->
  <div class="card" id="step-phone">
    <div class="card-title">로그인</div>
    <div class="card-desc">관리자가 등록한 휴대폰 번호로 로그인합니다.</div>

    <label>휴대폰 번호</label>
    <input id="inp-phone" type="tel" placeholder="010-1234-5678" autocomplete="tel" inputmode="numeric" maxlength="13"
           oninput="onPhoneChange(this.value)">
    <div class="alert" id="alert-phone"></div>
    <button class="btn" id="btn-send" onclick="sendOtp()">인증번호 받기</button>
    <button class="btn ghost" id="btn-pin-mode" onclick="switchToPinMode()" style="display:none;margin-top:8px;">
      🔢 PIN으로 빠른 로그인
    </button>
    <div class="hint">처음 사용하시는 분은<br>관리자(사장님)에게 번호 등록을 요청하세요.</div>
  </div>

  <!-- Step 2: 인증번호 (SMS) -->
  <div class="card" id="step-otp" style="display:none;">
    <div class="card-title">인증번호 입력</div>
    <div class="card-desc"><b id="phone-display"></b>로 발송된<br>6자리 번호를 입력해 주세요.</div>

    <label>인증번호 <span class="timer" id="timer"></span></label>
    <input id="inp-otp" type="tel" placeholder="000000" inputmode="numeric" maxlength="6" autocomplete="one-time-code">
    <div class="alert" id="alert-otp"></div>
    <button class="btn" id="btn-verify" onclick="verifyOtp()">로그인</button>
    <button class="btn ghost" onclick="resetForm()" style="margin-top:8px;">번호 다시 입력</button>
    <div class="hint">
      인증번호가 오지 않나요?
      <button class="btn-link" id="btn-resend" onclick="sendOtp()" disabled>재발송 (60초 후)</button>
    </div>
  </div>

  <!-- Step 3: PIN 빠른 로그인 -->
  <div class="card" id="step-pin" style="display:none;">
    <div class="card-title">🔢 PIN 로그인</div>
    <div class="card-desc"><b id="pin-phone-display"></b><br>4자리 PIN을 입력해 주세요.</div>

    <label>PIN (4자리 숫자)</label>
    <input id="inp-pin" type="tel" placeholder="••••" inputmode="numeric" maxlength="4" autocomplete="off"
           style="letter-spacing:8px;font-size:24px;text-align:center;">
    <div class="alert" id="alert-pin"></div>
    <button class="btn" id="btn-pin-verify" onclick="verifyPin()">로그인</button>
    <button class="btn ghost" onclick="switchToSmsMode()" style="margin-top:8px;">
      📨 SMS 인증번호로 로그인
    </button>
    <div class="hint">PIN을 잊으셨나요?<br>SMS 인증으로 로그인 후 MY 페이지에서 PIN 재설정 가능.</div>
  </div>

  <div class="bottom">
    <small>
      © 싹싹 2026<br>
      관리자 문의: 010-3318-1315
    </small>
  </div>
</div>

<script>
let currentPhone = '';
let timerId = null;
let resendCooldown = null;

// ── 자동 로그인 시도 (이전에 "이 기기 자동 로그인" 체크한 경우) ─────
(async () => {
  const deviceToken = localStorage.getItem('ssak_device_token');
  if (!deviceToken) return;
  try {
    const r = await fetch(SERVER + '/api/auth/auto-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ device_token: deviceToken })
    });
    const d = await r.json();
    if (r.ok && d.success) {
      setJwt(d.token);
      setCurrentUser(d.user);
      const params = new URLSearchParams(location.search);
      const next = params.get('next') || '/index.html';
      location.replace(next);
    } else {
      // 만료/무효 → 토큰 삭제 후 일반 로그인 흐름
      localStorage.removeItem('ssak_device_token');
      localStorage.removeItem('ssak_device_expires');
    }
  } catch (e) {
    // 네트워크 오류 — 일반 로그인 흐름 진행
  }
})();

// ── "이 기기 자동 로그인" 모달 ─────
function offerTrustDevice() {
  if (localStorage.getItem('ssak_device_token')) return Promise.resolve(false);
  return new Promise((resolve) => {
    const html = `
      <div id="trust-ov" style="display:flex;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;padding:20px;">
        <div style="background:#fff;border-radius:16px;padding:24px 20px;max-width:380px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,0.2);">
          <div style="font-size:20px;font-weight:var(--fw-bold);margin-bottom:8px;">🔒 이 기기를 기억할까요?</div>
          <div style="font-size:14px;color:#666;line-height:1.7;margin-bottom:18px;">
            30일 동안 <b>인증번호 없이 자동 로그인</b>합니다.<br>
            <b style="color:#DC2626;">⚠️ 본인 휴대폰에서만</b> 사용하세요.<br>
            공용 기기면 "매번 인증"을 누르세요.
          </div>
          <div style="display:flex;gap:10px;">
            <button onclick="__trustResolve(false)" style="flex:1;padding:13px;border:1.5px solid #E5E7EB;background:#fff;border-radius:10px;font-size:14px;font-weight:700;color:#666;cursor:pointer;font-family:inherit;">매번 인증</button>
            <button onclick="__trustResolve(true)" style="flex:1.5;padding:13px;border:none;background:#FF385C;color:#fff;border-radius:10px;font-size:14px;font-weight:var(--fw-bold);cursor:pointer;font-family:inherit;">자동 로그인 (30일)</button>
          </div>
        </div>
      </div>`;
    document.body.insertAdjacentHTML('beforeend', html);
    window.__trustResolve = (yes) => {
      const ov = document.getElementById('trust-ov');
      if (ov) ov.remove();
      delete window.__trustResolve;
      resolve(yes);
    };
  });
}

async function registerTrustDevice(jwt) {
  try {
    const r = await fetch(SERVER + '/api/auth/trust-device', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt }
    });
    const d = await r.json();
    if (d.success) {
      localStorage.setItem('ssak_device_token', d.device_token);
      localStorage.setItem('ssak_device_expires', d.expires_at);
    }
  } catch (e) { /* silent */ }
}

// 인증 성공 후 redirect 직전 트러스트 옵션 묻기
async function finalizeLogin(token, nextUrl) {
  const trust = await offerTrustDevice();
  if (trust) await registerTrustDevice(token);
  location.replace(nextUrl);
}

function normalizePhone(raw) {
  return (raw || '').replace(/[^\d+]/g, '');
}
function formatPhoneInput(v) {
  const n = v.replace(/\D/g, '').slice(0, 11);
  if (n.length < 4) return n;
  if (n.length < 8) return n.slice(0,3) + '-' + n.slice(3);
  return n.slice(0,3) + '-' + n.slice(3,7) + '-' + n.slice(7);
}

document.getElementById('inp-phone').addEventListener('input', (e) => {
  e.target.value = formatPhoneInput(e.target.value);
});
document.getElementById('inp-otp').addEventListener('input', (e) => {
  e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
});
document.getElementById('inp-pin').addEventListener('input', (e) => {
  e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4);
});

// 휴대폰 번호 변경 시 PIN 상태 확인 (PIN 옵션 표시 여부)
let pinCheckTimer = null;
async function onPhoneChange(v){
  const phone = normalizePhone(v);
  document.getElementById('btn-pin-mode').style.display = 'none';
  if (!/^01[016789]\d{7,8}$/.test(phone)) return;
  clearTimeout(pinCheckTimer);
  pinCheckTimer = setTimeout(async () => {
    try {
      const r = await fetch(SERVER + '/api/auth/pin-status?phone=' + encodeURIComponent(phone));
      const d = await r.json();
      if (d.success && d.has_pin && !d.locked) {
        document.getElementById('btn-pin-mode').style.display = 'block';
      }
    } catch (e) {}
  }, 400);
}

function switchToPinMode(){
  const phone = normalizePhone(document.getElementById('inp-phone').value);
  if (!/^01[016789]\d{7,8}$/.test(phone)) {
    showAlert('alert-phone', '휴대폰 번호를 정확히 입력해 주세요');
    return;
  }
  currentPhone = phone;
  hideAlert('alert-phone');
  document.getElementById('pin-phone-display').textContent = formatPhoneInput(phone);
  document.getElementById('inp-pin').value = '';
  document.getElementById('step-phone').style.display = 'none';
  document.getElementById('step-pin').style.display = 'block';
  setTimeout(() => document.getElementById('inp-pin').focus(), 200);
}
function switchToSmsMode(){
  document.getElementById('step-pin').style.display = 'none';
  document.getElementById('step-phone').style.display = 'block';
  hideAlert('alert-pin');
}

async function verifyPin(){
  hideAlert('alert-pin');
  const pin = document.getElementById('inp-pin').value;
  if (!/^\d{4}$/.test(pin)) {
    showAlert('alert-pin', '4자리 숫자를 입력해 주세요');
    return;
  }
  const btn = document.getElementById('btn-pin-verify');
  btn.disabled = true; btn.textContent = '확인 중...';
  try {
    const r = await fetch(SERVER + '/api/auth/pin/verify', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ phone: currentPhone, pin })
    });
    const d = await r.json();
    if (!r.ok || !d.success) {
      showAlert('alert-pin', d.error || 'PIN 불일치');
      btn.disabled = false; btn.textContent = '로그인';
      // 5회 잠금 — SMS 모드로 강제 전환
      if (d.code === 'PIN_LOCKED' || d.code === 'PIN_LOCKED_NOW') {
        setTimeout(() => switchToSmsMode(), 1500);
      }
      return;
    }
    setJwt(d.token); setCurrentUser(d.user);
    showAlert('alert-pin', '✅ 로그인 성공! 이동 중...', 'ok');
    const params = new URLSearchParams(location.search);
    const next = params.get('next') || '/index.html';
    setTimeout(() => finalizeLogin(d.token, next), 500);
  } catch (e) {
    showAlert('alert-pin', '서버 연결 실패');
    btn.disabled = false; btn.textContent = '로그인';
  }
}

function showAlert(id, msg, kind='') {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert on' + (kind ? ' ' + kind : '');
}
function hideAlert(id) {
  const el = document.getElementById(id);
  el.className = 'alert';
  el.textContent = '';
}

async function sendOtp() {
  hideAlert('alert-phone'); hideAlert('alert-otp');
  const raw = document.getElementById('inp-phone').value;
  const phone = normalizePhone(raw);
  if (!/^01[016789]\d{7,8}$/.test(phone)) {
    showAlert('alert-phone', '휴대폰 번호를 정확히 입력해 주세요');
    return;
  }
  const btn = document.getElementById('btn-send');
  btn.disabled = true; btn.textContent = '발송 중...';
  try {
    const r = await fetch(SERVER + '/api/auth/send-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const d = await r.json();
    if (!r.ok || !d.success) {
      showAlert('alert-phone', d.error || '발송 실패. 다시 시도해 주세요.');
      btn.disabled = false; btn.textContent = '인증번호 받기';
      return;
    }
    currentPhone = phone;
    document.getElementById('phone-display').textContent = formatPhoneInput(phone);
    document.getElementById('step-phone').style.display = 'none';
    document.getElementById('step-otp').style.display = 'block';
    document.getElementById('inp-otp').focus();
    startTimer(180); // 3분
    startResendCooldown(60);
  } catch (e) {
    showAlert('alert-phone', '서버 연결 실패. 잠시 후 다시 시도해 주세요.');
    btn.disabled = false; btn.textContent = '인증번호 받기';
  }
}

async function verifyOtp() {
  hideAlert('alert-otp');
  const code = document.getElementById('inp-otp').value;
  if (!/^\d{6}$/.test(code)) {
    showAlert('alert-otp', '6자리 숫자를 정확히 입력해 주세요');
    return;
  }
  const btn = document.getElementById('btn-verify');
  btn.disabled = true; btn.textContent = '확인 중...';
  try {
    const r = await fetch(SERVER + '/api/auth/verify-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: currentPhone, code })
    });
    const d = await r.json();
    if (!r.ok || !d.success) {
      showAlert('alert-otp', d.error || '인증 실패');
      btn.disabled = false; btn.textContent = '로그인';
      return;
    }
    setJwt(d.token);
    setCurrentUser(d.user);
    showAlert('alert-otp', '로그인 성공! 이동 중...', 'ok');
    // next 파라미터가 있으면 그곳으로, 없으면 홈
    const params = new URLSearchParams(location.search);
    const next = params.get('next') || '/index.html';
    setTimeout(() => finalizeLogin(d.token, next), 600);
  } catch (e) {
    showAlert('alert-otp', '서버 연결 실패. 잠시 후 다시 시도해 주세요.');
    btn.disabled = false; btn.textContent = '로그인';
  }
}

function resetForm() {
  document.getElementById('step-otp').style.display = 'none';
  document.getElementById('step-phone').style.display = 'block';
  document.getElementById('inp-phone').focus();
  document.getElementById('btn-send').disabled = false;
  document.getElementById('btn-send').textContent = '인증번호 받기';
  hideAlert('alert-phone'); hideAlert('alert-otp');
  if (timerId) clearInterval(timerId);
  if (resendCooldown) clearInterval(resendCooldown);
}

function startTimer(sec) {
  if (timerId) clearInterval(timerId);
  const tEl = document.getElementById('timer');
  let left = sec;
  const tick = () => {
    if (left < 0) {
      tEl.textContent = '(만료됨)';
      clearInterval(timerId);
      return;
    }
    const m = Math.floor(left / 60), s = left % 60;
    tEl.textContent = `(${m}:${String(s).padStart(2,'0')} 남음)`;
    left--;
  };
  tick();
  timerId = setInterval(tick, 1000);
}

function startResendCooldown(sec) {
  if (resendCooldown) clearInterval(resendCooldown);
  const btn = document.getElementById('btn-resend');
  let left = sec;
  btn.disabled = true;
  const tick = () => {
    if (left <= 0) {
      btn.disabled = false;
      btn.textContent = '재발송';
      clearInterval(resendCooldown);
      return;
    }
    btn.textContent = `재발송 (${left}초 후)`;
    left--;
  };
  tick();
  resendCooldown = setInterval(tick, 1000);
}

// 이미 로그인되어 있으면 홈으로
(function() {
  const p = decodeJwt();
  if (p && p.exp && p.exp > Math.floor(Date.now()/1000)) {
    const params = new URLSearchParams(location.search);
    const next = params.get('next') || '/index.html';
    location.replace(next);
  }
})();
</script>

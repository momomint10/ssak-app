<body>

<script>
// ══════════════════════════════════════════════════
// 🚧 런치 모드 (정식 출시 시 'production'으로 변경)
// 'beta' — PIN 우선 (SMS 1회만, trust-device 모달 숨김, 베타 배너 표시)
// 'production' — 기존 SMS+JWT+선택적 PIN 흐름
// ══════════════════════════════════════════════════
const LAUNCH_MODE = 'beta';

// 베타 모드 활성화: body 클래스 + 배너 표시
if (LAUNCH_MODE === 'beta') {
  document.body.classList.add('beta-mode');
  const banner = document.getElementById('beta-banner');
  if (banner) banner.classList.remove('hide');
  // 베타 모드: PIN 버튼을 항상 표시 (CSS body.beta-mode에서 primary 스타일 적용)
  const pinBtn = document.getElementById('btn-pin-mode');
  if (pinBtn) {
    pinBtn.style.display = 'block';
    pinBtn.textContent = '🔢 PIN으로 로그인';
  }
  // SMS 버튼 라벨 변경 (작아짐 + secondary)
  const smsBtn = document.getElementById('btn-send');
  if (smsBtn) smsBtn.textContent = 'PIN 처음이세요? · SMS로 로그인 (1회만)';
  // 안내 hint 메시지 변경
  const hint = document.querySelector('#step-phone .hint');
  if (hint) hint.innerHTML = '베타: 휴대폰 번호 + PIN 4자리로 로그인합니다.<br>처음이시면 SMS 인증 1회 후 PIN을 설정해 주세요.';
}

let currentPhone = '';
let timerId = null;
let resendCooldown = null;

// ── 자동 진입 우선순위 (260528 PIN 우선 흐름) ─────
// 1. 디바이스 토큰 자동로그인 (30일 신뢰 기기)
// 2. 마지막 로그인 번호 기억 → PIN 등록되어 있으면 바로 PIN 화면
// 3. 둘 다 실패 시 SMS 인증 (기본 흐름)
(async () => {
  // [1] 디바이스 토큰 자동로그인 (Railway cold start 대응 — 최대 2회 시도)
  const deviceToken = localStorage.getItem('ssak_device_token');
  if (deviceToken) {
    // 영구 무효 코드 (이 코드 받았을 때만 토큰 삭제 — transient 오류엔 유지)
    const PERMANENT_INVALID = ['DEVICE_UNKNOWN', 'DEVICE_EXPIRED', 'USER_DISABLED'];
    const tryAutoLogin = async () => {
      const ctrl = new AbortController();
      const timeoutId = setTimeout(() => ctrl.abort(), 15000);  // 15s 타임아웃
      try {
        const r = await fetch(SERVER + '/api/auth/auto-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ device_token: deviceToken }),
          signal: ctrl.signal
        });
        clearTimeout(timeoutId);
        const d = await r.json().catch(() => ({}));
        if (r.ok && d.success) {
          return { ok: true, data: d };
        }
        if (d && d.code && PERMANENT_INVALID.includes(d.code)) {
          return { ok: false, permanent: true, code: d.code };
        }
        return { ok: false, permanent: false, status: r.status };  // 5xx / unknown → transient
      } catch (e) {
        clearTimeout(timeoutId);
        return { ok: false, permanent: false, error: e.message };  // 네트워크/abort → transient
      }
    };

    let result = await tryAutoLogin();
    // Cold start 의심 (transient 실패) → 3초 후 1회 재시도
    if (!result.ok && !result.permanent) {
      await new Promise(r => setTimeout(r, 3000));
      result = await tryAutoLogin();
    }

    if (result.ok) {
      setJwt(result.data.token);
      setCurrentUser(result.data.user);
      const params = new URLSearchParams(location.search);
      const next = params.get('next') || '/index.html';
      location.replace(next);
      return;
    }
    if (result.permanent) {
      // 명시적 무효/만료 — 토큰 영구 삭제
      localStorage.removeItem('ssak_device_token');
      localStorage.removeItem('ssak_device_expires');
      console.log('[ssak] device token invalidated:', result.code);
    } else {
      // Transient (cold start, 네트워크) — 토큰 유지, 이번엔 PIN/SMS 흐름으로 fallback
      console.log('[ssak] auto-login transient fail, device token preserved');
    }
  }

  // [2] 마지막 로그인 번호 + PIN 자동 진입
  const lastPhone = localStorage.getItem('ssak_last_phone');
  if (lastPhone && /^01[016789]\d{7,8}$/.test(lastPhone)) {
    try {
      const r = await fetch(SERVER + '/api/auth/pin-status?phone=' + encodeURIComponent(lastPhone));
      const d = await r.json();
      if (d.success && d.has_pin && !d.locked) {
        // PIN 설정되어 있고 잠금 아님 → 바로 PIN 화면
        currentPhone = lastPhone;
        const pinDisplay = document.getElementById('pin-phone-display');
        if (pinDisplay) pinDisplay.textContent = formatPhoneInput(lastPhone);
        document.getElementById('step-phone').style.display = 'none';
        document.getElementById('step-pin').style.display = 'block';
        const inp = document.getElementById('inp-pin');
        if (inp) { inp.value = ''; setTimeout(() => inp.focus(), 200); }
        return;
      }
    } catch (e) { /* 네트워크 오류 — SMS 흐름으로 */ }
  }
  // [3] 기본: SMS 인증 흐름 (step-phone 그대로 표시)
})();

// ── "이 기기 자동 로그인" 모달 ─────
function offerTrustDevice() {
  if (localStorage.getItem('ssak_device_token')) return Promise.resolve(false);
  return new Promise((resolve) => {
    const html = `
      <div id="trust-ov" style="display:flex;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;padding:20px;">
        <div style="background:#fff;border-radius:16px;padding:24px 20px;max-width:380px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,0.2);">
          <div style="font-size:20px;font-weight:var(--fw-bold);margin-bottom:8px;">🔒 이 기기를 기억할까요?</div>
          <div style="font-size:14px;color:#666;line-height:1.7;margin-bottom:18px;">
            30일 동안 <b>인증번호 없이 자동 로그인</b>합니다.<br>
            <b style="color:#DC2626;">⚠️ 본인 휴대폰에서만</b> 사용하세요.<br>
            공용 기기면 "매번 인증"을 누르세요.
          </div>
          <div style="display:flex;gap:10px;">
            <button onclick="__trustResolve(false)" style="flex:1;padding:13px;border:1.5px solid #E5E7EB;background:#fff;border-radius:10px;font-size:14px;font-weight:700;color:#666;cursor:pointer;font-family:inherit;">매번 인증</button>
            <button onclick="__trustResolve(true)" style="flex:1.5;padding:13px;border:none;background:#FF385C;color:#fff;border-radius:10px;font-size:14px;font-weight:var(--fw-bold);cursor:pointer;font-family:inherit;">자동 로그인 (30일)</button>
          </div>
        </div>
      </div>`;
    document.body.insertAdjacentHTML('beforeend', html);
    window.__trustResolve = (yes) => {
      const ov = document.getElementById('trust-ov');
      if (ov) ov.remove();
      delete window.__trustResolve;
      resolve(yes);
    };
  });
}

async function registerTrustDevice(jwt) {
  try {
    const r = await fetch(SERVER + '/api/auth/trust-device', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt }
    });
    const d = await r.json();
    if (d.success) {
      localStorage.setItem('ssak_device_token', d.device_token);
      localStorage.setItem('ssak_device_expires', d.expires_at);
    }
  } catch (e) { /* silent */ }
}

// 인증 성공 후 redirect 직전 트러스트 옵션 묻기 (정식) 또는 PIN 설정 유도 (베타)
async function finalizeLogin(token, nextUrl) {
  if (LAUNCH_MODE === 'beta') {
    // 베타 모드: SMS 인증 후 PIN 미설정 시 자동으로 PIN 설정 화면으로
    if (currentPhone) {
      try {
        const r = await fetch(SERVER + '/api/auth/pin-status?phone=' + encodeURIComponent(currentPhone));
        const d = await r.json();
        if (d.success && !d.has_pin) {
          // PIN 미설정 — MY 페이지에서 PIN 설정 흐름 유도
          location.replace('/my.html?action=setup-pin&first=1');
          return;
        }
      } catch (e) { /* 무시하고 일반 흐름 */ }
    }
    // 이미 PIN 있음 또는 확인 실패 → 정상 이동
    location.replace(nextUrl);
    return;
  }
  // 정식 출시 모드: 기존 trust-device 모달 흐름
  const trust = await offerTrustDevice();
  if (trust) await registerTrustDevice(token);
  location.replace(nextUrl);
}

function normalizePhone(raw) {
  return (raw || '').replace(/[^\d+]/g, '');
}
function formatPhoneInput(v) {
  const n = v.replace(/\D/g, '').slice(0, 11);
  if (n.length < 4) return n;
  if (n.length < 8) return n.slice(0,3) + '-' + n.slice(3);
  return n.slice(0,3) + '-' + n.slice(3,7) + '-' + n.slice(7);
}

document.getElementById('inp-phone').addEventListener('input', (e) => {
  e.target.value = formatPhoneInput(e.target.value);
});
document.getElementById('inp-otp').addEventListener('input', (e) => {
  e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
});
document.getElementById('inp-pin').addEventListener('input', (e) => {
  e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4);
});

// 휴대폰 번호 변경 시 PIN 상태 확인 (PIN 옵션 표시 여부)
let pinCheckTimer = null;
async function onPhoneChange(v){
  const phone = normalizePhone(v);
  document.getElementById('btn-pin-mode').style.display = 'none';
  if (!/^01[016789]\d{7,8}$/.test(phone)) return;
  clearTimeout(pinCheckTimer);
  pinCheckTimer = setTimeout(async () => {
    try {
      const r = await fetch(SERVER + '/api/auth/pin-status?phone=' + encodeURIComponent(phone));
      const d = await r.json();
      if (d.success && d.has_pin && !d.locked) {
        document.getElementById('btn-pin-mode').style.display = 'block';
      }
    } catch (e) {}
  }, 400);
}

function switchToPinMode(){
  const phone = normalizePhone(document.getElementById('inp-phone').value);
  if (!/^01[016789]\d{7,8}$/.test(phone)) {
    showAlert('alert-phone', '휴대폰 번호를 정확히 입력해 주세요');
    return;
  }
  currentPhone = phone;
  hideAlert('alert-phone');
  document.getElementById('pin-phone-display').textContent = formatPhoneInput(phone);
  document.getElementById('inp-pin').value = '';
  document.getElementById('step-phone').style.display = 'none';
  document.getElementById('step-pin').style.display = 'block';
  setTimeout(() => document.getElementById('inp-pin').focus(), 200);
}
function switchToSmsMode(){
  document.getElementById('step-pin').style.display = 'none';
  document.getElementById('step-phone').style.display = 'block';
  hideAlert('alert-pin');
}

async function verifyPin(){
  hideAlert('alert-pin');
  const pin = document.getElementById('inp-pin').value;
  if (!/^\d{4}$/.test(pin)) {
    showAlert('alert-pin', '4자리 숫자를 입력해 주세요');
    return;
  }
  const btn = document.getElementById('btn-pin-verify');
  btn.disabled = true; btn.textContent = '확인 중...';
  try {
    const r = await fetch(SERVER + '/api/auth/pin/verify', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ phone: currentPhone, pin })
    });
    const d = await r.json();
    if (!r.ok || !d.success) {
      showAlert('alert-pin', d.error || 'PIN 불일치');
      btn.disabled = false; btn.textContent = '로그인';
      // 5회 잠금 — SMS 모드로 강제 전환
      if (d.code === 'PIN_LOCKED' || d.code === 'PIN_LOCKED_NOW') {
        setTimeout(() => switchToSmsMode(), 1500);
      }
      return;
    }
    setJwt(d.token); setCurrentUser(d.user);
    if (currentPhone) localStorage.setItem('ssak_last_phone', currentPhone);  // 다음 로그인 시 PIN 우선 진입
    showAlert('alert-pin', '✅ 로그인 성공! 이동 중...', 'ok');
    const params = new URLSearchParams(location.search);
    const next = params.get('next') || '/index.html';
    setTimeout(() => finalizeLogin(d.token, next), 500);
  } catch (e) {
    showAlert('alert-pin', '서버 연결 실패');
    btn.disabled = false; btn.textContent = '로그인';
  }
}

function showAlert(id, msg, kind='') {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert on' + (kind ? ' ' + kind : '');
}
function hideAlert(id) {
  const el = document.getElementById(id);
  el.className = 'alert';
  el.textContent = '';
}

async function sendOtp() {
  hideAlert('alert-phone'); hideAlert('alert-otp');
  const raw = document.getElementById('inp-phone').value;
  const phone = normalizePhone(raw);
  if (!/^01[016789]\d{7,8}$/.test(phone)) {
    showAlert('alert-phone', '휴대폰 번호를 정확히 입력해 주세요');
    return;
  }
  const btn = document.getElementById('btn-send');
  btn.disabled = true; btn.textContent = '발송 중...';
  try {
    const r = await fetch(SERVER + '/api/auth/send-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const d = await r.json();
    if (!r.ok || !d.success) {
      showAlert('alert-phone', d.error || '발송 실패. 다시 시도해 주세요.');
      btn.disabled = false; btn.textContent = '인증번호 받기';
      return;
    }
    currentPhone = phone;
    document.getElementById('phone-display').textContent = formatPhoneInput(phone);
    document.getElementById('step-phone').style.display = 'none';
    document.getElementById('step-otp').style.display = 'block';
    document.getElementById('inp-otp').focus();
    startTimer(180); // 3분
    startResendCooldown(60);
  } catch (e) {
    showAlert('alert-phone', '서버 연결 실패. 잠시 후 다시 시도해 주세요.');
    btn.disabled = false; btn.textContent = '인증번호 받기';
  }
}

async function verifyOtp() {
  hideAlert('alert-otp');
  const code = document.getElementById('inp-otp').value;
  if (!/^\d{6}$/.test(code)) {
    showAlert('alert-otp', '6자리 숫자를 정확히 입력해 주세요');
    return;
  }
  const btn = document.getElementById('btn-verify');
  btn.disabled = true; btn.textContent = '확인 중...';
  try {
    const r = await fetch(SERVER + '/api/auth/verify-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: currentPhone, code })
    });
    const d = await r.json();
    if (!r.ok || !d.success) {
      showAlert('alert-otp', d.error || '인증 실패');
      btn.disabled = false; btn.textContent = '로그인';
      return;
    }
    setJwt(d.token);
    setCurrentUser(d.user);
    if (currentPhone) localStorage.setItem('ssak_last_phone', currentPhone);  // 다음 로그인 시 PIN 우선 진입
    showAlert('alert-otp', '로그인 성공! 이동 중...', 'ok');
    // next 파라미터가 있으면 그곳으로, 없으면 홈
    const params = new URLSearchParams(location.search);
    const next = params.get('next') || '/index.html';
    setTimeout(() => finalizeLogin(d.token, next), 600);
  } catch (e) {
    showAlert('alert-otp', '서버 연결 실패. 잠시 후 다시 시도해 주세요.');
    btn.disabled = false; btn.textContent = '로그인';
  }
}

function resetForm() {
  document.getElementById('step-otp').style.display = 'none';
  document.getElementById('step-phone').style.display = 'block';
  document.getElementById('inp-phone').focus();
  document.getElementById('btn-send').disabled = false;
  document.getElementById('btn-send').textContent = '인증번호 받기';
  hideAlert('alert-phone'); hideAlert('alert-otp');
  if (timerId) clearInterval(timerId);
  if (resendCooldown) clearInterval(resendCooldown);
}

function startTimer(sec) {
  if (timerId) clearInterval(timerId);
  const tEl = document.getElementById('timer');
  let left = sec;
  const tick = () => {
    if (left < 0) {
      tEl.textContent = '(만료됨)';
      clearInterval(timerId);
      return;
    }
    const m = Math.floor(left / 60), s = left % 60;
    tEl.textContent = `(${m}:${String(s).padStart(2,'0')} 남음)`;
    left--;
  };
  tick();
  timerId = setInterval(tick, 1000);
}

function startResendCooldown(sec) {
  if (resendCooldown) clearInterval(resendCooldown);
  const btn = document.getElementById('btn-resend');
  let left = sec;
  btn.disabled = true;
  const tick = () => {
    if (left <= 0) {
      btn.disabled = false;
      btn.textContent = '재발송';
      clearInterval(resendCooldown);
      return;
    }
    btn.textContent = `재발송 (${left}초 후)`;
    left--;
  };
  tick();
  resendCooldown = setInterval(tick, 1000);
}

// 이미 로그인되어 있으면 홈으로
(function() {
  const p = decodeJwt();
  if (p && p.exp && p.exp > Math.floor(Date.now()/1000)) {
    const params = new URLSearchParams(location.search);
    const next = params.get('next') || '/index.html';
    location.replace(next);
  }
})();

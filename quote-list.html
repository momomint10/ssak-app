<script>
/* 싹싹 인증 진입 가드 (Phase 2) — JWT 검증, 미로그인 시 login.html로 */
(function(){
  try {
    var tok = localStorage.getItem('ssak_jwt');
    if (!tok) throw new Error('no_token');
    var parts = tok.split('.');
    if (parts.length !== 3) throw new Error('bad_token');
    var p64 = parts[1].replace(/-/g,'+').replace(/_/g,'/');
    while (p64.length % 4) p64 += '=';
    var bin = atob(p64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    var payload = JSON.parse(new TextDecoder('utf-8').decode(bytes));
    if (payload.exp && payload.exp < Math.floor(Date.now()/1000)) throw new Error('expired');
  } catch (e) {
    localStorage.removeItem('ssak_jwt');
    localStorage.removeItem('ssak_user');
    var next = encodeURIComponent(location.pathname + location.search);
    location.replace('/login.html?next=' + next);
  }
})();
</script>

<script>
const me = requireAuth();
const cfg = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');

let allList = [];
let curStatus = '';
let curDetail = null;

// toast removed — utils.js 사용 (자동 success/error/info 분류, 2026-05-23)
// fmtPhone removed — utils.js 사용 (2026-05-23)
function fmtAmount(n){ return n ? Number(n).toLocaleString() + '원' : '-'; }
function fmtDate(s){
  if (!s) return '-';
  return new Date(s).toLocaleString('ko-KR', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtDateOnly(s){
  if (!s) return '';
  return new Date(s).toLocaleDateString('ko-KR', {month:'short', day:'numeric'});
}

const statusLabel = {
  pending:'⏳ 미입력', submitted:'📥 정보 도착',
  quoted:'✅ 견적 완료', contracted:'🤝 계약', cancelled:'❌ 취소'
};
// 상태별 배지 색상 (design.css .ds-badge-*)
// quoted는 민트 그린 (자연·완료·신선 메타포 — Botanical 영감)
const statusBadgeCls = {
  pending: 'ds-badge-amber',
  submitted: 'ds-badge-blue',
  quoted: 'ds-badge-mint',
  contracted: 'ds-badge-pr',
  cancelled: 'ds-badge-gray'
};

// 휴대폰 자동 포맷팅
document.getElementById('new-phone').addEventListener('input', (e) => {
  const n = e.target.value.replace(/\D/g, '').slice(0, 11);
  if (n.length < 4) e.target.value = n;
  else if (n.length < 8) e.target.value = n.slice(0,3) + '-' + n.slice(3);
  else e.target.value = n.slice(0,3) + '-' + n.slice(3,7) + '-' + n.slice(7);
});

function refreshCounts(){
  const counts = {all: allList.length, submitted:0, pending:0, quoted:0, cancelled:0, contracted:0};
  allList.forEach(x => { counts[x.status] = (counts[x.status]||0) + 1; });
  document.getElementById('n-all').textContent = counts.all;
  document.getElementById('n-submitted').textContent = counts.submitted;
  document.getElementById('n-pending').textContent = counts.pending;
  document.getElementById('n-quoted').textContent = counts.quoted;
  document.getElementById('n-cancelled').textContent = counts.cancelled;
}

async function loadList(){
  try {
    const r = await fetch(SERVER + '/api/quote-requests');
    const d = await r.json();
    if (!d.success) throw new Error(d.error);
    allList = d.data || [];
    refreshCounts();
    renderList();
    updateTrashBadge();
  } catch (e) {
    document.getElementById('list').innerHTML =
      '<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-ttl">견적 목록을 불러올 수 없어요</div><div class="empty-sub">' + esc(friendlyFetchError(e, '견적 목록을 불러오지 못했어요.')) + '</div></div>';
  }
}

function renderList(){
  const filtered = curStatus ? allList.filter(x => x.status === curStatus) : allList;
  if (!filtered.length) {
    document.getElementById('list').innerHTML =
      curStatus
        ? emptySvg('paperplane', (statusLabel[curStatus]||curStatus) + ' 상태가 없습니다', '', { color: 'var(--c-pr)' })
        : emptySvg('paperplane', '아직 견적 요청이 없습니다', '＋ 새 요청 버튼으로 시작하세요', { color: 'var(--c-pr)' });
    return;
  }
  document.getElementById('list').innerHTML = filtered.map(card).join('');
  bindSwipeHandlers();
}

function card(r){
  const isNew = r.status === 'submitted';
  // 카드에는 핵심 태그만 (지역 + 평수 + 청소유형). 나머지는 상세에서.
  const tags = [];
  if (r.region)        tags.push(esc(r.region));
  if (r.area_size)     tags.push(r.area_size + '평' + (r.area_type ? '(' + esc(r.area_type) + ')' : ''));
  if (r.clean_type)    tags.push(esc(r.clean_type));
  // 부가 정보는 dot indicator로 압축
  const extras = [];
  if (Array.isArray(r.site_conditions) && r.site_conditions.length) extras.push('⚠️' + r.site_conditions.length);
  if (Array.isArray(r.appliance_options) && r.appliance_options.length) extras.push('🔌' + r.appliance_options.length);
  if (Array.isArray(r.photos) && r.photos.length) extras.push('📸' + r.photos.length);
  const badgeCls = statusBadgeCls[r.status] || 'ds-badge-gray';
  return `<div class="ds-swipe-wrap${isNew?' is-new':''}" data-id="${esc(r.id)}">
    <button class="ds-swipe-action" type="button" onclick="event.stopPropagation();swipeDelete('${esc(r.id)}')" aria-label="삭제">삭제</button>
    <div class="ds-swipe-card" onclick="openDetail('${esc(r.id)}')">
      <div class="ds-list-row">
        <span class="ds-badge ${badgeCls}">${esc(statusLabel[r.status]||r.status)}</span>
        <span class="ds-list-time">${fmtDate(r.submitted_at || r.created_at)}</span>
      </div>
      <div class="ds-list-name">${esc(r.customer_name || '(이름 미입력)')}</div>
      <div class="ds-list-sub">${fmtPhone(r.customer_phone)}${extras.length ? ` · ${extras.join(' ')}` : ''}</div>
      ${tags.length ? `<div class="ds-list-tags">${tags.map(t => `<span class="ds-list-tag">${t}</span>`).join('')}</div>` : ''}
      ${r.final_quote_amount ? `<div class="ds-list-amount">${fmtAmount(r.final_quote_amount)}</div>` : ''}
    </div>
  </div>`;
}

function onFilter(st){
  curStatus = st;
  document.querySelectorAll('.status-tab').forEach(t => {
    t.classList.toggle('on', (t.getAttribute('data-st') || '') === st);
  });
  renderList();
}

// ── 신규 견적 요청 발송 ─────────────────────────────────
function openNew(){
  document.getElementById('new-phone').value = '';
  document.getElementById('new-name').value = '';
  // SMS 템플릿: 설정 cfg.quoteRequestMsg 우선, 없으면 기본 빈 값 (서버 default 사용)
  document.getElementById('new-msg').value = cfg.quoteRequestMsg || '';
  document.getElementById('new-ov').classList.add('on');
  setTimeout(() => document.getElementById('new-phone').focus(), 200);
}
function closeNew(){ document.getElementById('new-ov').classList.remove('on'); }

let isSendingNew = false;  // 중복 발송 방어 (이중 안전망)
async function sendNew(){
  if (isSendingNew) return;  // 이미 처리 중이면 무시 (방어 1)
  const phone = document.getElementById('new-phone').value.replace(/\D/g,'');
  const name  = document.getElementById('new-name').value.trim();
  const msg   = document.getElementById('new-msg').value.trim();
  if (!/^01[016789]\d{7,8}$/.test(phone)) { toast('휴대폰 번호를 확인해 주세요'); return; }

  const btn = document.getElementById('btn-send-new');
  const originalText = btn ? btn.innerHTML : '';
  isSendingNew = true;
  if (btn) {
    btn.disabled = true;
    btn.style.opacity = '0.6';
    btn.style.cursor = 'not-allowed';
    btn.innerHTML = '⏳ 발송 중...';
  }
  toast('📨 발송 중...');

  try {
    const r = await fetch(SERVER + '/api/quote-requests', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        customer_phone: phone,
        customer_name: name,
        message: msg,
        company_name: cfg.company || ''
      })
    });
    const d = await r.json();
    if (!d.success) {
      toast(d.error || '발송 실패');
      return;
    }
    closeNew();
    if (d.sms_sent) {
      toast('✅ ' + fmtPhone(phone) + '에 발송됨');
    } else {
      toast('⚠ 토큰만 생성 (SMS 실패): ' + (d.sms_error || ''));
    }
    loadList();
  } catch (e) {
    toast('오류: ' + (e.message||''));
  } finally {
    isSendingNew = false;
    if (btn) {
      btn.disabled = false;
      btn.style.opacity = '';
      btn.style.cursor = '';
      btn.innerHTML = originalText;
    }
  }
}

// ── 견적요청서 상세 + 견적 발송 ─────────────────────
async function openDetail(id){
  document.getElementById('detail-ov').classList.add('on');
  document.getElementById('detail-body').innerHTML = '<div class="empty">불러오는 중...</div>';
  try {
    const r = await fetch(SERVER + '/api/quote-requests/' + id);
    const d = await r.json();
    if (!d.success) throw new Error(d.error);
    curDetail = d.data;
    renderDetail();
  } catch (e) {
    document.getElementById('detail-body').innerHTML = '<div class="empty">오류: ' + esc(e.message||'') + '</div>';
  }
}
function closeDetail(){ document.getElementById('detail-ov').classList.remove('on'); curDetail = null; }

function renderDetail(){
  const r = curDetail;
  const isPending  = r.status === 'pending';
  const isSubmitted= r.status === 'submitted';
  const isQuoted   = r.status === 'quoted';
  const allPhotos = Array.isArray(r.photos) ? r.photos : [];
  const photos = allPhotos.filter(p => p.type !== 'plan');
  const plans  = allPhotos.filter(p => p.type === 'plan');
  const formUrl = `https://ssakapp.co.kr/quote.html?token=${r.token}`;

  const html = `
    <div class="ds-list-row" style="margin-bottom:10px;">
      <span class="ds-badge ${statusBadgeCls[r.status]||'ds-badge-gray'}">${esc(statusLabel[r.status]||r.status)}</span>
      <span class="ds-list-time">${fmtDate(r.submitted_at || r.created_at)}</span>
    </div>
    <div class="detail-section">
      <div class="detail-h">고객</div>
      <div class="detail-v">${esc(r.customer_name || '(이름 미입력)')} · ${fmtPhone(r.customer_phone)}</div>
    </div>
    ${isPending ? `
    <div class="detail-section" style="background:#FFF7E6;padding:10px 12px;border-radius:8px;color:#92400E;font-size:13px;">
      ⏳ 고객이 아직 정보를 입력하지 않았습니다.<br>
      링크: <a href="${formUrl}" target="_blank" style="color:var(--c-pr, #FF385C);text-decoration:underline;word-break:break-all;">${formUrl}</a>
    </div>
    ` : ''}
    ${r.clean_type    ? `<div class="detail-section"><div class="detail-h">청소 유형</div><div class="detail-v">${esc(r.clean_type)}</div></div>` : ''}
    ${r.housing_type  ? `<div class="detail-section"><div class="detail-h">주거 형태</div><div class="detail-v">${esc(r.housing_type)}</div></div>` : ''}
    ${r.area_size     ? `<div class="detail-section"><div class="detail-h">평수</div><div class="detail-v">${r.area_size}평${r.area_type ? ` (${esc(r.area_type)})` : ''}</div></div>` : ''}
    ${(r.room_count !== null && r.room_count !== undefined) || (r.bathroom_count !== null && r.bathroom_count !== undefined) || (r.veranda_count !== null && r.veranda_count !== undefined) ? `
      <div class="detail-section">
        <div class="detail-h">방·화장실·베란다</div>
        <div class="detail-v" style="display:flex;gap:12px;">
          <span>🛏️ 방 <b>${r.room_count ?? '-'}</b></span>
          <span>🚽 화장실 <b>${r.bathroom_count ?? '-'}</b></span>
          <span>🪟 베란다 <b>${r.veranda_count ?? '-'}</b></span>
        </div>
      </div>` : ''}
    ${r.region        ? `<div class="detail-section"><div class="detail-h">지역</div><div class="detail-v">${esc(r.region)}</div></div>` : ''}
    ${r.desired_date  ? `<div class="detail-section"><div class="detail-h">희망 시공일</div><div class="detail-v">${fmtDateOnly(r.desired_date)}</div></div>` : ''}
    ${Array.isArray(r.site_conditions) && r.site_conditions.length ? `
      <div class="detail-section">
        <div class="detail-h">현장 특이 조건 (${r.site_conditions.length})</div>
        <div class="detail-v" style="display:flex;flex-wrap:wrap;gap:5px;">
          ${r.site_conditions.map(s => `<span class="ds-list-tag" style="background:#FFF0F4;color:#C92A4A;">⚠️ ${esc(s)}</span>`).join('')}
        </div>
      </div>` : ''}
    ${Array.isArray(r.appliance_options) && r.appliance_options.length ? `
      <div class="detail-section">
        <div class="detail-h">가전 분해청소 (${r.appliance_options.length}종)</div>
        <div class="detail-v" style="display:flex;flex-direction:column;gap:4px;">
          ${r.appliance_options.map(a => `<div style="display:flex;justify-content:space-between;padding:6px 10px;background:#F9FAFB;border-radius:6px;font-size:13px;"><span>${esc(a.name)}</span><b>${a.count}대</b></div>`).join('')}
        </div>
      </div>` : ''}
    ${r.aircon_info ? `<div class="detail-section"><div class="detail-h">에어컨 분해청소</div><div class="detail-v">${esc(r.aircon_info)}</div></div>` : ''}
    ${plans.length ? `
      <div class="detail-section">
        <div class="detail-h">🏠 아파트 평면도 ${plans.length}장</div>
        <div class="detail-photos">${plans.map(p => `<img src="${esc(p.url)}" onclick="window.open('${esc(p.url)}','_blank')">`).join('')}</div>
      </div>` : ''}
    ${photos.length ? `
      <div class="detail-section">
        <div class="detail-h">📸 현장 사진 ${photos.length}장</div>
        <div class="detail-photos">${photos.map(p => `<img src="${esc(p.url)}" onclick="window.open('${esc(p.url)}','_blank')">`).join('')}</div>
      </div>` : ''}
    ${r.notes ? `<div class="detail-section"><div class="detail-h">특이사항</div><div class="detail-notes">${esc(r.notes)}</div></div>` : ''}
    ${r.referral_source ? `<div class="detail-section"><div class="detail-h">유입 경로</div><div class="detail-v" style="color:#888;">📊 ${esc(r.referral_source)}</div></div>` : ''}

    ${isQuoted ? `
      <div class="detail-section" style="background:#D1FAE5;padding:12px 14px;border-radius:10px;">
        <div class="detail-h" style="color:#065F46;">견적 (발송 완료)</div>
        <div style="font-size:18px;font-weight:var(--fw-bold);color:#047857;margin-bottom:6px;">${fmtAmount(r.final_quote_amount)}</div>
        <div style="font-size:11px;color:#065F46;">${fmtDate(r.quoted_at)}</div>
        ${r.quote_message ? `<div class="detail-notes" style="background:rgba(255,255,255,0.6);margin-top:8px;">${esc(r.quote_message)}</div>` : ''}
      </div>
    ` : ''}

    ${isSubmitted ? `
      <hr style="margin:18px 0;border:none;border-top:1px solid #f0f0f0;">
      <div style="font-size:15px;font-weight:var(--fw-bold);margin-bottom:10px;">💰 견적 발송</div>

      <label>금액 (원) *</label>
      <input type="number" id="d-amount" placeholder="예: 350000" inputmode="numeric" oninput="rebuildMsg()">
      <div class="amount-quick">
        <button type="button" class="amt-btn" onclick="setAmt(200000)">20만원</button>
        <button type="button" class="amt-btn" onclick="setAmt(300000)">30만원</button>
        <button type="button" class="amt-btn" onclick="setAmt(400000)">40만원</button>
        <button type="button" class="amt-btn" onclick="setAmt(500000)">50만원</button>
      </div>

      <label>고객에게 보낼 SMS 본문 *</label>
      <textarea id="d-msg" maxlength="1000" placeholder="자동 생성된 견적 메시지"></textarea>
      <div class="hint">금액 입력 시 자동 생성됩니다. 직접 수정 가능.</div>

      <button class="btn" id="btn-send-quote" onclick="sendQuote()">📨 견적 SMS 발송</button>
      <button class="btn ghost" onclick="cancelReq()" style="color:#DC2626;border-color:#FECACA;">❌ 견적 거절/취소</button>
    ` : ''}
    ${isPending ? `
      <button class="btn ghost" onclick="cancelReq()" style="color:#DC2626;border-color:#FECACA;margin-top:14px;">❌ 견적 거절/취소</button>
    ` : ''}
  `;
  document.getElementById('detail-body').innerHTML = html;
  if (isSubmitted) rebuildMsg();  // 초기 메시지 생성
}

function setAmt(v){
  document.getElementById('d-amount').value = v;
  rebuildMsg();
}

function rebuildMsg(){
  const r = curDetail;
  if (!r) return;
  const amount = parseInt(document.getElementById('d-amount').value) || 0;
  // 자동 메시지 본문 — 받은 정보 압축 요약
  const summaryLines = [];
  if (r.housing_type)  summaryLines.push(`🏠 ${r.housing_type}`);
  if (r.area_size)     summaryLines.push(`📐 ${r.area_size}평${r.area_type ? ` (${r.area_type})` : ''}`);
  if (r.room_count != null || r.bathroom_count != null || r.veranda_count != null)
    summaryLines.push(`🛏 방${r.room_count ?? '-'} / 🚽 화${r.bathroom_count ?? '-'} / 🪟 베${r.veranda_count ?? '-'}`);
  if (Array.isArray(r.site_conditions) && r.site_conditions.length)
    summaryLines.push(`⚠️ 추가: ${r.site_conditions.join(', ')}`);
  if (Array.isArray(r.appliance_options) && r.appliance_options.length)
    summaryLines.push(`🔌 가전: ${r.appliance_options.map(a => `${a.name} ${a.count}대`).join(', ')}`);
  if (r.aircon_info)   summaryLines.push(`❄️ 에어컨: ${r.aircon_info}`);

  const tpl = cfg.quoteFinalMsg || `안녕하세요, ${cfg.company || '청소'}입니다.
${r.customer_name || '고객님'}님께서 알려주신 정보 확인했습니다.

📋 ${r.clean_type || '청소'}${r.region ? ` · ${r.region}` : ''}
${summaryLines.join('\n')}

💰 견적 금액: {금액}원

위 금액으로 진행 가능하시면 답장 또는 전화 부탁드립니다.
감사합니다.`;

  const msg = tpl
    .replace(/\{금액\}/g, amount ? amount.toLocaleString() : '0')
    .replace(/\{이름\}/g, r.customer_name || '고객님')
    .replace(/\{평수\}/g, r.area_size ? r.area_size + '평' : '')
    .replace(/\{유형\}/g, r.clean_type || '청소')
    .replace(/\{업체명\}/g, cfg.company || '');

  document.getElementById('d-msg').value = msg;
}

let isSendingQuote = false;  // 중복 발송 방어 (이중 안전망)
async function sendQuote(){
  if (isSendingQuote) return;
  const r = curDetail;
  if (!r) return;
  const amount = parseInt(document.getElementById('d-amount').value);
  const msg    = document.getElementById('d-msg').value.trim();
  if (!Number.isFinite(amount) || amount < 1) { toast('금액을 입력해 주세요'); return; }
  if (!msg) { toast('SMS 본문이 필요합니다'); return; }
  if (!(await ssakConfirm(`${fmtPhone(r.customer_phone)}에 ${amount.toLocaleString()}원으로 견적을 발송할까요?`))) return;

  const btn = document.getElementById('btn-send-quote');
  const originalText = btn ? btn.innerHTML : '';
  isSendingQuote = true;
  if (btn) {
    btn.disabled = true;
    btn.style.opacity = '0.6';
    btn.style.cursor = 'not-allowed';
    btn.innerHTML = '⏳ 발송 중...';
  }
  toast('📨 발송 중...');

  try {
    const res = await fetch(SERVER + '/api/quote-requests/' + r.id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'quote', final_quote_amount: amount, quote_message: msg })
    });
    const d = await res.json();
    if (!d.success) { toast(d.error || '발송 실패'); return; }
    toast('✅ 견적 발송 완료');
    closeDetail();
    loadList();
  } catch (e) {
    toast('오류: ' + (e.message||''));
  } finally {
    isSendingQuote = false;
    if (btn) {
      btn.disabled = false;
      btn.style.opacity = '';
      btn.style.cursor = '';
      btn.innerHTML = originalText;
    }
  }
}

async function cancelReq(){
  const r = curDetail;
  if (!r) return;
  if (!(await ssakConfirm(`${fmtPhone(r.customer_phone)} 견적 요청을 취소할까요?\n취소 후에는 같은 토큰으로 진행할 수 없습니다.`))) return;
  try {
    const res = await fetch(SERVER + '/api/quote-requests/' + r.id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'cancel' })
    });
    const d = await res.json();
    if (!d.success) { toast(d.error); return; }
    toast('취소되었습니다');
    closeDetail();
    loadList();
  } catch (e) {
    toast('오류: ' + (e.message||''));
  }
}

// ── 카드 스와이프 → 빠른 삭제 (design.css .ds-swipe-* 패턴) ─────
function bindSwipeHandlers() {
  const wraps = document.querySelectorAll('.ds-swipe-wrap');
  wraps.forEach(wrap => {
    const cardEl = wrap.querySelector('.ds-swipe-card');
    if (!cardEl) return;
    let startX = 0, currentX = 0, dragging = false;
    const openOffset = -76;  // .ds-swipe-action width와 동일
    const reset = () => { cardEl.style.transform = 'translateX(0)'; wrap._open = false; };

    cardEl.addEventListener('touchstart', (e) => {
      document.querySelectorAll('.ds-swipe-wrap').forEach(w => {
        if (w !== wrap && w._open) {
          const c = w.querySelector('.ds-swipe-card');
          if (c) c.style.transform = 'translateX(0)';
          w._open = false;
        }
      });
      startX = e.touches[0].clientX;
      currentX = startX;
      dragging = true;
    }, { passive: true });

    cardEl.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      currentX = e.touches[0].clientX;
      const dx = Math.min(0, Math.max(currentX - startX, openOffset));
      cardEl.style.transform = `translateX(${dx}px)`;
    }, { passive: true });

    cardEl.addEventListener('touchend', () => {
      if (!dragging) return;
      dragging = false;
      const dx = currentX - startX;
      if (dx < -38) {
        cardEl.style.transform = `translateX(${openOffset}px)`;
        wrap._open = true;
      } else {
        reset();
      }
    });

    cardEl.addEventListener('click', (e) => {
      if (wrap._open) { e.stopPropagation(); e.preventDefault(); reset(); }
    }, true);
  });
}

async function swipeDelete(id){
  if (!(await ssakConfirm('이 견적 요청을 삭제할까요?\n(7일간 휴지통에 보관 후 자동 영구 삭제)'))) return;
  try {
    const res = await fetch(SERVER + '/api/quote-requests/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'delete' })
    });
    const d = await res.json();
    if (!d.success) { toast(d.error || '삭제 실패'); return; }
    toast('🗑 휴지통으로 이동');
    // 낙관적 업데이트: 화면에서 즉시 제거
    allList = allList.filter(x => x.id !== id);
    refreshCounts();
    renderList();
    updateTrashBadge();
  } catch (e) {
    toast('오류: ' + (e.message||''));
  }
}

// ── 휴지통 ─────
let trashList = [];

async function updateTrashBadge(){
  try {
    const r = await fetch(SERVER + '/api/quote-requests/trash');
    const d = await r.json();
    if (!d.success) return;
    const n = (d.data || []).length;
    const btn = document.getElementById('btn-trash');
    const badge = document.getElementById('trash-badge');
    if (!btn || !badge) return;
    if (n > 0) {
      btn.style.display = 'inline-block';
      badge.textContent = n;
    } else {
      btn.style.display = 'none';
    }
  } catch (e) { /* silent */ }
}

async function openTrash(){
  document.getElementById('trash-ov').classList.add('on');
  document.getElementById('trash-body').innerHTML = '<div class="empty">불러오는 중...</div>';
  try {
    const r = await fetch(SERVER + '/api/quote-requests/trash');
    const d = await r.json();
    if (!d.success) throw new Error(d.error);
    trashList = d.data || [];
    renderTrash();
  } catch (e) {
    document.getElementById('trash-body').innerHTML = '<div class="empty">오류: ' + esc(e.message || '') + '</div>';
  }
}

function closeTrash(){ document.getElementById('trash-ov').classList.remove('on'); }

function renderTrash(){
  if (!trashList.length) {
    // 휴지통 빈 상태 = 싹싹이가 잠자고 있음 (할 일 없음 메타포)
    document.getElementById('trash-body').innerHTML =
      '<div class="ds-empty" style="padding:40px 24px;">' +
        '<div style="margin:0 auto 12px;width:120px;">' + mascot('sleep', { size: 120, color: 'var(--c-mint-d)' }) + '</div>' +
        '<div class="ds-empty-title">휴지통이 비어 있습니다</div>' +
        '<div class="ds-empty-sub">싹싹이가 쉬고 있어요</div>' +
      '</div>';
    return;
  }
  const html = '<div class="trash-empty-hint">💡 7일 후 자동 영구 삭제됩니다. 그 전에 ⤴ 복구 가능.</div>' +
    trashList.map(trashRow).join('');
  document.getElementById('trash-body').innerHTML = html;
}

function trashRow(r){
  const deletedAt = r.deleted_at
    ? new Date(r.deleted_at).toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })
    : '';
  const amount = r.final_quote_amount ? ` · ${fmtAmount(r.final_quote_amount)}` : '';
  return `<div class="trash-row">
    <div class="trash-row-info">
      <div style="font-size:14px;font-weight:700;color:#1A1F36;">${esc(r.customer_name || '(이름 미입력)')}</div>
      <div style="font-size:12.5px;color:#666;margin-top:2px;">${fmtPhone(r.customer_phone)}${amount}</div>
      <div style="font-size:10.5px;color:#999;margin-top:4px;">🗑 ${deletedAt} 삭제</div>
    </div>
    <button class="btn-restore" onclick="restoreItem('${esc(r.id)}')">⤴ 복구</button>
  </div>`;
}

async function restoreItem(id){
  if (!(await ssakConfirm('이 견적 요청을 복구할까요?'))) return;
  try {
    const res = await fetch(SERVER + '/api/quote-requests/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'restore' })
    });
    const d = await res.json();
    if (!d.success) { toast(d.error || '복구 실패'); return; }
    toast('⤴ 복구되었습니다');
    trashList = trashList.filter(x => x.id !== id);
    renderTrash();
    updateTrashBadge();
    loadList();  // 본 목록 갱신
  } catch (e) { toast('오류: ' + (e.message || '')); }
}

loadList();

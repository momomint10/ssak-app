<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>矛聥鹿矛聥鹿 芒聙聰 矛聤陇矛录聙矛陇聞</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="矛聥鹿矛聥鹿">
<meta name="theme-color" content="#00C896">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--primary:#00C896;--primary-dark:#00A87A;--primary-light:#E6FAF5;--gray-50:#F8FAFB;--gray-100:#F1F4F6;--gray-200:#E4E9EE;--gray-300:#C8D0DA;--gray-400:#9AA5B4;--gray-500:#6B7684;--gray-700:#3D4A5C;--gray-900:#1A1F36;--red:#EF4444;--amber:#F59E0B;--blue:#3B82F6;--purple:#8B5CF6;--radius:16px;--radius-sm:10px;--shadow:0 2px 12px rgba(0,0,0,0.07);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Noto Sans KR',sans-serif;background:var(--gray-50);color:var(--gray-900);}
.shell{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:100px;}

/* 铆聴陇毛聧聰 */
.header{background:#fff;border-bottom:1px solid var(--gray-200);padding:52px 20px 0;position:sticky;top:0;z-index:50;}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;}
.header-title{font-size:18px;font-weight:900;}
.add-btn-top{width:36px;height:36px;border-radius:50%;background:var(--primary);border:none;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;cursor:pointer;line-height:1;}

/* 矛聸聰 毛聞陇毛鹿聞锚虏聦矛聺麓矛聟聵 */
.month-nav{background:#fff;padding:0 20px 14px;display:flex;align-items:center;justify-content:space-between;}
.month-nav-btn{width:34px;height:34px;border-radius:50%;background:var(--gray-100);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.month-label{font-size:16px;font-weight:700;color:var(--gray-900);}

/* 矛潞聵毛娄掳毛聧聰 */
.calendar-wrap{background:#fff;padding:0 12px 12px;border-bottom:1px solid var(--gray-200);}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.cal-wd{text-align:center;font-size:11px;font-weight:600;color:var(--gray-400);padding:4px 0;}
.cal-wd:first-child{color:#EF4444;}
.cal-wd:last-child{color:var(--blue);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day{min-height:44px;border-radius:8px;display:flex;flex-direction:column;align-items:center;padding:4px 2px;cursor:pointer;transition:background 0.15s;position:relative;}
.cal-day:active{background:var(--gray-100);}
.cal-day.other-month .cal-num{color:var(--gray-300);}
.cal-day.today .cal-num{background:var(--primary);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.cal-day.selected{background:var(--primary-light);}
.cal-day.selected .cal-num{color:var(--primary-dark);font-weight:700;}
.cal-num{font-size:13px;font-weight:500;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.cal-day:first-child .cal-num,.cal-day.sunday .cal-num{color:#EF4444;}
.cal-day.today:first-child .cal-num,.cal-day.today.sunday .cal-num{color:#fff;}
.cal-day.saturday .cal-num{color:var(--blue);}
.cal-day.today.saturday .cal-num{color:#fff;}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:2px;min-height:6px;}
.cal-dot{width:5px;height:5px;border-radius:50%;}

/* 矛陆聵铆聟聬矛赂聽 */
.content{padding:16px 20px;}
.section-title{font-size:13px;font-weight:700;color:var(--gray-500);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.section-title span{flex:1;}
.section-title .count-badge{background:var(--primary-light);color:var(--primary-dark);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}

/* 矛聵聢矛聲陆 矛鹿麓毛聯聹 */
.booking-card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:all 0.15s;}
.booking-card:active{transform:scale(0.98);}
.booking-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.booking-name{font-size:15px;font-weight:700;}
.booking-status{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
.status-confirmed{background:#EEF2FF;color:#6366F1;}
.status-inprogress{background:#FFF7ED;color:#EA580C;}
.status-done{background:var(--primary-light);color:var(--primary-dark);}
.status-cancelled{background:#FEF2F2;color:#DC2626;}
.booking-meta{display:flex;gap:10px;font-size:12px;color:var(--gray-500);flex-wrap:wrap;}
.booking-meta-item{display:flex;align-items:center;gap:3px;}
.booking-card-footer{margin-top:10px;padding-top:10px;border-top:1px solid var(--gray-100);display:flex;gap:6px;}
.card-action-btn{flex:1;padding:7px 0;border-radius:8px;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-500);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.card-action-btn.primary{background:var(--primary-light);border-color:var(--primary);color:var(--primary-dark);}
.card-action-btn.danger{background:#FEF2F2;border-color:#FECACA;color:#DC2626;}

/* 毛鹿聢 矛聝聛铆聝聹 */
.empty-state{text-align:center;padding:40px 20px;color:var(--gray-400);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-text{font-size:14px;line-height:1.6;}

/* 铆聲聵毛聥篓 毛聞陇毛鹿聞锚虏聦矛聺麓矛聟聵 */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,0.95);border-top:1px solid var(--gray-200);backdrop-filter:blur(20px);display:flex;padding:8px 0 env(safe-area-inset-bottom,8px);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.06);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;background:none;border:none;font-family:inherit;font-size:10px;font-weight:500;color:var(--gray-400);cursor:pointer;}
.nav-item.active{color:var(--primary);font-weight:700;}
.nav-icon{font-size:20px;line-height:1;}

/* 毛陋篓毛聥卢 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;overflow-y:auto;padding:20px;}
.modal-overlay.open{display:flex;align-items:flex-end;}
.modal-sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;margin:0 auto;padding:20px 20px env(safe-area-inset-bottom,20px);max-height:90vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--gray-200);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:17px;font-weight:900;margin-bottom:18px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:600;color:var(--gray-500);margin-bottom:6px;display:block;}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--gray-900);outline:none;transition:border-color 0.2s;background:#fff;-webkit-appearance:none;}
.form-input:focus{border-color:var(--primary);}
select.form-input{cursor:pointer;}
textarea.form-input{resize:none;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-btns{display:flex;gap:8px;margin-top:4px;}
.btn-cancel{flex:1;padding:14px;background:var(--gray-100);color:var(--gray-700);border:none;border-radius:var(--radius);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}
.btn-save{flex:2;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.btn-delete{width:100%;padding:13px;background:#FEF2F2;color:#DC2626;border:1.5px solid #FECACA;border-radius:var(--radius);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}

/* 矛聝聛铆聝聹 矛聞聽铆聝聺 矛鹿漏 */
.status-chips{display:flex;gap:6px;flex-wrap:wrap;}
.status-chip{padding:7px 14px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-200);background:var(--gray-100);color:var(--gray-500);font-family:inherit;transition:all 0.15s;}
.status-chip.sel-confirmed{background:#EEF2FF;border-color:#A5B4FC;color:#6366F1;}
.status-chip.sel-inprogress{background:#FFF7ED;border-color:#FDBA74;color:#EA580C;}
.status-chip.sel-done{background:var(--primary-light);border-color:var(--primary);color:var(--primary-dark);}
.status-chip.sel-cancelled{background:#FEF2F2;border-color:#FECACA;color:#DC2626;}

/* SMS 毛掳聹矛聠隆 铆聦篓毛聞聬 */
.sms-quick{background:var(--primary-light);border:1.5px solid var(--primary);border-radius:var(--radius-sm);padding:12px 14px;margin-top:12px;}
.sms-quick-title{font-size:12px;font-weight:700;color:var(--primary-dark);margin-bottom:8px;}
.sms-tpl-btn{padding:7px 12px;border-radius:8px;background:#fff;border:1px solid var(--primary);color:var(--primary-dark);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;margin-right:6px;margin-bottom:6px;}

/* 铆聠聽矛聤陇铆聤赂 */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(26,31,54,0.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}

/* 矛聥聽锚路聹 矛聵聢矛聲陆矛聥聽矛虏颅 毛掳掳毛聞聢 */
.pending-banner{background:linear-gradient(135deg,#6366F1,#8B5CF6);padding:12px 20px;cursor:pointer;}
.pending-banner-inner{display:flex;align-items:center;gap:10px;}
.pending-dot{width:8px;height:8px;background:#fff;border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(1.3);}}
.pending-text{flex:1;font-size:13px;font-weight:700;color:#fff;}
.pending-count{background:rgba(255,255,255,0.25);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
.pending-sheet{background:#fff;border-top:1px solid var(--gray-200);padding:16px 20px;display:none;}
.pending-sheet.open{display:block;}
.pending-card{background:#fff;border:1.5px solid #A5B4FC;border-radius:var(--radius);padding:13px 15px;margin-bottom:10px;border-left:4px solid #6366F1;}
.pending-card-name{font-size:15px;font-weight:700;margin-bottom:5px;}
.pending-card-meta{font-size:12px;color:var(--gray-500);line-height:1.7;margin-bottom:10px;}
.pending-card-btns{display:flex;gap:8px;}
.btn-approve{flex:2;padding:9px;background:#6366F1;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-reject{flex:1;padding:9px;background:var(--gray-100);color:var(--gray-500);border:1.5px solid var(--gray-200);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
</style>
</head>

// 芒聰聙芒聰聙 毛聜聽矛搂聹 矛聹聽铆聥赂 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
let viewYear = new Date().getFullYear();
let viewMonth = new Date().getMonth(); // 0-indexed
let selectedDate = toDateStr(new Date());
let editingId = null;
let selectedStatus = 'confirmed';

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function todayStr() { return toDateStr(new Date()); }

// 芒聰聙芒聰聙 矛潞聵毛娄掳毛聧聰 毛聽聦毛聧聰毛搂聛 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function renderCalendar() {
  const MONTHS = ['1矛聸聰','2矛聸聰','3矛聸聰','4矛聸聰','5矛聸聰','6矛聸聰','7矛聸聰','8矛聸聰','9矛聸聰','10矛聸聰','11矛聸聰','12矛聸聰'];
  document.getElementById('month-label').textContent = `${viewYear}毛聟聞 ${MONTHS[viewMonth]}`;

  const grid = document.getElementById('cal-grid');
  const today = todayStr();

  // 矛聺麓毛聥卢 1矛聺录 矛職聰矛聺录, 毛搂聬矛聺录
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const lastDate = new Date(viewYear, viewMonth+1, 0).getDate();
  const prevLastDate = new Date(viewYear, viewMonth, 0).getDate();

  // 矛聵聢矛聲陆 毛聜聽矛搂聹毛鲁聞 矛搂聭锚鲁聞
  const dotMap = {};
  schedules.forEach(s => {
    if (!dotMap[s.date]) dotMap[s.date] = [];
    dotMap[s.date].push(s.status);
  });

  const STATUS_COLOR = {confirmed:'#6366F1', inprogress:'#EA580C', done:'#00C896', cancelled:'#DC2626'};

  let html = '';
  const totalCells = Math.ceil((firstDay + lastDate) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    let dateNum, dateStr, isOther = false;
    const dayOfWeek = i % 7;

    if (i < firstDay) {
      dateNum = prevLastDate - firstDay + i + 1;
      const m = viewMonth === 0 ? 12 : viewMonth;
      const y = viewMonth === 0 ? viewYear - 1 : viewYear;
      dateStr = `${y}-${String(m).padStart(2,'0')}-${String(dateNum).padStart(2,'0')}`;
      isOther = true;
    } else if (i >= firstDay + lastDate) {
      dateNum = i - firstDay - lastDate + 1;
      const m = viewMonth === 11 ? 1 : viewMonth + 2;
      const y = viewMonth === 11 ? viewYear + 1 : viewYear;
      dateStr = `${y}-${String(m).padStart(2,'0')}-${String(dateNum).padStart(2,'0')}`;
      isOther = true;
    } else {
      dateNum = i - firstDay + 1;
      dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(dateNum).padStart(2,'0')}`;
    }

    const isToday = dateStr === today;
    const isSel = dateStr === selectedDate;
    const isSun = dayOfWeek === 0;
    const isSat = dayOfWeek === 6;

    let cls = 'cal-day';
    if (isOther) cls += ' other-month';
    if (isToday) cls += ' today';
    if (isSel) cls += ' selected';
    if (isSun) cls += ' sunday';
    if (isSat) cls += ' saturday';

    // 矛聽聬 (矛碌聹毛聦聙 3锚掳聹)
    const dots = (dotMap[dateStr] || []).slice(0, 3).map(st =>
      `<div class="cal-dot" style="background:${STATUS_COLOR[st]||'#ccc'}"></div>`
    ).join('');

    html += `<div class="${cls}" onclick="selectDay('${dateStr}')">
      <div class="cal-num">${dateNum}</div>
      <div class="cal-dots">${dots}</div>
    </div>`;
  }

  grid.innerHTML = html;
}

function selectDay(dateStr) {
  selectedDate = dateStr;
  renderCalendar();
  renderList();
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderCalendar();
}

function renderList() {
  const list = document.getElementById('booking-list');
  const label = document.getElementById('list-label');
  const countBadge = document.getElementById('list-count');

  const today = todayStr();
  let items = schedules.filter(s => s.date === selectedDate)
    .sort((a,b) => (a.time||'').localeCompare(b.time||''));

  const isToday = selectedDate === today;
  const d = new Date(selectedDate + 'T00:00:00');
  const dayNames = ['矛聺录','矛聸聰','铆聶聰','矛聢聵','毛陋漏','锚赂聢','铆聠聽'];
  label.textContent = isToday
    ? `矛聵陇毛聤聵矛聺聵 矛聵聢矛聲陆`
    : `${d.getMonth()+1}矛聸聰 ${d.getDate()}矛聺录 (${dayNames[d.getDay()]}) 矛聵聢矛聲陆`;

  countBadge.textContent = `${items.length}锚卤麓`;

  if (items.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">冒聼聯颅</div>
      <div class="empty-text">矛聺麓 毛聜聽 矛聵聢矛聲陆矛聺麓 矛聴聠矛聤碌毛聥聢毛聥陇<br><span style="color:var(--primary);font-weight:700;cursor:pointer;" onclick="openAddModal()">+ 矛聵聢矛聲陆 矛露聰锚掳聙铆聲聵锚赂掳</span></div>
    </div>`;
    return;
  }

  const STATUS_LABEL = {confirmed:'矛聵聢矛聲陆铆聶聲矛聽聲', inprogress:'矛搂聞铆聳聣矛陇聭', done:'矛聶聞毛拢聦', cancelled:'矛路篓矛聠聦'};
  const STATUS_CLASS = {confirmed:'status-confirmed', inprogress:'status-inprogress', done:'status-done', cancelled:'status-cancelled'};

  list.innerHTML = items.map(s => `
    <div class="booking-card" onclick="openEditModal('${s.id}')">
      <div class="booking-card-top">
        <div>
          <div class="booking-name">${s.name}</div>
          <div class="booking-meta" style="margin-top:4px;">
            ${s.time ? `<span class="booking-meta-item">冒聼聲聬 ${s.time}</span>` : ''}
            ${s.type ? `<span class="booking-meta-item">冒聼搂鹿 ${s.type}</span>` : ''}
            ${s.size ? `<span class="booking-meta-item">冒聼聯聬 ${s.size}铆聫聣</span>` : ''}
          </div>
        </div>
        <span class="booking-status ${STATUS_CLASS[s.status]||''}">${STATUS_LABEL[s.status]||s.status}</span>
      </div>
      ${s.addr ? `<div style="font-size:12px;color:var(--gray-500);margin-bottom:4px;">冒聼聯聧 ${s.addr}</div>` : ''}
      ${s.price ? `<div style="font-size:12.5px;font-weight:700;color:var(--gray-700);">冒聼聮掳 ${Number(s.price).toLocaleString()}矛聸聬</div>` : ''}
      ${s.memo ? `<div style="font-size:12px;color:var(--gray-400);margin-top:4px;">冒聼聮卢 ${s.memo}</div>` : ''}
      <div class="booking-card-footer">
        <button class="card-action-btn primary" onclick="event.stopPropagation();openEditModal('${s.id}')">芒聹聫茂赂聫 矛聢聵矛聽聲</button>
        <button class="card-action-btn" onclick="event.stopPropagation();changeStatus('${s.id}')">冒聼聰聞 矛聝聛铆聝聹毛鲁聙锚虏陆</button>
        <button class="card-action-btn" onclick="event.stopPropagation();quickSMSCard('${s.id}')">冒聼聯卤 毛卢赂矛聻聬</button>
      </div>
    </div>
  `).join('');
}

// 芒聰聙芒聰聙 毛陋篓毛聥卢 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙

  editingId = null;
  selectedStatus = 'confirmed';
  document.getElementById('modal-title').textContent = '冒聼聯聥 矛聵聢矛聲陆 矛露聰锚掳聙';
  document.getElementById('b-name').value = '';
  document.getElementById('b-phone').value = '';
  document.getElementById('b-date').value = selectedDate;
  document.getElementById('b-time').value = '10:00';

  document.getElementById('b-size').value = '';
  document.getElementById('b-price').value = '';
  document.getElementById('b-memo').value = '';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('sms-quick-panel').style.display = 'none';
  updateStatusChips();

function openEditModal(id) {
  const s = schedules.find(x => x.id === id);
  if (!s) return;
  editingId = id;
  selectedStatus = s.status || 'confirmed';
  document.getElementById('modal-title').textContent = '芒聹聫茂赂聫 矛聵聢矛聲陆 矛聢聵矛聽聲';
  document.getElementById('b-name').value = s.name || '';
  document.getElementById('b-phone').value = s.phone || '';
  document.getElementById('b-date').value = s.date || '';
  document.getElementById('b-time').value = s.time || '10:00';
  document.getElementById('b-addr').value = s.addr || '';
  document.getElementById('b-type').value = s.type || '矛聻聟矛拢录 矛聽聞 矛虏颅矛聠聦';
  document.getElementById('b-size').value = s.size || '';
  document.getElementById('b-price').value = s.price || '';
  document.getElementById('b-memo').value = s.memo || '';
  document.getElementById('btn-delete').style.display = 'block';
  document.getElementById('sms-quick-panel').style.display = 'block';
  updateStatusChips();
  document.getElementById('booking-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('booking-modal').classList.remove('open');
}

function selectStatus(st, btn) {
  selectedStatus = st;
  updateStatusChips();
}

function updateStatusChips() {
  const MAP = {confirmed:'sel-confirmed', inprogress:'sel-inprogress', done:'sel-done', cancelled:'sel-cancelled'};
  document.querySelectorAll('.status-chip').forEach(c => {
    c.className = 'status-chip';
    const st = c.onclick.toString().match(/'(\w+)'/)?.[1];
    if (st === selectedStatus) c.className = 'status-chip ' + MAP[st];
  });
}

function saveBooking() {
  const name = document.getElementById('b-name').value.trim();
  const date = document.getElementById('b-date').value;
  if (!name || !date) { toast('锚鲁聽锚掳聺毛陋聟锚鲁录 毛聜聽矛搂聹毛聤聰 铆聲聞矛聢聵矛聻聟毛聥聢毛聥陇'); return; }

  const data = {
    id: editingId || Date.now().toString(),
    name,
    phone: document.getElementById('b-phone').value.trim(),
    date,
    time: document.getElementById('b-time').value,
    addr: document.getElementById('b-addr').value.trim(),
    type: document.getElementById('b-type').value,
    size: document.getElementById('b-size').value,
    price: document.getElementById('b-price').value,
    memo: document.getElementById('b-memo').value.trim(),
    status: selectedStatus,
    updatedAt: Date.now()
  };

  if (editingId) {
    const idx = schedules.findIndex(s => s.id === editingId);
    if (idx >= 0) schedules[idx] = data;
  } else {
    schedules.push(data);
  }

  saveSchedules();
  selectedDate = date;

  // 矛聸聰/矛聴掳毛聫聞毛聫聞 毛搂聻矛露聰锚赂掳
  const d = new Date(date + 'T00:00:00');
  viewYear = d.getFullYear();
  viewMonth = d.getMonth();

  closeModal();
  renderCalendar();
  renderList();
  toast(editingId ? '芒聹聟 矛聵聢矛聲陆矛聺麓 矛聢聵矛聽聲毛聬聬矛聤碌毛聥聢毛聥陇' : '芒聹聟 矛聵聢矛聲陆矛聺麓 矛露聰锚掳聙毛聬聬矛聤碌毛聥聢毛聥陇');
}

function deleteBooking() {
  if (!editingId) return;
  if (!confirm('矛聺麓 矛聵聢矛聲陆矛聺聞 矛聜颅矛聽聹铆聲聵矛聥聹锚虏聽矛聤碌毛聥聢锚鹿聦?')) return;
  schedules = schedules.filter(s => s.id !== editingId);
  saveSchedules();
  closeModal();
  renderCalendar();
  renderList();
  toast('冒聼聴聭 矛聵聢矛聲陆矛聺麓 矛聜颅矛聽聹毛聬聬矛聤碌毛聥聢毛聥陇');
}

// 芒聰聙芒聰聙 矛聝聛铆聝聹 毛鹿聽毛楼赂 毛鲁聙锚虏陆 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function changeStatus(id) {
  const ORDER = ['confirmed','inprogress','done','cancelled'];
  const LABEL = {confirmed:'矛聵聢矛聲陆铆聶聲矛聽聲', inprogress:'矛搂聞铆聳聣矛陇聭', done:'矛聶聞毛拢聦', cancelled:'矛路篓矛聠聦'};
  const s = schedules.find(x => x.id === id);
  if (!s) return;
  const cur = ORDER.indexOf(s.status);
  s.status = ORDER[(cur + 1) % ORDER.length];
  s.updatedAt = Date.now();
  saveSchedules();
  renderCalendar();
  renderList();
  toast(`芒聠聮 ${LABEL[s.status]}矛聹录毛隆聹 毛鲁聙锚虏陆毛聬聬矛聤碌毛聥聢毛聥陇`);
}

function sendQuickSMS(type) {
  const name = document.getElementById('b-name').value.trim() || '锚鲁聽锚掳聺';
  const date = document.getElementById('b-date').value;
  const time = document.getElementById('b-time').value;
  const addr = document.getElementById('b-addr').value.trim();
  const phone = document.getElementById('b-phone').value.trim();
  const company = cfg.company || '矛聥鹿矛聥鹿铆聛麓毛娄掳';

  if (!phone) { toast('矛聴掳毛聺陆矛虏聵毛楼录 矛聻聟毛聽楼铆聲麓矛拢录矛聞赂矛職聰'); return; }

  const d = date ? new Date(date+'T00:00:00') : new Date();
  const dateLabel = `${d.getMonth()+1}矛聸聰 ${d.getDate()}矛聺录`;

  const MSGS = {
    confirm: `[${company}] ${name}毛聥聵, ${dateLabel} ${time} 矛聻聟矛拢录矛虏颅矛聠聦 矛聵聢矛聲陆矛聺麓 铆聶聲矛聽聲毛聬聬矛聤碌毛聥聢毛聥陇. 矛拢录矛聠聦: ${addr||'铆聵聭矛聺聵'}. 毛卢赂矛聺聵: ${cfg.phone||''} 锚掳聬矛聜卢铆聲漏毛聥聢毛聥陇 冒聼聵聤`,
    remind: `[${company}] ${name}毛聥聵, 矛聵陇毛聤聵 ${time} 矛聻聟矛拢录矛虏颅矛聠聦 矛聺录矛聽聲矛聺麓 矛聻聢矛聤碌毛聥聢毛聥陇. 矛聻聤矛搂聙 毛搂聢矛聞赂矛職聰! 毛卢赂矛聺聵: ${cfg.phone||''}`,
    done: `[${company}] ${name}毛聥聵, 矛聵陇毛聤聵 矛虏颅矛聠聦锚掳聙 矛聶聞毛拢聦毛聬聬矛聤碌毛聥聢毛聥陇. 矛聺麓矛職漏铆聲麓 矛拢录矛聟聰矛聞聹 锚掳聬矛聜卢铆聲漏毛聥聢毛聥陇 冒聼聶聫 铆聸聞锚赂掳: ${cfg.review||''}`
  };

  const msg = MSGS[type];
  const apiKey = cfg.apiKey;
  const apiSecret = cfg.apiSecret;
  const fromPhone = cfg.fromPhone;

  if (!apiKey || !apiSecret || !fromPhone) {
    toast('矛聞陇矛聽聲矛聴聬矛聞聹 CoolSMS API毛楼录 毛篓录矛聽聙 矛聞陇矛聽聲铆聲麓矛拢录矛聞赂矛職聰');
    return;
  }

  toast('冒聼聯卤 毛卢赂矛聻聬 毛掳聹矛聠隆 矛陇聭...');

  fetch('https://ssakssak-server-production.up.railway.app/send-sms', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ to: phone, from: fromPhone, text: msg, apiKey, apiSecret })
  }).then(r => r.json()).then(data => {
    if (data.success) toast('芒聹聟 毛卢赂矛聻聬 毛掳聹矛聠隆 矛聶聞毛拢聦!');
    else toast('芒聺聦 毛掳聹矛聠隆 矛聥陇铆聦篓: ' + (data.error||'矛聵陇毛楼聵'));
  }).catch(() => toast('芒聺聦 矛聞聹毛虏聞 矛聵陇毛楼聵'));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 2400);
}

// 芒聰聙芒聰聙 矛麓聢锚赂掳铆聶聰 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙

const SERVER = 'https://ssakssak-server-production.up.railway.app';

// 芒聰聙芒聰聙 矛聥聽锚路聹 矛聵聢矛聲陆矛聥聽矛虏颅 毛隆聹毛聯聹 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
async function fetchPendingBookings() {
  try {
    const r = await fetch(SERVER + '/api/bookings?status=pending');
    const d = await r.json();
    if (!d.success || !d.data.length) return;
    const list = d.data;
    document.getElementById('pending-banner').style.display = 'block';
    document.getElementById('pending-count').textContent = list.length + '锚卤麓';
    document.getElementById('pending-list').innerHTML = list.map(b => `
      <div class="pending-card" id="pc-${b.id}">
        <div class="pending-card-name">${b.name} <span style="font-size:12px;color:#6366F1;font-weight:400;">${b.phone}</span></div>
        <div class="pending-card-meta">
          冒聼聯聟 ${b.date} ${b.time}<br>
          冒聼搂鹿 ${b.type} ${b.size ? b.size+'铆聫聣' : ''}<br>
          冒聼聯聧 ${b.address || '矛拢录矛聠聦 毛炉赂矛聻聟毛聽楼'}
          ${b.notes ? '<br>冒聼聮卢 '+b.notes : ''}
        </div>
        <div class="pending-card-btns">
          <button class="btn-approve" onclick="approveBooking('${b.id}',${JSON.stringify(b).replace(/"/g,'&quot;')})">芒聹聟 矛聤陇矛录聙矛陇聞矛聴聬 矛露聰锚掳聙</button>
          <button class="btn-reject" onclick="rejectBooking('${b.id}')">芒聹聲 锚卤掳矛聽聢</button>
        </div>
      </div>
    `).join('');
  } catch(e) { console.log('pending fetch error:', e); }
}

function togglePendingSheet() {
  const sheet = document.getElementById('pending-sheet');
  sheet.classList.toggle('open');
}

async function approveBooking(id, bookingData) {
  if (typeof bookingData === 'string') bookingData = JSON.parse(bookingData.replace(/&quot;/g,'"'));
  // 矛聤陇矛录聙矛陇聞矛聴聬 矛露聰锚掳聙
  schedules.push({
    id: Date.now().toString(),
    name: bookingData.name,
    phone: bookingData.phone,
    date: bookingData.date,
    time: bookingData.time,
    addr: bookingData.address,
    type: bookingData.type,
    size: bookingData.size,
    memo: bookingData.notes,
    status: 'confirmed',
    updatedAt: Date.now()
  });
  saveSchedules();
  // 矛聞聹毛虏聞矛聴聬矛聞聹 矛聝聛铆聝聹 矛聴聟毛聧掳矛聺麓铆聤赂
  try {
    await fetch(SERVER + '/api/bookings/' + id + '/status', {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({status:'confirmed'})
    });
  } catch(e) {}
  // 矛鹿麓毛聯聹 矛聽聹锚卤掳
  const card = document.getElementById('pc-' + id);
  if (card) card.remove();
  // 毛聜篓矛聺聙 矛鹿麓毛聯聹 矛虏麓铆聛卢
  if (!document.querySelector('.pending-card')) {
    document.getElementById('pending-banner').style.display = 'none';
    document.getElementById('pending-sheet').classList.remove('open');
  } else {
    const cnt = document.querySelectorAll('.pending-card').length;
    document.getElementById('pending-count').textContent = cnt + '锚卤麓';
  }
  // 铆聲麓毛聥鹿 毛聜聽矛搂聹毛隆聹 矛聺麓毛聫聶
  if (bookingData.date) {
    const d = new Date(bookingData.date + 'T00:00:00');
    viewYear = d.getFullYear(); viewMonth = d.getMonth(); selectedDate = bookingData.date;
  }
  renderCalendar(); renderList();
  toast('芒聹聟 矛聤陇矛录聙矛陇聞矛聴聬 矛露聰锚掳聙毛聬聬矛聤碌毛聥聢毛聥陇!');
}

async function rejectBooking(id) {
  if (!confirm('矛聺麓 矛聵聢矛聲陆矛聥聽矛虏颅矛聺聞 锚卤掳矛聽聢铆聲聵矛聥聹锚虏聽矛聤碌毛聥聢锚鹿聦?')) return;
  try {
    await fetch(SERVER + '/api/bookings/' + id + '/status', {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({status:'rejected'})
    });
  } catch(e) {}
  const card = document.getElementById('pc-' + id);
  if (card) card.remove();
  if (!document.querySelector('.pending-card')) {
    document.getElementById('pending-banner').style.display = 'none';
    document.getElementById('pending-sheet').classList.remove('open');
  } else {
    const cnt = document.querySelectorAll('.pending-card').length;
    document.getElementById('pending-count').textContent = cnt + '锚卤麓';
  }
  toast('锚卤掳矛聽聢 矛虏聵毛娄卢毛聬聬矛聤碌毛聥聢毛聥陇');
}

renderCalendar();
renderList();
fetchPendingBookings();
</script>

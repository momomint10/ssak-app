<script>
/* 싹싹 인증 진입 가드 (Phase 2 / 2026-05-17) — JWT 검증, 미로그인 시 login.html로 */
(function(){
  try {
    var tok = localStorage.getItem('ssak_jwt');
    if (!tok) throw new Error('no_token');
    var parts = tok.split('.');
    if (parts.length !== 3) throw new Error('bad_token');
    var p64 = parts[1].replace(/-/g,'+').replace(/_/g,'/');
    while (p64.length % 4) p64 += '=';
    var bin = atob(p64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    var payload = JSON.parse(new TextDecoder('utf-8').decode(bytes));
    if (payload.exp && payload.exp < Math.floor(Date.now()/1000)) throw new Error('expired');
  } catch (e) {
    localStorage.removeItem('ssak_jwt');
    localStorage.removeItem('ssak_user');
    var next = encodeURIComponent(location.pathname + location.search);
    location.replace('/login.html?next=' + next);
  }
})();
</script>

:root{--primary:var(--c-pr);--primary-dark:var(--c-pr-d);--primary-light:var(--c-pr-l);--gray-50:var(--c-bg);--gray-100:var(--c-g100);--gray-200:var(--c-g200);--gray-300:var(--c-g300);--gray-400:var(--c-g400);--gray-500:var(--c-g500);--gray-700:var(--c-g700);--gray-900:var(--c-g900);--red:var(--c-red);--amber:var(--c-amber);--blue:var(--c-blue);--purple:#8B5CF6;--radius:var(--r-lg);--radius-sm:10px;--shadow:var(--sh-sm);}

/* V1.9.20.1: 오늘 cell 원형 + 글씨 명확화 (font-size + line-height 명시) */

.agenda-day-num .a-d{font-size:14px;font-weight:var(--fw-bold);color:var(--gray-900);line-height:1;}
.agenda-day-num .a-w{font-size:9px;color:var(--gray-500);font-weight:700;margin-top:1px;}
.agenda-day-num.today{background:var(--primary);border-color:var(--primary);}
.agenda-day-num.today .a-d,.agenda-day-num.today .a-w{color:#fff;}
.agenda-day-num.sunday .a-d{color:#EF4444;}
.agenda-day-num.saturday .a-d{color:var(--blue);}
.agenda-day-label{flex:1;font-size:13px;color:var(--gray-500);font-weight:600;}
.agenda-day-count{font-size:11px;font-weight:700;color:var(--primary-dark);background:var(--primary-light);padding:2px 8px;border-radius:20px;}
.agenda-card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;}
.agenda-card:active{background:var(--gray-50);}
.agenda-time{font-size:13px;font-weight:700;color:var(--gray-700);min-width:46px;}
.agenda-info{flex:1;min-width:0;}
.agenda-name{font-size:13px;font-weight:700;color:var(--gray-900);}
.agenda-meta{font-size:11.5px;color:var(--gray-500);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.agenda-empty{text-align:center;padding:48px 20px;color:var(--gray-400);}

/* === Phase 8: 매출 그래프 === */
.stats-card{margin:12px 16px 0;background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px 16px;}
.stats-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px;}
.stats-title{font-size:13px;font-weight:700;color:var(--gray-700);letter-spacing:-0.01em;}
.stats-totals{display:flex;gap:18px;}
.stats-total-item{display:flex;flex-direction:column;align-items:flex-end;}
.stats-total-lbl{font-size:11px;color:var(--gray-500);font-weight:600;margin-bottom:2px;}
.stats-total-num{font-size:17px;font-weight:var(--fw-bold);color:var(--gray-900);letter-spacing:-0.02em;}
.stats-total-item:first-child .stats-total-num{font-size:20px;color:var(--c-pr,#FF385C);}
.stats-chart{width:100%;height:80px;display:block;}

/* === Phase 7: 카드 스와이프 === */
.booking-card-wrap{position:relative;overflow:hidden;border-radius:var(--radius);margin-bottom:10px;}
.booking-card-wrap .booking-card{margin-bottom:0;transition:transform 0.18s ease;will-change:transform;touch-action:pan-y;}
.swipe-action{position:absolute;top:0;right:0;height:100%;width:90px;display:flex;align-items:center;justify-content:center;background:#DC2626;color:#fff;font-size:13px;font-weight:700;border-top-right-radius:var(--radius);border-bottom-right-radius:var(--radius);cursor:pointer;font-family:inherit;border:none;}

/* === 검색 모달 (Phase 1B) === */
.search-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;}
.search-overlay.open{display:block;}
.search-sheet{position:absolute;inset:0;background:#fff;display:flex;flex-direction:column;}
.search-header{padding:14px 16px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;gap:10px;}
.search-input{flex:1;padding:11px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;outline:none;}
.search-input:focus{border-color:var(--primary);}
.search-close{background:none;border:none;font-size:15px;font-weight:700;color:var(--gray-500);cursor:pointer;padding:6px;font-family:inherit;}
.search-results{flex:1;overflow-y:auto;padding:8px 16px 80px;}
.search-result-item{padding:13px 14px;border-radius:var(--radius-sm);background:#fff;border:1px solid var(--gray-200);margin-bottom:8px;cursor:pointer;}
.search-result-item:active{background:var(--gray-50);}
.search-result-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.search-result-name{font-size:14px;font-weight:700;color:var(--gray-900);}
.search-result-date{font-size:11.5px;color:var(--gray-500);}
.search-result-meta{font-size:12px;color:var(--gray-500);line-height:1.5;}
.search-empty{text-align:center;padding:40px 20px;color:var(--gray-400);font-size:13px;}
.search-hint{font-size:12px;color:var(--gray-400);margin:8px 0 4px;}

/* === 액션 시트 (Phase 2) === */
.action-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;}
.action-overlay.open{display:flex;}
.action-sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;margin:0 auto;padding:14px 16px env(safe-area-inset-bottom,16px);max-height:85vh;overflow-y:auto;}
.action-handle{width:36px;height:4px;background:var(--gray-200);border-radius:2px;margin:0 auto 10px;}
.action-header{padding:6px 4px 14px;border-bottom:1px solid var(--gray-100);margin-bottom:10px;}
.action-header-name{font-size:16px;font-weight:var(--fw-bold);}
.action-header-meta{font-size:12px;color:var(--gray-500);margin-top:3px;}
.action-section-title{font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.5px;margin:10px 0 6px;padding:0 4px;}
.action-row{display:flex;gap:8px;margin-bottom:8px;}
.action-btn{flex:1;padding:14px 8px;border-radius:var(--radius);background:#fff;border:1.5px solid var(--gray-200);cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all 0.15s;}
.action-btn:active{transform:scale(0.96);background:var(--gray-50);}
.action-btn-icon{font-size:22px;line-height:1;}
.action-btn-label{font-size:11.5px;font-weight:600;color:var(--gray-700);}
.action-btn.primary{background:var(--primary-light);border-color:var(--primary);}
.action-btn.primary .action-btn-label{color:var(--primary-dark);}
.action-btn.danger{background:#FEF2F2;border-color:#FECACA;}
.action-btn.danger .action-btn-label{color:#DC2626;}

/* === 반복 옵션 (Phase 6) === */
.repeat-info{font-size:11.5px;color:var(--primary-dark);background:var(--primary-light);padding:6px 10px;border-radius:8px;margin-top:6px;display:none;}
.repeat-info.show{display:block;}

/* === 자동 리마인더 표시 (Phase 3 → 260527 톤업) === */
.reminder-status{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;line-height:1.4;
  margin:10px 16px 0;padding:10px 14px;
  border-radius:12px;
  background:var(--c-pr-xl, #FFEFF3);color:var(--c-pr-d, #E31C5F);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:transform .12s var(--ease-spring, ease-out), opacity .15s;
  letter-spacing:-.01em;
}
.reminder-status:empty{display:none;}
.reminder-status:active{transform:scale(.98);opacity:.85;}
.reminder-status .label{flex:1;}
.reminder-status .arrow{font-size:14px;opacity:.7;font-weight:700;}
.reminder-status.is-on{
  background:var(--c-mint-xl, #ECFDF5);color:#0F766E;
}
.reminder-status.is-off{
  background:var(--c-g100, #F2F4F6);color:var(--gray-500);
}
.reminder-status.is-busy{
  background:var(--c-pr-l, #FFE5EB);color:var(--c-pr-d, #E31C5F);
  animation:rem-pulse 1.2s ease-in-out infinite;
}
@keyframes rem-pulse{0%,100%{opacity:1}50%{opacity:.65}}
.reminder-status .on{color:#0F766E;font-weight:700;}

/* === Phase 4: 캘린더 셀 미니 텍스트 (V1.9.15: cell 안에 안 들어가는 시간 미리보기 숨김) === */
.cal-mini{display:none;}
.cal-mini-count{display:none;}
.cal-day.selected .cal-mini{color:var(--primary-dark);}
.cal-day.other-month .cal-mini{color:var(--gray-300);}

/* ═══ V1.9.15 mockup 풀 적용 — 사장님 결정 ═══ */
/* 1) 인사말 헤더 — 큰 톤 */
.sched-greet { padding:calc(14px + env(safe-area-inset-top)) 16px 12px; background:#fff; }  /* V1.9.75~76: 표준 높이 통일 + standalone 노치 안전 */
.sched-greet .greet-inner { display:flex; align-items:flex-end; justify-content:space-between; gap:14px; }
.sched-greet .greet-name { font-size:30px; font-weight:900; letter-spacing:-.035em; line-height:1.18; color:#191F28; }
.sched-greet .greet-name small { display:block; font-size:17px; color:#1B2A3F; font-weight:800; margin-top:5px; }
.sched-greet .icon-btn { background:#F2F4F6; border:none; width:38px; height:38px; border-radius:50%; font-size:16px; cursor:pointer; flex-shrink:0; }

/* 2) Pure White Hero 카드 + V1.9.28 날씨 연동 tone */
.hero-card {
  margin:14px 18px 0; border-radius:22px; padding:16px 22px;
  background:#fff; box-shadow:0 4px 18px rgba(15,15,18,.07);
  transition: background .35s ease;
}
.hero-label {
  display:inline-flex; align-items:center; gap:5px;
  font-size:12px; font-weight:800; color:#6B7280;
  letter-spacing:.04em; margin-bottom:7px;
}
.hero-weather { color:#9CA3AF; font-size:11px; font-weight:600; margin-left:2px; }
.hero-title {
  font-size:24px; font-weight:900; color:#1B2A3F;
  letter-spacing:-.03em; line-height:1.15;
}
.hero-title b { color:#1B2A3F; font-weight:900; }
.hero-sub {
  font-size:13px; font-weight:700; color:#6B7280; margin-top:6px;
}
.hero-sub b { color:inherit; font-weight:700; }

/* V1.9.28.1: 홈 ds-today-fc(design.css) 시스템과 100% 동일 색 — 진짜 통일 */
.hero-card.tone-clear   { background: linear-gradient(165deg, #DCE9F5 0%, #CFE0F0 55%, #B8D2EA 100%); }   /* 홈 base 동일 */
.hero-card.tone-clouds  { background: linear-gradient(165deg, #DDDFE5 0%, #C3C6CD 55%, #A8ACB5 100%); }   /* scene-cloudy 동일 */
.hero-card.tone-rainy   { background: linear-gradient(165deg, #8B9BB1 0%, #6B7C95 55%, #4F5E7A 100%); color:#fff; }   /* scene-rain 동일 */
.hero-card.tone-snow    { background: linear-gradient(165deg, #EEF2F7 0%, #D7E1EC 55%, #B8C7D7 100%); }   /* 옅은 청백 */
.hero-card.tone-night   { background: linear-gradient(165deg, #2A3A55 0%, #1E2A42 55%, #14192C 100%); color:#E8EFF7; }   /* scene-night 동일 */
/* Light tone에서 텍스트 — 다크 잉크 */
.hero-card.tone-clear .hero-title, .hero-card.tone-clear .hero-title b,
.hero-card.tone-clouds .hero-title, .hero-card.tone-clouds .hero-title b,
.hero-card.tone-snow .hero-title, .hero-card.tone-snow .hero-title b   { color:#1B2A3F; }
.hero-card.tone-clear .hero-label, .hero-card.tone-clear .hero-sub,
.hero-card.tone-clouds .hero-label, .hero-card.tone-clouds .hero-sub,
.hero-card.tone-snow .hero-label, .hero-card.tone-snow .hero-sub   { color:rgba(27,42,63,.7); }
.hero-card.tone-clear .hero-sub b, .hero-card.tone-clouds .hero-sub b, .hero-card.tone-snow .hero-sub b   { color:#1B2A3F; }
/* Dark tone (비/밤)에서 텍스트 — 흰 잉크 */
.hero-card.tone-rainy .hero-title, .hero-card.tone-rainy .hero-title b,
.hero-card.tone-night .hero-title, .hero-card.tone-night .hero-title b   { color:#fff; }
.hero-card.tone-rainy .hero-label, .hero-card.tone-rainy .hero-sub,
.hero-card.tone-night .hero-label, .hero-card.tone-night .hero-sub   { color:rgba(255,255,255,.78); }
.hero-card.tone-rainy .hero-sub b, .hero-card.tone-night .hero-sub b   { color:#fff; }
.hero-card.tone-rainy .hero-weather, .hero-card.tone-night .hero-weather   { color:rgba(255,255,255,.7); }
@media (prefers-reduced-motion: reduce) {
  .hero-card { transition: none; }
}

/* 3) 라이브 카드 — 4가지 상태 */
.live-card {
  margin:10px 18px 0; background:#fff;
  border-radius:18px; padding:14px 16px 14px 14px;
  box-shadow:0 4px 18px rgba(15,15,18,.07);
  border-left:4px solid #FF385C;
  display:none;
}
.live-card.is-active { display:block; }
.live-card.state-now { border-left-color:#FF385C; }
.live-card.state-soon { border-left-color:#F59E0B; }
.live-card.state-done { border-left-color:#10B981; }
.live-card.state-waiting { border-left-color:#9CA3AF; }
.live-top { display:flex; align-items:center; gap:7px; }
.live-dot { width:8px; height:8px; border-radius:50%; position:relative; }
.live-dot.animated { animation:live-dot-pulse 1.4s ease-in-out infinite; }
.live-dot.animated::after {
  content:''; position:absolute; inset:-4px; border-radius:50%;
  animation:live-dot-ring 1.4s ease-out infinite;
}
@keyframes live-dot-pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.5;transform:scale(.8);} }
@keyframes live-dot-ring { 0%{transform:scale(.6);opacity:.6;} 100%{transform:scale(1.8);opacity:0;} }
.state-now .live-dot { background:#FF385C; }
.state-now .live-dot::after { background:rgba(255,56,92,.3); }
.state-now .live-lbl { color:#FF385C; }
.state-now .live-bar-fill { background:linear-gradient(90deg,#FF385C,#E31C5F); }
.state-soon .live-dot { background:#F59E0B; }
.state-soon .live-dot::after { background:rgba(245,158,11,.3); }
.state-soon .live-lbl { color:#D97706; }
.state-soon .live-bar-fill { background:linear-gradient(90deg,#F59E0B,#D97706); }
.state-done .live-dot { background:#10B981; }
.state-done .live-lbl { color:#047857; }
.state-done .live-bar-fill { background:linear-gradient(90deg,#10B981,#059669); animation:none; }
.state-waiting .live-dot { background:#9CA3AF; }
.state-waiting .live-lbl { color:#6B7280; }
.state-waiting .live-title { color:#6B7280; }
.live-lbl { font-size:10.5px; font-weight:900; letter-spacing:.1em; text-transform:uppercase; }
.live-title { font-size:16px; font-weight:900; color:#1B2A3F; margin-top:7px; letter-spacing:-.02em; }
.live-meta { font-size:11.5px; font-weight:700; color:#6B7280; margin-top:3px; }
.live-bar { margin-top:10px; height:5px; background:#F2F4F6; border-radius:3px; overflow:hidden; position:relative; }
.live-bar-fill { position:absolute; left:0; top:0; bottom:0; border-radius:3px; animation:live-bar-flow 2.5s ease-in-out infinite; }
@keyframes live-bar-flow { 0%,100%{opacity:1;} 50%{opacity:.7;} }
.live-time { display:flex; justify-content:space-between; margin-top:7px; font-size:10.5px; font-weight:800; color:#1B2A3F; font-family:'JetBrains Mono', ui-monospace, monospace; }
.live-time .right { color:#6B7280; }

/* 4) 캘린더 헤더 (월 라벨 + 우측 toggle) */
.cal-header {
  /* V1.9.81~82: 컨트롤바 + 예약현황 요약을 한 묶음으로 스크롤 고정 (hero카드 기능 이동) */
  margin:0;
  padding:16px 22px 12px;
  position:sticky; top:env(safe-area-inset-top); z-index:20;
  background:var(--gray-50);
}
.cal-header-bar { display:flex; align-items:center; justify-content:space-between; }
.cal-summary { margin-top:9px; font-size:13px; font-weight:700; color:#475569; line-height:1.4; }
.cal-summary #hero-title { color:#1B2A3F; }
.cal-summary b { color:#191F28; font-weight:800; }
.cal-sum-sub { display:block; font-size:11.5px; font-weight:600; color:#8B95A1; margin-top:2px; }
.cal-sum-sub b { color:#475569; font-weight:700; }
.cal-month-label {
  font-size:18px; font-weight:700; color:#1B2A3F; letter-spacing:-.02em;
  display:flex; align-items:center; gap:4px;
}
.cal-month-label .chev {
  color:#FF385C; padding:0 4px; cursor:pointer;
  font-weight:700; font-size:20px;
  background:none; border:none;
}
.period-pill {
  background:#F2F4F6; border-radius:10px; padding:3px;
  display:flex; gap:2px;
}
.period-pill button {
  padding:6px 13px; background:none; border:none; border-radius:7px;
  font-size:12.5px; font-weight:800; color:#8B95A1;
  cursor:pointer; font-family:inherit;
}
.period-pill button.on {
  background:#fff; color:#1B2A3F;
  box-shadow:0 2px 6px rgba(15,15,18,.08);
}

/* 5) 캘린더 큰 카드 — V1.9.15.1 cell overflow fix */
.cal-card {
  margin:0 16px;
  background:#fff;
  border-radius:22px;
  padding:14px 8px 16px;       /* 좌우 padding 14 → 8 */
  box-shadow:0 4px 18px rgba(15,15,18,.05);
  overflow:hidden;
}
.cal-card .cal-grid { gap:3px !important; }
.cal-card .cal-day { font-size:14px !important; }

/* 6) "오늘" 라벨 */
.day-label-v2 {
  margin:18px 22px 10px;
  font-size:14.5px; font-weight:700;
  color:#6B7280; letter-spacing:-.02em;
  display:flex; align-items:center; justify-content:space-between;
}
.day-label-v2 .left { color:#1B2A3F; font-weight:700; }
.day-label-v2 .cnt {
  background:#fff; color:#1B2A3F;
  padding:4px 12px; border-radius:7px;
  font-size:13px; font-weight:700;
  box-shadow:0 2px 6px rgba(15,15,18,.08);
}

/* 7) 세부일정 B안 (Pure White soft shadow) — V1.9.17 살짝 축소 */
.ds-sched-row {
  display:grid; grid-template-columns:60px 1fr auto;
  align-items:center; gap:12px;
  width:100%; padding:11px 12px;
  background:#fff;
  border:none; border-radius:12px;
  margin-bottom:7px;
  cursor:pointer;
  text-align:left;
  font-family:inherit;
  box-shadow:0 2px 10px rgba(15,15,18,.06);
  transition:transform .12s;
}
.ds-sched-row:active { transform:scale(.98); }
.ds-sched-time { font-family:'JetBrains Mono', ui-monospace, monospace; }
.ds-sched-time-start { font-size:18px; font-weight:800; color:#1B2A3F; letter-spacing:-.04em; line-height:1; }
.ds-sched-time-end { font-size:10px; font-weight:700; color:rgba(27,42,63,.5); margin-top:3px; }
.ds-sched-body { min-width:0; }
.ds-sched-title { font-size:14px; font-weight:700; color:#1B2A3F; line-height:1.2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ds-sched-meta { font-size:11.5px; font-weight:600; color:rgba(27,42,63,.58); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ds-sched-status { font-size:10px; font-weight:800; letter-spacing:.04em; padding:3px 8px; border-radius:5px; flex-shrink:0; }

/* V1.9.17 그룹 헤더 (날짜별 묶음 — 달력 아이콘 X) */
.sched-group-header {
  margin:14px 22px 6px;
  display:flex; align-items:center; justify-content:space-between;
}
.sched-group-header .lbl {
  font-size:13px; font-weight:800; color:#1B2A3F;
  display:flex; align-items:center; gap:6px;
}
.sched-group-header.today .lbl::before {
  content:''; width:7px; height:7px; border-radius:50%;
  background:#FF385C;
  animation:sched-blink 1.4s ease-in-out infinite;
}
.sched-group-header .cnt {
  font-size:11px; font-weight:800; color:#6B7280;
}
.ds-sched-row-done .ds-sched-time-start, .ds-sched-row-done .ds-sched-title { color:rgba(27,42,63,.4); text-decoration:line-through; text-decoration-color:rgba(27,42,63,.3); }
.ds-sched-row-done .ds-sched-time-end, .ds-sched-row-done .ds-sched-meta { color:rgba(27,42,63,.35); }
.ds-sched-row-done .ds-sched-status { background:#D1FAE5; color:#047857; }
.ds-sched-row-inprogress { background:#fff; }
.ds-sched-row-inprogress .ds-sched-time-start { color:#FF385C; }
.ds-sched-row-inprogress .ds-sched-status { background:#FF385C; color:#fff; box-shadow:0 3px 10px rgba(255,56,92,.32); }
.ds-sched-row-inprogress .ds-sched-status::before { content:''; width:5px; height:5px; border-radius:50%; background:#fff; display:inline-block; margin-right:4px; vertical-align:middle; animation:sched-blink 1.4s ease-in-out infinite; }
@keyframes sched-blink { 0%,100% { opacity:1; } 50% { opacity:.35; } }
.ds-sched-row-confirmed .ds-sched-status { background:#F2F4F6; color:#6B7280; }
.ds-sched-row-cancelled .ds-sched-status { background:#FEE2E2; color:#DC2626; }
.ds-sched-row-cancelled .ds-sched-title { color:rgba(27,42,63,.5); text-decoration:line-through; }

@media (prefers-reduced-motion: reduce) {
  .ds-sched-row-inprogress .ds-sched-status::before { animation:none; }
  .live-dot.animated, .live-bar-fill { animation:none; }
}

/* 공휴일 column-reverse — V1.9.15 */
.cal-day.holiday {
  color:#FF385C !important; font-weight:900;
  flex-direction:column-reverse;

<script>
// ── 데이터 ──────────────────────────────────
let schedules = JSON.parse(localStorage.getItem('ssak_schedules') || '[]');
let cfg = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');

function saveSchedules() {
  localStorage.setItem('ssak_schedules', JSON.stringify(schedules));
}

// ── Supabase 동기화 (Phase 1A) ──────────────
function srvToLocal(r) {
  return {
    id: r.id,
    name: r.name || '',
    phone: r.phone || '',
    date: r.date || '',
    time: r.time || '',
    addr: r.addr || '',
    type: r.type || '입주 전 청소',
    size: r.size || '',
    price: r.price ? String(r.price) : '',
    memo: r.memo || '',
    status: r.status || 'confirmed',
    source: r.source || 'manual',
    source_id: r.source_id || null,
    updatedAt: r.updated_at ? new Date(r.updated_at).getTime() : Date.now()
  };
}

function localToSrv(s) {
  return {
    anon_id: getAnon(),
    name: s.name || '',
    phone: s.phone || '',
    date: s.date,
    time: s.time || '',
    addr: s.addr || '',
    type: s.type || '입주 전 청소',
    size: s.size || '',
    price: s.price ? Number(String(s.price).replace(/[^0-9]/g,'')) || 0 : 0,
    memo: s.memo || '',
    status: s.status || 'confirmed',
    source: s.source || 'manual',
    source_id: s.source_id || null
  };
}

function isServerId(id) {
  return typeof id === 'string' && /^[0-9a-f]{8}-[0-9a-f]{4}-/.test(id);
}

async function serverFetchSchedules() {
  try {
    const r = await fetch(SERVER + '/api/schedules?anon_id=' + encodeURIComponent(getAnon()));
    const d = await r.json();
    if (d && d.success && Array.isArray(d.data)) {
      schedules = d.data.map(srvToLocal);
      saveSchedules();
      return true;
    }
  } catch (e) { console.log('serverFetchSchedules:', e.message); }
  return false;
}

async function serverInsert(s) {
  try {
    const r = await fetch(SERVER + '/api/schedules', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(localToSrv(s))
    });
    const d = await r.json();
    if (d && d.success && d.data) return d.data.id;
  } catch (e) { console.log('serverInsert:', e.message); }
  return null;
}

async function serverUpdate(s) {
  if (!isServerId(s.id)) return false;
  try {
    const r = await fetch(SERVER + '/api/schedules/' + encodeURIComponent(s.id), {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(localToSrv(s))
    });
    const d = await r.json();
    return !!(d && d.success);
  } catch (e) { console.log('serverUpdate:', e.message); return false; }
}

async function serverDelete(id) {
  if (!isServerId(id)) return true;
  try {
    const r = await fetch(SERVER + '/api/schedules/' + encodeURIComponent(id) + '?anon_id=' + encodeURIComponent(getAnon()), {
      method: 'DELETE'
    });
    const d = await r.json();
    return !!(d && d.success);
  } catch (e) { console.log('serverDelete:', e.message); return false; }
}

async function migrateLocalToServerOnce() {
  if (localStorage.getItem('ssak_sched_migrated_v1') === '1') return;
  const local = (JSON.parse(localStorage.getItem('ssak_schedules') || '[]')) || [];
  const toMigrate = local.filter(s => !isServerId(s.id) && s.name && s.date);
  if (toMigrate.length === 0) {
    localStorage.setItem('ssak_sched_migrated_v1', '1');
    return;
  }
  let ok = 0;
  for (const s of toMigrate) {
    const newId = await serverInsert(s);
    if (newId) {
      const idx = schedules.findIndex(x => x.id === s.id);
      if (idx >= 0) schedules[idx].id = newId;
      ok++;
    }
  }
  saveSchedules();
  if (ok > 0) console.log(`[싹싹] ${ok}건 클라우드 동기화 완료`);
  localStorage.setItem('ssak_sched_migrated_v1', '1');
}

function getThisWeekStart() {
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate() - n.getDay()); // 이번 주 일요일
}

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function todayStr() { return toDateStr(new Date()); }

// V1.9.18: 년 모드 캘린더 — 최근 5년 카드 가로 스크롤
function renderYearCards(grid) {
  if (!grid) return;
  const parent = grid.parentElement; // cal-card
  // cal-card 전체를 year-cards-wrap으로 교체
  if (parent && parent.classList.contains('cal-card')) {
    parent.style.display = 'none';
  }
  // 별도 컨테이너 사용 (이미 있으면 재사용)
  let yWrap = document.getElementById('year-cards-wrap');
  if (!yWrap) {
    yWrap = document.createElement('div');
    yWrap.id = 'year-cards-wrap';
    yWrap.className = 'year-cards-wrap';
    yWrap.innerHTML = '<div class="year-cards" id="year-cards"></div>';
    if (parent && parent.parentElement) {
      parent.parentElement.insertBefore(yWrap, parent.nextSibling);
    }
  }
  yWrap.style.display = 'block';

  // 연도별 집계
  const curYear = (new Date()).getFullYear();
  const years = [curYear-4, curYear-3, curYear-2, curYear-1, curYear];
  const yearStats = {};
  years.forEach(y => yearStats[y] = { total:0, done:0 });
  (schedules || []).forEach(s => {
    const y = parseInt((s.date || '').slice(0,4), 10);
    if (yearStats[y]) {
      yearStats[y].total++;
      if (['completed','done'].includes(s.status)) yearStats[y].done++;
    }
  });

  const cardsEl = document.getElementById('year-cards');
  cardsEl.innerHTML = years.map(y => {
    const st = yearStats[y];
    const pct = st.total > 0 ? Math.round((st.done / st.total) * 100) : 0;
    const isCur = y === curYear;
    return `<button class="year-card ${isCur?'cur':''}" onclick="selectYear(${y})">
      <div class="yc-num">${y}</div>
      <div class="yc-cnt">${st.total}</div>
      <div class="yc-lbl">건</div>
      <div class="yc-bar"><div class="yc-bar-fill" style="width:${pct}%;"></div></div>
    </button>`;
  }).join('');

  // 올해 카드 가운데로 스크롤
  try {
    setTimeout(() => {
      const curCard = cardsEl.querySelector('.year-card.cur');
      if (curCard) curCard.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
    }, 100);
  } catch(_) {}
}

// V1.9.18: 연도 카드 클릭 — 그 해 일정으로 필터
function selectYear(year) {
  const d = new Date();
  if (year === d.getFullYear()) {
    selectedDate = todayStr();
  } else {
    selectedDate = `${year}-01-01`;
  }
  // 카드 강조 변경
  document.querySelectorAll('.year-card').forEach(c => c.classList.remove('cur'));
  // 선택 카드 cur
  const cards = document.querySelectorAll('.year-card');
  const curYear = (new Date()).getFullYear();
  const idx = year - (curYear - 4);
  if (cards[idx]) cards[idx].classList.add('cur');
  renderList();
}

// V1.9.17: 주 모드 캘린더 — 이번 주 일~토 7일만
function renderWeekCalendar(grid, today) {
  if (!grid) return;
  // V1.9.21: viewWeekStart 기준 (chevron ±7일 이동)
  const sunStart = new Date(viewWeekStart);
  const dotMap = {};
  schedules.forEach(s => {
    if (!dotMap[s.date]) dotMap[s.date] = [];
    dotMap[s.date].push(s.status);
  });
  const STATUS_COLOR = {confirmed:'#6366F1', inprogress:'#EA580C', done:'#FF385C', cancelled:'#DC2626'};
  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(sunStart.getFullYear(), sunStart.getMonth(), sunStart.getDate() + i);
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const isToday = dateStr === today;
    const isSel = dateStr === selectedDate;
    const isSun = i === 0; const isSat = i === 6;
    const holidayName = KOREAN_HOLIDAYS[dateStr];
    const isHoliday = !!holidayName;
    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (isSel) cls += ' selected';
    if (isSun) cls += ' sunday';
    if (isSat) cls += ' saturday';
    if (isHoliday) cls += ' holiday';
    const dots = (dotMap[dateStr] || []).slice(0, 3).map(st =>
      `<div class="cal-dot" style="background:${STATUS_COLOR[st]||'#ccc'}"></div>`
    ).join('');
    const holidayLabel = isHoliday
      ? `<div class="holiday-name">${holidayName === '대체공휴일' ? '대체' : holidayName}</div>`
      : '';
    html += `<div class="${cls}" data-holiday="${isHoliday ? (holidayName === '대체공휴일' ? '대체' : holidayName) : ''}" onclick="selectDay('${dateStr}')">
      ${holidayLabel}
      <div class="cal-num">${d.getDate()}</div>
      <div class="cal-dots">${dots}</div>
    </div>`;
  }
  grid.innerHTML = html;
}

// ── 캘린더 렌더링 ────────────────────────────
function renderCalendar() {
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  // V1.9.20: 모드별 동적 라벨 — 주 모드는 "1주 (X~Y일)" 추가
  const pm = periodMode || 'month';
  const labelEl = document.getElementById('month-label');
  if (labelEl) {
    if (pm === 'year') {
      labelEl.innerHTML = '최근 5년';
    } else if (pm === 'week') {
      // V1.9.21: viewWeekStart 기준 (chevron ±7일 이동 가능)
      const sun = new Date(viewWeekStart);
      const weekNum = Math.ceil(sun.getDate() / 7);
      labelEl.innerHTML = `${sun.getFullYear()}년 ${sun.getMonth()+1}월 ${weekNum}주`;
    } else {
      labelEl.innerHTML = `${viewYear}년 ${MONTHS[viewMonth]}`;
    }
  }

  const grid = document.getElementById('cal-grid');
  const today = todayStr();

  // V1.9.18: 년 모드면 5년 카드, cal-card 숨김
  if (pm === 'year') {
    renderYearCards(grid);
    return;
  }
  // V1.9.18: 월/주 모드면 5년 카드 숨기고 cal-card 보임
  const yWrap = document.getElementById('year-cards-wrap');
  if (yWrap) yWrap.style.display = 'none';
  const calCard = grid && grid.parentElement;
  if (calCard && calCard.classList.contains('cal-card')) calCard.style.display = '';

  // V1.9.17: 주 모드면 이번 주(일~토) 7일만 표시
  if (pm === 'week') {
    renderWeekCalendar(grid, today);
    return;
  }

  // 이달 1일 요일, 말일
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const lastDate = new Date(viewYear, viewMonth+1, 0).getDate();
  const prevLastDate = new Date(viewYear, viewMonth, 0).getDate();

  // 예약 날짜별 집계 (Phase 4: 시간/카운트도 함께)
  const dotMap = {};
  const dayBookings = {};
  schedules.forEach(s => {
    if (!dotMap[s.date]) dotMap[s.date] = [];
    dotMap[s.date].push(s.status);
    if (!dayBookings[s.date]) dayBookings[s.date] = [];
    dayBookings[s.date].push(s);
  });

  const STATUS_COLOR = {confirmed:'#6366F1', inprogress:'#EA580C', done:'var(--c-pr, #FF385C)', cancelled:'#DC2626'};

  let html = '';
  const totalCells = Math.ceil((firstDay + lastDate) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    let dateNum, dateStr, isOther = false;
    const dayOfWeek = i % 7;

    if (i < firstDay) {
      dateNum = prevLastDate - firstDay + i + 1;
      const m = viewMonth === 0 ? 12 : viewMonth;
      const y = viewMonth === 0 ? viewYear - 1 : viewYear;
      dateStr = `${y}-${String(m).padStart(2,'0')}-${String(dateNum).padStart(2,'0')}`;
      isOther = true;
    } else if (i >= firstDay + lastDate) {
      dateNum = i - firstDay - lastDate + 1;
      const m = viewMonth === 11 ? 1 : viewMonth + 2;
      const y = viewMonth === 11 ? viewYear + 1 : viewYear;
      dateStr = `${y}-${String(m).padStart(2,'0')}-${String(dateNum).padStart(2,'0')}`;
      isOther = true;
    } else {
      dateNum = i - firstDay + 1;
      dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(dateNum).padStart(2,'0')}`;
    }

    const isToday = dateStr === today;
    const isSel = dateStr === selectedDate;
    const isSun = dayOfWeek === 0;
    const isSat = dayOfWeek === 6;
    // V1.9.13: 법정공휴일 체크
    const holidayName = KOREAN_HOLIDAYS[dateStr];
    const isHoliday = !!holidayName && !isOther;

    let cls = 'cal-day';
    if (isOther) cls += ' other-month';
    if (isToday) cls += ' today';
    if (isSel) cls += ' selected';
    if (isSun) cls += ' sunday';
    if (isSat) cls += ' saturday';
    if (isHoliday) cls += ' holiday';

    // 점 (최대 3개)
    const dots = (dotMap[dateStr] || []).slice(0, 3).map(st =>
      `<div class="cal-dot" style="background:${STATUS_COLOR[st]||'#ccc'}"></div>`
    ).join('');

    // Phase 4: 미니 텍스트 — 첫 예약 시간 + 추가 건수 카운트
    let miniHtml = '';
    const dayList = dayBookings[dateStr];
    if (dayList && dayList.length > 0 && !isOther) {
      const sortedDay = [...dayList].sort((a,b) => (a.time || '99:99').localeCompare(b.time || '99:99'));
      const firstTime = sortedDay[0].time || '';
      const extra = sortedDay.length - 1;
      if (firstTime) {
        miniHtml = `<div class="cal-mini">${firstTime}${extra > 0 ? `<span class="cal-mini-count">+${extra}</span>` : ''}</div>`;
      } else if (extra > 0) {
        miniHtml = `<div class="cal-mini"><span class="cal-mini-count">${dayList.length}</span></div>`;
      }
    }

    // V1.9.13: 공휴일 이름 라벨 (대체공휴일은 짧게)
    const holidayLabel = isHoliday
      ? `<div class="holiday-name">${holidayName === '대체공휴일' ? '대체' : holidayName}</div>`
      : '';
    html += `<div class="${cls}" onclick="selectDay('${dateStr}')">
      ${holidayLabel}
      <div class="cal-num">${dateNum}</div>
      <div class="cal-dots">${dots}</div>
      ${miniHtml}
    </div>`;
  }

  grid.innerHTML = html;
  // Phase 8: 매출 그래프도 함께 갱신
  if (typeof renderSalesChart === 'function') renderSalesChart();
}

function selectDay(dateStr) {
  selectedDate = dateStr;
  if (viewMode === 'month') { renderCalendar(); renderList(); updateProgressCard(); updateGreeting(); }
  else renderAgenda();
}

function changeMonth(dir) {
  // V1.9.21: 주 모드면 ±7일 이동, 월 모드면 ±1월
  if ((periodMode || 'month') === 'week') {
    const d = new Date(viewWeekStart);
    d.setDate(d.getDate() + dir * 7);
    viewWeekStart = d;
    renderCalendar();
    try { renderList(); updateProgressCard(); updateGreeting(); } catch(_) {}
    return;
  }
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderCalendar();
}

// ── 목록 렌더링 (V1.9.17: 그룹 모드 — 주/월/년 토글에 따라 날짜 그룹) ──
function renderList() {
  const list = document.getElementById('booking-list');
  const label = document.getElementById('list-label');
  const countBadge = document.getElementById('list-count');
  if (!list) return;

  const today = todayStr();
  // V1.9.17: period 모드 기반 필터링 (전체 그룹) vs selectedDate 단일
  let items;
  let periodLabel = '오늘 일정';
  const isSelectedToday = selectedDate === today;

  // 캘린더 cell 클릭으로 selectedDate가 today가 아니면 → 단일 날짜 모드 (필터)
  // 그 외에는 period 모드 (그룹)
  const useGroupMode = isSelectedToday; // selectedDate가 today일 때만 그룹 모드

  if (useGroupMode) {
    items = (typeof filterByPeriod === 'function')
      ? filterByPeriod(schedules, periodMode || 'month').sort((a,b) =>
          (a.date||'').localeCompare(b.date||'') || (a.time||'').localeCompare(b.time||''))
      : schedules.filter(s => s.date === today).sort((a,b) => (a.time||'').localeCompare(b.time||''));
    periodLabel = '예약 목록';  /* V1.9.83: 안A — "이번 달" 중복 제거, 깔끔한 라벨 */
  } else {
    items = schedules.filter(s => s.date === selectedDate)
      .sort((a,b) => (a.time||'').localeCompare(b.time||''));
    const d = new Date(selectedDate + 'T00:00:00');
    const dayNames = ['일','월','화','수','목','금','토'];
    periodLabel = `${d.getMonth()+1}월 ${d.getDate()}일 (${dayNames[d.getDay()]}) 예약`;
  }

  if (label) label.textContent = periodLabel;
  if (countBadge) countBadge.textContent = `${items.length}건`;

  if (items.length === 0) {
    // V1.9.20.3: FAB(+)가 항상 있으므로 추가 버튼 제거 — 메시지만
    list.innerHTML = `<div class="empty-state" style="text-align:center;padding:40px 16px 32px;">
      <div style="font-size:13px;font-weight:600;color:#9CA3AF;line-height:1.7;">예약이 없습니다</div>
    </div>`;
    return;
  }

  const STATUS_LABEL = {confirmed:'예약', inprogress:'진행중', done:'완료', completed:'완료', cancelled:'취소'};
  const fmtTime = t => (t || '—').toString().slice(0,5);
  const estimateEnd = (start) => {
    if (!start) return '—';
    const [h, m] = start.split(':').map(Number);
    if (isNaN(h) || isNaN(m)) return '—';
    const eh = (h + 2) % 24;
    return `${String(eh).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  };

  // 단일 카드 HTML
  const cardHtml = (s) => {
    const status = s.status || 'confirmed';
    const startStr = fmtTime(s.time || s.scheduled_time);
    const endStr = fmtTime(s.end_time || estimateEnd(s.time));
    const title = esc(s.type || '청소');
    const addr = s.addr || s.name || '';
    const sizeStr = s.size ? ` · ${esc(s.size)}평` : '';
    const metaLine = addr ? `📍 ${esc(addr)}${sizeStr}` : (sizeStr ? sizeStr.replace(/^ · /, '') : '');
    return `<div class="booking-card-wrap" data-id="${esc(s.id)}">
      <button class="swipe-action" type="button" onclick="event.stopPropagation();swipeDelete('${esc(s.id)}')">🗑 삭제</button>
      <button class="ds-sched-row ds-sched-row-${status} booking-card" onclick="openActionSheet('${esc(s.id)}')">
        <div class="ds-sched-time">
          <div class="ds-sched-time-start">${startStr}</div>
          <div class="ds-sched-time-end">~${endStr}</div>
        </div>
        <div class="ds-sched-body">
          <div class="ds-sched-title">${title}</div>
          <div class="ds-sched-meta">${metaLine}</div>
        </div>
        <div class="ds-sched-status">${STATUS_LABEL[status] || esc(status)}</div>
      </button>
    </div>`;
  };

  if (!useGroupMode) {
    // 단일 날짜: 그룹 없이 카드만
    list.innerHTML = items.map(cardHtml).join('');
  } else {
    // 그룹 모드: 날짜별 묶기
    const groups = {}; // dateStr → items
    items.forEach(s => {
      const dt = (s.date || '').slice(0,10);
      if (!groups[dt]) groups[dt] = [];
      groups[dt].push(s);
    });
    const sortedDates = Object.keys(groups).sort();
    const dayNames = ['일','월','화','수','목','금','토'];
    const dateLabel = (dt) => {
      if (dt === today) {
        const d = new Date(today + 'T00:00:00');
        return `오늘 (${d.getMonth()+1}월 ${d.getDate()}일 ${dayNames[d.getDay()]})`;
      }
      const tmrw = (() => { const d = new Date(); d.setDate(d.getDate()+1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
      if (dt === tmrw) {
        const d = new Date(tmrw + 'T00:00:00');
        return `내일 (${d.getMonth()+1}월 ${d.getDate()}일 ${dayNames[d.getDay()]})`;
      }
      const d = new Date(dt + 'T00:00:00');
      return `${d.getMonth()+1}월 ${d.getDate()}일 (${dayNames[d.getDay()]})`;
    };

    list.innerHTML = sortedDates.map(dt => {
      const isToday = dt === today;
      const grpClass = isToday ? 'sched-group-header today' : 'sched-group-header';
      const cardsHtml = groups[dt].map(cardHtml).join('');
      return `<div class="${grpClass}">
        <span class="lbl">${dateLabel(dt)}</span>
        <span class="cnt">${groups[dt].length}건</span>
      </div>${cardsHtml}`;
    }).join('');
  }

  // Phase 7: 스와이프 이벤트 바인딩
  bindSwipeHandlers();

  // 아젠다 모드일 땐 아젠다도 갱신
  if (viewMode === 'agenda' && typeof renderAgenda === 'function') renderAgenda();
}

async function saveBooking() {
  const name = document.getElementById('b-name').value.trim();
  const date = document.getElementById('b-date').value;
  if (!name || !date) { toast('고객명과 날짜는 필수입니다'); return; }

  const baseData = {
    name,
    phone: document.getElementById('b-phone').value.trim(),
    date,
    time: document.getElementById('b-time').value,
    addr: document.getElementById('b-addr').value.trim(),
    type: document.getElementById('b-type').value,
    size: document.getElementById('b-size').value,
    price: document.getElementById('b-price').value,
    memo: document.getElementById('b-memo').value.trim(),
    status: selectedStatus
  };

  // 수정 모드: 단일 처리
  if (editingId) {
    const data = { ...baseData, id: editingId, updatedAt: Date.now() };
    const idx = schedules.findIndex(s => s.id === editingId);
    if (idx >= 0) schedules[idx] = { ...schedules[idx], ...data };
    saveSchedules();
    selectedDate = date;
    const d = new Date(date + 'T00:00:00');
    viewYear = d.getFullYear();
    viewMonth = d.getMonth();
    closeModal();
    renderCalendar(); renderList(); updateProgressCard(); updateGreeting();
    toast('✅ 예약이 수정됐습니다');
    if (isServerId(editingId)) serverUpdate(data);
    return;
  }

  // 신규 모드: 반복 처리 (Phase 6)
  const repeat = document.getElementById('b-repeat').value || 'none';
  const dates = expandRepeatDates(date, repeat);
  const seriesId = repeat !== 'none' ? ('series-' + Date.now().toString(36)) : null;
  const newRows = [];
  for (const dt of dates) {
    const row = {
      ...baseData,
      id: 'local-' + Date.now().toString() + '-' + Math.random().toString(36).slice(2, 5),
      date: dt,
      memo: seriesId ? ((baseData.memo || '') + (baseData.memo ? ' ' : '') + '[정기]') : baseData.memo,
      updatedAt: Date.now(),
      series_id: seriesId
    };
    schedules.push(row);
    newRows.push(row);
  }
  saveSchedules();
  selectedDate = date;
  const d = new Date(date + 'T00:00:00');
  viewYear = d.getFullYear();
  viewMonth = d.getMonth();
  closeModal();
  renderCalendar(); renderList(); updateProgressCard(); updateGreeting();
  toast(dates.length > 1 ? `✅ 정기 예약 ${dates.length}건이 추가됐습니다` : '✅ 예약이 추가됐습니다');

  // 서버 동기화 (백그라운드, 일괄)
  for (const row of newRows) {
    const newId = await serverInsert(row);
    if (newId) {
      const idx = schedules.findIndex(x => x.id === row.id);
      if (idx >= 0) schedules[idx].id = newId;
    }
  }
  saveSchedules();
}

// 반복 옵션에 따라 날짜 배열 생성 (Phase 6)
function expandRepeatDates(startDateStr, repeat) {
  if (!repeat || repeat === 'none') return [startDateStr];
  const out = [startDateStr];
  const start = new Date(startDateStr + 'T00:00:00');
  const config = {
    weekly:    { count: 8, addDays: 7 },
    biweekly:  { count: 6, addDays: 14 },
    monthly:   { count: 6, addMonths: 1 }
  }[repeat];
  if (!config) return out;
  for (let i = 1; i < config.count; i++) {
    const d = new Date(start);
    if (config.addMonths) d.setMonth(d.getMonth() + i * config.addMonths);
    else d.setDate(d.getDate() + i * config.addDays);
    out.push(toDateStr(d));
  }
  return out;
}

function updateRepeatInfo() {
  const sel = document.getElementById('b-repeat');
  const info = document.getElementById('repeat-info');
  if (!sel || !info) return;
  const v = sel.value;
  if (v === 'none') { info.classList.remove('show'); info.textContent = ''; return; }
  const date = document.getElementById('b-date').value;
  if (!date) return;
  const dates = expandRepeatDates(date, v);
  const last = dates[dates.length - 1];
  const lastD = new Date(last + 'T00:00:00');
  const dn = ['일','월','화','수','목','금','토'][lastD.getDay()];
  info.textContent = `📅 ${dates.length}회 자동 생성 (마지막: ${lastD.getMonth()+1}월 ${lastD.getDate()}일 ${dn})`;
  info.classList.add('show');
}

function sendSmsForBooking(s, type) {
  const c = cfg || JSON.parse(localStorage.getItem('ssak_cfg') || '{}');
  const apiKey = c.apiKey, apiSecret = c.apiSecret, fromPhone = c.fromPhone;
  if (!apiKey || !apiSecret || !fromPhone) {
    toast('설정에서 CoolSMS API를 먼저 설정해주세요'); return Promise.resolve(false);
  }
  if (!s || !s.phone) { toast('연락처가 없습니다'); return Promise.resolve(false); }
  const company = c.company || '싹싹클린';
  const d = s.date ? new Date(s.date + 'T00:00:00') : new Date();
  const dateLabel = `${d.getMonth()+1}월 ${d.getDate()}일`;
  const tm = s.time || '';
  const addr = s.addr || '협의';
  const phone = c.fromPhone || c.phone || '';
  const review = c.review || '';

  const MSGS = {
    confirm: `[${company}] ${s.name}님, ${dateLabel} ${tm} 입주청소 예약이 확정됐습니다. 주소: ${addr}. 문의: ${phone} 감사합니다 😊`,

  };
  const msg = MSGS[type];
  if (!msg) return Promise.resolve(false);

  toast('📱 문자 발송 중...');
  return fetch(SERVER + '/send-sms', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ to: s.phone, from: fromPhone, text: msg, apiKey, apiSecret })
  }).then(r => r.json()).then(data => {
    if (data.success) { toast('✅ 문자 발송 완료!'); return true; }
    toast('❌ 발송 실패: ' + (data.error || '오류'));

    const dateLbl = d ? `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${dn})` : '';
    const meta = [s.time, s.phone, s.addr].filter(Boolean).map(esc).join(' · ');
    return `<div class="search-result-item" onclick="goToSchedule('${esc(s.id)}')">
      <div class="search-result-top">
        <span class="search-result-name">${esc(s.name||'')}</span>
        <span class="booking-status ${STATUS_CLASS[s.status]||''}">${STATUS_LABEL[s.status]||esc(s.status||'')}</span>
      </div>
      <div class="search-result-date">${dateLbl}</div>
      <div class="search-result-meta">${meta}</div>
    </div>`;
  }).join('');
}

function goToSchedule(id) {
  const s = schedules.find(x => x.id === id);
  if (!s || !s.date) return;

}

// ── 자동 리마인더 (Phase 3) ─────────────────
async function checkAutoReminders() {
  const c = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');
  const enabled = c.autoReminder !== false;
  const statusEl = document.getElementById('reminder-status');
  // ── 헬퍼: 상태 텍스트 + 클래스를 한 번에 갱신 + 탭하면 my.html로 이동
  const setStatus = (cls, label, arrow='') => {
    if (!statusEl) return;
    statusEl.className = 'reminder-status' + (cls?' '+cls:'');
    statusEl.innerHTML = `<span class="label">${label}</span>` + (arrow?`<span class="arrow">${arrow}</span>`:'');
    statusEl.onclick = (cls==='is-on') ? null : () => { location.href='my.html#sms-setup'; };
  };
  if (!enabled) {
    setStatus('is-off', '🔕 자동 리마인더 OFF', '설정 ›');
    return;
  }
  if (!c.apiKey || !c.apiSecret || !c.fromPhone) {
    setStatus('', '🔔 자동 리마인더 대기 중', 'SMS 설정 ›');
    return;
  }

  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const tStr = toDateStr(tomorrow);
  const sentMap = JSON.parse(localStorage.getItem('ssak_reminded_v1') || '{}');

  const targets = schedules.filter(s =>
    s.date === tStr && s.status === 'confirmed' && s.phone &&
    !sentMap[`${tStr}:${s.id}`]
  );

  if (targets.length === 0) {
    setStatus('is-on', `✅ 자동 리마인더 <span class="on">ON</span> · 내일 0건`);
    return;
  }

  setStatus('is-busy', `🔔 리마인더 발송 중… ${targets.length}건`);

  let ok = 0;
  for (const s of targets) {
    const success = await sendSmsForBooking(s, 'remind');
    if (success) {
      sentMap[`${tStr}:${s.id}`] = Date.now();
      ok++;
    }
  }
  localStorage.setItem('ssak_reminded_v1', JSON.stringify(sentMap));
  setStatus('is-on', `✅ 자동 리마인더 <span class="on">ON</span> · 내일 ${ok}건 발송완료`);
  if (ok > 0) toast(`📱 내일 일정 ${ok}건 자동 리마인더 발송!`);
}

// V1.9.14: 기간별 필터링 — 주(이번주 월~일) / 월(이번달) / 년(올해)
function filterByPeriod(items, period) {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  // V1.9.21: 주 모드는 viewWeekStart 기준 (일~토). 다른 모드는 현재 기준
  const wStart = (typeof viewWeekStart !== 'undefined' && viewWeekStart)
    ? new Date(viewWeekStart)
    : (function() { const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), n.getDate() - n.getDay()); })();
  const wEnd = new Date(wStart.getFullYear(), wStart.getMonth(), wStart.getDate() + 6);
  const fmt = dt => `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  return (items || []).filter(s => {
    if (s.status === 'cancelled') return false;
    const sd = (s.date || s.scheduled_date || '').slice(0,10);
    if (!sd) return false;
    if (period === 'week') {
      return sd >= fmt(wStart) && sd <= fmt(wEnd);
    } else if (period === 'month') {
      return sd.startsWith(`${y}-${String(m+1).padStart(2,'0')}`);
    } else { // year
      return sd.startsWith(`${y}-`);
    }
  });
}

// V1.9.14: Pure White 진행 카드 업데이트
// V1.9.15: Pure White Hero 카드 — 텍스트 기반 (도넛 X)
function updateProgressCard() {
  const items = filterByPeriod(schedules || [], periodMode);
  const total = items.length;
  const done = items.filter(s => s.status === 'completed' || s.status === 'done').length;
  const prog = items.filter(s => s.status === 'inprogress' || s.status === 'in_progress').length;
  const next = Math.max(0, total - done - prog);
  const pct = total > 0 ? Math.round(((done + prog * 0.5) / total) * 100) : 0;

  const periodLabels = { week: '이번 주', month: '이번 달', year: '올해' };
  const set = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
  const setHTML = (id, v) => { const e = document.getElementById(id); if (e) e.innerHTML = v; };

  set('hero-period-label', periodLabels[periodMode] || '이번 달');

  // hero-title: "5건 · 완료 2 · 예정 3"
  if (total === 0) {
    setHTML('hero-title', '예약 0건');  /* V1.9.83: CTA→통계 (등록은 FAB 담당) */
    setHTML('hero-sub', `${periodLabels[periodMode]} 일정이 없습니다`);
  } else {
    setHTML('hero-title', `${total}건 · 완료 <b>${done}</b> · 예정 ${next}`);
    // sub: "오늘 N건 · 내일 N건 · 이번주 X% 진행"
    const today = todayStr();
    const tmr = (() => { const d = new Date(); d.setDate(d.getDate()+1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
    const todayCnt = (schedules || []).filter(s => s.date === today && s.status !== 'cancelled').length;
    const tmrwCnt = (schedules || []).filter(s => s.date === tmr && s.status !== 'cancelled').length;
    setHTML('hero-sub', `오늘 ${todayCnt}건 · 내일 ${tmrwCnt}건 · ${periodLabels[periodMode]} <b>${pct}% 진행</b>`);
  }

  // 라이브 카드 갱신
  try { updateLiveCard(); } catch(_) {}
}

// V1.9.15: 라이브 카드 — 4가지 상태 자동 인식
function updateLiveCard() {
  const card = document.getElementById('live-card');
  if (!card) return;
  const today = todayStr();
  const todayItems = (schedules || []).filter(s => s.date === today && s.status !== 'cancelled');
  const now = new Date();
  const curMin = now.getHours() * 60 + now.getMinutes();
  const toMin = t => { if (!t) return null; const [h,m] = t.split(':').map(Number); return isNaN(h)?null:h*60+m; };
  const addH = (t, hours) => { const m = toMin(t); if (m==null) return null; const total = m + hours*60; const hh = Math.floor(total/60)%24; const mm = total%60; return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`; };
  const fmtDur = m => { if (m < 60) return `${m}분`; const h = Math.floor(m/60); const mm = m%60; return mm>0 ? `${h}시간 ${mm}분` : `${h}시간`; };

  const setT = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };

  // 1) 진행중 일정 찾기
  let activeItem = null;
  let activeStart = null;
  let activeEnd = null;
  for (const s of todayItems) {
    const stMin = toMin(s.time);
    if (stMin == null) continue;
    let endStr = s.end_time;
    if (!endStr) endStr = addH(s.time, 2);
    const enMin = toMin(endStr);
    if (s.status === 'inprogress' || s.status === 'in_progress' ||
        (s.status === 'confirmed' && curMin >= stMin && curMin <= enMin)) {
      activeItem = s; activeStart = stMin; activeEnd = enMin;
      break;
    }
  }

  // 2) 방금 완료 (종료 후 30분 이내)
  let recentDone = null;
  if (!activeItem) {
    let bestEnd = -1;
    for (const s of todayItems) {
      if (!['completed','done'].includes(s.status)) continue;
      const stMin = toMin(s.time); if (stMin == null) continue;
      let endStr = s.end_time || addH(s.time, 2);
      const enMin = toMin(endStr);
      if (curMin - enMin <= 30 && curMin - enMin >= 0 && enMin > bestEnd) {
        recentDone = s; bestEnd = enMin;
      }
    }
  }

  // 3) 곧 시작 (30분 이내 시작할 다음 일정)
  let soonItem = null;
  if (!activeItem && !recentDone) {
    let bestDiff = 99999;
    for (const s of todayItems) {
      if (['completed','done','inprogress','in_progress'].includes(s.status)) continue;
      const stMin = toMin(s.time); if (stMin == null) continue;
      const diff = stMin - curMin;
      if (diff >= 0 && diff <= 30 && diff < bestDiff) {
        soonItem = s; bestDiff = diff;
      }
    }
  }

  const area = (s) => {
    const addr = s.addr || s.address || '';
    const m = addr.match(/(\S+구|\S+군|\S+시)/);
    return (m && m[1]) || (s.region || '');
  };
  const ttl = (s) => s.type || s.name || '청소';

  // 상태별 클래스 + 내용
  card.className = 'live-card';
  if (activeItem) {
    card.classList.add('is-active', 'state-now');
    document.getElementById('live-dot').className = 'live-dot animated';
    setT('live-lbl', '지금 진행중');
    setT('live-title', `${ttl(activeItem)} · ${area(activeItem) || '—'}`);
    setT('live-meta', `📍 ${activeItem.addr || activeItem.address || ''}${activeItem.size ? ' · ' + activeItem.size + '평' : ''}`);
    const total = Math.max(activeEnd - activeStart, 1);
    const elapsed = Math.max(0, Math.min(total, curMin - activeStart));
    const remain = Math.max(0, total - elapsed);
    const pct = Math.round((elapsed/total)*100);
    document.getElementById('live-bar-fill').style.width = pct + '%';
    setT('live-time-left', `⏱ ${fmtDur(elapsed)} 경과`);
    setT('live-time-right', `${fmtDur(remain)} 남음`);
  } else if (recentDone) {
    card.classList.add('is-active', 'state-done');
    document.getElementById('live-dot').className = 'live-dot';
    setT('live-lbl', '✓ 방금 완료');
    setT('live-title', `${ttl(recentDone)} · ${area(recentDone) || '—'}`);
    setT('live-meta', `📍 잘 마치셨어요!${recentDone.size ? ' · ' + recentDone.size + '평' : ''}`);
    document.getElementById('live-bar-fill').style.width = '100%';
    const stMin = toMin(recentDone.time);
    const endStr = recentDone.end_time || addH(recentDone.time, 2);
    const enMin = toMin(endStr);
    const duration = Math.max(0, enMin - stMin);
    setT('live-time-left', `✓ ${fmtDur(duration)} 작업`);
    setT('live-time-right', `${endStr} 종료`);
  } else if (soonItem) {
    card.classList.add('is-active', 'state-soon');
    document.getElementById('live-dot').className = 'live-dot animated';
    setT('live-lbl', '⏰ 곧 시작');
    setT('live-title', `${ttl(soonItem)} · ${area(soonItem) || '—'}`);
    setT('live-meta', `📍 ${soonItem.addr || soonItem.address || ''}${soonItem.size ? ' · ' + soonItem.size + '평' : ''}`);
    const stMin = toMin(soonItem.time);
    const diff = stMin - curMin;
    document.getElementById('live-bar-fill').style.width = '5%';
    setT('live-time-left', `⏱ ${diff}분 후 시작`);
    setT('live-time-right', `${soonItem.time} ~`);
  } else {
    // 표시 안 함
    card.classList.remove('is-active', 'state-now', 'state-soon', 'state-done', 'state-waiting');
  }
}

function renderAgenda() {
  const box = document.getElementById('agenda-list');
  if (!box) return;
  const today = todayStr();
  const upcoming = schedules
    .filter(s => s.date >= today || s.status === 'inprogress')
    .sort((a,b) => (a.date||'').localeCompare(b.date||'') || (a.time||'').localeCompare(b.time||''));

  if (upcoming.length === 0) {
    // V1.9.20.3: FAB(+)가 항상 있으므로 버튼 제거 — 메시지만
    box.innerHTML = `<div class="agenda-empty" style="text-align:center;padding:40px 16px 32px;">
      <div style="font-size:13px;font-weight:600;color:#9CA3AF;line-height:1.7;">다가오는 예약이 없습니다</div>
    </div>`;
    return;
  }

  const groups = {};
  upcoming.forEach(s => {
    if (!groups[s.date]) groups[s.date] = [];
    groups[s.date].push(s);
  });

  const STATUS_LABEL = {confirmed:'확정', inprogress:'진행중', done:'완료', cancelled:'취소'};
  const STATUS_CLASS = {confirmed:'status-confirmed', inprogress:'status-inprogress', done:'status-done', cancelled:'status-cancelled'};
  const dayNames = ['일','월','화','수','목','금','토'];

  let html = '';
  Object.keys(groups).sort().forEach(date => {
    const d = new Date(date + 'T00:00:00');
    const dn = dayNames[d.getDay()];
    const isToday = date === today;
    const monthDay = `${d.getMonth()+1}월 ${d.getDate()}일`;
    let dayCls = 'agenda-day-num';
    if (isToday) dayCls += ' today';
    if (d.getDay() === 0) dayCls += ' sunday';
    if (d.getDay() === 6) dayCls += ' saturday';

    html += `<div class="agenda-day-group">
      <div class="agenda-day-header">
        <div class="${dayCls}">
          <div class="a-d">${d.getDate()}</div>
          <div class="a-w">${dn}</div>
        </div>
        <div class="agenda-day-label">${isToday ? '오늘 · ' : ''}${monthDay}</div>
        <div class="agenda-day-count">${groups[date].length}건</div>
      </div>`;
    groups[date].forEach(s => {
      const meta = [s.type, s.size ? s.size+'평' : '', s.addr].filter(Boolean).map(esc).join(' · ');
      html += `<div class="agenda-card" onclick="openActionSheet('${esc(s.id)}')">
        <div class="agenda-time">${esc(s.time || '—')}</div>
        <div class="agenda-info">
          <div class="agenda-name">${esc(s.name||'')} <span class="booking-status ${STATUS_CLASS[s.status]||''}" style="margin-left:4px;">${STATUS_LABEL[s.status]||''}</span></div>
          <div class="agenda-meta">${meta}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  box.innerHTML = html;
}

// ── Phase 7: 카드 좌측 스와이프 → 빠른 삭제 ─────
function bindSwipeHandlers() {
  const wraps = document.querySelectorAll('.booking-card-wrap');
  wraps.forEach(wrap => {
    const card = wrap.querySelector('.booking-card');
    if (!card) return;
    let startX = 0, currentX = 0, dragging = false, openOffset = -90;
    const reset = () => { card.style.transform = 'translateX(0)'; wrap._open = false; };

    card.addEventListener('touchstart', (e) => {
      document.querySelectorAll('.booking-card-wrap').forEach(w => {
        if (w !== wrap && w._open) { const c = w.querySelector('.booking-card'); if (c) c.style.transform = 'translateX(0)'; w._open = false; }
      });
      startX = e.touches[0].clientX;
      currentX = startX;
      dragging = true;
    }, { passive: true });

    card.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      currentX = e.touches[0].clientX;
      const dx = Math.min(0, Math.max(currentX - startX, openOffset));
      card.style.transform = `translateX(${dx}px)`;
    }, { passive: true });

    card.addEventListener('touchend', () => {
      if (!dragging) return;
      dragging = false;
      const dx = currentX - startX;
      if (dx < -45) {
        card.style.transform = `translateX(${openOffset}px)`;
        wrap._open = true;
      } else {
        reset();
      }
    });

    card.addEventListener('click', (e) => {
      if (wrap._open) { e.stopPropagation(); e.preventDefault(); reset(); }
    }, true);
  });
}

// ── Phase 8: 이번 달 매출 막대 그래프 ─────────
function renderSalesChart() {
  const svg = document.getElementById('stats-chart');
  if (!svg) return;
  const W = 320, H = 80, PAD_T = 4, PAD_B = 16, PAD_L = 4, PAD_R = 4;
  const lastDate = new Date(viewYear, viewMonth+1, 0).getDate();

  const dayRevenue = new Array(lastDate + 1).fill(0);
  let totalRev = 0, doneCount = 0;
  schedules.forEach(s => {
    if (!s.date) return;
    const d = new Date(s.date + 'T00:00:00');
    if (d.getFullYear() !== viewYear || d.getMonth() !== viewMonth) return;
    const day = d.getDate();
    const p = s.price ? Number(String(s.price).replace(/[^0-9]/g,'')) || 0 : 0;
    if (s.status === 'done') {
      dayRevenue[day] += p;
      totalRev += p;
      doneCount++;
    }
  });

  const maxRev = Math.max(...dayRevenue, 1);
  const barW = (W - PAD_L - PAD_R) / lastDate;
  const today = new Date();
  const isThisMonth = today.getFullYear() === viewYear && today.getMonth() === viewMonth;
  const todayD = today.getDate();

  let bars = '';
  for (let day = 1; day <= lastDate; day++) {
    const rev = dayRevenue[day];
    const h = rev > 0 ? Math.max(2, ((H - PAD_T - PAD_B) * rev) / maxRev) : 0;
    const x = PAD_L + (day - 1) * barW;
    const y = H - PAD_B - h;
    const isToday = isThisMonth && day === todayD;
    const fill = isToday ? 'var(--c-pr, #FF385C)' : (rev > 0 ? '#FECDD3' : '#E4E9EE');
    if (h > 0) {
      bars += `<rect x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${(barW * 0.7).toFixed(2)}" height="${h.toFixed(2)}" rx="1.5" fill="${fill}"/>`;
    } else {
      bars += `<rect x="${x.toFixed(2)}" y="${(H - PAD_B - 1).toFixed(2)}" width="${(barW * 0.7).toFixed(2)}" height="1" fill="#E4E9EE"/>`;
    }
  }
  let labels = '';
  [1, 10, 20, lastDate].forEach(day => {
    const x = PAD_L + (day - 1) * barW + (barW * 0.35);
    labels += `<text x="${x.toFixed(2)}" y="${H - 4}" font-size="9" fill="#9AA5B4" text-anchor="middle">${day}</text>`;
  });

  svg.innerHTML = bars + labels;
  // 2026 트렌드: 숫자 카운트업 (countUp 헬퍼는 utils.js에 정의됨, 미정의 시 즉시 표시 fallback)
  const totalEl = document.getElementById('stats-total');
  const countEl = document.getElementById('stats-count');
  const totalManwon = Math.round(totalRev / 10000);
  if (typeof countUp === 'function') {
    countUp(totalEl, totalManwon, { duration: 900, suffix: '만' });
    countUp(countEl, doneCount, { duration: 700 });
  } else {
    totalEl.textContent = totalRev > 0 ? totalManwon.toLocaleString() + '만' : '0만';
    countEl.textContent = doneCount;
  }

  const monthLbl = `${viewYear}.${String(viewMonth+1).padStart(2,'0')}`;
  document.getElementById('stats-title').textContent = isThisMonth ? '이번 달 매출' : `${monthLbl} 매출`;
}

// ══════════════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════════════

// 1) localStorage 캐시로 즉시 표시
setView(viewMode); // 저장된 뷰 모드 적용 (기본 month)
// V1.9.14: 저장된 period(주/월/년) 복원 + UI 활성화
try { setPeriod(periodMode); } catch(_) {}
fetchPendingBookings();
if (typeof initStickyHeader === 'function') initStickyHeader(); // 헤더 스크롤 축소 효과

// V1.9.28: 홈에서 저장한 날씨 tone → hero-card에 적용
function applyWeatherTone(){
  try {
    const raw = localStorage.getItem('ssak_weather');
    if (!raw) return;
    const w = JSON.parse(raw);
    // 1시간 만료
    if (!w || !w.tone || (Date.now() - (w.ts||0)) > 60*60*1000) return;
    const card = document.getElementById('hero-card');
    if (!card) return;
    card.classList.remove('tone-clear','tone-clouds','tone-rainy','tone-snow','tone-night','tone-cold','tone-hot');
    card.classList.add('tone-' + w.tone);
    const chip = document.getElementById('hero-weather-chip');
    if (chip && w.emoji) {
      chip.textContent = '· ' + w.emoji + ' ' + (w.label || '');
      chip.style.display = 'inline';
    }
  } catch(_) {}
}
applyWeatherTone();
// 페이지 다시 활성화 시 갱신 (홈 → 스케줄 전환)
document.addEventListener('visibilitychange', () => { if (!document.hidden) applyWeatherTone(); });

// 2) 백그라운드: 마이그레이션 → 서버 fetch (V1.9.16: 자동 리마인더 호출 제거 — MY 탭으로 이동)
(async function initSync() {
  try {
    await migrateLocalToServerOnce();
    const ok = await serverFetchSchedules();
    if (ok) {
      if (viewMode === 'month') { renderCalendar(); renderList(); updateProgressCard(); updateGreeting(); }
      else renderAgenda();
    }
    // V1.9.16: checkAutoReminders 호출 제거 — 자동 리마인더 UI/기능은 MY 탭에서 관리
  } catch (e) { console.log('initSync:', e.message); }
})();
</script>

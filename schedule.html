<script>
/* 싹싹 인증 진입 가드 (Phase 2 / 2026-05-17) — JWT 검증, 미로그인 시 login.html로 */
/* ★ V1.7.2 DEV BYPASS: 수정 작업 중 로그인 비활성화 — 복원: 아래 'if(true)return;' 줄만 삭제 ★ */
(function(){
  if(true)return; // ← DEV BYPASS (복원 시 이 줄 삭제)
  try {
    var tok = localStorage.getItem('ssak_jwt');
    if (!tok) throw new Error('no_token');
    var parts = tok.split('.');
    if (parts.length !== 3) throw new Error('bad_token');
    var p64 = parts[1].replace(/-/g,'+').replace(/_/g,'/');
    while (p64.length % 4) p64 += '=';
    var bin = atob(p64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    var payload = JSON.parse(new TextDecoder('utf-8').decode(bytes));
    if (payload.exp && payload.exp < Math.floor(Date.now()/1000)) throw new Error('expired');
  } catch (e) {
    localStorage.removeItem('ssak_jwt');
    localStorage.removeItem('ssak_user');
    var next = encodeURIComponent(location.pathname + location.search);
    location.replace('/login.html?next=' + next);
  }
})();
</script>

/* design.css 토큰 alias로 마이그 (TOP 1 확장 2026-05-15) */
:root{--primary:var(--c-pr);--primary-dark:var(--c-pr-d);--primary-light:var(--c-pr-l);--gray-50:var(--c-bg);--gray-100:var(--c-g100);--gray-200:var(--c-g200);--gray-300:var(--c-g300);--gray-400:var(--c-g400);--gray-500:var(--c-g500);--gray-700:var(--c-g700);--gray-900:var(--c-g900);--red:var(--c-red);--amber:var(--c-amber);--blue:var(--c-blue);--purple:#8B5CF6;--radius:var(--r-lg);--radius-sm:10px;--shadow:var(--sh-sm);}

/* === Phase 8: 매출 그래프 === */

.action-overlay.open{display:flex;}
.action-sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;margin:0 auto;padding:14px 16px env(safe-area-inset-bottom,16px);max-height:85vh;overflow-y:auto;}
.action-handle{width:36px;height:4px;background:var(--gray-200);border-radius:2px;margin:0 auto 10px;}
.action-header{padding:6px 4px 14px;border-bottom:1px solid var(--gray-100);margin-bottom:10px;}

.action-header-meta{font-size:12px;color:var(--gray-500);margin-top:3px;}

.action-row{display:flex;gap:8px;margin-bottom:8px;}
.action-btn{flex:1;padding:14px 8px;border-radius:var(--radius);background:#fff;border:1.5px solid var(--gray-200);cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all 0.15s;}
.action-btn:active{transform:scale(0.96);background:var(--gray-50);}
.action-btn-icon{font-size:22px;line-height:1;}
.action-btn-label{font-size:11.5px;font-weight:600;color:var(--gray-700);}
.action-btn.primary{background:var(--primary-light);border-color:var(--primary);}
.action-btn.primary .action-btn-label{color:var(--primary-dark);}
.action-btn.danger{background:#FEF2F2;border-color:#FECACA;}
.action-btn.danger .action-btn-label{color:#DC2626;}

/* === 반복 옵션 (Phase 6) === */

/* === 자동 리마인더 표시 (Phase 3 → 260527 톤업) === */
.reminder-status{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;line-height:1.4;
  margin:10px 16px 0;padding:10px 14px;
  border-radius:12px;
  background:var(--c-pr-xl, #FFEFF3);color:var(--c-pr-d, #E31C5F);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:transform .12s var(--ease-spring, ease-out), opacity .15s;
  letter-spacing:-.01em;
}
.reminder-status:empty{display:none;}
.reminder-status:active{transform:scale(.98);opacity:.85;}
.reminder-status .label{flex:1;}
.reminder-status .arrow{font-size:14px;opacity:.7;font-weight:700;}
.reminder-status.is-on{
  background:var(--c-mint-xl, #ECFDF5);color:#0F766E;
}
.reminder-status.is-off{
  background:var(--c-g100, #F2F4F6);color:var(--gray-500);
}
.reminder-status.is-busy{
  background:var(--c-pr-l, #FFE5EB);color:var(--c-pr-d, #E31C5F);

}
@keyframes rem-pulse{0%,100%{opacity:1}50%{opacity:.65}}

<script>
// ── 데이터 ──────────────────────────────────
let schedules = JSON.parse(localStorage.getItem('ssak_schedules') || '[]');
let cfg = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');

function saveSchedules() {
  localStorage.setItem('ssak_schedules', JSON.stringify(schedules));
}

// ── Supabase 동기화 (Phase 1A) ──────────────
function srvToLocal(r) {
  return {
    id: r.id,
    name: r.name || '',
    phone: r.phone || '',
    date: r.date || '',
    time: r.time || '',
    addr: r.addr || '',
    type: r.type || '입주 전 청소',
    size: r.size || '',
    price: r.price ? String(r.price) : '',
    memo: r.memo || '',
    status: r.status || 'confirmed',
    source: r.source || 'manual',
    source_id: r.source_id || null,
    updatedAt: r.updated_at ? new Date(r.updated_at).getTime() : Date.now()
  };
}

function localToSrv(s) {
  return {
    anon_id: getAnon(),
    name: s.name || '',
    phone: s.phone || '',
    date: s.date,
    time: s.time || '',
    addr: s.addr || '',
    type: s.type || '입주 전 청소',
    size: s.size || '',
    price: s.price ? Number(String(s.price).replace(/[^0-9]/g,'')) || 0 : 0,
    memo: s.memo || '',
    status: s.status || 'confirmed',
    source: s.source || 'manual',
    source_id: s.source_id || null
  };
}

function isServerId(id) {
  return typeof id === 'string' && /^[0-9a-f]{8}-[0-9a-f]{4}-/.test(id);
}

async function serverFetchSchedules() {
  try {
    const r = await fetch(SERVER + '/api/schedules?anon_id=' + encodeURIComponent(getAnon()));
    const d = await r.json();
    if (d && d.success && Array.isArray(d.data)) {
      schedules = d.data.map(srvToLocal);
      saveSchedules();
      return true;
    }
  } catch (e) { console.log('serverFetchSchedules:', e.message); }
  return false;
}

async function serverInsert(s) {
  try {
    const r = await fetch(SERVER + '/api/schedules', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(localToSrv(s))
    });
    const d = await r.json();
    if (d && d.success && d.data) return d.data.id;
  } catch (e) { console.log('serverInsert:', e.message); }
  return null;
}

async function serverUpdate(s) {
  if (!isServerId(s.id)) return false;
  try {
    const r = await fetch(SERVER + '/api/schedules/' + encodeURIComponent(s.id), {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(localToSrv(s))
    });
    const d = await r.json();
    return !!(d && d.success);
  } catch (e) { console.log('serverUpdate:', e.message); return false; }
}

async function serverDelete(id) {
  if (!isServerId(id)) return true;
  try {
    const r = await fetch(SERVER + '/api/schedules/' + encodeURIComponent(id) + '?anon_id=' + encodeURIComponent(getAnon()), {
      method: 'DELETE'
    });
    const d = await r.json();
    return !!(d && d.success);
  } catch (e) { console.log('serverDelete:', e.message); return false; }
}

async function migrateLocalToServerOnce() {
  if (localStorage.getItem('ssak_sched_migrated_v1') === '1') return;
  const local = (JSON.parse(localStorage.getItem('ssak_schedules') || '[]')) || [];
  const toMigrate = local.filter(s => !isServerId(s.id) && s.name && s.date);
  if (toMigrate.length === 0) {
    localStorage.setItem('ssak_sched_migrated_v1', '1');
    return;
  }
  let ok = 0;
  for (const s of toMigrate) {
    const newId = await serverInsert(s);
    if (newId) {
      const idx = schedules.findIndex(x => x.id === s.id);
      if (idx >= 0) schedules[idx].id = newId;
      ok++;
    }
  }
  saveSchedules();
  if (ok > 0) console.log(`[싹싹] ${ok}건 클라우드 동기화 완료`);
  localStorage.setItem('ssak_sched_migrated_v1', '1');
}

// ── 날짜 유틸 ──────────────────────────────
let viewYear = new Date().getFullYear();
let viewMonth = new Date().getMonth(); // 0-indexed
let selectedDate = toDateStr(new Date());
let editingId = null;
let selectedStatus = 'confirmed';

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function todayStr() { return toDateStr(new Date()); }

// ── 캘린더 렌더링 ────────────────────────────
function renderCalendar() {
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('month-label').textContent = `${viewYear}년 ${MONTHS[viewMonth]}`;

  const grid = document.getElementById('cal-grid');
  const today = todayStr();

  // 이달 1일 요일, 말일
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const lastDate = new Date(viewYear, viewMonth+1, 0).getDate();
  const prevLastDate = new Date(viewYear, viewMonth, 0).getDate();

  // 예약 날짜별 집계 (Phase 4: 시간/카운트도 함께)
  const dotMap = {};
  const dayBookings = {};
  schedules.forEach(s => {
    if (!dotMap[s.date]) dotMap[s.date] = [];
    dotMap[s.date].push(s.status);
    if (!dayBookings[s.date]) dayBookings[s.date] = [];
    dayBookings[s.date].push(s);
  });

  const STATUS_COLOR = {confirmed:'#6366F1', inprogress:'#EA580C', done:'var(--c-pr, #FF385C)', cancelled:'#DC2626'};

  let html = '';
  const totalCells = Math.ceil((firstDay + lastDate) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    let dateNum, dateStr, isOther = false;
    const dayOfWeek = i % 7;

    if (i < firstDay) {
      dateNum = prevLastDate - firstDay + i + 1;
      const m = viewMonth === 0 ? 12 : viewMonth;
      const y = viewMonth === 0 ? viewYear - 1 : viewYear;
      dateStr = `${y}-${String(m).padStart(2,'0')}-${String(dateNum).padStart(2,'0')}`;
      isOther = true;
    } else if (i >= firstDay + lastDate) {
      dateNum = i - firstDay - lastDate + 1;
      const m = viewMonth === 11 ? 1 : viewMonth + 2;
      const y = viewMonth === 11 ? viewYear + 1 : viewYear;
      dateStr = `${y}-${String(m).padStart(2,'0')}-${String(dateNum).padStart(2,'0')}`;
      isOther = true;
    } else {
      dateNum = i - firstDay + 1;
      dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(dateNum).padStart(2,'0')}`;
    }

    const isToday = dateStr === today;
    const isSel = dateStr === selectedDate;
    const isSun = dayOfWeek === 0;
    const isSat = dayOfWeek === 6;

    let cls = 'cal-day';
    if (isOther) cls += ' other-month';
    if (isToday) cls += ' today';
    if (isSel) cls += ' selected';
    if (isSun) cls += ' sunday';
    if (isSat) cls += ' saturday';

    // 점 (최대 3개)
    const dots = (dotMap[dateStr] || []).slice(0, 3).map(st =>
      `<div class="cal-dot" style="background:${STATUS_COLOR[st]||'#ccc'}"></div>`
    ).join('');

    // Phase 4: 미니 텍스트 — 첫 예약 시간 + 추가 건수 카운트
    let miniHtml = '';
    const dayList = dayBookings[dateStr];
    if (dayList && dayList.length > 0 && !isOther) {
      const sortedDay = [...dayList].sort((a,b) => (a.time || '99:99').localeCompare(b.time || '99:99'));
      const firstTime = sortedDay[0].time || '';
      const extra = sortedDay.length - 1;
      if (firstTime) {
        miniHtml = `<div class="cal-mini">${firstTime}${extra > 0 ? `<span class="cal-mini-count">+${extra}</span>` : ''}</div>`;
      } else if (extra > 0) {
        miniHtml = `<div class="cal-mini"><span class="cal-mini-count">${dayList.length}</span></div>`;
      }
    }

    html += `<div class="${cls}" onclick="selectDay('${dateStr}')">
      <div class="cal-num">${dateNum}</div>
      <div class="cal-dots">${dots}</div>
      ${miniHtml}
    </div>`;
  }

  grid.innerHTML = html;
  // Phase 8: 매출 그래프도 함께 갱신
  if (typeof renderSalesChart === 'function') renderSalesChart();
}

function selectDay(dateStr) {

function changeMonth(dir) {
  viewMonth += dir;

  if (viewMonth < 0) { viewMonth = 11; viewYear--; }

}

async function saveBooking() {
  const name = document.getElementById('b-name').value.trim();
  const date = document.getElementById('b-date').value;
  if (!name || !date) { toast('고객명과 날짜는 필수입니다'); return; }

  const baseData = {
    name,
    phone: document.getElementById('b-phone').value.trim(),
    date,
    time: document.getElementById('b-time').value,
    addr: document.getElementById('b-addr').value.trim(),
    type: document.getElementById('b-type').value,
    size: document.getElementById('b-size').value,
    price: document.getElementById('b-price').value,
    memo: document.getElementById('b-memo').value.trim(),
    status: selectedStatus
  };

  // 수정 모드: 단일 처리
  if (editingId) {
    const data = { ...baseData, id: editingId, updatedAt: Date.now() };
    const idx = schedules.findIndex(s => s.id === editingId);
    if (idx >= 0) schedules[idx] = { ...schedules[idx], ...data };
    saveSchedules();
    selectedDate = date;
    const d = new Date(date + 'T00:00:00');
    viewYear = d.getFullYear();
    viewMonth = d.getMonth();
    closeModal();
    renderCalendar(); renderList();
    toast('✅ 예약이 수정됐습니다');
    if (isServerId(editingId)) serverUpdate(data);
    return;
  }

  // 신규 모드: 반복 처리 (Phase 6)
  const repeat = document.getElementById('b-repeat').value || 'none';
  const dates = expandRepeatDates(date, repeat);
  const seriesId = repeat !== 'none' ? ('series-' + Date.now().toString(36)) : null;
  const newRows = [];
  for (const dt of dates) {
    const row = {
      ...baseData,
      id: 'local-' + Date.now().toString() + '-' + Math.random().toString(36).slice(2, 5),
      date: dt,
      memo: seriesId ? ((baseData.memo || '') + (baseData.memo ? ' ' : '') + '[정기]') : baseData.memo,
      updatedAt: Date.now(),
      series_id: seriesId
    };
    schedules.push(row);
    newRows.push(row);
  }
  saveSchedules();
  selectedDate = date;
  const d = new Date(date + 'T00:00:00');
  viewYear = d.getFullYear();
  viewMonth = d.getMonth();
  closeModal();
  renderCalendar(); renderList();
  toast(dates.length > 1 ? `✅ 정기 예약 ${dates.length}건이 추가됐습니다` : '✅ 예약이 추가됐습니다');

  // 서버 동기화 (백그라운드, 일괄)
  for (const row of newRows) {
    const newId = await serverInsert(row);
    if (newId) {
      const idx = schedules.findIndex(x => x.id === row.id);
      if (idx >= 0) schedules[idx].id = newId;
    }
  }
  saveSchedules();
}

// 반복 옵션에 따라 날짜 배열 생성 (Phase 6)
function expandRepeatDates(startDateStr, repeat) {
  if (!repeat || repeat === 'none') return [startDateStr];
  const out = [startDateStr];
  const start = new Date(startDateStr + 'T00:00:00');
  const config = {
    weekly:    { count: 8, addDays: 7 },
    biweekly:  { count: 6, addDays: 14 },
    monthly:   { count: 6, addMonths: 1 }
  }[repeat];
  if (!config) return out;
  for (let i = 1; i < config.count; i++) {
    const d = new Date(start);
    if (config.addMonths) d.setMonth(d.getMonth() + i * config.addMonths);
    else d.setDate(d.getDate() + i * config.addDays);
    out.push(toDateStr(d));
  }
  return out;
}

function updateRepeatInfo() {
  const sel = document.getElementById('b-repeat');
  const info = document.getElementById('repeat-info');
  if (!sel || !info) return;
  const v = sel.value;
  if (v === 'none') { info.classList.remove('show'); info.textContent = ''; return; }
  const date = document.getElementById('b-date').value;
  if (!date) return;
  const dates = expandRepeatDates(date, v);
  const last = dates[dates.length - 1];
  const lastD = new Date(last + 'T00:00:00');
  const dn = ['일','월','화','수','목','금','토'][lastD.getDay()];
  info.textContent = `📅 ${dates.length}회 자동 생성 (마지막: ${lastD.getMonth()+1}월 ${lastD.getDate()}일 ${dn})`;
  info.classList.add('show');
}

async function changeStatus(id) {

  const LABEL = {confirmed:'예약확정', inprogress:'진행중', done:'완료', cancelled:'취소'};
  const s = schedules.find(x => x.id === id);

  s.updatedAt = Date.now();
  saveSchedules();
  renderCalendar(); renderList();
  toast(`→ ${LABEL[s.status]}으로 변경됐습니다`);

}

// ── 통합 SMS 전송 (액션시트·자동리마인더 공용) ───
function sendSmsForBooking(s, type) {
  const c = cfg || JSON.parse(localStorage.getItem('ssak_cfg') || '{}');
  const apiKey = c.apiKey, apiSecret = c.apiSecret, fromPhone = c.fromPhone;
  if (!apiKey || !apiSecret || !fromPhone) {
    toast('설정에서 CoolSMS API를 먼저 설정해주세요'); return Promise.resolve(false);
  }
  if (!s || !s.phone) { toast('연락처가 없습니다'); return Promise.resolve(false); }
  const company = c.company || '싹싹클린';
  const d = s.date ? new Date(s.date + 'T00:00:00') : new Date();
  const dateLabel = `${d.getMonth()+1}월 ${d.getDate()}일`;
  const tm = s.time || '';
  const addr = s.addr || '협의';
  const phone = c.fromPhone || c.phone || '';
  const review = c.review || '';

  const MSGS = {
    confirm: `[${company}] ${s.name}님, ${dateLabel} ${tm} 입주청소 예약이 확정됐습니다. 주소: ${addr}. 문의: ${phone} 감사합니다 😊`,
    remind:  `[${company}] ${s.name}님, 내일 ${tm} 입주청소 일정 안내드립니다. 잊지 마세요! 문의: ${phone}`,
    done:    `[${company}] ${s.name}님, 오늘 청소가 완료됐습니다. 이용해 주셔서 감사합니다 🙏${review ? ' 후기: ' + review : ''}`
  };
  const msg = MSGS[type];
  if (!msg) return Promise.resolve(false);

  toast('📱 문자 발송 중...');
  return fetch(SERVER + '/send-sms', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ to: s.phone, from: fromPhone, text: msg, apiKey, apiSecret })
  }).then(r => r.json()).then(data => {
    if (data.success) { toast('✅ 문자 발송 완료!'); return true; }
    toast('❌ 발송 실패: ' + (data.error || '오류'));
    return false;
  }).catch(() => { toast('❌ 서버 오류'); return false; });
}

// ── 검색 (Phase 1B) ─────────────────────────
function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(() => document.getElementById('search-input').focus(), 100);
}

function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML =
    '<div class="search-empty">이름·전화·주소·메모로<br>예약을 빠르게 찾아보세요</div>';
}

function doSearch() {
  const q = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const box = document.getElementById('search-results');
  if (!q) {
    box.innerHTML = '<div class="search-empty">이름·전화·주소·메모로<br>예약을 빠르게 찾아보세요</div>';
    return;
  }
  const hits = schedules.filter(s => {
    const blob = [s.name, s.phone, s.addr, s.memo, s.type].filter(Boolean).join(' ').toLowerCase();
    return blob.indexOf(q) >= 0;
  }).sort((a,b) => (b.date||'').localeCompare(a.date||''));

  if (hits.length === 0) {
    box.innerHTML = '<div class="search-empty">검색 결과가 없습니다</div>';
    return;
  }

  const STATUS_LABEL = {confirmed:'예약확정', inprogress:'진행중', done:'완료', cancelled:'취소'};
  const STATUS_CLASS = {confirmed:'status-confirmed', inprogress:'status-inprogress', done:'status-done', cancelled:'status-cancelled'};

  box.innerHTML = `<div class="search-hint">검색 결과 ${hits.length}건</div>` + hits.map(s => {
    const d = s.date ? new Date(s.date + 'T00:00:00') : null;
    const dn = d ? ['일','월','화','수','목','금','토'][d.getDay()] : '';
    const dateLbl = d ? `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${dn})` : '';
    const meta = [s.time, s.phone, s.addr].filter(Boolean).map(esc).join(' · ');
    return `<div class="search-result-item" onclick="goToSchedule('${esc(s.id)}')">
      <div class="search-result-top">
        <span class="search-result-name">${esc(s.name||'')}</span>
        <span class="booking-status ${STATUS_CLASS[s.status]||''}">${STATUS_LABEL[s.status]||esc(s.status||'')}</span>
      </div>
      <div class="search-result-date">${dateLbl}</div>
      <div class="search-result-meta">${meta}</div>
    </div>`;
  }).join('');
}

function goToSchedule(id) {
  const s = schedules.find(x => x.id === id);
  if (!s || !s.date) return;
  const d = new Date(s.date + 'T00:00:00');
  viewYear = d.getFullYear();
  viewMonth = d.getMonth();
  selectedDate = s.date;
  closeSearch();
  renderCalendar(); renderList();
  setTimeout(() => openActionSheet(id), 250);
}

// ── 자동 리마인더 (Phase 3) ─────────────────
async function checkAutoReminders() {
  const c = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');
  const enabled = c.autoReminder !== false;
  const statusEl = document.getElementById('reminder-status');
  // ── 헬퍼: 상태 텍스트 + 클래스를 한 번에 갱신 + 탭하면 my.html로 이동
  const setStatus = (cls, label, arrow='') => {
    if (!statusEl) return;
    statusEl.className = 'reminder-status' + (cls?' '+cls:'');
    statusEl.innerHTML = `<span class="label">${label}</span>` + (arrow?`<span class="arrow">${arrow}</span>`:'');
    statusEl.onclick = (cls==='is-on') ? null : () => { location.href='my.html#sms-setup'; };
  };
  if (!enabled) {
    setStatus('is-off', '🔕 자동 리마인더 OFF', '설정 ›');
    return;
  }
  if (!c.apiKey || !c.apiSecret || !c.fromPhone) {
    setStatus('', '🔔 자동 리마인더 대기 중', 'SMS 설정 ›');
    return;
  }

  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const tStr = toDateStr(tomorrow);
  const sentMap = JSON.parse(localStorage.getItem('ssak_reminded_v1') || '{}');

  const targets = schedules.filter(s =>
    s.date === tStr && s.status === 'confirmed' && s.phone &&
    !sentMap[`${tStr}:${s.id}`]
  );

  if (targets.length === 0) {
    setStatus('is-on', `✅ 자동 리마인더 <span class="on">ON</span> · 내일 0건`);
    return;
  }

  setStatus('is-busy', `🔔 리마인더 발송 중… ${targets.length}건`);

  let ok = 0;
  for (const s of targets) {
    const success = await sendSmsForBooking(s, 'remind');
    if (success) {
      sentMap[`${tStr}:${s.id}`] = Date.now();
      ok++;
    }
  }
  localStorage.setItem('ssak_reminded_v1', JSON.stringify(sentMap));
  setStatus('is-on', `✅ 자동 리마인더 <span class="on">ON</span> · 내일 ${ok}건 발송완료`);
  if (ok > 0) toast(`📱 내일 일정 ${ok}건 자동 리마인더 발송!`);
}

// ── Phase 5: 뷰 전환 (월간 / 아젠다) ───────────
let viewMode = localStorage.getItem('ssak_view_mode') || 'month';

function setView(mode) {
  viewMode = mode;
  localStorage.setItem('ssak_view_mode', mode);
  document.getElementById('vbtn-month').classList.toggle('active', mode === 'month');
  document.getElementById('vbtn-agenda').classList.toggle('active', mode === 'agenda');
  document.getElementById('view-month').style.display = mode === 'month' ? 'block' : 'none';
  document.getElementById('view-agenda').classList.toggle('active', mode === 'agenda');
  if (mode === 'agenda') renderAgenda();
  else { renderCalendar(); renderList(); renderSalesChart(); }
}

function renderAgenda() {
  const box = document.getElementById('agenda-list');
  if (!box) return;
  const today = todayStr();
  const upcoming = schedules
    .filter(s => s.date >= today || s.status === 'inprogress')
    .sort((a,b) => (a.date||'').localeCompare(b.date||'') || (a.time||'').localeCompare(b.time||''));

  if (upcoming.length === 0) {
    box.innerHTML = `<div class="agenda-empty">
      <div style="font-size:40px;margin-bottom:10px;">📭</div>
      <div style="font-size:14px;line-height:1.6;">다가오는 예약이 없습니다<br><span style="color:var(--primary);font-weight:700;cursor:pointer;" onclick="openAddModal()">+ 예약 추가하기</span></div>
    </div>`;
    return;
  }

  const groups = {};
  upcoming.forEach(s => {
    if (!groups[s.date]) groups[s.date] = [];
    groups[s.date].push(s);
  });

  const STATUS_LABEL = {confirmed:'확정', inprogress:'진행중', done:'완료', cancelled:'취소'};
  const STATUS_CLASS = {confirmed:'status-confirmed', inprogress:'status-inprogress', done:'status-done', cancelled:'status-cancelled'};
  const dayNames = ['일','월','화','수','목','금','토'];

  let html = '';
  Object.keys(groups).sort().forEach(date => {
    const d = new Date(date + 'T00:00:00');
    const dn = dayNames[d.getDay()];
    const isToday = date === today;
    const monthDay = `${d.getMonth()+1}월 ${d.getDate()}일`;
    let dayCls = 'agenda-day-num';
    if (isToday) dayCls += ' today';
    if (d.getDay() === 0) dayCls += ' sunday';
    if (d.getDay() === 6) dayCls += ' saturday';

    html += `<div class="agenda-day-group">
      <div class="agenda-day-header">
        <div class="${dayCls}">
          <div class="a-d">${d.getDate()}</div>
          <div class="a-w">${dn}</div>
        </div>
        <div class="agenda-day-label">${isToday ? '오늘 · ' : ''}${monthDay}</div>
        <div class="agenda-day-count">${groups[date].length}건</div>
      </div>`;
    groups[date].forEach(s => {
      const meta = [s.type, s.size ? s.size+'평' : '', s.addr].filter(Boolean).map(esc).join(' · ');
      html += `<div class="agenda-card" onclick="openActionSheet('${esc(s.id)}')">
        <div class="agenda-time">${esc(s.time || '—')}</div>
        <div class="agenda-info">
          <div class="agenda-name">${esc(s.name||'')} <span class="booking-status ${STATUS_CLASS[s.status]||''}" style="margin-left:4px;">${STATUS_LABEL[s.status]||''}</span></div>
          <div class="agenda-meta">${meta}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  box.innerHTML = html;
}

// ── Phase 7: 카드 좌측 스와이프 → 빠른 삭제 ─────
function bindSwipeHandlers() {
  const wraps = document.querySelectorAll('.booking-card-wrap');
  wraps.forEach(wrap => {
    const card = wrap.querySelector('.booking-card');
    if (!card) return;
    let startX = 0, currentX = 0, dragging = false, openOffset = -90;
    const reset = () => { card.style.transform = 'translateX(0)'; wrap._open = false; };

    card.addEventListener('touchstart', (e) => {
      document.querySelectorAll('.booking-card-wrap').forEach(w => {
        if (w !== wrap && w._open) { const c = w.querySelector('.booking-card'); if (c) c.style.transform = 'translateX(0)'; w._open = false; }
      });
      startX = e.touches[0].clientX;
      currentX = startX;
      dragging = true;
    }, { passive: true });

    card.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      currentX = e.touches[0].clientX;
      const dx = Math.min(0, Math.max(currentX - startX, openOffset));
      card.style.transform = `translateX(${dx}px)`;
    }, { passive: true });

    card.addEventListener('touchend', () => {
      if (!dragging) return;
      dragging = false;
      const dx = currentX - startX;
      if (dx < -45) {
        card.style.transform = `translateX(${openOffset}px)`;
        wrap._open = true;
      } else {
        reset();
      }
    });

    card.addEventListener('click', (e) => {
      if (wrap._open) { e.stopPropagation(); e.preventDefault(); reset(); }
    }, true);
  });
}

async function swipeDelete(id) {
  if (!(await ssakConfirm('이 예약을 삭제하시겠습니까?'))) return;
  schedules = schedules.filter(s => s.id !== id);
  saveSchedules();
  if (viewMode === 'month') { renderCalendar(); renderList(); }
  else renderAgenda();
  toast('🗑 예약이 삭제됐습니다');
  serverDelete(id);
}

// ── Phase 8: 이번 달 매출 막대 그래프 ─────────
function renderSalesChart() {
  const svg = document.getElementById('stats-chart');
  if (!svg) return;
  const W = 320, H = 80, PAD_T = 4, PAD_B = 16, PAD_L = 4, PAD_R = 4;
  const lastDate = new Date(viewYear, viewMonth+1, 0).getDate();

  const dayRevenue = new Array(lastDate + 1).fill(0);
  let totalRev = 0, doneCount = 0;
  schedules.forEach(s => {
    if (!s.date) return;
    const d = new Date(s.date + 'T00:00:00');
    if (d.getFullYear() !== viewYear || d.getMonth() !== viewMonth) return;
    const day = d.getDate();
    const p = s.price ? Number(String(s.price).replace(/[^0-9]/g,'')) || 0 : 0;
    if (s.status === 'done') {
      dayRevenue[day] += p;
      totalRev += p;
      doneCount++;
    }
  });

  const maxRev = Math.max(...dayRevenue, 1);
  const barW = (W - PAD_L - PAD_R) / lastDate;
  const today = new Date();
  const isThisMonth = today.getFullYear() === viewYear && today.getMonth() === viewMonth;
  const todayD = today.getDate();

  let bars = '';
  for (let day = 1; day <= lastDate; day++) {
    const rev = dayRevenue[day];
    const h = rev > 0 ? Math.max(2, ((H - PAD_T - PAD_B) * rev) / maxRev) : 0;
    const x = PAD_L + (day - 1) * barW;
    const y = H - PAD_B - h;
    const isToday = isThisMonth && day === todayD;
    const fill = isToday ? 'var(--c-pr, #FF385C)' : (rev > 0 ? '#FECDD3' : '#E4E9EE');
    if (h > 0) {
      bars += `<rect x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${(barW * 0.7).toFixed(2)}" height="${h.toFixed(2)}" rx="1.5" fill="${fill}"/>`;
    } else {
      bars += `<rect x="${x.toFixed(2)}" y="${(H - PAD_B - 1).toFixed(2)}" width="${(barW * 0.7).toFixed(2)}" height="1" fill="#E4E9EE"/>`;
    }
  }
  let labels = '';
  [1, 10, 20, lastDate].forEach(day => {
    const x = PAD_L + (day - 1) * barW + (barW * 0.35);
    labels += `<text x="${x.toFixed(2)}" y="${H - 4}" font-size="9" fill="#9AA5B4" text-anchor="middle">${day}</text>`;
  });

  svg.innerHTML = bars + labels;
  // 2026 트렌드: 숫자 카운트업 (countUp 헬퍼는 utils.js에 정의됨, 미정의 시 즉시 표시 fallback)
  const totalEl = document.getElementById('stats-total');
  const countEl = document.getElementById('stats-count');
  const totalManwon = Math.round(totalRev / 10000);
  if (typeof countUp === 'function') {
    countUp(totalEl, totalManwon, { duration: 900, suffix: '만' });
    countUp(countEl, doneCount, { duration: 700 });
  } else {
    totalEl.textContent = totalRev > 0 ? totalManwon.toLocaleString() + '만' : '0만';
    countEl.textContent = doneCount;
  }

  const monthLbl = `${viewYear}.${String(viewMonth+1).padStart(2,'0')}`;
  document.getElementById('stats-title').textContent = isThisMonth ? '이번 달 매출' : `${monthLbl} 매출`;
}

<script>
// 화면 디버그 로거 (사장님이 직접 진행 상황 확인 가능)
window.DLOG = function(msg, level='info') {
  const panel = document.getElementById('diag-panel');
  if (!panel) return;
  const time = new Date().toLocaleTimeString('ko-KR');
  const div = document.createElement('div');
  div.className = level;
  div.innerHTML = `<span class="time">${time}</span> ${msg}`;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
};
DLOG('📱 booking2.html 로드 완료', 'ok');
DLOG('🌍 User-Agent: ' + navigator.userAgent.slice(0, 60) + '...', 'info');
DLOG('🔧 Service Worker: ' + ('serviceWorker' in navigator ? '지원' : '미지원'), 'info');
window.addEventListener('error', e => DLOG('❌ JS Error: ' + e.message, 'err'));
</script>
<script>
// 🔧 진단/긴급 fix: 페이지 로드 시 옛 sw + 캐시 자동 청소 (한 번만)
(async () => {
  if ('serviceWorker' in navigator && !sessionStorage.getItem('sw-cleared-v11')) {
    try {
      sessionStorage.setItem('sw-cleared-v11', '1');
      DLOG('🧹 sw 캐시 청소 시작...', 'warn');
      const regs = await navigator.serviceWorker.getRegistrations();
      let cleared = false;
      for (const r of regs) {
        await r.update();
        cleared = true;
      }
      DLOG('🧹 sw ' + regs.length + '개 업데이트 트리거', 'info');
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
        DLOG('🧹 cache ' + keys.length + '개 삭제', 'info');
      }
      if (cleared) {
        DLOG('🔄 잠시 후 새로고침...', 'warn');
        setTimeout(() => location.reload(), 500);
      } else {
        DLOG('✅ sw 없음 — 청소 스킵', 'ok');
      }
    } catch(e) { DLOG('❌ sw clear error: ' + e.message, 'err'); }
  } else {
    DLOG('✅ sw 이미 청소됨 (스킵)', 'ok');
  }
})();
</script>

<script>
const params = new URLSearchParams(location.search);

// URL 파라미터 파싱
const urlName   = params.get('name')  || '';
const urlPhone  = params.get('phone') || '';
const urlSize   = params.get('size')  || '';
const urlType   = params.get('type')  || '';
const urlPrice  = params.get('price') || '';
const urlCompany= params.get('company') || '서프로클린';

const typeLabels = {'move-in':'입주 전','move-out':'이사 후','new':'신축 준공','life':'생활 청소'};

function applyQuoteData(d) {
  const company = d.companyName || urlCompany || '서프로클린';
  document.getElementById('hdr-logo').textContent = company.charAt(0);
  document.getElementById('hdr-company').textContent = company;
  document.getElementById('footer-company').textContent = company + ' 입주청소';
  document.title = company + ' — 예약 신청';

  if (d.name)  { const el = document.getElementById('f-name');  el.value = d.name;  el.classList.add('prefilled'); }
  if (d.phone) { const el = document.getElementById('f-phone'); el.value = d.phone; el.classList.add('prefilled'); }
  if (d.size)  { const el = document.getElementById('f-size');  el.value = d.size;  el.classList.add('prefilled'); }
  if (d.type)  { const el = document.getElementById('f-type');  el.value = d.type;  el.classList.add('prefilled'); }

  if (d.size || d.price) {
    document.getElementById('quote-summary').style.display = 'block';
    document.getElementById('summary-type').textContent = typeLabels[d.type] || '입주 전 청소';
    if (d.size)  document.getElementById('summary-size').textContent  = d.size + '평';
    if (d.price) document.getElementById('summary-price').textContent = parseInt(d.price).toLocaleString() + '원';
  }

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('f-date').min = today;
  document.getElementById('screen-loading').style.display = 'none';
  document.getElementById('screen-main').style.display = 'block';
}

window.onload = async () => {
  const token = params.get('t'); // 단축 토큰

  if (token) {
    // 토큰 방식: 서버에서 견적 데이터 가져오기
    try {
      const res = await fetch(`${SERVER}/api/booking/token/${token}`);
      const json = await res.json();
      if (!res.ok) {
        document.getElementById('screen-loading').innerHTML =
          '<div class="state-icon">⚠️</div><div class="state-title">' + (json.error || '유효하지 않은 링크') + '</div><div class="state-sub">새 견적을 요청해 주세요</div>';
        return;
      }
      applyQuoteData(json.data);
    } catch(e) {
      document.getElementById('screen-loading').innerHTML =
        '<div class="state-icon">❌</div><div class="state-title">서버 연결 오류</div><div class="state-sub">잠시 후 다시 시도해주세요</div>';
    }
  } else {
    // URL 파라미터 방식 (fallback)
    applyQuoteData({ name: urlName, phone: urlPhone, size: urlSize, type: urlType, price: urlPrice, companyName: urlCompany });
  }
};

function checkReady() {
  const name  = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const addr  = document.getElementById('f-addr').value.trim();
  const agree = document.getElementById('agree-check').checked;
  document.getElementById('btn-submit').disabled = !(name && phone && addr && agree);
}

['f-name','f-phone','f-addr','f-size'].forEach(id => {
  document.getElementById(id)?.addEventListener('input', checkReady);
});

// ── 평수/유형별 자동 견적 계산 ──────────────────────────────────
const BASE_PRICE = {
  '입주 전 청소':  { base: 100000, perPyeong: 8000 },
  '이사 후 청소':  { base: 80000,  perPyeong: 7000 },
  '신축 준공 청소':{ base: 150000, perPyeong: 10000 },
  '생활 청소':     { base: 50000,  perPyeong: 5000 },
};

function calcEstimate() {
  const sizeVal = parseInt(document.getElementById('f-size').value) || 0;
  const typeVal = document.getElementById('f-type').value;
  const summaryEl = document.getElementById('quote-summary');
  const summaryType = document.getElementById('summary-type');
  const summarySize = document.getElementById('summary-size');
  const summaryPrice = document.getElementById('summary-price');

  if (!sizeVal || !typeVal) {
    if (summaryEl) summaryEl.style.display = 'none';
    return;
  }

  const priceTable = BASE_PRICE[typeVal];
  if (!priceTable) return;
  const estimated = priceTable.base + (sizeVal * priceTable.perPyeong);
  const formatted = Math.ceil(estimated / 10000) * 10000;

  if (summaryEl) summaryEl.style.display = 'block';
  if (summaryType) summaryType.textContent = typeVal;
  if (summarySize) summarySize.textContent = sizeVal + '평';
  if (summaryPrice) summaryPrice.textContent = formatted.toLocaleString() + '원~';
}

function submitBooking() {
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const address = document.getElementById('f-addr').value.trim();
  const size = document.getElementById('f-size').value.trim();
  const type = document.getElementById('f-type').value;
  const date = document.getElementById('f-date').value;
  const time = document.getElementById('f-time').value;
  const notes = document.getElementById('f-notes').value.trim();
  if (!name || !phone) { showToast('이름과 연락처를 입력해주세요'); return; }
  if (!address) { showToast('청소 주소를 입력해주세요'); return; }
  if (!date) { showToast('희망 날짜를 선택해주세요'); return; }
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = '⏳ 신청 중...';
  const cfg = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');
  // 10초 timeout (응답 안 오면 강제 종료)
  const _ctrl = new AbortController();
  const _tid = setTimeout(() => { _ctrl.abort(); DLOG('⏱ 10초 timeout 발동', 'warn'); }, 10000);
  DLOG('📤 서버에 요청 전송 시작: ' + SERVER + '/api/booking', 'info');
  fetch(SERVER + '/api/booking', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    signal: _ctrl.signal,
    body: JSON.stringify({name, phone, address, size, type, date, time, notes,
      ownerPhone: cfg.fromPhone || cfg.phone || '',
      company: cfg.company || '싹싹클린',
      companyName: cfg.company || '싹싹클린'
    })
  })
  .then(r => { DLOG('📥 HTTP ' + r.status + ' 응답 받음', r.ok ? 'ok' : 'err'); return r.json(); })
  .then(data => {
    DLOG('📋 데이터: success=' + data.success + (data.error ? ', error=' + data.error : ''), data.success ? 'ok' : 'err');
    if (data.success) {
      DLOG('✅ 예약 신청 성공!', 'ok');
      document.getElementById('screen-main').style.display = 'none';
      document.getElementById('screen-done').style.display = 'flex';
      // 완료 화면에 예약 정보 표시
      const detail = document.getElementById('done-detail');
      if(detail) {
        detail.innerHTML = `
          <div style="background:#f8faf8;border:1px solid #d4e8d4;border-radius:14px;padding:16px;text-align:left;font-size:13px;line-height:2;">
            <div>👤 <b>${name}</b> · ${phone}</div>
            <div>📍 ${address || '주소 미입력'}</div>
            <div>📅 ${date} · 🧹 ${type} ${size ? size+'평' : ''}</div>
            ${notes ? '<div>📝 '+notes+'</div>' : ''}
          </div>`;
      }
    } else {
      showToast('신청 실패: ' + (data.error || '오류'));
      btn.disabled = false;
      btn.textContent = '📅 예약 신청하기';
    }
  })
  .catch((e) => {
    clearTimeout(_tid);
    const isAbort = e && e.name === 'AbortError';
    DLOG('❌ fetch 실패: ' + (e.name || 'Unknown') + ' - ' + (e.message || 'no message'), 'err');
    showToast(isAbort ? '응답 시간 초과. 다시 시도해주세요.' : '서버 오류. 잠시 후 다시 시도해주세요.');
    btn.disabled = false;
    btn.textContent = '📅 예약 신청하기';
  })
  .finally(() => { clearTimeout(_tid); DLOG('🏁 fetch 흐름 종료', 'info'); });
}

let toastTimer;
</script>
</body>
</html>

/* 싹싹 인증 진입 가드 (Phase 2 / 2026-05-17) — JWT 검증, 미로그인 시 login.html로 */
/* ★ V1.7.2 DEV BYPASS: 수정 작업 중 로그인 비활성화 — 복원: 아래 'if(true)return;' 줄만 삭제 ★ */
(function(){
  if(true)return; // ← DEV BYPASS (복원 시 이 줄 삭제)
  try {
    var tok = localStorage.getItem('ssak_jwt');
    if (!tok) throw new Error('no_token');
    var parts = tok.split('.');
    if (parts.length !== 3) throw new Error('bad_token');
    var p64 = parts[1].replace(/-/g,'+').replace(/_/g,'/');
    while (p64.length % 4) p64 += '=';
    var bin = atob(p64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    var payload = JSON.parse(new TextDecoder('utf-8').decode(bytes));
    if (payload.exp && payload.exp < Math.floor(Date.now()/1000)) throw new Error('expired');
    // OK
  } catch (e) {
    localStorage.removeItem('ssak_jwt');
    localStorage.removeItem('ssak_user');
    var next = encodeURIComponent(location.pathname + location.search);
    location.replace('/login.html?next=' + next);
  }
})();
</script>

/* ═══ V1.8 헬스 카드 — 3단계 색 (블루 → 살구 → 코랄) ═══ */
.health-card {
  margin: 12px 16px 20px;
  border-radius: 16px;

  -webkit-tap-highlight-color: transparent;
}
.health-card:active { transform: scale(0.98); }

/* V1.9.1: 단계별 진한 텍스트 색 (가독성 ↑, WCAG AA 4.5:1+ 통과)
   카드 배경은 옅게 유지 + 텍스트는 톤에 맞춰 진하게 */

/* L1 여유롭게 — 연한 블루 (배경) + 진한 네이비 (텍스트) */
.health-card.level-1 {
  background: linear-gradient(135deg, #BFD7F0 0%, #7BA8DC 100%);
  color: #0F1E33;  /* 진한 네이비 — contrast 8.5:1 */
}
.health-card.level-1 .health-bar { background: rgba(15,30,51,0.20); }
.health-card.level-1 .health-bar-fill { background: rgba(15,30,51,0.85); }

/* L2 순조롭게 — 살구 (배경) + 진한 갈색 (텍스트) */
.health-card.level-2 {
  background: linear-gradient(135deg, #FFD8B5 0%, #FFB585 100%);
  color: #4A2410;  /* 진한 초콜릿 — contrast 6.2:1 */
}
.health-card.level-2 .health-bar { background: rgba(74,36,16,0.20); }
.health-card.level-2 .health-bar-fill { background: rgba(74,36,16,0.85); }

/* L3 활기차게 — 연한 코랄 (배경) + 진한 와인 (텍스트) */
.health-card.level-3 {
  background: linear-gradient(135deg, #FFB8C5 0%, #FF7A95 100%);
  color: #4A0E1F;  /* 진한 와인 — contrast 5.8:1 */
}
.health-card.level-3 .health-bar { background: rgba(74,14,31,0.20); }
.health-card.level-3 .health-bar-fill { background: rgba(74,14,31,0.85); }

  text-shadow: 0 1px 0 rgba(255,255,255,0.25);
}

.ds-tl-area { font-size:10px; font-weight:700; color:rgba(27,42,63,0.7); margin-top:2px; letter-spacing:-0.01em; line-height:1.1; }
.ds-tl-item.now .ds-tl-area { color:rgba(255,255,255,0.9); }
.ds-tl-task { font-size:10px; font-weight:600; color:rgba(27,42,63,0.55); margin-top:1px; line-height:1.1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ds-tl-item.now .ds-tl-task { color:rgba(255,255,255,0.75); }

/* ═══ V1.7.4 mockup port: Today Forecast 강화 (큰 사이즈) ═══ */
.ds-today-fc {
  margin: 14px 16px 0;
}
.ds-today-fc-date::after {
  /* "월 일 · 요일 · 강서구" — 위치 정보는 JS가 채움 */
}
/* Weather hero 더 크게 — mockup 비율 */
.ds-today-fc .ds-today-fc-scene {
  height: 130px;
}
.ds-today-fc .ds-today-sun {
  width: 76px; height: 76px;
}
.ds-today-fc .ds-today-cloud {
  width: 120px; height: 52px;
}

/* ═══ V1.9 Parallax — 스크롤(A) + 터치(C) 효과 ═══ */
.ds-today-fc {
  transition: transform 240ms cubic-bezier(.16,1,.3,1), box-shadow 240ms ease;
  cursor: pointer;
  --ripple-x: 50%;
  --ripple-y: 50%;
}
.ds-today-fc .ds-today-sun,
.ds-today-fc .ds-today-cloud,
.ds-today-fc .ds-today-sparkles {
  will-change: transform;
  transition: transform 140ms cubic-bezier(.2,.8,.4,1);
}
/* 터치 중 — 더 빠른 transition + 카드 부풀어 */
.ds-today-fc.parallax-touching {
  transform: scale(1.012);
  box-shadow: 0 18px 48px rgba(80,120,180,.24), 0 2px 0 rgba(15,15,18,.04);
}
.ds-today-fc.parallax-touching .ds-today-sun,
.ds-today-fc.parallax-touching .ds-today-cloud,
.ds-today-fc.parallax-touching .ds-today-sparkles {
  transition: transform 70ms ease-out;
}
/* 터치 ripple 효과 — pseudo-element */
.ds-today-fc-ripple {
  position: absolute;
  pointer-events: none;
  width: 110px; height: 110px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,.45), transparent 65%);
  left: var(--ripple-x);
  top: var(--ripple-y);
  transform: translate(-50%, -50%) scale(0.4);
  opacity: 0;
  transition: opacity 220ms ease-out, transform 600ms ease-out;
  z-index: 5;
}
.ds-today-fc.parallax-touching .ds-today-fc-ripple {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1.5);
}

@media (prefers-reduced-motion: reduce) {
  .ds-today-fc { transition: none; }
  .ds-today-fc .ds-today-sun,
  .ds-today-fc .ds-today-cloud,
  .ds-today-fc .ds-today-sparkles { transition: none; }
  .ds-today-fc.parallax-touching { transform: none; }
  .ds-today-fc-ripple { display: none; }
}
.ds-today-fc .ds-today-fc-num {
  font-size: 64px;
  font-weight: 900;
  letter-spacing: -0.05em;
}

/* ═══ V1.7.4 실시간 날씨 — 4 scene (맑음/흐림/비/눈/밤) ═══ */

/* 기온 칩 (hero top 우측, state 옆) */
.ds-fc-temp {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.72); backdrop-filter: blur(8px);
  border-radius: 99px; padding: 5px 11px;
  font-size: 12px; font-weight: 800;
  color: #1B2A3F;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  margin-left: 6px;
}
.ds-fc-temp .deg { font-size: 11px; opacity: 0.7; }

/* 흐림 scene (Clouds) */
.ds-today-fc.scene-cloudy {
  background: linear-gradient(165deg, #DDDFE5 0%, #C3C6CD 55%, #A8ACB5 100%);
}
.ds-today-fc.scene-cloudy .ds-today-sun {
  opacity: 0.35; filter: grayscale(0.5);
}
.ds-today-fc.scene-cloudy .ds-today-cloud {
  filter: brightness(0.9);
}

/* 비 scene (Rain/Drizzle) */
.ds-today-fc.scene-rain {
  background: linear-gradient(165deg, #8B9BB1 0%, #6B7C95 55%, #4F5E7A 100%);
  color: #fff;
}
.ds-today-fc.scene-rain .ds-today-fc-label,
.ds-today-fc.scene-rain .ds-today-fc-date,
.ds-today-fc.scene-rain .ds-today-fc-sub {
  color: rgba(255,255,255,0.85);
}
.ds-today-fc.scene-rain .ds-today-fc-num,
.ds-today-fc.scene-rain .ds-today-fc-unit { color: #fff; }
.ds-today-fc.scene-rain .ds-today-sun { display: none; }
.ds-today-fc.scene-rain .ds-today-sparkles { display: none; }
.ds-today-fc.scene-rain .ds-today-cloud { filter: brightness(0.7); }
.ds-today-fc.scene-rain .ds-fc-temp {
  background: rgba(255,255,255,0.25); color: #fff;
}
.ds-rain-drops {
  position: absolute; inset: 0;
  pointer-events: none; overflow: hidden;
}
.ds-rain-drop {
  position: absolute; top: -20px;
  width: 1.5px; height: 14px;
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.7));
  animation: rain-fall 1.2s linear infinite;
}
@keyframes rain-fall {
  0%   { transform: translateY(-20px); opacity: 0; }
  10%  { opacity: 0.7; }
  90%  { opacity: 0.7; }
  100% { transform: translateY(160px); opacity: 0; }
}

/* 눈 scene (Snow) */
.ds-today-fc.scene-snow {
  background: linear-gradient(165deg, #E8EFF7 0%, #CFDDEB 55%, #B5C9DC 100%);
}
.ds-today-fc.scene-snow .ds-today-sun {
  display: none;
}
.ds-today-fc.scene-snow .ds-today-cloud {
  filter: brightness(1.1);
}
.ds-snow-flakes {
  position: absolute; inset: 0;
  pointer-events: none; overflow: hidden;
}
.ds-snow-flake {
  position: absolute; top: -20px;
  color: #fff; font-size: 12px; font-weight: 900;
  text-shadow: 0 1px 2px rgba(80,100,140,0.2);
  animation: snow-fall 4s linear infinite;
}
@keyframes snow-fall {
  0%   { transform: translateY(-20px) translateX(0) rotate(0); opacity: 0; }
  15%  { opacity: 0.9; }
  85%  { opacity: 0.9; }
  100% { transform: translateY(160px) translateX(20px) rotate(360deg); opacity: 0; }
}

/* 밤 scene (Clear/Clouds at night — icon ends with 'n') */
.ds-today-fc.scene-night {
  background: linear-gradient(165deg, #2A3A55 0%, #1E2A42 55%, #14192C 100%);
  color: #E8EFF7;
}
.ds-today-fc.scene-night .ds-today-fc-label,
.ds-today-fc.scene-night .ds-today-fc-date {
  color: rgba(232,239,247,0.65);
}
.ds-today-fc.scene-night .ds-today-fc-sub { color: rgba(232,239,247,0.8); }
.ds-today-fc.scene-night .ds-today-fc-num,
.ds-today-fc.scene-night .ds-today-fc-unit { color: #E8EFF7; }
.ds-today-fc.scene-night .ds-fc-temp {
  background: rgba(255,255,255,0.18); color: #E8EFF7;
}
.ds-today-fc.scene-night .ds-today-sun {
  background: radial-gradient(circle at 35% 35%, #F5F1E8 0%, #DDD5BE 60%, #B8AC8E 100%);
  box-shadow: 0 0 0 5px rgba(220,210,180,0.18), 0 0 24px rgba(220,210,180,0.18);
}
.ds-today-fc.scene-night .ds-today-sun .ray { display: none; } /* 달은 빛 ✗ */
.ds-today-fc.scene-night .ds-today-cloud { opacity: 0.4; filter: brightness(0.6); }
.ds-today-fc.scene-night .ds-today-sparkle {
  color: #E8EFF7; opacity: 1;
}
/* 밤 별 강화 — sparkle 더 많이 */
.ds-today-fc.scene-night .ds-today-sparkles::before,
.ds-today-fc.scene-night .ds-today-sparkles::after {
  content: '·';
  position: absolute;
  color: #E8EFF7;
  font-size: 10px;
  opacity: 0.7;
}
.ds-today-fc.scene-night .ds-today-sparkles::before { left: 22%; top: 18%; }
.ds-today-fc.scene-night .ds-today-sparkles::after { left: 78%; top: 62%; }

/* 천둥 (Thunderstorm) — 비 scene 위에 번개 깜빡 */
.ds-today-fc.scene-thunder {
  background: linear-gradient(165deg, #5A4A6E 0%, #3F3458 55%, #2A1E3F 100%);
  color: #fff;
}
.ds-today-fc.scene-thunder .ds-today-fc-label,
.ds-today-fc.scene-thunder .ds-today-fc-date,
.ds-today-fc.scene-thunder .ds-today-fc-sub { color: rgba(255,255,255,0.85); }
.ds-today-fc.scene-thunder .ds-today-fc-num,
.ds-today-fc.scene-thunder .ds-today-fc-unit { color: #fff; }
.ds-today-fc.scene-thunder .ds-today-sun { display: none; }
.ds-today-fc.scene-thunder .ds-today-cloud { filter: brightness(0.6); }
.ds-today-fc.scene-thunder::before {
  content: ''; position: absolute; inset: 0;
  background: rgba(255,255,180,0); pointer-events: none;
  animation: thunder-flash 6s ease-in-out infinite;
}
@keyframes thunder-flash {
  0%, 92%, 100% { background: rgba(255,255,180,0); }
  93%, 94%      { background: rgba(255,255,180,0.45); }
  95%, 96%      { background: rgba(255,255,180,0); }
  97%, 98%      { background: rgba(255,255,180,0.6); }
}

@media (prefers-reduced-motion: reduce) {
  .ds-rain-drop, .ds-snow-flake { animation: none; opacity: 0.5; }
  .ds-today-fc.scene-thunder::before { animation: none; }
}

/* ═══ V1.7.4 mockup port: Timeline 강화 ═══ */
.ds-timeline {
  margin-top: 16px;
  padding: 12px 0 12px 16px;
}
.ds-tl-item {
  width: 112px;
  border-radius: 16px;
  padding: 13px 12px;
}
.ds-tl-item.now {
  background: #047857;
  color: #fff;
  box-shadow: 0 6px 20px rgba(4,120,87,0.28);
}

/* ═══ V1.7.4: 고객케어 노란 hero + Extended FAB 모두 제거 (이미지 그대로) ═══ */

/* ── V1.7.3: Extended FAB (고객케어 primary CTA) — DEPRECATED V1.7.4 ──────────── */
.ds-fab-ext {

  bottom: 80px; /* nav(60px) + 20px gap */

}

.ds-fab-ext-ico {

/* 홈 컨텐츠 padding-bottom — 마지막 tile이 FAB에 가려지지 않도록 */

@media (prefers-reduced-motion: reduce) {

.tile-row {

/* unread dot — 내 글 댓글 / 내 거래 메시지 신규 알림 (V1.5) */

// 🔔 버튼 클릭 → 상태별 흐름 분기 (Phase 5-B priming)
async function togglePushNotification() {
  const perm = pushPermission();
  if (perm === 'unsupported') {
    toast('이 브라우저는 푸시 알림을 지원하지 않습니다');
    return;
  }
  if (perm === 'ios-no-pwa') {
    ssakShowIOSInstallGuide();
    return;
  }
  if (perm === 'denied') {
    ssakShowPushDeniedGuide();
    return;
  }

  // granted 인데 구독 객체가 없으면 → 구독부터, 있으면 → 설정 모달
  const reg = await navigator.serviceWorker.ready;
  const sub = await reg.pushManager.getSubscription();

  if (!sub) {
    // permission='default' or granted-but-not-subscribed → priming
    ssakShowPushPrime({
      onAccept: async () => {
        const res = await ssakSubscribePush({ hour: 8, minute: 0, reminder_enabled: true });
        if (res.ok) {
          updateBellState(true);
          toast('🔔 매일 오전 8:00에 알림을 받아요. 시간은 벨에서 바꿀 수 있어요');
        } else if (res.err === 'denied') {
          ssakShowPushDeniedGuide();
        } else if (res.err === 'default') {
          // 사용자가 native prompt를 닫음 — 조용히
        } else {
          toast('알림 설정 중 오류: ' + (res.err || 'unknown'));
        }
      }
    });
    return;
  }

  // 이미 구독 중 → 설정 모달
  fillReminderTimes();
  const enabledEl = document.getElementById('reminder-enabled');
  const timeEl = document.getElementById('reminder-time');
  try {
    const r = await fetch(SERVER + '/api/push/reminder?endpoint=' + encodeURIComponent(sub.endpoint));
    const d = await r.json();
    const cfg = (d && d.data) || { reminder_hour: 8, reminder_minute: 0, reminder_enabled: true };
    enabledEl.checked = cfg.reminder_enabled !== false;
    const hh = String(cfg.reminder_hour ?? 8).padStart(2,'0');
    const mm = String(cfg.reminder_minute ?? 0).padStart(2,'0');
    timeEl.value = `${hh}:${mm}`;
  } catch(e) {
    enabledEl.checked = true;
    timeEl.value = '08:00';
  }

  syncEnabledUI(enabledEl.checked);
  enabledEl.onchange = () => syncEnabledUI(enabledEl.checked);
  document.getElementById('reminder-modal').style.display = 'flex';
}

// 모달 [저장] 클릭
async function saveReminderSettings() {
  const enabled = document.getElementById('reminder-enabled').checked;
  const [hhStr, mmStr] = document.getElementById('reminder-time').value.split(':');
  const reminder_hour = parseInt(hhStr, 10);
  const reminder_minute = parseInt(mmStr, 10);

  try {
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();

    if (!enabled) {
      // 구독 자체는 유지, 서버에서 reminder_enabled=false
      if (sub) {
        await fetch(SERVER + '/api/push/reminder', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint: sub.endpoint, reminder_enabled: false })
        });
      }
      updateBellState(false);
      closeReminderModal();
      toast('🔕 리마인더가 꺼졌습니다');
      return;
    }

    if (!sub) {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') { toast('알림 권한이 거부됐습니다'); return; }
      const keyRes = await fetch(SERVER + '/api/push/vapid-key').then(r => r.json());
      const vapidKey = urlBase64ToUint8Array(keyRes.publicKey);
      sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: vapidKey });
    }

    const { endpoint } = sub;
    const keys = sub.toJSON().keys;
    const cfg = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');

    await fetch(SERVER + '/api/push/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        endpoint, p256dh: keys.p256dh, auth: keys.auth,
        anon_id: getAnon(),
        deviceId: cfg.company || 'unknown',
        reminder_hour, reminder_minute
      })
    });
    await fetch(SERVER + '/api/push/reminder', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ endpoint, reminder_enabled: true, reminder_hour, reminder_minute })
    });

    updateBellState(true);
    closeReminderModal();
    toast(`🔔 매일 ${String(reminder_hour).padStart(2,'0')}:${String(reminder_minute).padStart(2,'0')}에 알림을 받습니다`);
  } catch(e) {
    console.error('Reminder save error:', e);
    toast('저장 중 오류: ' + e.message);
  }
}

// ── 홈 리디자인 보완 ───────────────────────────────────────────
// fetch 60초 메모리 캐시 — 같은 사장님이 홈 ↔ 다른 탭 자주 이동 시 네트워크 ↓
// 캐시 키 = URL. 응답을 sessionStorage에도 저장해 reload 직후에도 즉시 그림.
const _ssakFetchCache = new Map();
async function cachedFetch(url, ttlMs = 60000) {
  const now = Date.now();
  const mem = _ssakFetchCache.get(url);
  if (mem && (now - mem.ts) < ttlMs) return mem.data;
  try {
    const sess = sessionStorage.getItem('ssak_fetch_' + url);
    if (sess) {
      const parsed = JSON.parse(sess);
      if (parsed && (now - parsed.ts) < ttlMs) {
        _ssakFetchCache.set(url, parsed);
        return parsed.data;
      }
    }
  } catch(_) {}
  const r = await fetch(url);
  const data = await r.json();
  const entry = { ts: now, data };
  _ssakFetchCache.set(url, entry);
  try { sessionStorage.setItem('ssak_fetch_' + url, JSON.stringify(entry)); } catch(_) {}
  return data;
}

// ── V1.7.x: Today Forecast 렌더링 (weather hero) ─────────────
// 사장님 일정을 일기예보처럼. 매출 ✗, 일정 건수·시간·진척만.
// V1.7.2: 일정 0건이어도 weather hero 항상 표시 (사장님: "라이브 날씨 무조건 적용")
function renderTodayForecast(items) {
  const fc = document.getElementById('today-fc');
  const statusCard = document.getElementById('today-card');
  if (!fc) return;

  // 무조건 weather hero 표시, status-card 영구 숨김
  fc.style.display = '';
  if (statusCard) statusCard.style.display = 'none';

  const total = items.length;
  if (total === 0) {
    // 일정 0건 — weather hero에 "여유로운 하루" 표시
    const set = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
    const setHTML = (id, v) => { const e = document.getElementById(id); if (e) e.innerHTML = v; };
    const d = new Date();
    const days = ['일','월','화','수','목','금','토'];
    const dateStr = `${d.getMonth()+1}월 ${d.getDate()}일 · ${days[d.getDay()]}`;
    set('today-fc-num', 0);
    set('today-fc-date', dateStr);
    set('today-fc-state', '🌤 여유로운 하루');
    setHTML('today-fc-progress', '오늘 일정 없음 · 탭해서 새 견적 받기');
    set('today-fc-progress-pct', '—');
    set('today-fc-first', '—');
    set('today-fc-now', '—');
    set('today-fc-last', '—');
    // 카드 클릭 시 견적 페이지로 (no schedule, so quote action)
    fc.onclick = () => goTo('quote');
    return;
  }

  // 일정 있음 — 정상 렌더
  fc.onclick = () => goTo('schedule');

  // 상태 분류 (status별 카운트)
  const done = items.filter(i => i.status === 'completed' || i.status === 'done').length;
  const inprog = items.filter(i => i.status === 'inprogress' || i.status === 'in_progress').length;
  const upcoming = total - done - inprog;
  const progressPct = total > 0 ? Math.round((done / total) * 100) : 0;

  // 시간 추출 (HH:MM 또는 first.time)
  const sorted = items.slice().sort((a, b) => {
    const ta = (a.time || a.scheduled_time || '00:00');
    const tb = (b.time || b.scheduled_time || '00:00');
    return ta.localeCompare(tb);
  });
  const firstTime = sorted[0] && (sorted[0].time || sorted[0].scheduled_time) || '—';
  const lastTime  = sorted[sorted.length-1] && (sorted[sorted.length-1].time || sorted[sorted.length-1].scheduled_time) || '—';

  // 지금 진행중 또는 다음 예정
  const now = new Date();
  const nowHHMM = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const nextItem = sorted.find(i => {
    const t = (i.time || i.scheduled_time || '');
    return t >= nowHHMM && i.status !== 'completed' && i.status !== 'done';
  });
  const nowTime = nextItem ? (nextItem.time || nextItem.scheduled_time || '—') : '—';

  // 상태 칩 카피
  let stateLabel;
  if (total >= 4)      stateLabel = '☀ 활기찬 하루';
  else if (total >= 2) stateLabel = '⛅ 순조로움';
  else                  stateLabel = '🌥 여유로움';

  // 날짜 + 위치 (mockup 그대로: "6월 5일 · 목 · 강서구")
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  const cfgLoc = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');
  const region = cfgLoc.region || cfgLoc.district || cfgLoc.address?.split(' ').slice(0,2).join(' ') || '';
  const dateStr = `${d.getMonth()+1}월 ${d.getDate()}일 · ${days[d.getDay()]}` + (region ? ` · ${region}` : '');

  // DOM 업데이트
  const set = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
  const setHTML = (id, v) => { const e = document.getElementById(id); if (e) e.innerHTML = v; };
  // V1.8 bug fix: upcoming은 confirmed 만 (cancelled 제외)
  const confirmed = items.filter(i => i.status === 'confirmed').length;
  set('today-fc-num', total);
  set('today-fc-date', dateStr);
  set('today-fc-state', stateLabel);
  setHTML('today-fc-progress', `완료 <b>${done}</b> · 진행 <b>${inprog}</b> · 예정 <b>${confirmed}</b>`);
  set('today-fc-progress-pct', progressPct + '%');
  set('today-fc-first', firstTime);
  set('today-fc-now', nowTime);
  set('today-fc-last', lastTime);

  // V1.8 단순 Timeline: 시간/지역/내용 3줄
  renderTimeline(sorted, nextItem);
  // V1.8 헬스 카드 자동 추정 + 색 단계
  renderHealthCard(items);
}

// V1.8 단순 Timeline (시간/지역/내용 3줄, 컴팩트)
function renderTimeline(sorted, nextItem) {
  const tl = document.getElementById('today-timeline');
  if (!tl) return;
  if (!sorted || sorted.length === 0) { tl.style.display = 'none'; return; }
  tl.style.display = '';
  tl.innerHTML = sorted.slice(0, 6).map(i => {
    const t = i.time || i.scheduled_time || '—';
    const isDone = i.status === 'completed' || i.status === 'done';
    const isProg = i.status === 'inprogress' || i.status === 'in_progress';
    const isCancelled = i.status === 'cancelled';
    const isNow  = (i === nextItem) && !isDone;
    if (isCancelled) return ''; // 취소된 일정 숨김
    const stateCls = isDone ? 'done' : (isNow ? 'now' : '');
    // 지역: address에서 자치구 추출 (예: "서울 강서구 ..." → "강서구")
    const addr = i.address || i.addr || '';
    const m = addr.match(/(\S+구|\S+군|\S+시)/);
    const area = (m && m[1]) || (i.region || i.district || '');
    const task = (i.kind || i.service || i.type || '청소').slice(0, 6);
    return `<button class="ds-tl-item ${stateCls}" onclick="location.href='schedule.html'">
      <div class="ds-tl-time">${t}</div>
      <div class="ds-tl-area">${area || '—'}</div>
      <div class="ds-tl-task">${task}</div>
    </button>`;
  }).join('');
}

const HEALTH_STATUS = {
  1: '여유롭게 시작하고 있어요',
  2: '순조롭게 일하고 있어요',
  3: '활기차게 일하고 있어요 ✨',
};

function renderHealthCard(items) {
  const card = document.getElementById('health-card');
  const face = document.getElementById('health-face');
  if (!card || !face) return;
  // 청소 시간: 일정의 status가 done/inprogress인 항목들로 자동 추정
  // 일정 1건당 평균 2시간 가정 (실측 데이터 없을 때)
  const worked = (items || []).filter(i => {
    return i.status === 'completed' || i.status === 'done' || i.status === 'inprogress' || i.status === 'in_progress';
  });
  // service_time/duration 있으면 사용, 없으면 평균 2h
  let hours = 0;
  worked.forEach(i => {
    const t = parseFloat(i.duration || i.service_time || 0);
    hours += (t > 0 ? t : 2);
  });
  // 칼로리: 1시간 청소 ≈ 220kcal (체중 65kg 기준)
  const kcal = Math.round(hours * 220);
  // 걸음: 1시간 청소 ≈ 5,000보
  const steps = Math.round(hours * 5000);
  // 3 단계 결정
  // L1: 0~400 / L2: 400~700 / L3: 700+
  let level = 1;
  if (kcal >= 700) level = 3;
  else if (kcal >= 400) level = 2;
  // 카드 색 클래스 갱신
  card.classList.remove('level-1', 'level-2', 'level-3');
  card.classList.add(`level-${level}`);
  // 캐릭터 SVG 교체
  face.innerHTML = HEALTH_FACE_SVG[level];
  // 텍스트 갱신
  const set = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
  set('health-status', HEALTH_STATUS[level]);
  set('health-kcal', kcal);
  // meta: 시간 + 걸음
  const metaEl = document.getElementById('health-meta');
  if (metaEl) {
    if (kcal > 0) {
      metaEl.textContent = `· ${hours.toFixed(1)}h · ${steps.toLocaleString()}보`;
    } else {
      metaEl.textContent = '· 오늘 시작 전';
    }
  }
  // 진행바 (목표 1000kcal 기준)
  const pct = Math.min(100, Math.round(kcal / 1000 * 100));
  const fill = document.getElementById('health-bar-fill');
  if (fill) fill.style.width = pct + '%';
  set('health-pct', pct + '%');
}

const SCENE_BY_MAIN = {
  Clear:        'clear',     // 맑음 — 기본 (CSS class 없음 = default sky scene)
  Clouds:       'cloudy',    // 흐림
  Rain:         'rain',

function applyWeatherScene(weather) {
  if (!weather) return;
  const fc = document.getElementById('today-fc');
  if (!fc) return;

  // 기존 scene 클래스 모두 제거
  fc.classList.remove('scene-cloudy', 'scene-rain', 'scene-snow', 'scene-thunder', 'scene-night');

  // 밤 여부 (icon 끝 'n')
  const isNight = (weather.icon || '').endsWith('n');
  const sceneByMain = SCENE_BY_MAIN[weather.main] || '';
  let scene = sceneByMain;

  // 맑음이면서 밤이면 → night scene
  if (isNight && (weather.main === 'Clear' || weather.main === 'Clouds')) {
    scene = 'night';
  }

  if (scene) fc.classList.add(`scene-${scene}`);

  // 비 떨어지는 애니메이션 — DOM 동적 추가
  let rainEl = fc.querySelector('.ds-rain-drops');
  if (scene === 'rain' || scene === 'thunder') {
    if (!rainEl) {
      rainEl = document.createElement('div');
      rainEl.className = 'ds-rain-drops';
      const drops = [];
      for (let i = 0; i < 24; i++) {
        const left = Math.random() * 100;
        const delay = Math.random() * 1.2;
        const dur = 0.8 + Math.random() * 0.8;
        drops.push(`<span class="ds-rain-drop" style="left:${left}%; animation-delay:${delay}s; animation-duration:${dur}s;"></span>`);
      }
      rainEl.innerHTML = drops.join('');
      fc.querySelector('.ds-today-fc-scene')?.appendChild(rainEl);
    }
  } else if (rainEl) {
    rainEl.remove();
  }

  // 눈 내리는 애니메이션
  let snowEl = fc.querySelector('.ds-snow-flakes');
  if (scene === 'snow') {
    if (!snowEl) {
      snowEl = document.createElement('div');
      snowEl.className = 'ds-snow-flakes';
      const flakes = [];
      for (let i = 0; i < 12; i++) {
        const left = Math.random() * 100;
        const delay = Math.random() * 4;
        const dur = 3 + Math.random() * 3;
        flakes.push(`<span class="ds-snow-flake" style="left:${left}%; animation-delay:${delay}s; animation-duration:${dur}s;">❄</span>`);
      }
      snowEl.innerHTML = flakes.join('');
      fc.querySelector('.ds-today-fc-scene')?.appendChild(snowEl);
    }
  } else if (snowEl) {
    snowEl.remove();
  }

  // 기온 칩
  const tempEl = document.getElementById('today-fc-temp');
  const tempVal = document.getElementById('today-fc-temp-val');
  if (tempEl && tempVal && typeof weather.temp === 'number') {
    tempVal.textContent = weather.temp;
    tempEl.style.display = 'inline-flex';
  }

  // 상태 칩 — 일정 카운트 기반 카피 대신 날씨 카피로 override
  const stateEl = document.getElementById('today-fc-state');
  if (stateEl && weather.description) {
    const icon = scene === 'rain' ? '🌧'
               : scene === 'snow' ? '❄'
               : scene === 'thunder' ? '⛈'
               : scene === 'cloudy' ? '☁'
               : scene === 'night' ? '🌙'
               : '☀';
    stateEl.innerHTML = `${icon} ${weather.description}`;
  }
}

async function loadWeather() {
  try {
    const cfg = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');
    const region = cfg.region || cfg.district || '강서구';
    const url = SERVER + '/api/weather?region=' + encodeURIComponent(region);
    const r = await fetch(url);
    const d = await r.json();
    if (d.success && d.data) {
      applyWeatherScene(d.data);
    }
  } catch (e) {
    // 무음 fallback — weather 없어도 hero 자체는 일정 정보로 표시됨
    console.warn('weather load failed:', e?.message);
  }
}

// 벨 아이콘 상태 — 3 state: subscribed / available / denied
function updateBellState(subscribed) {
  const dot = document.getElementById('notif-dot');
  if (!dot) return;
  const perm = (typeof pushPermission === 'function') ? pushPermission() : Notification.permission;
  if (subscribed) {
    dot.style.display = 'block';
    dot.style.background = '#FFD600'; // 활성 — 옐로
    dot.style.borderColor = 'rgba(255,56,92,.6)';
  } else if (perm === 'denied') {
    dot.style.display = 'block';
    dot.style.background = '#B0B7C3'; // 거부 — 회색
    dot.style.borderColor = 'rgba(176,183,195,.5)';
  } else {
    dot.style.display = 'none'; // default — 깔끔
  }
}

// V1.9 Parallax — 스크롤(A) + 터치(C) 시차 효과
// 레이어: 해(depth 0.35/18) / 구름(0.55/28) / ✦(0.85/40)
function initParallax() {
  const fc = document.getElementById('today-fc');
  if (!fc) return;
  // prefers-reduced-motion 사용자는 비활성
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    return;
  }
  const sun      = fc.querySelector('.ds-today-sun');
  const cloud    = fc.querySelector('.ds-today-cloud');
  const sparkles = fc.querySelector('.ds-today-sparkles');
  if (!sun && !cloud && !sparkles) return;

  // depth 계수
  const D = {
    sun:      { scroll: 0.35, touch: 18 },
    cloud:    { scroll: 0.55, touch: 28 },
    sparkles: { scroll: 0.85, touch: 40 },
  };
  let scrollPx = 0, tx = 0, ty = 0;
  let ticking = false, touching = false;
  let pressTime = 0, pressX = 0, pressY = 0;

  function apply() {
    const setT = (el, d) => {
      if (!el) return;
      const sy = -scrollPx * d.scroll;
      const dx = tx * d.touch;
      const dy = ty * d.touch;
      el.style.transform = `translate3d(${dx}px, ${sy + dy}px, 0)`;
    };
    setT(sun,      D.sun);
    setT(cloud,    D.cloud);
    setT(sparkles, D.sparkles);
    ticking = false;
  }
  function schedule() {
    if (!ticking) {
      requestAnimationFrame(apply);
      ticking = true;
    }
  }

  // A) 스크롤 — weather hero가 위로 이동한 만큼 레이어 떨어짐
  function onScroll() {
    const rect = fc.getBoundingClientRect();
    if (rect.bottom < 0 || rect.top > window.innerHeight) {
      scrollPx = 0;
    } else {
      scrollPx = Math.max(0, -rect.top);
    }
    schedule();
  }
  window.addEventListener('scroll', onScroll, { passive: true });

  // C) 터치 — 손가락 위치 따라 레이어 이동 + 카드 부풀어 + ripple
  function updateTouch(e) {
    const rect = fc.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    tx = Math.max(-1, Math.min(1, (e.clientX - cx) / (rect.width / 2)));
    ty = Math.max(-1, Math.min(1, (e.clientY - cy) / (rect.height / 2)));
    schedule();
  }
  function onPointerDown(e) {
    touching = true;
    pressTime = Date.now();
    pressX = e.clientX; pressY = e.clientY;
    fc.classList.add('parallax-touching');
    const rect = fc.getBoundingClientRect();
    fc.style.setProperty('--ripple-x', (e.clientX - rect.left) + 'px');
    fc.style.setProperty('--ripple-y', (e.clientY - rect.top) + 'px');
    updateTouch(e);
    try { fc.setPointerCapture(e.pointerId); } catch(_) {}
  }
  function onPointerMove(e) {
    if (!touching) return;
    updateTouch(e);
  }
  function onPointerUp(e) {
    if (!touching) return;
    touching = false;
    fc.classList.remove('parallax-touching');
    tx = 0; ty = 0; schedule();
    // V1.9: tap 으로 인식되면 (짧고 거의 안 움직임) schedule 페이지 이동
    const dt = Date.now() - pressTime;
    const dx = Math.abs(e.clientX - pressX);
    const dy = Math.abs(e.clientY - pressY);
    if (dt < 350 && dx < 10 && dy < 10) {
      try { goTo('schedule'); } catch(_) {}
    }
  }
  fc.addEventListener('pointerdown', onPointerDown);
  fc.addEventListener('pointermove', onPointerMove);
  fc.addEventListener('pointerup', onPointerUp);
  fc.addEventListener('pointercancel', onPointerUp);
  // 초기 위치 보정
  onScroll();
}

// DOMContentLoaded
document.addEventListener('DOMContentLoaded', () => {
  setGreeting();
  loadUser();
  loadHomeStats();
  applyHeroImage(); // 사용자 hero 사진 적용
  initStickyHeader(); // 스크롤 그림자 헤더
  initParallax(); // V1.9 Parallax (스크롤 + 터치)
  // SW 구독 상태 — 거부 상태도 회색 dot으로 반영
  if ('serviceWorker' in navigator && 'PushManager' in window) {
    navigator.serviceWorker.ready.then(reg =>
      reg.pushManager.getSubscription()
    ).then(sub => updateBellState(!!sub)).catch(() => {});
  } else {
    updateBellState(false);
  }
});

<script>
/* 싹싹 인증 진입 가드 (Phase 2 / 2026-05-17) — JWT 검증, 미로그인 시 login.html로 */
(function(){
  try {
    var tok = localStorage.getItem('ssak_jwt');
    if (!tok) throw new Error('no_token');
    var parts = tok.split('.');
    if (parts.length !== 3) throw new Error('bad_token');
    var p64 = parts[1].replace(/-/g,'+').replace(/_/g,'/');
    while (p64.length % 4) p64 += '=';
    var bin = atob(p64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    var payload = JSON.parse(new TextDecoder('utf-8').decode(bytes));
    if (payload.exp && payload.exp < Math.floor(Date.now()/1000)) throw new Error('expired');
    // OK
  } catch (e) {
    localStorage.removeItem('ssak_jwt');
    localStorage.removeItem('ssak_user');
    var next = encodeURIComponent(location.pathname + location.search);
    location.replace('/login.html?next=' + next);
  }
})();
</script>

// 🔔 버튼 클릭 → 상태별 흐름 분기 (Phase 5-B priming)
async function togglePushNotification() {
  const perm = pushPermission();
  if (perm === 'unsupported') {
    toast('이 브라우저는 푸시 알림을 지원하지 않습니다');
    return;
  }
  if (perm === 'ios-no-pwa') {
    ssakShowIOSInstallGuide();
    return;
  }
  if (perm === 'denied') {
    ssakShowPushDeniedGuide();
    return;
  }

  // granted 인데 구독 객체가 없으면 → 구독부터, 있으면 → 설정 모달
  const reg = await navigator.serviceWorker.ready;
  const sub = await reg.pushManager.getSubscription();

  if (!sub) {
    // permission='default' or granted-but-not-subscribed → priming
    ssakShowPushPrime({
      onAccept: async () => {
        const res = await ssakSubscribePush({ hour: 8, minute: 0, reminder_enabled: true });
        if (res.ok) {
          updateBellState(true);
          toast('🔔 매일 오전 8:00에 알림을 받아요. 시간은 벨에서 바꿀 수 있어요');
        } else if (res.err === 'denied') {
          ssakShowPushDeniedGuide();
        } else if (res.err === 'default') {
          // 사용자가 native prompt를 닫음 — 조용히
        } else {
          toast('알림 설정 중 오류: ' + (res.err || 'unknown'));
        }
      }
    });
    return;
  }

  // 이미 구독 중 → 설정 모달
  fillReminderTimes();
  const enabledEl = document.getElementById('reminder-enabled');
  const timeEl = document.getElementById('reminder-time');
  try {
    const r = await fetch(SERVER + '/api/push/reminder?endpoint=' + encodeURIComponent(sub.endpoint));
    const d = await r.json();
    const cfg = (d && d.data) || { reminder_hour: 8, reminder_minute: 0, reminder_enabled: true };
    enabledEl.checked = cfg.reminder_enabled !== false;
    const hh = String(cfg.reminder_hour ?? 8).padStart(2,'0');
    const mm = String(cfg.reminder_minute ?? 0).padStart(2,'0');
    timeEl.value = `${hh}:${mm}`;
  } catch(e) {
    enabledEl.checked = true;
    timeEl.value = '08:00';
  }

  syncEnabledUI(enabledEl.checked);
  enabledEl.onchange = () => syncEnabledUI(enabledEl.checked);
  document.getElementById('reminder-modal').style.display = 'flex';
}

// 모달 [저장] 클릭
async function saveReminderSettings() {
  const enabled = document.getElementById('reminder-enabled').checked;
  const [hhStr, mmStr] = document.getElementById('reminder-time').value.split(':');
  const reminder_hour = parseInt(hhStr, 10);
  const reminder_minute = parseInt(mmStr, 10);

  try {
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();

    if (!enabled) {
      // 구독 자체는 유지, 서버에서 reminder_enabled=false
      if (sub) {
        await fetch(SERVER + '/api/push/reminder', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint: sub.endpoint, reminder_enabled: false })
        });
      }
      updateBellState(false);
      closeReminderModal();
      toast('🔕 리마인더가 꺼졌습니다');
      return;
    }

    if (!sub) {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') { toast('알림 권한이 거부됐습니다'); return; }
      const keyRes = await fetch(SERVER + '/api/push/vapid-key').then(r => r.json());
      const vapidKey = urlBase64ToUint8Array(keyRes.publicKey);
      sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: vapidKey });
    }

    const { endpoint } = sub;
    const keys = sub.toJSON().keys;
    const cfg = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');

    await fetch(SERVER + '/api/push/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        endpoint, p256dh: keys.p256dh, auth: keys.auth,
        anon_id: getAnon(),
        deviceId: cfg.company || 'unknown',
        reminder_hour, reminder_minute
      })
    });
    await fetch(SERVER + '/api/push/reminder', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ endpoint, reminder_enabled: true, reminder_hour, reminder_minute })
    });

    updateBellState(true);
    closeReminderModal();
    toast(`🔔 매일 ${String(reminder_hour).padStart(2,'0')}:${String(reminder_minute).padStart(2,'0')}에 알림을 받습니다`);
  } catch(e) {
    console.error('Reminder save error:', e);
    toast('저장 중 오류: ' + e.message);
  }
}

// ── 홈 리디자인 보완 ───────────────────────────────────────────
// fetch 60초 메모리 캐시 — 같은 사장님이 홈 ↔ 다른 탭 자주 이동 시 네트워크 ↓
// 캐시 키 = URL. 응답을 sessionStorage에도 저장해 reload 직후에도 즉시 그림.
const _ssakFetchCache = new Map();
async function cachedFetch(url, ttlMs = 60000) {
  const now = Date.now();
  const mem = _ssakFetchCache.get(url);
  if (mem && (now - mem.ts) < ttlMs) return mem.data;
  try {
    const sess = sessionStorage.getItem('ssak_fetch_' + url);
    if (sess) {
      const parsed = JSON.parse(sess);
      if (parsed && (now - parsed.ts) < ttlMs) {
        _ssakFetchCache.set(url, parsed);
        return parsed.data;
      }
    }
  } catch(_) {}
  const r = await fetch(url);
  const data = await r.json();
  const entry = { ts: now, data };
  _ssakFetchCache.set(url, entry);
  try { sessionStorage.setItem('ssak_fetch_' + url, JSON.stringify(entry)); } catch(_) {}
  return data;
}

// ── V1.7.x: Today Forecast 렌더링 (weather hero) ─────────────
// 사장님 일정을 일기예보처럼. 매출 ✗, 일정 건수·시간·진척만.
function renderTodayForecast(items) {
  const fc = document.getElementById('today-fc');
  const statusCard = document.getElementById('today-card');
  if (!fc) return;

  const total = items.length;
  if (total === 0) {
    // 일정 0건 — status-card fallback (이미 카피 적용됨)
    fc.style.display = 'none';
    if (statusCard) statusCard.style.display = '';
    return;
  }

  // 일정 있음 — weather hero 표시, status-card 숨김
  fc.style.display = '';
  if (statusCard) statusCard.style.display = 'none';

  // 상태 분류 (status별 카운트)
  const done = items.filter(i => i.status === 'completed' || i.status === 'done').length;
  const inprog = items.filter(i => i.status === 'inprogress' || i.status === 'in_progress').length;
  const upcoming = total - done - inprog;
  const progressPct = total > 0 ? Math.round((done / total) * 100) : 0;

  // 시간 추출 (HH:MM 또는 first.time)
  const sorted = items.slice().sort((a, b) => {
    const ta = (a.time || a.scheduled_time || '00:00');
    const tb = (b.time || b.scheduled_time || '00:00');
    return ta.localeCompare(tb);
  });
  const firstTime = sorted[0] && (sorted[0].time || sorted[0].scheduled_time) || '—';
  const lastTime  = sorted[sorted.length-1] && (sorted[sorted.length-1].time || sorted[sorted.length-1].scheduled_time) || '—';

  // 지금 진행중 또는 다음 예정
  const now = new Date();
  const nowHHMM = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const nextItem = sorted.find(i => {
    const t = (i.time || i.scheduled_time || '');
    return t >= nowHHMM && i.status !== 'completed' && i.status !== 'done';
  });
  const nowTime = nextItem ? (nextItem.time || nextItem.scheduled_time || '—') : '—';

  // 상태 칩 카피
  let stateLabel;
  if (total >= 4)      stateLabel = '☀ 활기찬 하루';
  else if (total >= 2) stateLabel = '⛅ 순조로움';
  else                  stateLabel = '🌥 여유로움';

  // 날짜
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  const dateStr = `${d.getMonth()+1}월 ${d.getDate()}일 · ${days[d.getDay()]}`;

  // DOM 업데이트
  const set = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
  const setHTML = (id, v) => { const e = document.getElementById(id); if (e) e.innerHTML = v; };
  set('today-fc-num', total);
  set('today-fc-date', dateStr);
  set('today-fc-state', stateLabel);
  setHTML('today-fc-progress', `완료 <b>${done}</b> · 진행 <b>${inprog}</b> · 예정 <b>${upcoming}</b>`);
  set('today-fc-progress-pct', progressPct + '%');
  set('today-fc-first', firstTime);
  set('today-fc-now', nowTime);
  set('today-fc-last', lastTime);

  // V1.7.1 prioritization A: Timeline/Weekly forecast 렌더링 제거
  // — Timeline은 Today Forecast 카드의 🌅/🕘/🌙 셀과 의미 중복
  // — Weekly forecast는 schedule.html에서 더 자세히 봄
}

async function loadHomeStats() {
  const cfg = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');
  const adminKey = cfg.adminKey || '';

  // 오늘 할 일 + Today Forecast hero (V1.7.x)
  try {
    // 오늘 날짜 기준 모든 bookings 가져오기 (status 무관)
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    const [rPending, rToday, rWeek] = await Promise.all([
      fetch(SERVER + '/api/bookings?status=pending').then(r => r.json()).catch(() => ({data:[]})),
      fetch(SERVER + `/api/bookings?date=${todayStr}`).then(r => r.json()).catch(() => ({data:[]})),
      fetch(SERVER + `/api/bookings?week=current`).then(r => r.json()).catch(() => ({data:[]}))
    ]);
    const pending = rPending.data || [];
    // 오늘 일정 (전체 status) — Today Forecast 렌더
    const todayItems = (rToday.data || []).length > 0 ? rToday.data : pending;
    renderTodayForecast(todayItems);
    // V1.7.1: Weekly forecast 제거 — rWeek는 fetch만 유지 (다른 기능 호환)
    void rWeek;

    const todayText = document.getElementById('today-text');
    const todaySub  = document.getElementById('today-sub');
    const statusIco = document.getElementById('status-ico');

    // Status-First fallback 카피 (Today Forecast가 표시 안 될 때만 의미)
    if (todayText) {
      if (pending.length > 0) {
        const first = pending[0] || {};
        const timeStr = first.time || first.scheduled_time || '';
        const customer = first.customer_name || first.name || '';
        const taskKind = first.kind || first.service || '청소';
        todayText.innerHTML = `예약 <span class="num">${pending.length}건</span>이 있어요`;
        if (todaySub) {
          if (timeStr && customer) todaySub.textContent = `${timeStr} ${customer}님 ${taskKind}부터 시작이에요`;
          else if (timeStr) todaySub.textContent = `${timeStr}에 첫 일정이 있어요`;
          else todaySub.textContent = '탭해서 빠르게 처리하세요';
        }
        if (statusIco) statusIco.classList.add('has-task');
      } else {
        todayText.textContent = '여유로운 하루예요 ☀️';
        if (todaySub) todaySub.textContent = '탭해서 새 견적을 받아볼까요?';
        if (statusIco) statusIco.classList.remove('has-task');
        const todayCard = document.getElementById('today-card');
        if (todayCard) todayCard.onclick = () => goTo('quote');
      }
    }
  } catch(e) {
    const todayText = document.getElementById('today-text');
    if (todayText) todayText.textContent = '일정을 불러오는 중이에요';
  }

  // 이달 실적 — V1.5: hero 매출 row 제거됨, tile-grid + KPI에만 표시
  try {
    const r2 = await fetch(SERVER + '/api/stats/monthly');
    const d2 = await r2.json();
    if (d2.success) {
      // V1.7.1: KPI inline 제거 — Today Forecast 카드가 같은 정보를 가짐
      const bookN = d2.confirmed > 0 ? d2.confirmed : 0;

      // ── V1.7 tile-grid 와이어링 (매출 표시 ✗ 정책) ──────────
      const tBookedN  = document.getElementById('tile-booked-n');
      const tBookedB  = document.getElementById('tile-booked-badge');
      const tPendingN = document.getElementById('tile-pending-n');
      const tPendingB = document.getElementById('tile-pending-badge');
      const pendingCt = (typeof pending !== 'undefined') ? pending.length : 0;

      if (tBookedN)  tBookedN.textContent  = bookN || 0;
      if (tBookedB && bookN > 0)  { tBookedB.textContent = bookN;     tBookedB.style.display = 'inline-block'; }
      if (tPendingN) tPendingN.textContent = pendingCt;
      if (tPendingB && pendingCt > 0) { tPendingB.textContent = pendingCt; tPendingB.style.display = 'inline-block'; }
      // V1.7: 정산 tile + 매출 sparkline 제거 — 사장님 "매출 표시 ✗" 명시
    }
  } catch(e) {}

  // 커뮤니티/중고거래 unread dot — 내 글 댓글 / 내 chat 메시지
  try {
    const anonId = (typeof getAnon === 'function') ? getAnon() : null;
    if (anonId) {
      const cSeen = localStorage.getItem('ssak_community_last_seen') || '';
      const mSeen = localStorage.getItem('ssak_market_last_seen') || '';
      const cUrl = SERVER + '/api/community/unread?anon_id=' + encodeURIComponent(anonId) + (cSeen ? '&since=' + encodeURIComponent(cSeen) : '');
      const mUrl = SERVER + '/api/market/unread?anon_id=' + encodeURIComponent(anonId) + (mSeen ? '&since=' + encodeURIComponent(mSeen) : '');
      const [rC, rM] = await Promise.all([
        cachedFetch(cUrl).catch(() => null),
        cachedFetch(mUrl).catch(() => null)
      ]);
      // V1.7.1: dot-community/dot-market(recent-row) 제거 — 커뮤니티 tile-badge가 대체
      void rM;

      // V1.7: 커뮤니티 tile 와이어링 (정산 자리 교체)
      const tCommN = document.getElementById('tile-community-n');
      const tCommB = document.getElementById('tile-community-badge');
      const cCount = (rC && typeof rC.count === 'number') ? rC.count : 0;
      if (tCommN) tCommN.textContent = cCount;
      if (tCommB && cCount > 0) {
        tCommB.textContent = cCount;
        tCommB.style.display = 'inline-block';
      }
    }
  } catch(_) { /* 무음 fallback */ }

  // 동료 — 내 채용공고 지원자 합산 (서버 단 필터 endpoint 사용)
  try {
    const anonId = (typeof getAnon === 'function') ? getAnon() : null;
    if (anonId) {
      const dJ = await cachedFetch(SERVER + '/api/jobs/my/posted?anon_id=' + encodeURIComponent(anonId));
      if (dJ && Array.isArray(dJ.data)) {
        // open 상태만 카운트 (closed/deleted 제외)
        const openJobs = dJ.data.filter(j => j.status === 'open');
        const applicantsTotal = openJobs.reduce((s, j) => s + (j.applicant_count || 0), 0);
        const tWfSub = document.getElementById('tile-workforce-sub');
        const tAppB  = document.getElementById('tile-applicants-badge');
        if (applicantsTotal > 0) {
          if (tWfSub) tWfSub.innerHTML = `지원 <b>${applicantsTotal}</b>명 대기`;
          if (tAppB)  { tAppB.textContent = '+' + applicantsTotal; tAppB.style.display = 'inline-block'; }
        } else if (openJobs.length > 0) {
          if (tWfSub) tWfSub.textContent = `모집 ${openJobs.length}건 진행 중`;
        }
      }
    }
  } catch(e) { /* 무음 fallback */ }
}

// 벨 아이콘 상태 — 3 state: subscribed / available / denied
function updateBellState(subscribed) {
  const dot = document.getElementById('notif-dot');
  if (!dot) return;
  const perm = (typeof pushPermission === 'function') ? pushPermission() : Notification.permission;
  if (subscribed) {
    dot.style.display = 'block';
    dot.style.background = '#FFD600'; // 활성 — 옐로
    dot.style.borderColor = 'rgba(255,56,92,.6)';
  } else if (perm === 'denied') {
    dot.style.display = 'block';
    dot.style.background = '#B0B7C3'; // 거부 — 회색
    dot.style.borderColor = 'rgba(176,183,195,.5)';
  } else {
    dot.style.display = 'none'; // default — 깔끔
  }
}

// 사용자 hero 이미지 적용 — 사진 있으면 사진 모드, 없으면 흰 헤더 모드
function applyHeroImage() {
  const root = document.getElementById('hero-root');
  const heroEl = document.getElementById('hero-img');
  if (!root || !heroEl) return;
  const setMode = (url) => {
    if (url) {
      root.classList.remove('no-photo');
      heroEl.style.backgroundImage = `url('${url}')`;
    } else {
      root.classList.add('no-photo');
      heroEl.style.backgroundImage = '';
    }
  };
  const cached = (typeof ssakGetHeroUrl === 'function') ? ssakGetHeroUrl() : '';
  setMode(cached);
  // 서버 최신 동기화 (백그라운드)
  (async () => {
    try {
      const r = await fetch(SERVER + '/api/auth/me');
      const d = await r.json();
      const serverUrl = (d && d.user && d.user.hero_image_url) || '';
      if (serverUrl !== cached) {
        setMode(serverUrl);
        try {
          if (serverUrl) localStorage.setItem('ssak_hero_url', serverUrl);
          else localStorage.removeItem('ssak_hero_url');
        } catch (e) {}
      }
    } catch (e) {}
  })();
}

// DOMContentLoaded
document.addEventListener('DOMContentLoaded', () => {
  setGreeting();
  loadUser();
  loadHomeStats();
  applyHeroImage(); // 사용자 hero 사진 적용
  initStickyHeader(); // 스크롤 그림자 헤더
  // SW 구독 상태 — 거부 상태도 회색 dot으로 반영
  if ('serviceWorker' in navigator && 'PushManager' in window) {
    navigator.serviceWorker.ready.then(reg =>
      reg.pushManager.getSubscription()
    ).then(sub => updateBellState(!!sub)).catch(() => {});
  } else {
    updateBellState(false);
  }
});

</script>

<style>
/* ── 홈 전용 스타일 ────────────────────────────────────────── */
.home-header {
  background: linear-gradient(135deg, var(--c-pr) 0%, var(--c-pr-d) 100%);
  padding: 52px 20px 24px;
  position: relative; overflow: hidden;
}
.home-header::before {
  content:''; position:absolute; top:-50px; right:-50px;
  width:180px; height:180px; background:rgba(255,255,255,.08); border-radius:50%;
}
.hd-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.hd-greeting { font-size:13px; color:rgba(255,255,255,.8); margin-bottom:3px; }
.hd-name { font-size:22px; font-weight:900; color:#fff; }
.hd-actions { display:flex; gap:8px; }
.hd-icon-btn {
  width:40px; height:40px; border-radius:50%;
  background:rgba(255,255,255,.18); border:none;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; cursor:pointer; position:relative; color:#fff;
}
.hd-notif-dot {
  position:absolute; top:7px; right:7px;
  width:8px; height:8px; border-radius:50%;
  background:#FFD600; border:1.5px solid rgba(0,200,150,.6);
}

/* ── 오늘 할 일 카드 ──────────────────────────────────────── */
.today-card {
  background:#fff; border-radius:18px; padding:16px 18px;
  margin:0 20px; margin-top:-24px;
  box-shadow: 0 4px 24px rgba(0,0,0,.12);
  display:flex; align-items:center; gap:14px;
  cursor:pointer;
  transition: transform .1s; position: relative; z-index: 2;
}
.today-card:active { transform:scale(.98); }
.today-card-ico {
  width:48px; height:48px; border-radius:14px;
  background:var(--c-pr-l); display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0;
}
.today-card-body { flex:1; }
.today-card-label { font-size:11px; font-weight:700; color:var(--c-g400); margin-bottom:3px; }
.today-card-text { font-size:16px; font-weight:800; color:var(--c-g900); }
.today-card-sub { font-size:12px; color:var(--c-g500); margin-top:2px; }
.today-card-arrow { font-size:18px; color:var(--c-g300); flex-shrink:0; }

/* ── 빠른 실행 4버튼 ──────────────────────────────────────── */
.quick-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
  padding:0 20px; margin-top:12px;
}
.quick-btn {
  display:flex; flex-direction:column; align-items:center; gap:7px;
  padding:14px 6px; border-radius:14px;
  background:#fff; border:none; cursor:pointer;
  box-shadow: 0 1px 6px rgba(0,0,0,.06);
  font-family:inherit; transition:transform .1s;
}
.quick-btn:active { transform:scale(.96); }
.quick-ico {
  width:44px; height:44px; border-radius:12px;
  display:flex; align-items:center; justify-content:center; font-size:20px;
}
.quick-lbl { font-size:11px; font-weight:700; color:var(--c-g700); }

/* ── 이번 달 실적 ─────────────────────────────────────────── */
.perf-card {
  margin:0 20px; margin-top:12px;
  background:#fff; border-radius:18px; padding:18px 20px;
  box-shadow: 0 1px 6px rgba(0,0,0,.06);
}
.perf-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.perf-title { font-size:13px; font-weight:800; color:var(--c-g500); }
.perf-period { font-size:11px; color:var(--c-g400); }
.perf-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.perf-stat { text-align:center; }
.perf-val { font-size:22px; font-weight:900; color:var(--c-g900); line-height:1.2; }
.perf-val.green { color:var(--c-pr); }
.perf-lbl { font-size:11px; color:var(--c-g400); margin-top:3px; }
.perf-change { font-size:10px; margin-top:2px; }
.perf-change.up { color:var(--c-pr); }
.perf-change.dn { color:var(--c-red); }

/* ── 최근 알림 섹션 ───────────────────────────────────────── */
.section-wrap { padding:0 20px; margin-top:14px; }
.recent-card { background:#fff; border-radius:18px; overflow:hidden; box-shadow: 0 1px 6px rgba(0,0,0,.06); }
.recent-row {
  display:flex; align-items:center; gap:12px;
  padding:14px 16px; border-bottom:1px solid var(--c-g100);
  cursor:pointer;
}
.recent-row:last-child { border-bottom:none; }
.recent-ico {
  width:40px; height:40px; border-radius:11px;
  display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;
}
.recent-body { flex:1; min-width:0; }
.recent-title { font-size:14px; font-weight:700; color:var(--c-g900); }
.recent-sub { font-size:12px; color:var(--c-g400); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.recent-right { font-size:11px; color:var(--c-g300); flex-shrink:0; }
</style>

<script>

// ── 인사말 ──────────────────────────────────
function setGreeting() {
  const hour = new Date().getHours();
  const greetings = {
    morning: '좋은 아침이에요 ☀️',
    afternoon: '안녕하세요 👋',
    evening: '수고하셨어요 🌙',
    night: '늦은 시간까지 고생이에요 🌟'
  };
  let msg = hour < 12 ? greetings.morning
    : hour < 18 ? greetings.afternoon
    : hour < 22 ? greetings.evening
    : greetings.night;
  document.getElementById('greeting').textContent = msg;
}

// ── 사용자 정보 로드 ─────────────────────────
function loadUser() {
  const cfg = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');
  const sch = JSON.parse(localStorage.getItem('ssak_schedules') || '[]');

  // 업주명 표시
  const nameEl = document.getElementById('user-name');
  if (nameEl) {
    if (cfg.ownerName) nameEl.textContent = cfg.ownerName + ' 사장님';
    else if (cfg.company) nameEl.textContent = cfg.company + ' 사장님';
  }

  // 오늘 예약 건수 (로컬)
  const today = new Date();
  const todayStr = today.getFullYear() + '-' +
    String(today.getMonth()+1).padStart(2,'0') + '-' +
    String(today.getDate()).padStart(2,'0');
  const todayCount = sch.filter(function(s) {
    return (s.date || '').startsWith(todayStr);
  }).length;
  var todayEl = document.getElementById('stat-today');
  if (todayEl) todayEl.innerHTML = todayCount + '<span class="ts-unit">건</span>';

  // 미답변 문의 (서버 API)
  if (cfg.adminKey) {
    fetch(SERVER+'/api/bookings?status=pending&adminKey=' + encodeURIComponent(cfg.adminKey))
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var cnt = (d.data ? d.data.length : 0);
        var pendEl = document.getElementById('stat-pending');
        if (pendEl) pendEl.textContent = cnt;
      })
      .catch(function() {});

    // 이달 실적 서버에서 가져오기
    fetch(SERVER+'/api/stats/monthly?adminKey=' + encodeURIComponent(cfg.adminKey))
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (!d.success) return;
        var perfDoneEl    = document.getElementById('perf-done');
        var perfRevEl     = document.getElementById('perf-revenue');
        var perfRevChgEl  = document.getElementById('perf-revenue-change');
        var statTodayEl   = document.getElementById('stat-today');
        if (perfDoneEl)   perfDoneEl.textContent = d.done;
        if (perfRevEl) {
          var man = Math.round((d.revenue || 0) / 10000);
          perfRevEl.textContent = man > 0 ? man : '-';
        }
        if (perfRevChgEl && d.revenue > 0) {
          perfRevChgEl.textContent = Math.round(d.revenue/10000) + '만원';
        }
        if (statTodayEl && d.confirmed > 0) {
          statTodayEl.innerHTML = d.confirmed + '<span class="ts-unit">건</span>';
        }
      })
      .catch(function() {});
  }

  // 이달 실적 계산
  var now = new Date();
  var ym = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  var doneThisMonth = sch.filter(function(x) {
    return (x.date||'').startsWith(ym) && x.status === 'done';
  });
  var totalRevenue = doneThisMonth.reduce(function(acc, x) {
    return acc + (parseInt(x.price)||0);
  }, 0);
  var perfDoneEl = document.getElementById('perf-done');
  var perfRevEl = document.getElementById('perf-revenue');
  var perfRevChg = document.getElementById('perf-revenue-change');
  if (perfDoneEl) perfDoneEl.textContent = doneThisMonth.length;
  if (perfRevEl) {
    var manwon = Math.round(totalRevenue / 10000);
    perfRevEl.textContent = manwon > 0 ? manwon : '-';
  }
  if (perfRevChg && totalRevenue > 0) {
    perfRevChg.textContent = (totalRevenue/10000).toFixed(0) + '만원';
  }
}

// ── 네비게이션 ───────────────────────────────
function setNav(page) {
  const map = {
    'home': 'index.html',
    'quote': 'ssak-quote.html',
    'schedule': 'schedule.html',
    'my': 'my.html',
    'community': 'community.html'
  };
  if (map[page]) location.href = map[page];
}

function goTo(page) {
  const map = {
    'quote': 'ssak-quote.html',
    'schedule': 'schedule.html',
    'my': 'my.html',
    'community': 'community.html',
    'booking': 'booking.html',
    'workforce': 'workforce.html'
  };
  if (map[page]) location.href = map[page];
}

// ── Toast ────────────────────────────────────
let toastTimer;
// ── Init ─────────────────────────────────────
setGreeting();
loadUser();

      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .then(function(reg) { console.log('SW registered:', reg.scope); })
          .catch(function(err) { console.log('SW error:', err); });

// ── 푸시 알림 ───────────────────────────────────────────────
async function togglePushNotification() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    toast('이 브라우저는 푸시 알림을 지원하지 않습니다');
    return;
  }

  const perm = Notification.permission;

  // 이미 거부된 경우
  if (perm === 'denied') {
    toast('브라우저 설정에서 알림을 허용해 주세요 🔔');
    return;
  }

  const reg = await navigator.serviceWorker.ready;
  const existing = await reg.pushManager.getSubscription();

  if (existing) {
    // 이미 구독 중 → 해제 확인
    if (!confirm('푸시 알림을 해제할까요?')) return;
    await existing.unsubscribe();
    await fetch(SERVER + '/api/push/subscribe', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ endpoint: existing.endpoint })
    }).catch(() => {});
    updateBellState(false);
    toast('🔕 알림이 해제됐습니다');
    return;
  }

  // 권한 요청
  const permission = await Notification.requestPermission();
  if (permission !== 'granted') {
    toast('알림 권한이 거부됐습니다');
    return;
  }

  // VAPID 공개키 가져오기
  try {
    const keyRes = await fetch(SERVER + '/api/push/vapid-key').then(r => r.json());
    const vapidKey = urlBase64ToUint8Array(keyRes.publicKey);

    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: vapidKey
    });

    const { endpoint } = sub;
    const keys = sub.toJSON().keys;
    const cfg = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');

    await fetch(SERVER + '/api/push/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        endpoint, p256dh: keys.p256dh, auth: keys.auth,
        deviceId: cfg.company || 'unknown'
      })
    });

    updateBellState(true);
    toast('🔔 알림이 설정됐습니다! 신규 예약·계약 완료 시 알림을 받습니다');
  } catch(e) {
    console.error('Push 구독 오류:', e);
    toast('알림 설정 중 오류가 발생했습니다: ' + e.message);
  }
}

// 벨 상태 업데이트 (구독 여부 표시)
async function updateBellState(subscribed) {
  const btn = document.querySelector('[onclick="togglePushNotification()"]');
  if (!btn) return;
  const dot = btn.querySelector('.notif-dot');
  if (dot) dot.style.background = subscribed ? '#00C896' : '';
  btn.title = subscribed ? '알림 ON (클릭하면 해제)' : '알림 OFF (클릭하면 설정)';
}

// 페이지 로드 시 구독 상태 확인
(async () => {
  if ('serviceWorker' in navigator && 'PushManager' in window) {
    const reg = await navigator.serviceWorker.ready.catch(() => null);
    if (!reg) return;
    const sub = await reg.pushManager.getSubscription().catch(() => null);
    updateBellState(!!sub);
  }
})();

// VAPID 키 변환 유틸


// ── 홈 리디자인 보완 ───────────────────────────────────────────
async function loadHomeStats() {
  const cfg = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');
  const adminKey = cfg.adminKey || '';

  // 오늘 예약 수 (기존 fetchPendingBookings 대체)
  try {
    const r = await fetch(SERVER + '/api/bookings?status=pending&adminKey=' + encodeURIComponent(adminKey));
    const d = await r.json();
    const pending = d.data || [];
    const todayText = document.getElementById('today-text');
    const todaySub  = document.getElementById('today-sub');
    const todayCard = document.getElementById('today-card');
    if (todayText) {
      if (pending.length > 0) {
        todayText.textContent = `대기 예약 ${pending.length}건 확인하기`;
        todaySub && (todaySub.textContent = '탭하면 스케줄로 이동합니다');
        todayCard && (todayCard.style.outline = '2px solid var(--c-pr)');
      } else {
        todayText.textContent = '오늘 대기 예약 없음';
        todaySub && (todaySub.textContent = '여유로운 하루입니다 ☀️');
      }
    }
  } catch(e) {
    const todayText = document.getElementById('today-text');
    if (todayText) todayText.textContent = '스케줄 확인하기';
  }

  // 이달 실적
  try {
    const r2 = await fetch(SERVER + '/api/stats/monthly?adminKey=' + encodeURIComponent(adminKey));
    const d2 = await r2.json();
    if (d2.success) {
      const perfDone    = document.getElementById('perf-done');
      const perfRevenue = document.getElementById('perf-revenue');
      if (perfDone)    perfDone.textContent    = d2.done ?? 0;
      if (perfRevenue) perfRevenue.textContent = d2.revenue ? Math.round(d2.revenue/10000) : '-';
    }
  } catch(e) {}

  // 기간 표시
  const now = new Date();
  const period = document.getElementById('perf-period');
  if (period) period.textContent = `${now.getMonth()+1}월`;
}

// 벨 아이콘 상태 (redesign에 맞게)
function updateBellState(subscribed) {
  const dot = document.getElementById('notif-dot');
  if (dot) dot.style.display = subscribed ? 'block' : 'none';
}

// DOMContentLoaded
document.addEventListener('DOMContentLoaded', () => {
  setGreeting();
  loadUser();
  loadHomeStats();
  // SW 구독 상태
  if ('serviceWorker' in navigator && 'PushManager' in window) {
    navigator.serviceWorker.ready.then(reg =>
      reg.pushManager.getSubscription()
    ).then(sub => updateBellState(!!sub)).catch(() => {});
  }
});

</script>

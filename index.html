<script>
/* 싹싹 인증 진입 가드 (Phase 2 / 2026-05-17) — JWT 검증, 미로그인 시 login.html로 */
(function(){
  try {
    var tok = localStorage.getItem('ssak_jwt');
    if (!tok) throw new Error('no_token');
    var parts = tok.split('.');
    if (parts.length !== 3) throw new Error('bad_token');
    var p64 = parts[1].replace(/-/g,'+').replace(/_/g,'/');
    while (p64.length % 4) p64 += '=';
    var bin = atob(p64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    var payload = JSON.parse(new TextDecoder('utf-8').decode(bytes));
    if (payload.exp && payload.exp < Math.floor(Date.now()/1000)) throw new Error('expired');
    // OK
  } catch (e) {
    localStorage.removeItem('ssak_jwt');
    localStorage.removeItem('ssak_user');
    var next = encodeURIComponent(location.pathname + location.search);
    location.replace('/login.html?next=' + next);
  }
})();
</script>

<script>

// ── 인사말 ──────────────────────────────────
function setGreeting() {
  const hour = new Date().getHours();
  const greetings = {
    morning: '좋은 아침이에요 ☀️',
    afternoon: '안녕하세요 👋',
    evening: '수고하셨어요 🌙',
    night: '늦은 시간까지 고생이에요 🌟'
  };
  let msg = hour < 12 ? greetings.morning
    : hour < 18 ? greetings.afternoon
    : hour < 22 ? greetings.evening
    : greetings.night;
  document.getElementById('greeting').textContent = msg;
}

// ── 사용자 정보 로드 ─────────────────────────
function loadUser() {
  const cfg = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');
  const sch = JSON.parse(localStorage.getItem('ssak_schedules') || '[]');

  // 업주명 표시
  const nameEl = document.getElementById('user-name');
  if (nameEl) {
    if (cfg.ownerName) nameEl.textContent = cfg.ownerName + ' 사장님';
    else if (cfg.company) nameEl.textContent = cfg.company + ' 사장님';
  }

  // 이달 실적 (로컬 ssak_schedules 기반 fallback — 서버 응답이 늦을 때 빠른 표시용)
  // 서버 응답은 loadHomeStats()에서 도착 시 덮어씀
  var now = new Date();
  var ym = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  var doneThisMonth = sch.filter(function(x) {
    return (x.date||'').startsWith(ym) && x.status === 'done';
  });
  var confirmedThisMonth = sch.filter(function(x) {
    return (x.date||'').startsWith(ym) && x.status === 'confirmed';
  });
  var confirmedRevenue = confirmedThisMonth.reduce(function(acc, x) { return acc + (parseInt(x.price)||0); }, 0);
  var totalRevenue = doneThisMonth.reduce(function(acc, x) { return acc + (parseInt(x.price)||0); }, 0);

  var perfDoneEl   = document.getElementById('perf-done');
  var perfRevEl    = document.getElementById('perf-revenue');
  var perfRevChg   = document.getElementById('perf-revenue-change');
  var perfBookedEl = document.getElementById('perf-booked');
  var perfBookedChg= document.getElementById('perf-booked-change');

  if (perfDoneEl && doneThisMonth.length > 0) perfDoneEl.textContent = doneThisMonth.length;
  if (perfRevEl) {
    var manwon = Math.round(totalRevenue / 10000);
    if (manwon > 0) perfRevEl.textContent = manwon;
  }
  if (perfRevChg && totalRevenue > 0) {
    perfRevChg.textContent = Math.round(totalRevenue/10000) + '만원';
  }
  if (perfBookedEl && confirmedThisMonth.length > 0) perfBookedEl.textContent = confirmedThisMonth.length;
  if (perfBookedChg && confirmedRevenue > 0) {
    perfBookedChg.textContent = '예정 ' + Math.round(confirmedRevenue/10000) + '만';
  }

  // 확정 예약 박스 클릭 → 스케줄 이동
  var bookedStat = perfBookedEl && perfBookedEl.closest('.perf-stat');
  if (bookedStat && !bookedStat.dataset.clickBound) {
    bookedStat.dataset.clickBound = '1';
    bookedStat.style.cursor = 'pointer';
    bookedStat.onclick = function(){ location.href = 'schedule.html?filter=confirmed'; };
  }
}

// 00:00 ~ 23:45, 15분 단위 시간 옵션 채우기 (24시간 전체)
function fillReminderTimes() {
  const sel = document.getElementById('reminder-time');
  if (!sel || sel.options.length) return;
  for (let h = 0; h <= 23; h++) {
    for (let m = 0; m < 60; m += 15) {
      const v = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
      const o = document.createElement('option');
      o.value = v; o.textContent = v;
      sel.appendChild(o);
    }
  }
}
function syncEnabledUI(on) {
  const slider = document.getElementById('reminder-slider');
  const knob = document.getElementById('reminder-knob');
  if (slider) slider.style.background = on ? '#FF385C' : '#C8D0DA';

  const sel = document.getElementById('reminder-time');

}

}

// 🔔 버튼 클릭 → 상태별 흐름 분기 (Phase 5-B priming)
async function togglePushNotification() {
  const perm = pushPermission();
  if (perm === 'unsupported') {
    toast('이 브라우저는 푸시 알림을 지원하지 않습니다');
    return;
  }
  if (perm === 'ios-no-pwa') {
    ssakShowIOSInstallGuide();
    return;
  }
  if (perm === 'denied') {
    ssakShowPushDeniedGuide();
    return;
  }

  // granted 인데 구독 객체가 없으면 → 구독부터, 있으면 → 설정 모달
  const reg = await navigator.serviceWorker.ready;
  const sub = await reg.pushManager.getSubscription();

  if (!sub) {
    // permission='default' or granted-but-not-subscribed → priming
    ssakShowPushPrime({
      onAccept: async () => {
        const res = await ssakSubscribePush({ hour: 8, minute: 0, reminder_enabled: true });
        if (res.ok) {
          updateBellState(true);
          toast('🔔 매일 오전 8:00에 알림을 받아요. 시간은 벨에서 바꿀 수 있어요');
        } else if (res.err === 'denied') {
          ssakShowPushDeniedGuide();
        } else if (res.err === 'default') {
          // 사용자가 native prompt를 닫음 — 조용히
        } else {
          toast('알림 설정 중 오류: ' + (res.err || 'unknown'));
        }
      }
    });
    return;
  }

  // 이미 구독 중 → 설정 모달
  fillReminderTimes();
  const enabledEl = document.getElementById('reminder-enabled');
  const timeEl = document.getElementById('reminder-time');
  try {
    const r = await fetch(SERVER + '/api/push/reminder?endpoint=' + encodeURIComponent(sub.endpoint));
    const d = await r.json();
    const cfg = (d && d.data) || { reminder_hour: 8, reminder_minute: 0, reminder_enabled: true };
    enabledEl.checked = cfg.reminder_enabled !== false;
    const hh = String(cfg.reminder_hour ?? 8).padStart(2,'0');
    const mm = String(cfg.reminder_minute ?? 0).padStart(2,'0');
    timeEl.value = `${hh}:${mm}`;
  } catch(e) {
    enabledEl.checked = true;
    timeEl.value = '08:00';
  }

  syncEnabledUI(enabledEl.checked);
  enabledEl.onchange = () => syncEnabledUI(enabledEl.checked);
  document.getElementById('reminder-modal').style.display = 'flex';
}

// 모달 [저장] 클릭
async function saveReminderSettings() {
  const enabled = document.getElementById('reminder-enabled').checked;
  const [hhStr, mmStr] = document.getElementById('reminder-time').value.split(':');
  const reminder_hour = parseInt(hhStr, 10);
  const reminder_minute = parseInt(mmStr, 10);

  try {
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();

    if (!enabled) {
      // 구독 자체는 유지, 서버에서 reminder_enabled=false
      if (sub) {
        await fetch(SERVER + '/api/push/reminder', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint: sub.endpoint, reminder_enabled: false })
        });
      }
      updateBellState(false);
      closeReminderModal();
      toast('🔕 리마인더가 꺼졌습니다');
      return;
    }

    if (!sub) {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') { toast('알림 권한이 거부됐습니다'); return; }
      const keyRes = await fetch(SERVER + '/api/push/vapid-key').then(r => r.json());
      const vapidKey = urlBase64ToUint8Array(keyRes.publicKey);
      sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: vapidKey });
    }

    const { endpoint } = sub;
    const keys = sub.toJSON().keys;
    const cfg = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');

    await fetch(SERVER + '/api/push/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        endpoint, p256dh: keys.p256dh, auth: keys.auth,
        anon_id: getAnon(),
        deviceId: cfg.company || 'unknown',
        reminder_hour, reminder_minute
      })
    });
    await fetch(SERVER + '/api/push/reminder', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ endpoint, reminder_enabled: true, reminder_hour, reminder_minute })
    });

    updateBellState(true);
    closeReminderModal();
    toast(`🔔 매일 ${String(reminder_hour).padStart(2,'0')}:${String(reminder_minute).padStart(2,'0')}에 알림을 받습니다`);
  } catch(e) {
    console.error('Reminder save error:', e);
    toast('저장 중 오류: ' + e.message);
  }
}

// ── 홈 리디자인 보완 ───────────────────────────────────────────
async function loadHomeStats() {
  const cfg = JSON.parse(localStorage.getItem('ssak_cfg') || '{}');
  const adminKey = cfg.adminKey || '';

  // 오늘 할 일 (대기 예약 우선)
  try {
    const r = await fetch(SERVER + '/api/bookings?status=pending');
    const d = await r.json();
    const pending = d.data || [];
    const todayText = document.getElementById('today-text');
    const todaySub  = document.getElementById('today-sub');
    const statusIco = document.getElementById('status-ico');
    const perfPendingEl = document.getElementById('perf-pending');

    // Status-First 풀 문장 카피 (2026-05-29 조합 패턴)
    if (todayText) {
      if (pending.length > 0) {
        const first = pending[0] || {};
        const timeStr = first.time || first.scheduled_time || '';
        const customer = first.customer_name || first.name || '';
        const taskKind = first.kind || first.service || '청소';
        todayText.innerHTML = `예약 <span class="num">${pending.length}건</span>이 있어요`;
        if (todaySub) {
          if (timeStr && customer) todaySub.textContent = `${timeStr} ${customer}님 ${taskKind}부터 시작이에요`;
          else if (timeStr) todaySub.textContent = `${timeStr}에 첫 일정이 있어요`;
          else todaySub.textContent = '탭해서 빠르게 처리하세요';
        }
        if (statusIco) statusIco.classList.add('has-task');
      } else {
        todayText.textContent = '여유로운 하루예요 ☀️';
        if (todaySub) todaySub.textContent = '오늘 대기 중인 예약이 없습니다';
        if (statusIco) statusIco.classList.remove('has-task');
      }
    }
    // KPI 대기 문의
    if (perfPendingEl) perfPendingEl.textContent = pending.length || '-';
  } catch(e) {
    const todayText = document.getElementById('today-text');
    if (todayText) todayText.textContent = '일정을 불러오는 중이에요';
  }

  // 이달 실적 — 매출은 hero 안, 완료/확정은 KPI 카드에 표시
  try {
    const r2 = await fetch(SERVER + '/api/stats/monthly');
    const d2 = await r2.json();
    if (d2.success) {
      const heroRev     = document.getElementById('hero-revenue');
      const heroTrend   = document.getElementById('hero-trend');
      const perfDone    = document.getElementById('perf-done');
      const perfBooked  = document.getElementById('perf-booked');
      const doneN = d2.done ?? 0;
      const revN  = d2.revenue ? Math.round(d2.revenue/10000) : 0;
      const bookN = d2.confirmed > 0 ? d2.confirmed : 0;
      // hero 매출
      if (heroRev) {
        if (typeof countUp === 'function' && revN > 0) countUp(heroRev, revN, { duration: 900 });
        else heroRev.textContent = revN > 0 ? revN : '-';
      }
      // hero 트렌드 (지난달 비교 — 데이터 있을 때만)
      if (heroTrend && d2.revenue_change_pct !== undefined && d2.revenue_change_pct !== null) {
        const pct = Math.round(d2.revenue_change_pct);
        const dir = pct >= 0 ? '↗' : '↘';
        heroTrend.textContent = `${dir} ${Math.abs(pct)}%`;
        heroTrend.classList.toggle('down', pct < 0);
        heroTrend.style.display = 'inline-flex';
      }
      // KPI
      if (perfDone) {
        if (typeof countUp === 'function') countUp(perfDone, doneN, { duration: 800 });
        else perfDone.textContent = doneN;
      }
      if (perfBooked) {
        if (typeof countUp === 'function' && bookN > 0) countUp(perfBooked, bookN, { duration: 700 });
        else perfBooked.textContent = bookN > 0 ? bookN : '-';
      }
    }
  } catch(e) {}
}

// 벨 아이콘 상태 — 3 state: subscribed / available / denied
function updateBellState(subscribed) {
  const dot = document.getElementById('notif-dot');
  if (!dot) return;
  const perm = (typeof pushPermission === 'function') ? pushPermission() : Notification.permission;
  if (subscribed) {
    dot.style.display = 'block';
    dot.style.background = '#FFD600'; // 활성 — 옐로
    dot.style.borderColor = 'rgba(255,56,92,.6)';
  } else if (perm === 'denied') {
    dot.style.display = 'block';
    dot.style.background = '#B0B7C3'; // 거부 — 회색
    dot.style.borderColor = 'rgba(176,183,195,.5)';
  } else {
    dot.style.display = 'none'; // default — 깔끔
  }
}

// 사용자 hero 이미지 적용 — 사진 있으면 사진 모드, 없으면 흰 헤더 모드
function applyHeroImage() {
  const root = document.getElementById('hero-root');
  const heroEl = document.getElementById('hero-img');
  if (!root || !heroEl) return;
  const setMode = (url) => {
    if (url) {
      root.classList.remove('no-photo');
      heroEl.style.backgroundImage = `url('${url}')`;
    } else {
      root.classList.add('no-photo');
      heroEl.style.backgroundImage = '';
    }
  };
  const cached = (typeof ssakGetHeroUrl === 'function') ? ssakGetHeroUrl() : '';
  setMode(cached);
  // 서버 최신 동기화 (백그라운드)
  (async () => {
    try {
      const r = await fetch(SERVER + '/api/auth/me');
      const d = await r.json();
      const serverUrl = (d && d.user && d.user.hero_image_url) || '';
      if (serverUrl !== cached) {
        setMode(serverUrl);
        try {
          if (serverUrl) localStorage.setItem('ssak_hero_url', serverUrl);
          else localStorage.removeItem('ssak_hero_url');
        } catch (e) {}
      }
    } catch (e) {}
  })();
}

  setGreeting();

  if ('serviceWorker' in navigator && 'PushManager' in window) {
    navigator.serviceWorker.ready.then(reg =>
      reg.pushManager.getSubscription()
    ).then(sub => updateBellState(!!sub)).catch(() => {});
  } else {
    updateBellState(false);
  }
});

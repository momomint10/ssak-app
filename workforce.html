<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>싹싹 — 인력매칭</title>
<meta name="theme-color" content="#6366F1">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#6366F1;--pr-d:#4F46E5;--pr-l:#EEF2FF;
  --g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;
  --g300:#CBD5E1;--g400:#94A3B8;--g500:#64748B;
  --g700:#334155;--g900:#0F172A;
  --green:#10B981;--orange:#F97316;
  --radius:14px;--shadow:0 1px 8px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Noto Sans KR',sans-serif;background:var(--g50);color:var(--g900);}
.shell{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:90px;}

/* ── 헤더 ──────────────────────────────────────────────── */
.hd{background:#fff;padding:14px 16px 0;border-bottom:1px solid var(--g200);position:sticky;top:0;z-index:50;}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.hd-title{font-size:18px;font-weight:900;}
.btn-register{background:var(--pr);color:#fff;border:none;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}

/* 탭 */
.tabs{display:flex;border-bottom:2px solid var(--g100);}
.tab{flex:1;padding:9px 0;text-align:center;font-size:13px;font-weight:600;color:var(--g400);cursor:pointer;border:none;background:none;font-family:inherit;position:relative;}
.tab.on{color:var(--pr);font-weight:800;}
.tab.on::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--pr);border-radius:2px;}

/* ── 필터 ──────────────────────────────────────────────── */
.filter-bar{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.fbtn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1.5px solid var(--g200);background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--g500);}
.fbtn.on{background:var(--pr);border-color:var(--pr);color:#fff;}

/* ── 인력 카드 ──────────────────────────────────────────── */
.list{padding:4px 12px 0;}
.wcard{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;padding:14px;display:flex;gap:12px;cursor:pointer;transition:transform .1s;}
.wcard:active{transform:scale(.98);}
.avatar{width:50px;height:50px;border-radius:50%;background:var(--pr-l);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.wcard-body{flex:1;min-width:0;}
.wcard-top{display:flex;align-items:flex-start;justify-content:space-between;}
.wcard-name{font-size:15px;font-weight:800;}
.wcard-rate{font-size:13px;font-weight:700;color:var(--pr);}
.wcard-meta{font-size:12px;color:var(--g500);margin:3px 0;}
.skill-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.skill-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--pr-l);color:var(--pr-d);}
.day-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.day-tag{font-size:10px;padding:2px 6px;border-radius:6px;background:var(--g100);color:var(--g700);font-weight:600;}
.status-active{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:4px;vertical-align:middle;}

/* 빈/로딩 */
.empty{text-align:center;padding:60px 20px;}
.empty-ico{font-size:44px;margin-bottom:10px;}
.empty-ttl{font-size:15px;font-weight:700;color:var(--g700);margin-bottom:4px;}
.empty-sub{font-size:13px;color:var(--g400);}
.sp{width:24px;height:24px;border:2.5px solid var(--g200);border-top-color:var(--pr);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 내 프로필 탭 ──────────────────────────────────────── */
.my-section{padding:16px 12px;}
.my-profile-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;}
.my-profile-head{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.my-avatar{width:60px;height:60px;border-radius:50%;background:var(--pr-l);display:flex;align-items:center;justify-content:center;font-size:28px;}
.my-name{font-size:17px;font-weight:900;}
.my-status{font-size:12px;color:var(--g400);margin-top:2px;}
.my-stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0;}
.my-stat{text-align:center;background:var(--g50);border-radius:10px;padding:10px 6px;}
.my-stat-val{font-size:16px;font-weight:900;color:var(--pr);}
.my-stat-lbl{font-size:10px;color:var(--g400);margin-top:2px;}
.btn-full{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border:none;}
.btn-primary{background:var(--pr);color:#fff;}
.btn-outline{background:#fff;color:var(--pr);border:1.5px solid var(--pr) !important;}
.btn-danger{background:#FEE2E2;color:#DC2626;}
.btn-gap{margin-top:8px;}
.no-profile{text-align:center;padding:40px 20px;}
.no-profile-ico{font-size:48px;margin-bottom:12px;}
.no-profile-ttl{font-size:16px;font-weight:800;margin-bottom:6px;}
.no-profile-sub{font-size:13px;color:var(--g400);margin-bottom:20px;line-height:1.6;}

/* ── 상세 시트 ─────────────────────────────────────────── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;}
.ov.on{display:block;}
.sh{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;z-index:201;max-height:88vh;display:flex;flex-direction:column;}
.sh-drag{width:32px;height:3px;background:var(--g200);border-radius:2px;margin:10px auto;}
.sh-body{overflow-y:auto;padding:16px;}
.det-avatar-wrap{display:flex;justify-content:center;margin-bottom:14px;}
.det-avatar{width:72px;height:72px;border-radius:50%;background:var(--pr-l);display:flex;align-items:center;justify-content:center;font-size:34px;}
.det-name{text-align:center;font-size:20px;font-weight:900;margin-bottom:4px;}
.det-rate{text-align:center;font-size:17px;font-weight:700;color:var(--pr);margin-bottom:14px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.info-cell{background:var(--g50);border-radius:10px;padding:12px;}
.info-cell-lbl{font-size:10px;font-weight:700;color:var(--g400);margin-bottom:4px;}
.info-cell-val{font-size:14px;font-weight:700;color:var(--g900);}
.det-sec-title{font-size:12px;font-weight:700;color:var(--g500);margin-bottom:6px;}
.det-bio{font-size:13px;color:var(--g700);line-height:1.7;background:var(--g50);border-radius:10px;padding:12px;margin-bottom:14px;white-space:pre-wrap;}
.sh-foot{padding:12px 16px;border-top:1px solid var(--g100);}
.btn-chat{width:100%;padding:13px;background:var(--pr);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}

/* ── 채팅 시트 ─────────────────────────────────────────── */
.ch-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;}
.ch-ov.on{display:block;}
.ch-sh{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;z-index:401;height:88vh;display:flex;flex-direction:column;}
.ch-drag{width:32px;height:3px;background:var(--g200);border-radius:2px;margin:10px auto;}
.ch-head{padding:4px 16px 12px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:10px;}
.ch-avatar{width:36px;height:36px;border-radius:50%;background:var(--pr-l);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ch-info{flex:1;}
.ch-info-name{font-size:13px;font-weight:800;}
.ch-info-sub{font-size:11px;color:var(--g400);}
.ch-badge{font-size:10px;background:var(--pr-l);color:var(--pr-d);border-radius:20px;padding:2px 8px;font-weight:700;}
.ch-close{background:none;border:none;font-size:22px;color:var(--g300);cursor:pointer;}
.ch-notice{background:var(--pr-l);border-radius:8px;padding:8px 12px;margin:8px 12px 0;font-size:11px;color:var(--pr-d);line-height:1.5;}
.ch-msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.ch-empty{text-align:center;padding:40px 20px;color:var(--g400);font-size:13px;}
.msg-row{display:flex;align-items:flex-end;gap:6px;}
.msg-row.me{flex-direction:row-reverse;}
.msg-bubble{max-width:72%;padding:9px 12px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;}
.msg-row.me .msg-bubble{background:var(--pr);color:#fff;border-bottom-right-radius:4px;}
.msg-row:not(.me) .msg-bubble{background:var(--g100);color:var(--g900);border-bottom-left-radius:4px;}
.msg-time{font-size:10px;color:var(--g300);flex-shrink:0;margin-bottom:2px;}
.ch-bar{padding:8px 12px;padding-bottom:max(8px,env(safe-area-inset-bottom));border-top:1px solid var(--g200);display:flex;align-items:flex-end;gap:8px;background:#fff;}
.ch-inp{flex:1;border:1.5px solid var(--g200);border-radius:18px;padding:9px 13px;font-size:14px;font-family:inherit;resize:none;max-height:80px;outline:none;background:#fafafa;}
.ch-inp:focus{border-color:var(--pr);background:#fff;}
.ch-send{background:var(--pr);color:#fff;border:none;border-radius:50%;width:36px;height:36px;flex-shrink:0;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.ch-send:disabled{background:var(--g300);}

/* ── 등록/수정 시트 ──────────────────────────────────────── */
.fo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;}
.fo.on{display:block;}
.fs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;z-index:301;max-height:93vh;display:flex;flex-direction:column;}
.fs-drag{width:32px;height:3px;background:var(--g200);border-radius:2px;margin:10px auto;}
.fs-bar{padding:4px 16px 12px;border-bottom:1px solid var(--g100);display:flex;align-items:center;}
.fs-title{font-size:16px;font-weight:900;}
.fs-cancel{margin-left:auto;background:none;border:none;font-size:14px;color:var(--g400);cursor:pointer;font-family:inherit;}
.fs-body{overflow-y:auto;padding:16px;}
.f-sec{margin-bottom:14px;}
.f-lbl{font-size:11.5px;font-weight:700;color:var(--g500);margin-bottom:5px;display:block;}
.f-inp{width:100%;padding:11px 12px;border:1.5px solid var(--g200);border-radius:9px;font-size:14px;font-family:inherit;outline:none;background:var(--g50);}
.f-inp:focus{border-color:var(--pr);background:#fff;}
textarea.f-inp{resize:none;min-height:72px;line-height:1.6;}
.f-inp::placeholder{color:var(--g300);}
.f-price-wrap{position:relative;}
.f-price-wrap .f-inp{padding-right:28px;}
.f-price-unit{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--g400);pointer-events:none;}
.chip-grid{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--g200);background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--g500);}
.chip.on{background:var(--pr);border-color:var(--pr);color:#fff;}

.fs-foot{padding:10px 16px;border-top:1px solid var(--g100);}

/* ── 네비 ──────────────────────────────────────────────── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,.96);border-top:1px solid var(--g200);backdrop-filter:blur(20px);display:flex;padding:8px 0 env(safe-area-inset-bottom,8px);z-index:100;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;background:none;border:none;font-family:inherit;font-size:10px;font-weight:500;color:var(--g400);cursor:pointer;}
.ni.on{color:var(--pr);font-weight:700;}
.ni-ico{font-size:20px;line-height:1;}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.92);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
</style>
</head>
<body>
<div class="shell">
  <div class="hd">
    <div class="hd-top">
      <div class="hd-title">👥 인력 매칭</div>
      <button class="btn-register" onclick="openForm()">👤 내 프로필 등록</button>
    </div>
    <div class="tabs">
      <button class="tab on" id="tab-find" onclick="switchTab('find')">🔍 인력 찾기</button>
      <button class="tab" id="tab-my"   onclick="switchTab('my')">📋 내 프로필</button>
    </div>
  </div>

  <!-- 인력 찾기 탭 -->
  <div id="sec-find">
    <div class="filter-bar" id="region-filter"></div>
    <div class="list" id="worker-list"></div>
  </div>

  <!-- 내 프로필 탭 -->
  <div id="sec-my" style="display:none;">
    <div class="my-section" id="my-profile-area">
      <div style="text-align:center;padding:40px 0;"><div class="sp"></div></div>
    </div>
  </div>
</div>

<!-- 상세 시트 -->
<div class="ov" id="det-ov" onclick="if(event.target===this)closeDet()">
  <div class="sh">
    <div class="sh-drag"></div>
    <div class="sh-body" id="det-body">
      <div class="det-avatar-wrap"><div class="det-avatar" id="det-emoji">🧹</div></div>
      <div class="det-name" id="det-name"></div>
      <div class="det-rate" id="det-rate"></div>
      <div class="info-grid">
        <div class="info-cell"><div class="info-cell-lbl">📍 활동 지역</div><div class="info-cell-val" id="det-region"></div></div>
        <div class="info-cell"><div class="info-cell-lbl">🏆 경력</div><div class="info-cell-val" id="det-exp"></div></div>
        <div class="info-cell"><div class="info-cell-lbl">📅 가능 요일</div><div class="info-cell-val" id="det-days"></div></div>
        <div class="info-cell"><div class="info-cell-lbl">🕐 가능 시간</div><div class="info-cell-val" id="det-times"></div></div>
        <div class="info-cell"><div class="info-cell-lbl">🛠 보유 기술</div><div class="info-cell-val" id="det-skills"></div></div>
      </div>
      <div class="det-sec-title">자기소개</div>
      <div class="det-bio" id="det-bio"></div>
    </div>
    <div class="sh-foot">
      <button class="btn-chat" id="det-chat-btn" onclick="openChat()">💬 안심채팅으로 연락하기</button>
    </div>
  </div>
</div>

<!-- 채팅 시트 -->
<div class="ch-ov" id="ch-ov" onclick="if(event.target===this)closeChat()">
  <div class="ch-sh">
    <div class="ch-drag"></div>
    <div class="ch-head">
      <div class="ch-avatar" id="ch-avatar">🧹</div>
      <div class="ch-info">
        <div class="ch-info-name" id="ch-name"></div>
        <div class="ch-info-sub" id="ch-sub"></div>
      </div>
      <span class="ch-badge">🔒 안심채팅</span>
      <button class="ch-close" onclick="closeChat()">×</button>
    </div>
    <div class="ch-notice">🛡️ 전화번호 없이 익명으로 안전하게 대화하세요. 개인정보를 채팅에 직접 입력하지 않는 것을 권장합니다.</div>
    <div class="ch-msgs" id="ch-msgs"><div class="ch-empty">채팅을 시작해보세요 👋</div></div>
    <div class="ch-bar">
      <textarea class="ch-inp" id="ch-inp" rows="1" placeholder="메시지를 입력하세요..."
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
      <button class="ch-send" id="ch-send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>
</div>

<!-- 프로필 등록/수정 시트 -->
<div class="fo" id="form-ov" onclick="if(event.target===this)closeForm()">
  <div class="fs">
    <div class="fs-drag"></div>
    <div class="fs-bar">
      <div class="fs-title" id="form-title">프로필 등록</div>
      <button class="fs-cancel" onclick="closeForm()">취소</button>
    </div>
    <div class="fs-body">

      <!-- 프로필 사진 -->
      <div class="f-sec">
        <label class="f-lbl">📷 프로필 사진 (상반신)</label>
        <div id="f-photo-preview" style="display:none;position:relative;margin-bottom:10px;">
          <img id="f-photo-img" alt="프로필 사진" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--pr);display:block;margin:0 auto;">
          <button onclick="removePhoto()" style="position:absolute;top:0;right:calc(50% - 62px);background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;">×</button>
        </div>
        <div style="text-align:center;">
          <button class="chip" onclick="document.getElementById('f-photo-file').click()" style="background:var(--pr-l);border-color:var(--pr);color:var(--pr-d);">📷 사진 선택</button>
          <input type="file" id="f-photo-file" accept="image/*" style="display:none" onchange="onPhotoSelect(this)">
        </div>
        <div style="font-size:11px;color:var(--g400);text-align:center;margin-top:6px;">상반신이 잘 보이는 사진을 등록해주세요</div>
      </div>
      <!-- 닉네임 -->
      <div class="f-sec">
        <label class="f-lbl">닉네임 *</label>
        <input class="f-inp" id="f-nick" placeholder="예: 청소10년장인, 서울청소마스터" type="text" maxlength="16">
      </div>
      <!-- 활동 지역 -->
      <div class="f-sec">
        <label class="f-lbl">📍 활동 지역 (복수 선택) *</label>
        <div class="chip-grid" id="region-chips"></div>
      </div>
      <!-- 보유 기술 -->
      <div class="f-sec">
        <label class="f-lbl">🛠 보유 기술 (복수 선택) *</label>
        <div class="chip-grid" id="skill-chips"></div>
      </div>
      <!-- 가능 요일 -->
      <div class="f-sec">
        <label class="f-lbl">📅 가능 요일</label>
        <div class="chip-grid" id="day-chips"></div>
      </div>
      <!-- 가능 시간 -->
      <div class="f-sec">
        <label class="f-lbl">🕐 가능 시간</label>
        <div class="chip-grid" id="time-chips"></div>
      </div>
      <!-- 경력 -->
      <div class="f-sec">
        <label class="f-lbl">🏆 경력 (년)</label>
        <input class="f-inp" id="f-exp" placeholder="예: 3" type="number" inputmode="numeric" min="0" max="50">
      </div>
      <!-- 희망 일당 -->
      <div class="f-sec">
        <label class="f-lbl">💰 희망 일당 (원)</label>
        <div class="f-price-wrap">
          <input class="f-inp" id="f-rate" placeholder="예: 150000" type="number" inputmode="numeric">
          <span class="f-price-unit">원</span>
        </div>
      </div>
      <!-- 자기소개 -->
      <div class="f-sec">
        <label class="f-lbl">📝 자기소개</label>
        <textarea class="f-inp" id="f-bio" placeholder="경력, 전문 분야, 장점 등을 자유롭게 적어주세요" maxlength="300"></textarea>
      </div>
    </div>
    <div class="fs-foot">
      <button class="btn-full btn-primary" id="btn-save" onclick="saveProfile()">저장하기</button>
    </div>
  </div>
</div>

<!-- 네비 -->
<div class="nav">
  <button class="ni" onclick="location.href='index.html'"><div class="ni-ico">🏠</div><div>홈</div></button>
  <button class="ni" onclick="location.href='ssak-quote.html'"><div class="ni-ico">⚡</div><div>견적</div></button>
  <button class="ni" onclick="location.href='schedule.html'"><div class="ni-ico">📅</div><div>스케줄</div></button>
  <button class="ni on"><div class="ni-ico">👥</div><div>인력</div></button>
  <button class="ni" onclick="location.href='community.html'"><div class="ni-ico">💬</div><div>커뮤니티</div></button>
</div>

<div id="toast"></div>

<script>
const SERVER = 'https://ssakssak-server-production.up.railway.app';

const REGIONS = ['전체','서울','경기','인천','부산','대구','광주','대전','울산','제주','기타'];
const SKILLS  = ['전체','입주청소','이사청소','사무실청소','상가청소','특수청소','공사후청소','정기청소','소독방역','에어컨청소'];
const DAYS    = ['월','화','수','목','금','토','일'];
const TIMES   = ['오전','오후'];

let curTab = 'find';
let curRegion = '전체';
let curWorker = null, curChatId = null, pollTimer = null, lastMsgTime = null;
let selRegions = [], selSkills = [], selDays = [], selTimes = [];
let myProfile = null;
let editMode = false;
let picBase64 = null, picMime = null;

// ── 유틸 ───────────────────────────────────────────────────────
function getAnon(){
  let id = localStorage.getItem('ssak_anon_id');
  if(!id){ id='a'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); localStorage.setItem('ssak_anon_id',id); }
  return id;
}
function ago(ts){
  const s=Math.floor((Date.now()-new Date(ts))/1000);
  if(s<60) return '방금'; if(s<3600) return Math.floor(s/60)+'분 전';
  if(s<86400) return Math.floor(s/3600)+'시간 전';
  return Math.floor(s/86400)+'일 전';
}
function esc(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtRate(n){ return n ? Number(n).toLocaleString()+'원/일' : '협의 가능'; }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.style.opacity='1'; clearTimeout(window._tt); window._tt=setTimeout(()=>el.style.opacity='0',2500); }

// ── 탭 전환 ────────────────────────────────────────────────────
function switchTab(tab) {
  curTab = tab;
  document.getElementById('tab-find').classList.toggle('on', tab==='find');
  document.getElementById('tab-my').classList.toggle('on', tab==='my');
  document.getElementById('sec-find').style.display = tab==='find' ? '' : 'none';
  document.getElementById('sec-my').style.display  = tab==='my'   ? '' : 'none';
  if (tab === 'my') loadMyProfile();
}

// ── 필터 렌더 ─────────────────────────────────────────────────
function renderFilters() {
  const rb = document.getElementById('region-filter');
  rb.innerHTML = REGIONS.map(r=>`<button class="fbtn${r===curRegion?' on':''}" onclick="setRegion('${r}')">${r}</button>`).join('');

}
function setRegion(r){ curRegion=r; renderFilters(); loadWorkers(); }

// ── 인력 목록 ─────────────────────────────────────────────────
async function loadWorkers() {
  const list = document.getElementById('worker-list');
  list.innerHTML = '<div style="text-align:center;padding:30px;"><div class="sp"></div></div>';
  try {
    let url = SERVER+'/api/workers?';
    if(curRegion!=='전체') url+='region='+encodeURIComponent(curRegion)+'&';
    const d = await fetch(url).then(r=>r.json());
    if(!d.success) throw new Error(d.error);
    if(!d.data.length){
      list.innerHTML=`<div class="empty"><div class="empty-ico">👥</div><div class="empty-ttl">등록된 인력이 없어요</div><div class="empty-sub">조건을 바꾸거나<br>내 프로필을 먼저 등록해보세요!</div></div>`;
      return;
    }
    list.innerHTML = d.data.map(w => `
      <div class="wcard" onclick="openDet('${w.id}')">
        <div class="avatar">${w.photo_url
          ? `<img src="${esc(w.photo_url)}" alt="" style="width:50px;height:50px;border-radius:50%;object-fit:cover;">`
          : `<span style="font-size:22px;">👤</span>`
        }</div>
        <div class="wcard-body">
          <div class="wcard-top">
            <span class="wcard-name"><span class="status-active"></span>${esc(w.nickname)}</span>
            <span class="wcard-rate">${fmtRate(w.daily_rate)}</span>
          </div>
          <div class="wcard-meta">📍 ${(w.regions||[]).slice(0,2).join(', ')}${(w.regions||[]).length>2?` 외 ${(w.regions||[]).length-2}`:''} · 경력 ${w.experience||0}년</div>
          <div class="skill-tags">${(w.skills||[]).map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('')}</div>
          <div class="day-tags">${(w.available_days||[]).map(d=>`<span class="day-tag">${esc(d)}</span>`).join('')}${(w.available_times||[]).map(t=>`<span class="day-tag" style="background:#EEF2FF;color:#4F46E5;margin-left:2px;">${esc(t)}</span>`).join('')}</div>
        </div>
      </div>`).join('');
  } catch(e) {
    list.innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-ttl">불러오기 실패</div><div class="empty-sub">${esc(e.message)}</div></div>`;
  }
}

// ── 상세 시트 ─────────────────────────────────────────────────
async function openDet(id) {
  curWorker = null;
  document.getElementById('det-ov').classList.add('on');
  document.getElementById('det-name').textContent = '불러오는 중...';
  document.getElementById('det-chat-btn').textContent = '💬 안심채팅으로 연락하기';
  try {
    const d = await fetch(SERVER+'/api/workers/'+id).then(r=>r.json());
    if(!d.success) throw new Error(d.error);
    const w = curWorker = d.data;
    const isMine = w.anon_id === getAnon();
    const detEmoji = document.getElementById('det-emoji');
    if(w.photo_url){
      detEmoji.innerHTML = `<img src="${w.photo_url}" alt="" style="width:72px;height:72px;border-radius:50%;object-fit:cover;">`;
      detEmoji.style.background = 'transparent';
    } else {
      detEmoji.innerHTML = '<span style="font-size:34px;">👤</span>';
    }
    document.getElementById('det-name').textContent  = w.nickname;
    document.getElementById('det-rate').textContent  = fmtRate(w.daily_rate);
    document.getElementById('det-region').textContent = (w.regions||[]).join(', ')||'-';
    document.getElementById('det-exp').textContent    = (w.experience||0)+'년';
    document.getElementById('det-days').textContent   = (w.available_days||[]).join(', ')||'-';
    document.getElementById('det-times').textContent  = (w.available_times||[]).join(', ')||'-';
    document.getElementById('det-skills').textContent = (w.skills||[]).join(', ')||'-';
    document.getElementById('det-bio').textContent    = w.bio||'(자기소개 없음)';
    const chatBtn = document.getElementById('det-chat-btn');
    if(isMine){ chatBtn.textContent='내 프로필입니다'; chatBtn.disabled=true; chatBtn.style.opacity='.5'; }
    else { chatBtn.textContent='💬 안심채팅으로 연락하기'; chatBtn.disabled=false; chatBtn.style.opacity=''; }
  } catch(e) { document.getElementById('det-name').textContent='오류: '+e.message; }
}
function closeDet(){ document.getElementById('det-ov').classList.remove('on'); curWorker=null; }

// ── 채팅 ───────────────────────────────────────────────────────
async function openChat() {
  if(!curWorker) return;
  const myAnon = getAnon();
  const d = await fetch(SERVER+'/api/worker-chats',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ worker_id: curWorker.id, requester_anon_id: myAnon })
  }).then(r=>r.json());
  if(!d.success){ toast('오류: '+(d.error||'서버 오류')); return; }
  curChatId = d.data.id; lastMsgTime = null;
  document.getElementById('ch-avatar').textContent = curWorker.avatar_emoji||'🧹';
  document.getElementById('ch-name').textContent   = curWorker.nickname;
  document.getElementById('ch-sub').textContent    = fmtRate(curWorker.daily_rate)+' · '+(curWorker.regions||[]).slice(0,2).join(', ');
  document.getElementById('ch-ov').classList.add('on');
  document.getElementById('ch-msgs').innerHTML='<div class="ch-empty">불러오는 중...</div>';
  document.getElementById('ch-inp').value='';
  await loadMsgs(true);
  startPoll();
  setTimeout(()=>document.getElementById('ch-inp').focus(),300);
}

async function loadMsgs(reset=false) {
  if(!curChatId) return;
  const myAnon = getAnon();
  let url = SERVER+'/api/worker-chats/'+curChatId+'/messages?anon_id='+encodeURIComponent(myAnon);
  if(lastMsgTime&&!reset) url+='&after='+encodeURIComponent(lastMsgTime);
  try {
    const d = await fetch(url).then(r=>r.json());
    if(!d.success) return;
    const msgs=d.data||[]; const c=document.getElementById('ch-msgs');
    if(reset){ c.innerHTML=!msgs.length?'<div class="ch-empty">채팅을 시작해보세요 👋<br><span style="font-size:11px;color:var(--g400);">전화번호 없이 익명으로 안전하게 대화할 수 있어요</span></div>':''; }
    msgs.forEach(m=>{
      c.querySelector('.ch-empty')?.remove();
      const isMe=m.sender_anon_id===myAnon;
      const t=new Date(m.created_at);
      const ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
      c.insertAdjacentHTML('beforeend',`<div class="msg-row${isMe?' me':''}"><div class="msg-bubble">${esc(m.content)}</div><div class="msg-time">${ts}</div></div>`);
      lastMsgTime=m.created_at;
    });
    if(msgs.length||reset) c.scrollTop=c.scrollHeight;
  } catch(e){}
}

async function sendMsg(){
  const inp=document.getElementById('ch-inp'); const content=inp.value.trim();
  if(!content||!curChatId) return;
  inp.value=''; inp.style.height='auto';
  const btn=document.getElementById('ch-send-btn'); btn.disabled=true;
  try {
    const d=await fetch(SERVER+'/api/worker-chats/'+curChatId+'/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ anon_id:getAnon(), content })
    }).then(r=>r.json());
    if(!d.success) throw new Error(d.error);
    const c=document.getElementById('ch-msgs'); c.querySelector('.ch-empty')?.remove();
    const msg=d.data; const t=new Date(msg.created_at);
    const ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
    c.insertAdjacentHTML('beforeend',`<div class="msg-row me"><div class="msg-bubble">${esc(content)}</div><div class="msg-time">${ts}</div></div>`);
    c.scrollTop=c.scrollHeight; lastMsgTime=msg.created_at;
  } catch(e){ toast('전송 오류: '+e.message); inp.value=content; }
  btn.disabled=false;
}
function startPoll(){ stopPoll(); pollTimer=setInterval(()=>loadMsgs(false),3000); }
function stopPoll(){ clearInterval(pollTimer); pollTimer=null; }
function closeChat(){ stopPoll(); document.getElementById('ch-ov').classList.remove('on'); curChatId=null; }

// ── 내 프로필 ─────────────────────────────────────────────────
async function loadMyProfile() {
  const area = document.getElementById('my-profile-area');
  area.innerHTML='<div style="text-align:center;padding:40px 0;"><div class="sp"></div></div>';
  try {
    const d = await fetch(SERVER+'/api/workers/my/'+encodeURIComponent(getAnon())).then(r=>r.json());
    myProfile = d.data;
    if (!myProfile) {
      area.innerHTML=`<div class="no-profile">
        <div class="no-profile-ico">👤</div>
        <div class="no-profile-ttl">아직 프로필이 없어요</div>
        <div class="no-profile-sub">프로필을 등록하면 청소 업체들이<br>나를 찾아 연락할 수 있어요!</div>
        <button class="btn-full btn-primary" onclick="openForm(false)">프로필 등록하기</button>
      </div>`;
      return;
    }
    const isActive = myProfile.status === 'active';
    area.innerHTML=`
      <div class="my-profile-card">
        <div class="my-profile-head">
          <div class="my-avatar">${myProfile.photo_url
          ? `<img src="${esc(myProfile.photo_url)}" alt="" style="width:60px;height:60px;border-radius:50%;object-fit:cover;">`
          : '<span style="font-size:28px;">👤</span>'
        }</div>
          <div>
            <div class="my-name">${esc(myProfile.nickname)}</div>
            <div class="my-status"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${isActive?'#10B981':'#94A3B8'};margin-right:4px;vertical-align:middle;"></span>${isActive?'활동 중':'대기 중'}</div>
          </div>
        </div>
        <div class="my-stat-row">
          <div class="my-stat"><div class="my-stat-val">${myProfile.experience||0}년</div><div class="my-stat-lbl">경력</div></div>
          <div class="my-stat"><div class="my-stat-val">${fmtRate(myProfile.daily_rate).replace('/일','')}</div><div class="my-stat-lbl">희망 일당</div></div>
          <div class="my-stat"><div class="my-stat-val">${(myProfile.regions||[]).length}</div><div class="my-stat-lbl">활동 지역</div></div>
        </div>
        <div style="margin-bottom:10px;">
          <div style="font-size:11px;font-weight:700;color:var(--g400);margin-bottom:6px;">보유 기술</div>
          <div class="skill-tags">${(myProfile.skills||[]).map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('')}</div>
        </div>
        <div style="margin-bottom:10px;">
          <div style="font-size:11px;font-weight:700;color:var(--g400);margin-bottom:6px;">가능 요일</div>
          <div class="day-tags">${(myProfile.available_days||[]).map(d=>`<span class="day-tag">${esc(d)}</span>`).join('')||'<span style="font-size:12px;color:var(--g400);">미설정</span>'}</div>
        </div>
        <div style="margin-bottom:14px;">
          <div style="font-size:11px;font-weight:700;color:var(--g400);margin-bottom:6px;">가능 시간</div>
          <div class="day-tags">${(myProfile.available_times||[]).map(t=>`<span class="day-tag" style="background:#EEF2FF;color:#4F46E5;">${esc(t)}</span>`).join('')||'<span style="font-size:12px;color:var(--g400);">미설정</span>'}</div>
        </div>
        <button class="btn-full btn-primary" onclick="openForm(true)">✏️ 프로필 수정</button>
        <button class="btn-full btn-outline btn-gap" style="border:1.5px solid var(--pr);" onclick="toggleStatus()">
          ${isActive?'⏸ 구직 일시 중단':'▶ 구직 재시작'}
        </button>
      </div>`;
  } catch(e) { area.innerHTML=`<div class="no-profile"><div class="no-profile-ico">⚠️</div><div class="no-profile-ttl">오류 발생</div></div>`; }
}

async function toggleStatus(){
  if(!myProfile) return;
  const newStatus = myProfile.status==='active'?'inactive':'active';
  const d = await fetch(SERVER+'/api/workers/'+myProfile.id+'/status',{
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ anon_id: getAnon(), status: newStatus })
  }).then(r=>r.json());
  if(d.success){ toast(newStatus==='active'?'✅ 구직 활성화됐습니다':'⏸ 구직을 일시 중단했습니다'); loadMyProfile(); }
  else toast('오류: '+d.error);
}

// ── 프로필 등록/수정 시트 ─────────────────────────────────────
function renderFormChips(){
  // 지역
  document.getElementById('region-chips').innerHTML = REGIONS.slice(1).map(r=>
    `<button class="chip${selRegions.includes(r)?' on':''}" onclick="toggleChip('region','${r}')">${r}</button>`
  ).join('');
  // 기술
  document.getElementById('skill-chips').innerHTML = SKILLS.slice(1).map(s=>
    `<button class="chip${selSkills.includes(s)?' on':''}" onclick="toggleChip('skill','${s}')">${s}</button>`
  ).join('');
  // 요일
  document.getElementById('day-chips').innerHTML = DAYS.map(d=>
    `<button class="chip${selDays.includes(d)?' on':''}" onclick="toggleChip('day','${d}')">${d}</button>`
  ).join('');
  // 시간
  document.getElementById('time-chips').innerHTML = TIMES.map(t=>
    `<button class="chip${selTimes.includes(t)?' on':''}" onclick="toggleChip('time','${t}')">${t}</button>`
  ).join('');
}

function toggleChip(type, val){
  if(type==='region'){ selRegions=selRegions.includes(val)?selRegions.filter(x=>x!==val):[...selRegions,val]; }
  if(type==='skill'){  selSkills =selSkills.includes(val) ?selSkills.filter(x=>x!==val) :[...selSkills,val];  }
  if(type==='day'){    selDays   =selDays.includes(val)   ?selDays.filter(x=>x!==val)   :[...selDays,val];    }
  if(type==='time'){   selTimes  =selTimes.includes(val)  ?selTimes.filter(x=>x!==val)  :[...selTimes,val];   }
  renderFormChips();
}


// ── 프로필 사진 ───────────────────────────────────────────────
function onPhotoSelect(inp) {
  const file = inp.files[0]; if(!file) return;
  if(file.size > 5*1024*1024){ toast('5MB 이하 사진만 가능합니다'); return; }
  picMime = file.type;
  const r = new FileReader();
  r.onload = e => {
    picBase64 = e.target.result.split(',')[1];
    document.getElementById('f-photo-img').src = e.target.result;
    document.getElementById('f-photo-preview').style.display = 'block';
  };
  r.readAsDataURL(file);
  inp.value = '';
}
function removePhoto(){
  picBase64 = null; picMime = null;
  document.getElementById('f-photo-preview').style.display = 'none';
  document.getElementById('f-photo-img').src = '';
}
function openForm(isEdit=false){
  editMode = isEdit;
  document.getElementById('form-title').textContent = isEdit?'프로필 수정':'프로필 등록';
  if(isEdit && myProfile){
    selRegions = [...(myProfile.regions||[])];
    selSkills  = [...(myProfile.skills||[])];
    selDays    = [...(myProfile.available_days||[])];
    selTimes   = [...(myProfile.available_times||[])];
    document.getElementById('f-nick').value = myProfile.nickname||'';
    document.getElementById('f-exp').value  = myProfile.experience||'';
    document.getElementById('f-rate').value = myProfile.daily_rate||'';
    document.getElementById('f-bio').value  = myProfile.bio||'';
    // 기존 사진 복원
    if(myProfile.photo_url){
      document.getElementById('f-photo-img').src = myProfile.photo_url;
      document.getElementById('f-photo-preview').style.display = 'block';
    } else { removePhoto(); }
  } else {
    selRegions=[]; selSkills=[]; selDays=[]; selTimes=[]; removePhoto();
    document.getElementById('f-nick').value='';
    document.getElementById('f-exp').value='';
    document.getElementById('f-rate').value='';
    document.getElementById('f-bio').value='';
  }
  renderFormChips();
  document.getElementById('form-ov').classList.add('on');
  setTimeout(()=>document.getElementById('f-nick').focus(),300);
}
function closeForm(){ document.getElementById('form-ov').classList.remove('on'); }

async function saveProfile(){
  const nick = document.getElementById('f-nick').value.trim();
  const exp  = document.getElementById('f-exp').value;
  const rate = document.getElementById('f-rate').value;
  const bio  = document.getElementById('f-bio').value.trim();
  if(!nick){ toast('닉네임을 입력해주세요'); return; }
  if(!selRegions.length){ toast('활동 지역을 선택해주세요'); return; }
  if(!selSkills.length){  toast('보유 기술을 선택해주세요'); return; }
  const btn=document.getElementById('btn-save'); btn.disabled=true; btn.textContent='저장 중...';
  try {
    const d=await fetch(SERVER+'/api/workers',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ anon_id:getAnon(), nickname:nick, regions:selRegions, skills:selSkills,
        available_days:selDays, available_times:selTimes, experience:Number(exp)||0, daily_rate:Number(rate)||0,
        bio, avatar_emoji:'👤',
        ...(picBase64 ? { photoBase64: picBase64, photoMime: picMime||'image/jpeg' } : {}) })
    }).then(r=>r.json());
    if(!d.success) throw new Error(d.error||'서버 오류');
    closeForm(); toast('✅ 프로필이 저장됐습니다!');
    loadWorkers(); loadMyProfile();
  } catch(e){ toast('오류: '+e.message); }
  finally { btn.disabled=false; btn.textContent='저장하기'; }
}

// ── 초기화 ────────────────────────────────────────────────────
renderFilters();
loadWorkers();
</script>
</body>
</html>

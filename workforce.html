/* 싹싹 인증 진입 가드 (Phase 2 / 2026-05-17) — JWT 검증, 미로그인 시 login.html로 */
/* ★ V1.7.2 DEV BYPASS: 수정 작업 중 로그인 비활성화 — 복원: 아래 'if(true)return;' 줄만 삭제 ★ */
(function(){
  if(true)return; // ← DEV BYPASS (복원 시 이 줄 삭제)
  try {
    var tok = localStorage.getItem('ssak_jwt');
    if (!tok) throw new Error('no_token');
    var parts = tok.split('.');
    if (parts.length !== 3) throw new Error('bad_token');
    var p64 = parts[1].replace(/-/g,'+').replace(/_/g,'/');
    while (p64.length % 4) p64 += '=';
    var bin = atob(p64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    var payload = JSON.parse(new TextDecoder('utf-8').decode(bytes));
    if (payload.exp && payload.exp < Math.floor(Date.now()/1000)) throw new Error('expired');
  } catch (e) {
    localStorage.removeItem('ssak_jwt');
    localStorage.removeItem('ssak_user');
    var next = encodeURIComponent(location.pathname + location.search);
    location.replace('/login.html?next=' + next);
  }
})();
</script>

.det-rate-unit{font-size:13px;color:var(--g400);font-weight:600;margin-left:2px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.info-cell{background:var(--g50);border-radius:14px;padding:14px;}
.info-lbl{font-size:11px;font-weight:700;color:var(--g500);margin-bottom:6px;letter-spacing:0.02em;}
.info-val{font-size:14px;font-weight:700;color:var(--g-ink,#191F28);line-height:1.4;}
.det-bio{font-size:13px;color:var(--g700);line-height:1.7;background:var(--g50);border-radius:14px;padding:14px;margin-bottom:14px;white-space:pre-wrap;}
.sh-foot{padding:12px 16px;border-top:1px solid var(--g100);}
.btn-chat{width:100%;padding:13px;background:var(--c-pr, #FF385C);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
/* ── 채용 상세 ── */
.job-detail-head{background:var(--pr-l);border-radius:14px;padding:16px;margin-bottom:14px;}
.job-detail-title{font-size:18px;font-weight:var(--fw-bold);margin-bottom:6px;}
.job-detail-rate{font-size:20px;font-weight:var(--fw-bold);color:var(--pr-d);margin-bottom:8px;}
.job-meta-row{display:flex;gap:6px;flex-wrap:wrap;}
.job-meta-chip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:#fff;color:var(--g700);}
.job-desc{font-size:13px;color:var(--g700);line-height:1.7;background:var(--g50);border-radius:12px;padding:12px;margin-bottom:14px;white-space:pre-wrap;}
.applicant-item{background:#fff;border-radius:12px;border:1px solid var(--g200);padding:12px;margin-bottom:8px;}
.applicant-name{font-size:14px;font-weight:var(--fw-bold);margin-bottom:4px;}
.applicant-contact{font-size:12px;color:var(--g500);}
.applicant-msg{font-size:12px;color:var(--g700);margin-top:4px;line-height:1.5;}
.applicant-foot{display:flex;justify-content:flex-end;margin-top:8px;}
.btn-match{padding:7px 16px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-match:disabled{background:var(--g300);cursor:not-allowed;}
/* ── 채팅 시트 ── */
.ch-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;}
.ch-ov.on{display:block;}
.ch-sh{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;z-index:401;height:88vh;display:flex;flex-direction:column;}
.ch-drag{width:32px;height:3px;background:var(--g200);border-radius:2px;margin:10px auto;}
.ch-head{padding:4px 16px 12px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:10px;}
.ch-av{width:36px;height:36px;border-radius:50%;background:var(--pr-l);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden;}
.ch-av img{width:100%;height:100%;object-fit:cover;}
.ch-info{flex:1;}
.ch-info-name{font-size:13px;font-weight:var(--fw-bold);}
.ch-info-sub{font-size:11px;color:var(--g400);}
.ch-badge{font-size:10px;background:var(--pr-l);color:var(--pr-d);border-radius:20px;padding:2px 8px;font-weight:700;}
.ch-close{background:none;border:none;font-size:22px;color:var(--g300);cursor:pointer;}
.ch-notice{background:var(--pr-l);border-radius:8px;padding:8px 12px;margin:8px 12px 0;font-size:11px;color:var(--pr-d);line-height:1.5;}
.ch-msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.ch-empty{text-align:center;padding:40px 20px;color:var(--g400);font-size:13px;}
.msg-row{display:flex;align-items:flex-end;gap:6px;}
.msg-row.me{flex-direction:row-reverse;}
.msg-bubble{max-width:72%;padding:9px 12px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;}
.msg-row.me .msg-bubble{background:var(--c-pr, #FF385C);color:#fff;border-bottom-right-radius:4px;}
.msg-row:not(.me) .msg-bubble{background:var(--g100);color:var(--g900);border-bottom-left-radius:4px;}
.msg-time{font-size:10px;color:var(--g300);flex-shrink:0;margin-bottom:2px;}
.ch-bar{padding:8px 12px;padding-bottom:max(8px,env(safe-area-inset-bottom));border-top:1px solid var(--g200);display:flex;align-items:flex-end;gap:8px;background:#fff;}
.ch-inp{flex:1;border:1.5px solid var(--g200);border-radius:18px;padding:9px 13px;font-size:14px;font-family:inherit;resize:none;max-height:80px;outline:none;background:#fafafa;}
.ch-inp:focus{border-color:var(--c-pr, #FF385C);background:#fff;}
.ch-send{background:var(--c-pr, #FF385C);color:#fff;border:none;border-radius:50%;width:36px;height:36px;flex-shrink:0;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.ch-send:disabled{background:var(--g300);}

/* ── 메신저 UI 개선 (날짜·읽음·상태) ── */
.msg-day-divider{align-self:center;margin:8px 0 4px;font-size:11px;color:var(--g400);background:var(--g100);padding:3px 10px;border-radius:12px;font-weight:600;}
.msg-row.has-time .msg-time{display:inline;}
.msg-row:not(.has-time) .msg-time{display:none;}
.msg-meta{display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0;margin-bottom:2px;}
.msg-row:not(.me) .msg-meta{align-items:flex-start;}
.msg-state{font-size:10px;color:var(--g300);font-weight:600;}
.msg-state.read{color:var(--c-pr, #FF385C);}
.msg-state.sending{color:var(--g300);font-style:italic;}
.msg-state.failed{color:#DC2626;cursor:pointer;font-weight:700;}
.ch-conn{display:none;text-align:center;font-size:11px;padding:5px 12px;background:#FEF2F2;color:#DC2626;font-weight:600;}
.ch-conn.show{display:block;}
/* ── 폼 시트 ── */
.fo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;}
.fo.on{display:block;}
.fs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;z-index:301;max-height:93vh;display:flex;flex-direction:column;}
.fs-drag{width:32px;height:3px;background:var(--g200);border-radius:2px;margin:10px auto;}
.fs-bar{padding:4px 16px 12px;border-bottom:1px solid var(--g100);display:flex;align-items:center;}
.fs-title{font-size:16px;font-weight:var(--fw-bold);}
.fs-cancel{margin-left:auto;background:none;border:none;font-size:14px;color:var(--g400);cursor:pointer;font-family:inherit;}
.fs-body{overflow-y:auto;padding:16px;}
.f-sec{margin-bottom:14px;}
.f-lbl{font-size:11.5px;font-weight:700;color:var(--g500);margin-bottom:5px;display:block;}
.f-inp{width:100%;padding:11px 12px;border:1.5px solid var(--g200);border-radius:9px;font-size:14px;font-family:inherit;outline:none;background:var(--g50);}
.f-inp:focus{border-color:var(--c-pr, #FF385C);background:#fff;}
.f-inp::placeholder{color:var(--g300);}
textarea.f-inp{resize:none;min-height:72px;line-height:1.6;}
.f-pw{position:relative;}
.f-pw .f-inp{padding-right:28px;}
.f-pu{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--g400);pointer-events:none;}
.chip-grid{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:10px 18px;min-height:40px;border-radius:9999px;
  border:1.5px solid var(--g200);background:#fff;
  font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--g500);
  transition:background .18s,border-color .18s,color .18s,box-shadow .18s,transform .1s;
  white-space:nowrap;user-select:none;-webkit-tap-highlight-color:transparent;
}
.chip:active{transform:scale(.95);}
.chip.on{
  background:var(--pr);border-color:var(--pr);color:#fff;
  box-shadow:0 3px 10px rgba(255,56,92,.28);
}
.fs-foot{padding:10px 16px;border-top:1px solid var(--g100);}
/* ── 매칭 완료 카드 ── */
.match-card{background:linear-gradient(135deg,var(--c-pr, #FF385C),#FF6B8A);border-radius:14px;padding:16px;margin-bottom:12px;color:#fff;}
.match-title{font-size:14px;font-weight:var(--fw-bold);margin-bottom:8px;}
.match-info{font-size:12px;line-height:1.8;background:rgba(255,255,255,.15);border-radius:8px;padding:10px;}

  <button class="ds-nav-item" onclick="location.href='community.html'"><div class="ds-nav-ico">💬</div><div>커뮤니티</div></button>
  <button class="ds-nav-item on"><div class="ds-nav-ico">👥</div><div>동료</div></button>
  <button class="ds-nav-item" onclick="location.href='my.html'"><div class="ds-nav-ico">👤</div><div>MY</div></button>
</nav>
<div id="toast"></div>

<script>

// ── UI 헬퍼 ───────────────────────────────────────────────────
const statusBadge = (status, openTxt='모집중', closeTxt='마감') =>
  `<span style="font-size:11px;padding:2px 8px;border-radius:12px;background:${status==='open'?'#DCFCE7':'#F3F4F6'};color:${status==='open'?'#16A34A':'#6B7280'};">${status==='open'?openTxt:closeTxt}</span>`;

const matchBadge = (isMatch, isMine) =>
  (isMatch && !isMine ? '<span style="font-size:10px;background:#f7f7f7;color:var(--c-pr, #FF385C);padding:2px 7px;border-radius:12px;font-weight:700;">✨ 매칭</span>' : '') +
  (isMine ? '<span style="font-size:10px;background:#FEF3C7;color:#D97706;padding:2px 7px;border-radius:12px;font-weight:700;">내 공고</span>' : '');

const skillChips = (skills) =>
  skills && skills.length
    ? `<div class="skill-tags">${skills.map(sk=>`<span class="skill-tag">${esc(sk)}</span>`).join('')}</div>`
    : '';

const infoCell = (icon, label, val) =>
  `<div class="info-cell"><div class="info-cell-lbl">${icon} ${label}</div><div class="info-cell-val">${val}</div></div>`;

// ── 유틸 ─────────────────────────────────────────────────────
function fmtRate(n){ return n?Number(n).toLocaleString()+'원/일':'협의'; }
function fmtDate(s){ if(!s)return'-'; const d=new Date(s); return`${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`; }
// ── 상태 ─────────────────────────────────────────────────────
let curTab='find', curRegion='전체', curJobRegion='전체';
let curWorker=null, curJob=null, curApplyJobId=null;
let curChatId=null, pollTimer=null, lastMsgTime=null;
let myProfile=null;
let selRegions=[],selSkills=[],selDays=[],selTimes=[],selJobRegion='서울',selJobSkills=[];
let picBase64=null,picMime=null;

// ── 헤더 버튼 ────────────────────────────────────────────────
function onHdBtn(){
  if(curTab==='find'||curTab==='my') openProfileForm(false);
  else openJobForm();
}
function updateHdBtn(){
  const btn=document.getElementById('hd-btn');
  if(curTab==='job'){btn.textContent='📋 공고 등록';}
  else{btn.textContent='👤 프로필 등록';}
}

// ── 탭 전환 ──────────────────────────────────────────────────
function switchTab(tab){
  curTab=tab;
  ['find','job','my'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('on',t===tab);
    document.getElementById('sec-'+t).style.display=t===tab?'':'none';
  });
  updateHdBtn();
  if(tab==='my') loadMyProfile();
  if(tab==='job'){ renderJobFilters(); loadJobs(); }
}

// ── 필터 ─────────────────────────────────────────────────────
function renderFilters(){
  document.getElementById('region-filter').innerHTML=REGIONS.map(r=>`<button class="fbtn${r===curRegion?' on':''}" onclick="setRegion('${r}')">${r}</button>`).join('');
  document.getElementById('job-region-filter').innerHTML=REGIONS.map(r=>`<button class="fbtn${r===curJobRegion?' on':''}" onclick="setJobRegion('${r}')">${r}</button>`).join('');
}
function setRegion(r){curRegion=r;renderFilters();loadWorkers();}
function renderJobFilters(){
  const rb=document.getElementById('job-region-filter');
  if(!rb) return;
  rb.innerHTML=REGIONS.map(r=>`<button class="fbtn${r===curJobRegion?' on':''}" onclick="setJobRegion('${r}')">${r}</button>`).join('');
}
function setJobRegion(r){curJobRegion=r;renderJobFilters();loadJobs();}

// ── 인력 목록 ────────────────────────────────────────────────
async function loadWorkers(){
  const list=document.getElementById('worker-list');
  list.innerHTML = Array(4).fill(`
    <div class="ds-skel-list-item">
      <div class="ds-skel av"></div>
      <div class="ds-skel-body">
        <div class="ds-skel" style="height:14px;width:60%;"></div>
        <div class="ds-skel" style="height:11px;width:80%;"></div>
      </div>
    </div>`).join('');
  try{
    let url=SERVER+'/api/workers?';
    if(curRegion!=='전체') url+='region='+encodeURIComponent(curRegion)+'&';
    const d=await fetch(url).then(r=>r.json());
    if(!d.data.length){
      list.innerHTML='<div class="empty"><div class="ds-empty-svg" style="margin:0 auto 14px;">'+(typeof svgIcon==='function'?svgIcon('broom',{size:72,color:'var(--c-pr)'}):'👥')+'</div><div class="empty-ttl">등록된 인력이 없어요</div><div class="empty-sub">내 프로필을 먼저 등록해보세요!</div></div>';
      return;
    }
    // 마켓플레이스 활기 stats bar + AX 하이브리드 카드 (260528)
    const total = d.data.length;
    const regionLbl = curRegion === '전체' ? '전체' : curRegion;
    const avgExp = Math.round(d.data.reduce((s,w)=>s+(w.experience||0),0)/Math.max(1,total));
    const statsBar = `
      <div class="stats-bar">
        <span class="stat"><b>${total}</b>명 활동중</span>
        <span class="stat-div"></span>
        <span class="stat"><b>${esc(regionLbl)}</b> 지역</span>
        <span class="stat-div"></span>
        <span class="stat"><b>평균 ${avgExp}년</b></span>
      </div>`;

    // 닉네임 해시 → 아바타 컬러 (이름별 일관)
    const avColors = ['', 'av-mint', 'av-amber', 'av-blue', 'av-purple'];
    const avColor = (s) => {
      let h = 0;
      for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
      return avColors[h % avColors.length];
    };

    list.innerHTML = statsBar + d.data.map(w => {
      const cls = avColor(w.nickname || '');
      const firstChar = (w.nickname || '?').trim().charAt(0);
      const avatar = w.photo_url
        ? `<div class="avatar"><img loading="lazy" src="${esc(w.photo_url)}" alt=""></div>`
        : `<div class="avatar ${cls}">${esc(firstChar)}</div>`;
      const skills = (w.skills || []);
      const visibleSkills = skills.slice(0, 3);
      const overflow = skills.length - 3;
      const skillTags = visibleSkills.map(s => `<span class="skill-tag">${esc(s)}</span>`).join('') +
        (overflow > 0 ? `<span class="skill-tag more">+${overflow}</span>` : '');
      const region = (w.regions || ['-'])[0] || '-';
      const firstTime = (w.available_times || ['-'])[0] || '-';
      const dayCount = (w.available_days || []).length;
      const exp = w.experience || 0;
      return `
      <div class="wcard" onclick="openDet('${w.id}')">
        <div class="wcard-top">
          ${avatar}
          <div class="wcard-body">
            <div class="wcard-head">
              <span class="wcard-name">${esc(w.nickname)}</span>
              <span class="wcard-rate">${fmtRate(w.daily_rate)}<span class="wcard-rate-unit">/일</span></span>
            </div>
            <div class="wcard-meta">📍 ${(w.regions||[]).slice(0,2).join(', ')} · <span class="act-dot"></span>활동중</div>
            <div class="skill-tags">${skillTags}</div>
          </div>
        </div>
        <div class="wmeta-grid">
          <div class="wmeta-item"><div class="wmeta-lbl">경력</div><div class="wmeta-val">${exp}년</div></div>
          <div class="wmeta-item"><div class="wmeta-lbl">활동지역</div><div class="wmeta-val">${esc(region)}</div></div>
          <div class="wmeta-item"><div class="wmeta-lbl">가능시간</div><div class="wmeta-val">${esc(firstTime)}</div></div>
          <div class="wmeta-item"><div class="wmeta-lbl">요일</div><div class="wmeta-val ${dayCount>0?'':'muted'}">${dayCount > 0 ? dayCount + '일' : '-'}</div></div>
        </div>
      </div>`;
    }).join('');
  }catch(e){
    list.innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-ttl">동료 목록을 불러올 수 없어요</div><div class="empty-sub">${esc(friendlyFetchError(e,'동료 목록을 불러오지 못했어요.'))}</div></div>`;
  }
}

// ── 채용공고 목록 ─────────────────────────────────────────────
async function loadJobs(){
  const list=document.getElementById('job-list');
  list.innerHTML = Array(4).fill(`
    <div class="ds-skel-list-item">
      <div class="ds-skel av"></div>
      <div class="ds-skel-body">
        <div class="ds-skel" style="height:14px;width:60%;"></div>
        <div class="ds-skel" style="height:11px;width:80%;"></div>
      </div>
    </div>`).join('');
  try{
    let url=SERVER+'/api/jobs?status=open';
    if(curJobRegion&&curJobRegion!=='전체') url+='&region='+encodeURIComponent(curJobRegion);
    const d=await fetch(url).then(r=>r.json());
    if(!d.data||!d.data.length){
      list.innerHTML='<div class="empty"><div class="ds-empty-svg" style="margin:0 auto 14px;">'+(typeof svgIcon==='function'?svgIcon('cart',{size:72,color:'var(--c-pr)'}):'💼')+'</div><div class="empty-ttl">등록된 채용공고가 없어요</div><div class="empty-sub">첫 공고를 등록해보세요!</div></div>';
      return;
    }
    // 내 프로필 기준 자동매칭 표시
    const myAnon=getAnon();
    // Stats bar — 모집중 건수 + 매칭 가능 건수
    const openCount = d.data.length;
    const matchCount = myProfile ? d.data.filter(j => (j.region==='전체'||(myProfile.regions||[]).includes(j.region)) && (!j.skills||!j.skills.length||(j.skills||[]).some(sk=>(myProfile.skills||[]).includes(sk)))).length : 0;
    const statsBarJ = `
      <div class="stats-bar">
        <span class="stat"><b>${openCount}</b>건 모집중</span>
        ${myProfile ? `<span class="stat-div"></span><span class="stat"><b>${matchCount}</b>건 매칭</span>` : ''}
        <span class="stat-div"></span>
        <span class="stat"><b>${esc(curJobRegion==='전체'?'전체':curJobRegion)}</b> 지역</span>
      </div>`;

    list.innerHTML = statsBarJ + d.data.map(j=>{
      const isMine=j.anon_id===myAnon;
      const isMatch=myProfile&&
        (j.region==='전체'||(myProfile.regions||[]).includes(j.region))&&
        (!j.skills||!j.skills.length||(j.skills||[]).some(sk=>(myProfile.skills||[]).includes(sk)));
      const rateText = j.daily_rate ? Math.round(j.daily_rate/10000)+'만' : '협의';
      const rateUnit = j.daily_rate ? '/일' : '';
      // 날짜 D-day 표시
      let dateLabel = j.work_date || '날짜 미정';
      let dateClass = 'muted';
      if (j.work_date) {
        try {
          const wd = new Date(j.work_date);
          const now = new Date();
          const days = Math.ceil((wd - now)/(1000*60*60*24));
          if (days === 0) { dateLabel = '오늘'; dateClass = ''; }
          else if (days === 1) { dateLabel = '내일'; dateClass = 'amber'; }
          else if (days > 0 && days <= 7) { dateLabel = 'D-'+days; dateClass = 'amber'; }
          else if (days > 7) { dateLabel = wd.getMonth()+1 + '/' + wd.getDate(); dateClass = ''; }
          else { dateLabel = '지남'; dateClass = 'muted'; }
        } catch(e) {}
      }
      return `<div class="jcard" onclick="openJobDet('${j.id}')">
        <div class="jcard-head">
          <div class="jcard-title">${esc(j.title)}</div>
          <div class="jcard-rate">${rateText}<span class="jcard-rate-unit">${rateUnit}</span></div>
        </div>
        <div class="jcard-meta">📍 <span>${esc(j.region)}</span> · 👥 ${j.headcount||1}명 모집 ${matchBadge(isMatch,isMine)}</div>
        ${skillChips(j.skills)}
        <div class="jmeta-grid">
          <div class="jmeta-item"><div class="jmeta-lbl">근무일</div><div class="jmeta-val ${dateClass}">${dateLabel}</div></div>
          <div class="jmeta-item"><div class="jmeta-lbl">지원자</div><div class="jmeta-val">${j.applicant_count||0}명</div></div>
          <div class="jmeta-item"><div class="jmeta-lbl">매칭</div><div class="jmeta-val ${isMatch?'teal':'muted'}">${isMatch?'가능':'-'}</div></div>
          <div class="jmeta-item"><div class="jmeta-lbl">상태</div><div class="jmeta-val ${j.status==='open'?'teal':'muted'}">${j.status==='open'?'모집중':'마감'}</div></div>
        </div>
      </div>`;
    }).join('');
  }catch(e){
    list.innerHTML='<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-ttl">채용공고를 불러올 수 없어요</div><div class="empty-sub">'+esc(friendlyFetchError(e,'채용공고 목록을 불러오지 못했어요.'))+'</div></div>';
  }
}

// ── 인력 상세 ────────────────────────────────────────────────
async function openDet(id){
  curWorker=null;
  document.getElementById('det-ov').classList.add('on');
  document.getElementById('det-name').textContent='불러오는 중...';
  try{
    const d=await fetch(SERVER+'/api/workers/'+id).then(r=>r.json());
    if(!d.success) throw new Error(d.error);
    const w=curWorker=d.data;
    const isMine=w.anon_id===getAnon();
    // 컬러 아바타 해시 (wcard와 동일 로직)
    const detAv=document.getElementById('det-emoji');
    const avClasses = ['','av-mint','av-amber','av-blue','av-purple'];
    const nick = w.nickname || '?';
    let h = 0; for (let i = 0; i < nick.length; i++) h = (h * 31 + nick.charCodeAt(i)) >>> 0;
    const avCls = avClasses[h % avClasses.length];
    // 기존 클래스 정리 후 새 클래스 적용
    detAv.className = 'det-avatar' + (avCls ? ' ' + avCls : '');
    detAv.style.background = '';  // CSS 클래스가 결정
    if (w.photo_url) {
      detAv.innerHTML = `<img loading="lazy" src="${esc(w.photo_url)}" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    } else {
      detAv.innerHTML = esc(nick.trim().charAt(0));
    }
    document.getElementById('det-name').textContent=w.nickname;
    document.getElementById('det-rate').innerHTML = w.daily_rate
      ? Math.round(w.daily_rate/10000) + '만<span class="det-rate-unit">원/일</span>'
      : '협의';
    document.getElementById('det-region').textContent=(w.regions||[]).join(', ')||'-';
    document.getElementById('det-exp').textContent=(w.experience||0)+'년';
    document.getElementById('det-days').textContent=(w.available_days||[]).join(', ')||'-';
    document.getElementById('det-times').textContent=(w.available_times||[]).join(', ')||'-';
    document.getElementById('det-skills').textContent=(w.skills||[]).join(', ')||'-';
    document.getElementById('det-bio').textContent=w.bio||'(자기소개 없음)';
    const cb=document.getElementById('det-chat-btn');
    if(isMine){cb.textContent='내 프로필입니다';cb.disabled=true;cb.style.opacity='.5';}
    else{cb.textContent='💬 안심채팅으로 연락하기';cb.disabled=false;cb.style.opacity='';}
  }catch(e){document.getElementById('det-name').textContent='오류: '+e.message;}
}
function closeDet(){document.getElementById('det-ov').classList.remove('on');curWorker=null;}

// ── 채용 상세 ────────────────────────────────────────────────
async function openJobDet(id){
  curJob=null;
  document.getElementById('job-det-ov').classList.add('on');
  document.getElementById('job-det-body').innerHTML='<div style="text-align:center;padding:30px;"><div class="sp"></div></div>';
  document.getElementById('job-det-foot').innerHTML='';
  try{
    const d=await fetch(SERVER+'/api/jobs/'+id).then(r=>r.json());
    if(!d.success) throw new Error(d.error);
    const j=curJob=d.data;
    const isMine=j.anon_id===getAnon();
    document.getElementById('job-det-title').textContent='채용공고 상세';

    // 공고 정보
    let bodyHtml=`
      <div style="padding:16px 0 8px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;">
          <div style="font-size:18px;font-weight:var(--fw-bold);flex:1;">${esc(j.title)}</div>
          <span style="font-size:12px;padding:3px 10px;border-radius:12px;background:${j.status==='open'?'#DCFCE7':'#F3F4F6'};color:${j.status==='open'?'#16A34A':'#6B7280'};flex-shrink:0;margin-left:8px;">${j.status==='open'?'모집중':'마감'}</span>
        </div>
        <div class="info-grid">
          ${infoCell('📍','지역',esc(j.region))}
          ${infoCell('📅','작업일',j.work_date||'-')}
          ${infoCell('👥','모집 인원',(j.headcount||1)+'명')}
          ${infoCell('💰','일당',j.daily_rate?Number(j.daily_rate).toLocaleString()+'원':'협의')}
        </div>`;
    if(j.skills&&j.skills.length) bodyHtml+=`<div style="margin:10px 0;"><div style="font-size:11px;font-weight:700;color:var(--g400);margin-bottom:5px;">요구 기술</div>${skillChips(j.skills)}</div>`;
    if(j.description){
      bodyHtml+=`<div class="det-bio">${esc(j.description)}</div>`;
    }
    bodyHtml+=`</div>`;

    // 채용자 본인: 지원자 목록
    if(isMine){
      bodyHtml+=`<div style="margin-top:4px;"><div style="font-size:14px;font-weight:var(--fw-bold);margin-bottom:10px;">📬 지원자 목록</div>
        <div id="ap-list">`;
      try{
        const ad=await fetch(SERVER+'/api/jobs/'+id+'/applications?anon_id='+encodeURIComponent(getAnon())).then(r=>r.json());
        const apps=ad.data||[];
        if(!apps.length){
          bodyHtml+=`<div style="text-align:center;padding:20px;color:var(--g400);font-size:13px;">아직 지원자가 없어요 🙁</div>`;
        } else {
          bodyHtml+=apps.map(ap=>`
            <div id="ap-${esc(ap.id)}" style="border:1px solid ${ap.status==='matched'?'#A7F3D0':'var(--g200)'};border-radius:12px;padding:12px;margin-bottom:8px;background:${ap.status==='matched'?'#F0FDF4':'#fff'};">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                <div style="font-size:14px;font-weight:700;">${esc(ap.worker_nickname||'지원자')}</div>
                ${ap.status==='matched'?'<span style="font-size:11px;padding:2px 8px;border-radius:12px;background:#DCFCE7;color:#16A34A;">✅ 매칭됨</span>':''}
              </div>
              <div style="font-size:12px;color:var(--g700);margin-bottom:4px;">📞 ${esc(ap.applicant_contact)}</div>
              ${ap.message?`<div style="font-size:12px;color:var(--g500);">"${esc(ap.message)}"</div>`:''}
              ${ap.status!=='matched'?`<button class="btn-match" onclick="confirmMatch('${ap.id}','${esc(ap.worker_nickname||'지원자')}')"
                style="width:100%;margin-top:8px;padding:9px;background:var(--c-pr, #FF385C);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">
                🤝 매칭 확정
              </button>`:'<div style="margin-top:6px;font-size:12px;color:#16A34A;">📞 구직자 연락처: <strong>'+esc(ap.applicant_contact)+'</strong></div>'}
            </div>`).join('');
        }
      }catch(e2){ bodyHtml+=`<div style="color:var(--g400);font-size:13px;padding:12px;">지원자 목록 오류</div>`; }
      bodyHtml+=`</div></div>`;

      document.getElementById('job-det-body').innerHTML=bodyHtml;
      document.getElementById('job-det-foot').innerHTML=`
        <button onclick="toggleJobStatus('${j.id}','${j.status}')" style="width:100%;padding:12px;border:1.5px solid var(--g200);border-radius:14px;background:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">
          ${j.status==='open'?'⏹ 공고 마감하기':'▶ 공고 재개하기'}
        </button>`;
    } else {
      // 구직자: 지원하기
      document.getElementById('job-det-body').innerHTML=bodyHtml;
      const alreadyApplied=await checkAlreadyApplied(id);
      if(alreadyApplied){
        document.getElementById('job-det-foot').innerHTML=`
          <button disabled style="width:100%;padding:12px;background:var(--g200);color:var(--g400);border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:not-allowed;font-family:inherit;">
            ✅ 지원 완료
          </button>`;
      } else if(j.status==='open'){
        document.getElementById('job-det-foot').innerHTML=`
          <button onclick="openApplyForm('${j.id}')" class="btn-chat" style="width:100%;padding:13px;font-size:15px;">
            📝 지원하기
          </button>`;
      } else {
        document.getElementById('job-det-foot').innerHTML=`
          <button disabled style="width:100%;padding:12px;background:var(--g200);color:var(--g400);border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:not-allowed;font-family:inherit;">
            마감된 공고입니다
          </button>`;
      }
    }
  }catch(e){

async function toggleJobStatus(jobId,curStatus){
  const newStatus=curStatus==='open'?'closed':'open';
  const d=await fetch(`${SERVER}/api/jobs/${jobId}/status`,{
    method:'PATCH',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({anon_id:getAnon(),status:newStatus})
  }).then(r=>r.json());
  if(d.success){toast(newStatus==='closed'?'공고가 마감됐습니다':'공고를 재오픈했습니다');closeJobDet();loadJobs();}
  else toast('오류: '+d.error);
}

async function confirmMatch(appId,nickname){
  if(!(await ssakConfirm(`${nickname}님과 매칭을 확정할까요?\n매칭 완료 시 서로의 연락처가 공유되고\n스케줄에 자동으로 추가됩니다.`))) return;
  const btn=document.getElementById('ap-'+appId)?.querySelector('.btn-match');
  if(btn){btn.disabled=true;btn.textContent='처리 중...';}
  try{
    const d=await fetch(`${SERVER}/api/jobs/applications/${appId}/match`,{
      method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({anon_id:getAnon()})
    }).then(r=>r.json());
    if(!d.success) throw new Error(d.error);
    // 매칭 완료 정보 표시
    const card=document.getElementById('ap-'+appId);
    if(card) card.innerHTML=`
      <div class="match-card">
        <div class="match-title">🎉 매칭 완료!</div>
        <div class="match-info">
          📞 지원자 연락처: <b>${esc(d.applicant_contact)}</b><br>
          📅 작업 날짜: <b>${fmtDate(d.work_date)}</b><br>

      </div>`;

  }catch(e){
    toast('오류: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='✅ 매칭 확정';}
  }
}

function renderProfileChips(){
  document.getElementById('region-chips').innerHTML=REGIONS.slice(1).map(r=>`<button class="chip${selRegions.includes(r)?' on':''}" onclick="toggleChip('region','${r}')">${r}</button>`).join('');
  document.getElementById('skill-chips').innerHTML=SKILLS.map(s=>`<button class="chip${selSkills.includes(s)?' on':''}" onclick="toggleChip('skill','${s}')">${s}</button>`).join('');
  document.getElementById('day-chips').innerHTML=DAYS.map(d=>`<button class="chip${selDays.includes(d)?' on':''}" onclick="toggleChip('day','${d}')">${d}</button>`).join('');
  document.getElementById('time-chips').innerHTML=TIMES.map(t=>`<button class="chip${selTimes.includes(t)?' on':''}" onclick="toggleChip('time','${t}')">${t}</button>`).join('');
}
function toggleChip(type,val){
  if(type==='region') selRegions=selRegions.includes(val)?selRegions.filter(x=>x!==val):[...selRegions,val];
  if(type==='skill')  selSkills =selSkills.includes(val) ?selSkills.filter(x=>x!==val) :[...selSkills,val];
  if(type==='day')    selDays   =selDays.includes(val)   ?selDays.filter(x=>x!==val)   :[...selDays,val];
  if(type==='time')   selTimes  =selTimes.includes(val)  ?selTimes.filter(x=>x!==val)  :[...selTimes,val];
  renderProfileChips();
}

// ══════════════════════════════════════════════════════════════
// 메신저 (Phase 1+2: 깔끔/속도/안정성)
// ══════════════════════════════════════════════════════════════

// 상태 추적: 현재 채팅의 메시지 캐시 (UI 렌더링·시간 그룹핑·낙관적 업데이트용)
let chatMsgs = [];          // 화면에 표시되는 메시지들 (서버 + 낙관적 임시 모두 포함)

let chFailCount = 0;        // 연속 실패 카운트 (연결 상태 표시용)

// ── 채팅 열기 ────────────────────────────────────────────
async function openChat(){
  if(!curWorker) return;
  try{
    const r = await fetch(SERVER+'/api/worker-chats', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ worker_id: curWorker.id, requester_anon_id: getAnon() })
    });
    const d = await r.json();
    if(!d.success){ toast('오류: '+(d.error||'서버 오류')); return; }
    curChatId = d.data.id;
    lastMsgTime = null;
    chatMsgs = [];
    chFailCount = 0;
  }catch(e){ toast('연결 오류: '+e.message); return; }

  // UI 셋업
  const avEl = document.getElementById('ch-av');
  if(curWorker.photo_url){
    avEl.innerHTML = `<img loading="lazy" src="${esc(curWorker.photo_url)}" alt="">`;
    avEl.style.background = 'transparent';
  } else {
    avEl.innerHTML = '👤';
    avEl.style.background = '';
  }
  document.getElementById('ch-name').textContent = curWorker.nickname;
  document.getElementById('ch-sub').textContent = fmtRate(curWorker.daily_rate)+' · '+(curWorker.regions||[]).slice(0,2).join(', ');
  document.getElementById('ch-ov').classList.add('on');
  document.getElementById('ch-conn').classList.remove('show');
  document.getElementById('ch-msgs').innerHTML = '<div class="ch-empty">불러오는 중...</div>';
  document.getElementById('ch-inp').value = '';

  await loadMsgs(true);
  markRead();
  startPoll();
  setTimeout(()=>document.getElementById('ch-inp').focus(), 300);
}

// ── 메시지 가져오기 (?after= 증분 작동) ──────────────────────
async function loadMsgs(reset=false){
  if(!curChatId) return;
  const myAnon = getAnon();
  let url = SERVER+'/api/worker-chats/'+curChatId+'/messages?anon_id='+encodeURIComponent(myAnon);
  if(lastMsgTime && !reset) url += '&after='+encodeURIComponent(lastMsgTime);

  try{
    const r = await fetch(url);
    const d = await r.json();
    if(!d.success){ chFailCount++; updateConnUI(); return; }
    chFailCount = 0; updateConnUI();

    const msgs = d.data || [];
    if(reset){
      chatMsgs = msgs.slice();  // 전체 교체
    } else if(msgs.length){
      // 증분: 낙관적 메시지(temp_id)는 서버 응답으로 교체
      msgs.forEach(srv => {
        const tempIdx = chatMsgs.findIndex(m =>
          m._optimistic && m.sender_anon_id === srv.sender_anon_id && m.content === srv.content
        );
        if(tempIdx >= 0) chatMsgs[tempIdx] = srv;
        else chatMsgs.push(srv);
      });
    }

    if(msgs.length){
      lastMsgTime = msgs[msgs.length-1].created_at;
      // 받은 메시지 중 상대방이 보낸 게 있으면 read 처리
      const hasIncoming = msgs.some(m => m.sender_anon_id !== myAnon);
      if(hasIncoming) markRead();
    }
    if(msgs.length || reset) renderMsgs();
  }catch(e){
    chFailCount++; updateConnUI();
  }
}

// ── 메시지 렌더링 (시간 그룹핑 + 날짜 구분선 + 읽음 표시) ─────
function renderMsgs(){
  const c = document.getElementById('ch-msgs');
  if(!c) return;
  if(!chatMsgs.length){
    c.innerHTML = '<div class="ch-empty">채팅을 시작해보세요 👋</div>';
    return;
  }
  const myAnon = getAnon();
  let html = '';
  let prevDay = '', prevMin = '', prevSender = '';

  // 정렬 (created_at 오름차순)
  chatMsgs.sort((a,b) => (a.created_at||a._tempTime||'').localeCompare(b.created_at||b._tempTime||''));

  chatMsgs.forEach((m, i) => {
    const t = new Date(m.created_at || m._tempTime || Date.now());
    const dayKey = t.getFullYear()+'-'+(t.getMonth()+1)+'-'+t.getDate();
    const minKey = dayKey+'-'+t.getHours()+'-'+t.getMinutes();
    const isMe = m.sender_anon_id === myAnon;

    // 날짜 구분선
    if(dayKey !== prevDay){
      html += `<div class="msg-day-divider">${fmtDayLabel(t)}</div>`;
      prevDay = dayKey;
      prevMin = ''; // 날짜 바뀌면 시간도 다시 표시
    }

    // 시간 그룹핑 — 같은 분의 같은 발신자 마지막 메시지에만 시간 표시
    const next = chatMsgs[i+1];
    const nextSameMin = next &&
      (new Date(next.created_at || next._tempTime || 0).getHours() === t.getHours()) &&
      (new Date(next.created_at || next._tempTime || 0).getMinutes() === t.getMinutes()) &&
      (next.sender_anon_id === m.sender_anon_id);
    const showTime = !nextSameMin;

    // 시간 + 상태
    const ts = t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
    let stateHtml = '';
    if(isMe && showTime){
      if(m._failed){
        stateHtml = `<div class="msg-state failed" onclick="retrySend('${esc(m._tempId||'')}')">전송 실패 · 다시 보내기</div>`;
      } else if(m._optimistic){
        stateHtml = `<div class="msg-state sending">전송 중...</div>`;
      } else if(m.read_at){
        stateHtml = `<div class="msg-state read">읽음</div>`;
      }
    }

    const meta = showTime ? `<div class="msg-meta"><div class="msg-time">${ts}</div>${stateHtml}</div>` : '';
    html += `<div class="msg-row${isMe?' me':''}${showTime?' has-time':''}"><div class="msg-bubble">${esc(m.content)}</div>${meta}</div>`;

    prevMin = minKey;
    prevSender = m.sender_anon_id;
  });

  c.innerHTML = html;
  c.scrollTop = c.scrollHeight;
}

// 날짜 라벨 ("오늘"/"어제"/"5월 3일 (월)")
function fmtDayLabel(d){
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diffDays = Math.round((today - target) / 86400000);
  if(diffDays === 0) return '오늘';
  if(diffDays === 1) return '어제';
  const dn = ['일','월','화','수','목','금','토'][d.getDay()];
  if(d.getFullYear() === now.getFullYear()){
    return `${d.getMonth()+1}월 ${d.getDate()}일 (${dn})`;
  }
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}

// ── 메시지 전송 (낙관적 업데이트 + 중복 방지 + 재시도) ────────
async function sendMsg(){
  const inp = document.getElementById('ch-inp');
  const content = (inp.value||'').trim();
  if(!content || !curChatId) return;

  inp.value = ''; inp.style.height = 'auto';
  const btn = document.getElementById('ch-send-btn');
  btn.disabled = true;

  // 낙관적 업데이트: 즉시 화면에 표시
  const tempId = 't_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  const myAnon = getAnon();
  const optimistic = {
    _optimistic: true, _tempId: tempId, _tempTime: new Date().toISOString(),
    sender_anon_id: myAnon, content, created_at: null, read_at: null
  };
  chatMsgs.push(optimistic);
  renderMsgs();

  try{
    const r = await fetch(SERVER+'/api/worker-chats/'+curChatId+'/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ anon_id: myAnon, content })
    });
    const d = await r.json();
    if(!d.success) throw new Error(d.error||'서버 오류');

    // 임시 메시지 → 서버 응답으로 교체
    const idx = chatMsgs.findIndex(m => m._tempId === tempId);
    if(idx >= 0) chatMsgs[idx] = d.data;
    if(d.data && d.data.created_at && d.data.created_at > (lastMsgTime||'')){
      lastMsgTime = d.data.created_at;
    }
    renderMsgs();
    chFailCount = 0; updateConnUI();
  }catch(e){
    // 실패 표시 (사용자가 다시 보내기 가능)
    const idx = chatMsgs.findIndex(m => m._tempId === tempId);
    if(idx >= 0){ chatMsgs[idx]._failed = true; chatMsgs[idx]._optimistic = false; }
    renderMsgs();
    chFailCount++; updateConnUI();
    toast('전송 실패: '+e.message);
  } finally {
    btn.disabled = false;
  }
}

// ── 전송 실패 메시지 재시도 ─────────────────────────────────
async function retrySend(tempId){
  const idx = chatMsgs.findIndex(m => m._tempId === tempId);
  if(idx < 0) return;
  const msg = chatMsgs[idx];
  msg._failed = false; msg._optimistic = true;
  renderMsgs();

  try{
    const r = await fetch(SERVER+'/api/worker-chats/'+curChatId+'/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ anon_id: getAnon(), content: msg.content })
    });
    const d = await r.json();
    if(!d.success) throw new Error(d.error||'서버 오류');
    chatMsgs[idx] = d.data;
    if(d.data.created_at > (lastMsgTime||'')) lastMsgTime = d.data.created_at;
    renderMsgs();
    chFailCount = 0; updateConnUI();
  }catch(e){
    chatMsgs[idx]._failed = true; chatMsgs[idx]._optimistic = false;
    renderMsgs();
    chFailCount++; updateConnUI();
    toast('재전송 실패: '+e.message);
  }
}

// ── 읽음 처리 (debounce 2초) ─────────────────────────────
async function markRead(){
  if(!curChatId) return;
  const now = Date.now();
  if(now - lastReadAt < 2000) return; // 2초 안에 중복 호출 방지
  lastReadAt = now;
  try{
    await fetch(SERVER+'/api/worker-chats/'+curChatId+'/read', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ anon_id: getAnon() })
    });
  }catch(e){ /* read 실패는 무시 */ }
}

// ── 연결 상태 UI 표시 ───────────────────────────────────
function updateConnUI(){
  const el = document.getElementById('ch-conn');
  if(!el) return;
  el.classList.toggle('show', chFailCount >= 2);
}

// ── Polling (1.5초, Visibility API로 백그라운드 자동 중단) ──
function startPoll(){
  stopPoll();
  pollTimer = setInterval(() => {
    if(document.hidden) return; // 페이지 background면 스킵 (배터리·트래픽 절약)
    loadMsgs(false);
  }, 1500);
}
function stopPoll(){ clearInterval(pollTimer); pollTimer = null; }

// 페이지 visibility 변화 감지 — foreground 복귀 시 즉시 1회 + 폴링 재개
document.addEventListener('visibilitychange', () => {
  if(!curChatId) return;
  if(!document.hidden){
    loadMsgs(false);
    markRead();
  }
});

function closeChat(){
  stopPoll();
  document.getElementById('ch-ov').classList.remove('on');
  curChatId = null;
  chatMsgs = [];
  chFailCount = 0;
}

// ── 초기화 (병렬 로딩) ───────────────────────────────────────
renderFilters();
renderJobFilters();
Promise.all([ loadWorkers(), loadJobs() ]).catch(()=>{});
// URL 파라미터 탭 전환
(()=>{ const p=new URLSearchParams(location.search); const t=p.get('tab'); if(t&&['find','job','my'].includes(t)) switchTab(t); })();
</script>

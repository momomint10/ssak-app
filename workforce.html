<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>싹싹 — 인력매칭</title>
<meta name="theme-color" content="#FF385C">
<link rel="stylesheet" href="design.css">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --pr:#FF385C;--pr-d:#4F46E5;--pr-l:#EEF2FF;
  --green:#10B981;--orange:#F97316;--red:#EF4444;
  --g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;
  --g400:#94A3B8;--g500:#64748B;--g700:#334155;--g900:#0F172A;
  --radius:14px;--shadow:0 1px 8px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:"Pretendard Variable",Pretendard,-apple-system,sans-serif;background:var(--g50);color:var(--g900);}
.shell{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:90px;}
/* ── 헤더 ── */
.hd{
  background:linear-gradient(160deg,#FFF8F5 0%,#FFFFFF 60%);
  padding:12px 16px 0;border-bottom:0.5px solid #f5e8e4;
  position:sticky;top:0;z-index:50;
  position:relative;
}
.hd::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:3px;background:linear-gradient(90deg,#FF385C 0%,#FC8181 100%);
}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.hd-title{font-size:18px;font-weight:900;}
.btn-hd{background:#FF385C;color:#fff;border:none;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.tabs{display:flex;}
.tab-row{display:flex;gap:6px;padding:10px 16px;background:linear-gradient(160deg,#FFF8F5 0%,#FFFFFF 60%);border-bottom:0.5px solid #f5e8e4;overflow-x:auto;}
.tab{flex-shrink:0;padding:7px 16px;font-size:12px;font-weight:600;color:#767676;cursor:pointer;border:none;background:#f3f3f3;border-radius:20px;font-family:inherit;white-space:nowrap;}
.tab.on{color:#fff;background:#FF385C;}
/* ── 필터 ── */
.filter-bar{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.fbtn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1.5px solid var(--g200);background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--g500);}
.fbtn.on{background:var(--pr);border-color:#FF385C;color:#fff;}
/* ── 인력 카드 ── */
.list{padding:4px 12px 0;}
.wcard{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;padding:14px;display:flex;gap:12px;cursor:pointer;transition:transform .1s;}
.wcard:active{transform:scale(.98);}
.avatar{width:50px;height:50px;border-radius:50%;background:var(--pr-l);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.wcard-body{flex:1;min-width:0;}
.wcard-top{display:flex;align-items:flex-start;justify-content:space-between;}
.wcard-name{font-size:15px;font-weight:800;}
.wcard-rate{font-size:13px;font-weight:700;color:#FF385C;}
.wcard-meta{font-size:12px;color:var(--g500);margin:3px 0;}
.skill-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.skill-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:12px;background:var(--pr-l);color:var(--pr-d);}
.day-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.day-tag{font-size:10px;padding:2px 6px;border-radius:6px;background:var(--g100);color:var(--g700);font-weight:600;}
.time-tag{background:#EEF2FF;color:#4F46E5;}
.act-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:4px;vertical-align:middle;}
/* ── 채용 카드 ── */
.jcard{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;padding:14px;cursor:pointer;transition:transform .1s;}
.jcard:active{transform:scale(.98);}
.jcard-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.jcard-title{font-size:15px;font-weight:800;flex:1;padding-right:8px;line-height:1.3;}
.jcard-rate{font-size:14px;font-weight:900;color:#FF385C;flex-shrink:0;}
.jcard-meta{font-size:12px;color:var(--g500);margin-bottom:6px;}
.jcard-meta span{font-weight:700;color:var(--g700);}
.jcard-skills{display:flex;flex-wrap:wrap;gap:4px;}
.jcard-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--g100);}
.jcard-count{font-size:11px;color:var(--g400);}
.badge-open{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;background:#DCFCE7;color:#16A34A;}
.badge-closed{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;background:var(--g100);color:var(--g400);}
.badge-matched{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;background:#FEF3C7;color:#D97706;}
/* ── 빈/로딩 ── */
.empty{text-align:center;padding:60px 20px;}
.empty-ico{font-size:44px;margin-bottom:10px;}
.empty-ttl{font-size:15px;font-weight:700;color:var(--g700);margin-bottom:4px;}
.empty-sub{font-size:13px;color:var(--g400);}
.sp{width:24px;height:24px;border:2.5px solid var(--g200);border-top-color:#FF385C;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── MY 프로필 ── */
.my-section{padding:16px 12px;}
.my-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:10px;}
.my-profile-head{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.my-avatar{width:60px;height:60px;border-radius:50%;background:var(--pr-l);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;}
.my-avatar img{width:100%;height:100%;object-fit:cover;}
.my-name{font-size:17px;font-weight:900;}
.my-status{font-size:12px;color:var(--g400);margin-top:2px;}
.my-stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0;}
.my-stat{text-align:center;background:var(--g50);border-radius:12px;padding:10px 6px;}
.my-stat-val{font-size:16px;font-weight:900;color:#FF385C;}
.my-stat-lbl{font-size:10px;color:var(--g400);margin-top:2px;}
.section-title{font-size:13px;font-weight:700;color:var(--g500);margin-bottom:8px;}
.btn-full{width:100%;padding:12px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border:none;margin-bottom:8px;}
.btn-pr{background:#FF385C;color:#fff;}
.btn-pr:active{opacity:.8;}
.btn-outline{background:#fff;border:1.5px solid var(--pr) !important;color:#FF385C;}
.btn-gray{background:var(--g100);color:var(--g500);}
.btn-danger{background:#FEE2E2;color:var(--red);}
/* ── 공통 시트 ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;}
.ov.on{display:block;}
.sh{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;z-index:201;max-height:90vh;display:flex;flex-direction:column;}
.sh-drag{width:32px;height:3px;background:var(--g200);border-radius:2px;margin:10px auto;}
.sh-bar{padding:4px 16px 12px;border-bottom:1px solid var(--g100);display:flex;align-items:center;}
.sh-title{font-size:16px;font-weight:900;}
.sh-close{margin-left:auto;background:none;border:none;font-size:22px;color:var(--g300);cursor:pointer;line-height:1;}
.sh-body{overflow-y:auto;padding:16px;}
/* ── 인력 상세 ── */
.det-avatar-wrap{display:flex;justify-content:center;margin-bottom:14px;}
.det-avatar{width:72px;height:72px;border-radius:50%;background:var(--pr-l);display:flex;align-items:center;justify-content:center;font-size:34px;overflow:hidden;}
.det-name{text-align:center;font-size:20px;font-weight:900;margin-bottom:4px;}
.det-rate{text-align:center;font-size:17px;font-weight:700;color:#FF385C;margin-bottom:14px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.info-cell{background:var(--g50);border-radius:12px;padding:12px;}
.info-lbl{font-size:10px;font-weight:700;color:var(--g400);margin-bottom:4px;}
.info-val{font-size:13px;font-weight:700;}
.det-bio{font-size:13px;color:var(--g700);line-height:1.7;background:var(--g50);border-radius:12px;padding:12px;margin-bottom:14px;white-space:pre-wrap;}
.sh-foot{padding:12px 16px;border-top:1px solid var(--g100);}
.btn-chat{width:100%;padding:13px;background:#FF385C;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
/* ── 채용 상세 ── */
.job-detail-head{background:var(--pr-l);border-radius:14px;padding:16px;margin-bottom:14px;}
.job-detail-title{font-size:18px;font-weight:900;margin-bottom:6px;}
.job-detail-rate{font-size:20px;font-weight:900;color:var(--pr-d);margin-bottom:8px;}
.job-meta-row{display:flex;gap:6px;flex-wrap:wrap;}
.job-meta-chip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:#fff;color:var(--g700);}
.job-desc{font-size:13px;color:var(--g700);line-height:1.7;background:var(--g50);border-radius:12px;padding:12px;margin-bottom:14px;white-space:pre-wrap;}
.applicant-item{background:#fff;border-radius:12px;border:1px solid var(--g200);padding:12px;margin-bottom:8px;}
.applicant-name{font-size:14px;font-weight:800;margin-bottom:4px;}
.applicant-contact{font-size:12px;color:var(--g500);}
.applicant-msg{font-size:12px;color:var(--g700);margin-top:4px;line-height:1.5;}
.applicant-foot{display:flex;justify-content:flex-end;margin-top:8px;}
.btn-match{padding:7px 16px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-match:disabled{background:var(--g300);cursor:not-allowed;}
/* ── 채팅 시트 ── */
.ch-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;}
.ch-ov.on{display:block;}
.ch-sh{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;z-index:401;height:88vh;display:flex;flex-direction:column;}
.ch-drag{width:32px;height:3px;background:var(--g200);border-radius:2px;margin:10px auto;}
.ch-head{padding:4px 16px 12px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:10px;}
.ch-av{width:36px;height:36px;border-radius:50%;background:var(--pr-l);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden;}
.ch-av img{width:100%;height:100%;object-fit:cover;}
.ch-info{flex:1;}
.ch-info-name{font-size:13px;font-weight:800;}
.ch-info-sub{font-size:11px;color:var(--g400);}
.ch-badge{font-size:10px;background:var(--pr-l);color:var(--pr-d);border-radius:20px;padding:2px 8px;font-weight:700;}
.ch-close{background:none;border:none;font-size:22px;color:var(--g300);cursor:pointer;}
.ch-notice{background:var(--pr-l);border-radius:8px;padding:8px 12px;margin:8px 12px 0;font-size:11px;color:var(--pr-d);line-height:1.5;}
.ch-msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.ch-empty{text-align:center;padding:40px 20px;color:var(--g400);font-size:13px;}
.msg-row{display:flex;align-items:flex-end;gap:6px;}
.msg-row.me{flex-direction:row-reverse;}
.msg-bubble{max-width:72%;padding:9px 12px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;}
.msg-row.me .msg-bubble{background:#FF385C;color:#fff;border-bottom-right-radius:4px;}
.msg-row:not(.me) .msg-bubble{background:var(--g100);color:var(--g900);border-bottom-left-radius:4px;}
.msg-time{font-size:10px;color:var(--g300);flex-shrink:0;margin-bottom:2px;}
.ch-bar{padding:8px 12px;padding-bottom:max(8px,env(safe-area-inset-bottom));border-top:1px solid var(--g200);display:flex;align-items:flex-end;gap:8px;background:#fff;}
.ch-inp{flex:1;border:1.5px solid var(--g200);border-radius:18px;padding:9px 13px;font-size:14px;font-family:inherit;resize:none;max-height:80px;outline:none;background:#fafafa;}
.ch-inp:focus{border-color:#FF385C;background:#fff;}
.ch-send{background:#FF385C;color:#fff;border:none;border-radius:50%;width:36px;height:36px;flex-shrink:0;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.ch-send:disabled{background:var(--g300);}
/* ── 폼 시트 ── */
.fo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;}
.fo.on{display:block;}
.fs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;z-index:301;max-height:93vh;display:flex;flex-direction:column;}
.fs-drag{width:32px;height:3px;background:var(--g200);border-radius:2px;margin:10px auto;}
.fs-bar{padding:4px 16px 12px;border-bottom:1px solid var(--g100);display:flex;align-items:center;}
.fs-title{font-size:16px;font-weight:900;}
.fs-cancel{margin-left:auto;background:none;border:none;font-size:14px;color:var(--g400);cursor:pointer;font-family:inherit;}
.fs-body{overflow-y:auto;padding:16px;}
.f-sec{margin-bottom:14px;}
.f-lbl{font-size:11.5px;font-weight:700;color:var(--g500);margin-bottom:5px;display:block;}
.f-inp{width:100%;padding:11px 12px;border:1.5px solid var(--g200);border-radius:9px;font-size:14px;font-family:inherit;outline:none;background:var(--g50);}
.f-inp:focus{border-color:#FF385C;background:#fff;}
.f-inp::placeholder{color:var(--g300);}
textarea.f-inp{resize:none;min-height:72px;line-height:1.6;}
.f-pw{position:relative;}
.f-pw .f-inp{padding-right:28px;}
.f-pu{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--g400);pointer-events:none;}
.chip-grid{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--g200);background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--g500);}
.chip.on{background:var(--pr);border-color:#FF385C;color:#fff;}
.fs-foot{padding:10px 16px;border-top:1px solid var(--g100);}
/* ── 매칭 완료 카드 ── */
.match-card{background:linear-gradient(135deg,#FF385C,#FF6B8A);border-radius:14px;padding:16px;margin-bottom:12px;color:#fff;}
.match-title{font-size:14px;font-weight:900;margin-bottom:8px;}
.match-info{font-size:12px;line-height:1.8;background:rgba(255,255,255,.15);border-radius:8px;padding:10px;}
/* ── 네비 ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,.96);border-top:1px solid var(--g200);backdrop-filter:blur(20px);display:flex;padding:8px 0 env(safe-area-inset-bottom,8px);z-index:100;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;background:none;border:none;font-family:inherit;font-size:10px;font-weight:500;color:var(--g400);cursor:pointer;}
.ni.on{color:#FF385C;font-weight:700;}
.ni-ico{font-size:20px;line-height:1;}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.92);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:85vw;}

    @keyframes skeleton-shimmer {
      0%{background-position:-400px 0}
      100%{background-position:400px 0}
    }
    [style*="skeleton-shimmer"] > div { background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:800px 100%;animation:skeleton-shimmer 1.4s infinite linear; }
  </style>
<script src="utils.js"></script>
</head>
<body>
<div class="shell">
  <div class="hd">
    <div class="hd-top">
      <div class="hd-title">👥 인력 매칭</div>
      <button class="btn-hd" id="hd-btn" onclick="onHdBtn()">👤 프로필 등록</button>
    </div>
    <div class="tab-row">
      <button class="tab on" id="tab-find" onclick="switchTab('find')">🔍 인력 찾기</button>
      <button class="tab" id="tab-job"  onclick="switchTab('job')">💼 채용정보</button>
      <button class="tab" id="tab-my"   onclick="switchTab('my')">📋 내 현황</button>
    </div>
  </div>

  <!-- 인력 찾기 -->
  <div id="sec-find">
    <div class="filter-bar" id="region-filter"></div>
    <div class="list" id="worker-list"></div>
  </div>

  <!-- 채용정보 -->
  <div id="sec-job" style="display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px 0;">
      <div class="filter-bar" id="job-region-filter" style="padding:0;flex:1;overflow-x:auto;"></div>
      <button class="btn-register" onclick="openJobForm()" style="flex-shrink:0;margin-left:8px;">➕ 공고 등록</button>
    </div>
    <div class="list" id="job-list"></div>
  </div>

  <!-- 내 프로필 -->
  <div id="sec-my" style="display:none;">
    <div class="my-section" id="my-profile-area">
      <div style="text-align:center;padding:40px 0;"><div class="sp"></div></div>
    </div>
  </div>
</div>

<!-- 인력 상세 시트 -->
<div class="ov" id="det-ov" onclick="if(event.target===this)closeDet()">
  <div class="sh">
    <div class="sh-drag"></div>
    <div class="sh-body">
      <div class="det-avatar-wrap"><div class="det-avatar" id="det-emoji">👤</div></div>
      <div class="det-name" id="det-name"></div>
      <div class="det-rate" id="det-rate"></div>
      <div class="info-grid">
        <div class="info-cell"><div class="info-lbl">📍 활동 지역</div><div class="info-val" id="det-region"></div></div>
        <div class="info-cell"><div class="info-lbl">🏆 경력</div><div class="info-val" id="det-exp"></div></div>
        <div class="info-cell"><div class="info-lbl">📅 가능 요일</div><div class="info-val" id="det-days"></div></div>
        <div class="info-cell"><div class="info-lbl">🕐 가능 시간</div><div class="info-val" id="det-times"></div></div>
        <div class="info-cell" style="grid-column:1/-1;"><div class="info-lbl">🛠 보유 기술</div><div class="info-val" id="det-skills"></div></div>
      </div>
      <div style="font-size:11px;font-weight:700;color:var(--g500);margin-bottom:6px;">자기소개</div>
      <div class="det-bio" id="det-bio"></div>
    </div>
    <div class="sh-foot">
      <button class="btn-chat" id="det-chat-btn" onclick="openChat()">💬 안심채팅으로 연락하기</button>
    </div>
  </div>
</div>

<!-- 채용 상세 시트 -->
<div class="ov" id="job-det-ov" onclick="if(event.target===this)closeJobDet()">
  <div class="sh">
    <div class="sh-drag"></div>
    <div class="sh-bar">
      <div class="sh-title" id="job-det-title">공고 상세</div>
      <button class="sh-close" onclick="closeJobDet()">×</button>
    </div>
    <div class="sh-body" id="job-det-body" style="padding-top:0;"></div>
    <div class="sh-foot" id="job-det-foot"></div>
  </div>
</div>

<!-- 채팅 시트 -->
<div class="ch-ov" id="ch-ov" onclick="if(event.target===this)closeChat()">
  <div class="ch-sh">
    <div class="ch-drag"></div>
    <div class="ch-head">
      <div class="ch-av" id="ch-av">👤</div>
      <div class="ch-info"><div class="ch-info-name" id="ch-name"></div><div class="ch-info-sub" id="ch-sub"></div></div>
      <span class="ch-badge">🔒 안심채팅</span>
      <button class="ch-close" onclick="closeChat()">×</button>
    </div>
    <div class="ch-notice">🛡️ 전화번호 없이 익명으로 안전하게 대화하세요.</div>

<script>

// ── UI 헬퍼 ───────────────────────────────────────────────────
const statusBadge = (status, openTxt='모집중', closeTxt='마감') =>
  `<span style="font-size:11px;padding:2px 8px;border-radius:12px;background:${status==='open'?'#DCFCE7':'#F3F4F6'};color:${status==='open'?'#16A34A':'#6B7280'};">${status==='open'?openTxt:closeTxt}</span>`;

const matchBadge = (isMatch, isMine) =>
  (isMatch && !isMine ? '<span style="font-size:10px;background:#EEF2FF;color:#FF385C;padding:2px 7px;border-radius:12px;font-weight:700;">✨ 매칭</span>' : '') +
  (isMine ? '<span style="font-size:10px;background:#FEF3C7;color:#D97706;padding:2px 7px;border-radius:12px;font-weight:700;">내 공고</span>' : '');

const skillChips = (skills) =>
  skills && skills.length
    ? `<div class="skill-tags">${skills.map(sk=>`<span class="skill-tag">${esc(sk)}</span>`).join('')}</div>`
    : '';

const infoCell = (icon, label, val) =>
  `<div class="info-cell"><div class="info-cell-lbl">${icon} ${label}</div><div class="info-cell-val">${val}</div></div>`;

// ── 유틸 ─────────────────────────────────────────────────────
function fmtRate(n){ return n?Number(n).toLocaleString()+'원/일':'협의'; }
function fmtDate(s){ if(!s)return'-'; const d=new Date(s); return`${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`; }
// ── 상태 ─────────────────────────────────────────────────────
let curTab='find', curRegion='전체', curJobRegion='전체';
let curWorker=null, curJob=null, curApplyJobId=null;
let curChatId=null, pollTimer=null, lastMsgTime=null;
let myProfile=null;
let selRegions=[],selSkills=[],selDays=[],selTimes=[],selJobRegion='서울',selJobSkills=[];
let picBase64=null,picMime=null;

// ── 헤더 버튼 ────────────────────────────────────────────────
function onHdBtn(){
  if(curTab==='find'||curTab==='my') openProfileForm(false);
  else openJobForm();
}
function updateHdBtn(){
  const btn=document.getElementById('hd-btn');
  if(curTab==='job'){btn.textContent='📋 공고 등록';}
  else{btn.textContent='👤 프로필 등록';}
}

// ── 탭 전환 ──────────────────────────────────────────────────
function switchTab(tab){
  curTab=tab;
  ['find','job','my'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('on',t===tab);
    document.getElementById('sec-'+t).style.display=t===tab?'':'none';
  });
  updateHdBtn();
  if(tab==='my') loadMyProfile();
  if(tab==='job'){ renderJobFilters(); loadJobs(); }
}

// ── 필터 ─────────────────────────────────────────────────────
function renderFilters(){
  document.getElementById('region-filter').innerHTML=REGIONS.map(r=>`<button class="fbtn${r===curRegion?' on':''}" onclick="setRegion('${r}')">${r}</button>`).join('');
  document.getElementById('job-region-filter').innerHTML=REGIONS.map(r=>`<button class="fbtn${r===curJobRegion?' on':''}" onclick="setJobRegion('${r}')">${r}</button>`).join('');
}
function setRegion(r){curRegion=r;renderFilters();loadWorkers();}
function renderJobFilters(){
  const rb=document.getElementById('job-region-filter');
  if(!rb) return;
  rb.innerHTML=REGIONS.map(r=>`<button class="fbtn${r===curJobRegion?' on':''}" onclick="setJobRegion('${r}')">${r}</button>`).join('');
}
function setJobRegion(r){curJobRegion=r;renderJobFilters();loadJobs();}

// ── 인력 목록 ────────────────────────────────────────────────
async function loadWorkers(){
  const list=document.getElementById('worker-list');
  list.innerHTML = Array(4).fill(`
    <div style="background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #f0f0f0;animation:skeleton-shimmer 1.4s infinite;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:52px;height:52px;border-radius:50%;background:#f0f0f0;flex-shrink:0;"></div>
        <div style="flex:1;">
          <div style="height:14px;background:#f0f0f0;border-radius:4px;margin-bottom:8px;width:60%;"></div>
          <div style="height:11px;background:#f0f0f0;border-radius:4px;width:80%;"></div>
        </div>
      </div>
    </div>`).join('');
  try{
    let url=SERVER+'/api/workers?';
    if(curRegion!=='전체') url+='region='+encodeURIComponent(curRegion)+'&';
    const d=await fetch(url).then(r=>r.json());
    if(!d.data.length){
      list.innerHTML='<div class="empty"><div class="empty-ico">👥</div><div class="empty-ttl">등록된 인력이 없어요</div><div class="empty-sub">내 프로필을 먼저 등록해보세요!</div></div>';
      return;
    }
    list.innerHTML=d.data.map(w=>`
      <div class="wcard" onclick="openDet('${w.id}')">
        <div class="avatar">${w.photo_url?`<img loading="lazy" src="${esc(w.photo_url)}" alt="">`:' <span style="font-size:22px;">👤</span>'}</div>
        <div class="wcard-body">
          <div class="wcard-top">
            <span class="wcard-name"><span class="act-dot"></span>${esc(w.nickname)}</span>
            <span class="wcard-rate">${fmtRate(w.daily_rate)}</span>
          </div>
          <div class="wcard-meta">📍 ${(w.regions||[]).slice(0,2).join(', ')} · 경력 ${w.experience||0}년</div>
          <div class="skill-tags">${(w.skills||[]).map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('')}</div>
          <div class="day-tags">${(w.available_days||[]).map(d=>`<span class="day-tag">${esc(d)}</span>`).join('')}${(w.available_times||[]).map(t=>`<span class="day-tag time-tag">${esc(t)}</span>`).join('')}</div>
        </div>
      </div>`).join('');
  }catch(e){list.innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-ttl">오류 발생</div><div class="empty-sub">${esc(e.message)}</div></div>`;}
}

// ── 채용공고 목록 ─────────────────────────────────────────────
async function loadJobs(){
  const list=document.getElementById('job-list');
  list.innerHTML = Array(4).fill(`
    <div style="background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #f0f0f0;animation:skeleton-shimmer 1.4s infinite;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:52px;height:52px;border-radius:50%;background:#f0f0f0;flex-shrink:0;"></div>
        <div style="flex:1;">
          <div style="height:14px;background:#f0f0f0;border-radius:4px;margin-bottom:8px;width:60%;"></div>
          <div style="height:11px;background:#f0f0f0;border-radius:4px;width:80%;"></div>
        </div>
      </div>
    </div>`).join('');
  try{
    let url=SERVER+'/api/jobs?status=open';
    if(curJobRegion&&curJobRegion!=='전체') url+='&region='+encodeURIComponent(curJobRegion);
    const d=await fetch(url).then(r=>r.json());
    if(!d.data||!d.data.length){
      list.innerHTML='<div class="empty"><div class="empty-ico">💼</div><div class="empty-ttl">등록된 채용공고가 없어요</div><div class="empty-sub">첫 공고를 등록해보세요!</div></div>';
      return;
    }
    // 내 프로필 기준 자동매칭 표시
    const myAnon=getAnon();
    list.innerHTML=d.data.map(j=>{
      const isMine=j.anon_id===myAnon;
      const isMatch=myProfile&&
        (j.region==='전체'||(myProfile.regions||[]).includes(j.region))&&
        (!j.skills||!j.skills.length||(j.skills||[]).some(sk=>(myProfile.skills||[]).includes(sk)));
      return `<div class="jcard" onclick="openJobDet('${j.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
          <div class="jcard-title">${esc(j.title)}</div>
          <div style="display:flex;gap:4px;flex-shrink:0;margin-left:6px;">${matchBadge(isMatch,isMine)}</div>
        </div>
        <div class="jcard-meta">
          📍 ${esc(j.region)} · 📅 ${j.work_date||'날짜 미정'} · 👥 ${j.headcount||1}명
        </div>
        <div class="jcard-meta">${j.daily_rate?'💰 '+Number(j.daily_rate).toLocaleString()+'원/일':'💰 협의'}</div>
        ${skillChips(j.skills)}
      </div>`;
    }).join('');
  }catch(e){
    list.innerHTML='<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-ttl">오류 발생</div></div>';
  }
}

// ── 인력 상세 ────────────────────────────────────────────────
async function openDet(id){
  curWorker=null;
  document.getElementById('det-ov').classList.add('on');
  document.getElementById('det-name').textContent='불러오는 중...';
  try{
    const d=await fetch(SERVER+'/api/workers/'+id).then(r=>r.json());
    if(!d.success) throw new Error(d.error);
    const w=curWorker=d.data;
    const isMine=w.anon_id===getAnon();
    const detAv=document.getElementById('det-emoji');
    if(w.photo_url){detAv.innerHTML=`<img loading="lazy" src="${esc(w.photo_url)}" alt="" style="width:72px;height:72px;border-radius:50%;object-fit:cover;">`;detAv.style.background='transparent';}
    else{detAv.innerHTML='<span style="font-size:34px;">👤</span>';detAv.style.background='';}
    document.getElementById('det-name').textContent=w.nickname;
    document.getElementById('det-rate').textContent=fmtRate(w.daily_rate);
    document.getElementById('det-region').textContent=(w.regions||[]).join(', ')||'-';
    document.getElementById('det-exp').textContent=(w.experience||0)+'년';
    document.getElementById('det-days').textContent=(w.available_days||[]).join(', ')||'-';
    document.getElementById('det-times').textContent=(w.available_times||[]).join(', ')||'-';
    document.getElementById('det-skills').textContent=(w.skills||[]).join(', ')||'-';
    document.getElementById('det-bio').textContent=w.bio||'(자기소개 없음)';
    const cb=document.getElementById('det-chat-btn');
    if(isMine){cb.textContent='내 프로필입니다';cb.disabled=true;cb.style.opacity='.5';}
    else{cb.textContent='💬 안심채팅으로 연락하기';cb.disabled=false;cb.style.opacity='';}
  }catch(e){document.getElementById('det-name').textContent='오류: '+e.message;}
}
function closeDet(){document.getElementById('det-ov').classList.remove('on');curWorker=null;}

// ── 채용 상세 ────────────────────────────────────────────────
async function openJobDet(id){
  curJob=null;
  document.getElementById('job-det-ov').classList.add('on');
  document.getElementById('job-det-body').innerHTML='<div style="text-align:center;padding:30px;"><div class="sp"></div></div>';
  document.getElementById('job-det-foot').innerHTML='';
  try{
    const d=await fetch(SERVER+'/api/jobs/'+id).then(r=>r.json());
    if(!d.success) throw new Error(d.error);
    const j=curJob=d.data;
    const isMine=j.anon_id===getAnon();
    document.getElementById('job-det-title').textContent='채용공고 상세';

    // 공고 정보
    let bodyHtml=`
      <div style="padding:16px 0 8px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;">
          <div style="font-size:18px;font-weight:900;flex:1;">${esc(j.title)}</div>
          <span style="font-size:12px;padding:3px 10px;border-radius:12px;background:${j.status==='open'?'#DCFCE7':'#F3F4F6'};color:${j.status==='open'?'#16A34A':'#6B7280'};flex-shrink:0;margin-left:8px;">${j.status==='open'?'모집중':'마감'}</span>
        </div>
        <div class="info-grid">
          ${infoCell('📍','지역',esc(j.region))}
          ${infoCell('📅','작업일',j.work_date||'-')}
          ${infoCell('👥','모집 인원',(j.headcount||1)+'명')}
          ${infoCell('💰','일당',j.daily_rate?Number(j.daily_rate).toLocaleString()+'원':'협의')}
        </div>`;
    if(j.skills&&j.skills.length) bodyHtml+=`<div style="margin:10px 0;"><div style="font-size:11px;font-weight:700;color:var(--g400);margin-bottom:5px;">요구 기술</div>${skillChips(j.skills)}</div>`;
    if(j.description){
      bodyHtml+=`<div class="det-bio">${esc(j.description)}</div>`;
    }
    bodyHtml+=`</div>`;

    // 채용자 본인: 지원자 목록
    if(isMine){
      bodyHtml+=`<div style="margin-top:4px;"><div style="font-size:14px;font-weight:800;margin-bottom:10px;">📬 지원자 목록</div>
        <div id="ap-list">`;
      try{
        const ad=await fetch(SERVER+'/api/jobs/'+id+'/applications?anon_id='+encodeURIComponent(getAnon())).then(r=>r.json());
        const apps=ad.data||[];
        if(!apps.length){
          bodyHtml+=`<div style="text-align:center;padding:20px;color:var(--g400);font-size:13px;">아직 지원자가 없어요 🙁</div>`;
        } else {
          bodyHtml+=apps.map(ap=>`
            <div id="ap-${esc(ap.id)}" style="border:1px solid ${ap.status==='matched'?'#A7F3D0':'var(--g200)'};border-radius:12px;padding:12px;margin-bottom:8px;background:${ap.status==='matched'?'#F0FDF4':'#fff'};">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                <div style="font-size:14px;font-weight:700;">${esc(ap.worker_nickname||'지원자')}</div>
                ${ap.status==='matched'?'<span style="font-size:11px;padding:2px 8px;border-radius:12px;background:#DCFCE7;color:#16A34A;">✅ 매칭됨</span>':''}
              </div>

                style="width:100%;margin-top:8px;padding:9px;background:#FF385C;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">

      bodyHtml+=`</div></div>`;

      document.getElementById('job-det-body').innerHTML=bodyHtml;
      document.getElementById('job-det-foot').innerHTML=`
        <button onclick="toggleJobStatus('${j.id}','${j.status}')" style="width:100%;padding:12px;border:1.5px solid var(--g200);border-radius:14px;background:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">
          ${j.status==='open'?'⏹ 공고 마감하기':'▶ 공고 재개하기'}
        </button>`;
    } else {
      // 구직자: 지원하기
      document.getElementById('job-det-body').innerHTML=bodyHtml;

        document.getElementById('job-det-foot').innerHTML=`
          <button disabled style="width:100%;padding:12px;background:var(--g200);color:var(--g400);border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:not-allowed;font-family:inherit;">

          </button>`;

        document.getElementById('job-det-foot').innerHTML=`
          <button onclick="openApplyForm('${j.id}')" class="btn-chat" style="width:100%;padding:13px;font-size:15px;">
            📝 지원하기
          </button>`;
      } else {
        document.getElementById('job-det-foot').innerHTML=`
          <button disabled style="width:100%;padding:12px;background:var(--g200);color:var(--g400);border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:not-allowed;font-family:inherit;">
            마감된 공고입니다
          </button>`;

  }catch(e){
    document.getElementById('job-det-body').innerHTML=`<div style="padding:20px;color:var(--g400);">오류: ${esc(e.message)}</div>`;
  }

function closeJobDet(){document.getElementById('job-det-ov').classList.remove('on');curJob=null;}

async function checkAlreadyApplied(jobId){
  try{
    const d=await fetch(SERVER+'/api/jobs/my/applied?anon_id='+encodeURIComponent(getAnon())).then(r=>r.json());
    return (d.data||[]).some(a=>a.job_id===jobId);
  }catch(e){return false;}
}

async function loadApplicants(jobId){
  const el=document.getElementById('applicant-list');
  if(!el) return;
  try{
    const d=await fetch(`${SERVER}/api/jobs/${jobId}/applications?anon_id=${encodeURIComponent(getAnon())}`).then(r=>r.json());
    if(!d.success||!d.data.length){el.innerHTML='<div style="font-size:13px;color:var(--g400);text-align:center;padding:12px;">아직 지원자가 없습니다</div>';return;}
    el.innerHTML=d.data.map(a=>`
      <div class="applicant-item" id="ap-${a.id}">
        <div class="applicant-name">🙋 ${esc(a.worker_nickname||'구직자')}</div>
        <div class="applicant-contact">📞 ${a.status==='matched'?esc(a.applicant_contact):'연락처는 매칭 후 공개'}</div>
        ${a.message?`<div class="applicant-msg">${esc(a.message)}</div>`:''}
        <div class="applicant-foot">
          ${a.status==='matched'
            ?`<span class="badge-matched">✅ 매칭 완료</span>`
            :`<button class="btn-match" onclick="confirmMatch('${a.id}','${a.worker_nickname||'구직자'}')">✅ 매칭 확정</button>`}
        </div>
      </div>`).join('');
  }catch(e){if(el) el.innerHTML='<div style="color:red;font-size:12px;">'+esc(e.message)+'</div>';}
}

async function toggleJobStatus(jobId,curStatus){
  const newStatus=curStatus==='open'?'closed':'open';
  const d=await fetch(`${SERVER}/api/jobs/${jobId}/status`,{
    method:'PATCH',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({anon_id:getAnon(),status:newStatus})
  }).then(r=>r.json());
  if(d.success){toast(newStatus==='closed'?'공고가 마감됐습니다':'공고를 재오픈했습니다');closeJobDet();loadJobs();}
  else toast('오류: '+d.error);
}

async function confirmMatch(appId,nickname){
  if(!confirm(`${nickname}님과 매칭을 확정할까요?\n매칭 완료 시 서로의 연락처가 공유되고\n스케줄에 자동으로 추가됩니다.`)) return;
  const btn=document.getElementById('ap-'+appId)?.querySelector('.btn-match');
  if(btn){btn.disabled=true;btn.textContent='처리 중...';}
  try{
    const d=await fetch(`${SERVER}/api/jobs/applications/${appId}/match`,{
      method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({anon_id:getAnon()})
    }).then(r=>r.json());
    if(!d.success) throw new Error(d.error);
    // 매칭 완료 정보 표시
    const card=document.getElementById('ap-'+appId);
    if(card) card.innerHTML=`
      <div class="match-card">
        <div class="match-title">🎉 매칭 완료!</div>
        <div class="match-info">
          📞 지원자 연락처: <b>${esc(d.applicant_contact)}</b><br>
          📅 작업 날짜: <b>${fmtDate(d.work_date)}</b><br>
          📅 스케줄에 자동 추가됐습니다
        </div>
      </div>`;
    toast('🎉 매칭 완료! 연락처가 공유됐습니다');
  }catch(e){
    toast('오류: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='✅ 매칭 확정';}
  }
}

function openApplyForm(jobId){

  if(curJob){

      <div style="font-size:12px;color:var(--pr-d);">📍 ${esc(curJob.region)} · 📅 ${fmtDate(curJob.work_date)} · 💰 ${curJob.daily_rate?Number(curJob.daily_rate).toLocaleString()+'원/일':'협의'}</div>`;

async function submitApply(){
  const contact=document.getElementById('a-contact').value.trim();
  const msg=document.getElementById('a-msg').value.trim();
  if(!contact){toast('연락처를 입력해주세요');return;}
  const btn=document.getElementById('apply-btn');btn.disabled=true;btn.textContent='지원 중...';
  try{
    const d=await fetch(`${SERVER}/api/jobs/${curApplyJobId}/apply`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({anon_id:getAnon(),contact,message:msg})
    }).then(r=>r.json());
    if(!d.success) throw new Error(d.error);
    closeApplyForm();closeJobDet();
    toast('🎉 지원 완료! 채용자 확인 후 알림을 드립니다');
    loadJobs();
  }catch(e){toast('오류: '+e.message);}
  finally{btn.disabled=false;btn.textContent='지원하기';}
}

function openJobForm(){
  selJobRegion='서울'; selJobSkills=[];
  document.getElementById('j-title').value='';
  document.getElementById('j-date').value='';
  document.getElementById('j-headcount').value='1';
  document.getElementById('j-rate').value='';
  document.getElementById('j-desc').value='';
  document.getElementById('j-contact').value=myProfile?.contact||'';
  // 지역 칩 (단일 선택)
  document.getElementById('job-region-chips').innerHTML=REGIONS.slice(1).map(r=>`<button class="chip${r===selJobRegion?' on':''}" onclick="pickJobRegion('${r}')">${r}</button>`).join('');
  // 기술 칩
  document.getElementById('job-skill-chips').innerHTML=SKILLS.map(s=>`<button class="chip${selJobSkills.includes(s)?' on':''}" onclick="toggleJobSkill('${s}')">${s}</button>`).join('');
  document.getElementById('job-fo').classList.add('on');
}
function closeJobForm(){document.getElementById('job-fo').classList.remove('on');}
function pickJobRegion(r){
  selJobRegion=r;
  document.getElementById('job-region-chips').querySelectorAll('.chip').forEach(el=>el.classList.toggle('on',el.textContent.trim()===r));
}
function toggleJobSkill(s){
  selJobSkills=selJobSkills.includes(s)?selJobSkills.filter(x=>x!==s):[...selJobSkills,s];
  document.getElementById('job-skill-chips').querySelectorAll('.chip').forEach(el=>el.classList.toggle('on',selJobSkills.includes(el.textContent.trim())));
}

async function saveJob(){
  const title=document.getElementById('j-title').value.trim();
  const date=document.getElementById('j-date').value;
  const headcount=document.getElementById('j-headcount').value;
  const rate=document.getElementById('j-rate').value;
  const desc=document.getElementById('j-desc').value.trim();
  const contact=document.getElementById('j-contact').value.trim();
  if(!title){toast('공고 제목을 입력해주세요');return;}
  if(!selJobRegion){toast('지역을 선택해주세요');return;}
  if(!date){toast('작업 날짜를 선택해주세요');return;}
  const btn=document.getElementById('jf-save-btn');btn.disabled=true;btn.textContent='등록 중...';
  try{
    const d=await fetch(SERVER+'/api/jobs',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({anon_id:getAnon(),title,region:selJobRegion,work_date:date,headcount:Number(headcount)||1,daily_rate:Number(rate)||0,skills:selJobSkills,description:desc,contact})
    }).then(r=>r.json());
    if(!d.success) throw new Error(d.error);

async function toggleStatus(){
  if(!myProfile) return;
  const newStatus=myProfile.status==='active'?'inactive':'active';
  const d=await fetch(SERVER+'/api/workers/'+myProfile.id+'/status',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({anon_id:getAnon(),status:newStatus})}).then(r=>r.json());
  if(d.success){toast(newStatus==='active'?'✅ 구직 활성화됐습니다':'⏸ 구직을 일시 중단했습니다');loadMyProfile();}
  else toast('오류: '+d.error);
}

// ── 프로필 폼 ─────────────────────────────────────────────────
function renderProfileChips(){
  document.getElementById('region-chips').innerHTML=REGIONS.slice(1).map(r=>`<button class="chip${selRegions.includes(r)?' on':''}" onclick="toggleChip('region','${r}')">${r}</button>`).join('');
  document.getElementById('skill-chips').innerHTML=SKILLS.map(s=>`<button class="chip${selSkills.includes(s)?' on':''}" onclick="toggleChip('skill','${s}')">${s}</button>`).join('');
  document.getElementById('day-chips').innerHTML=DAYS.map(d=>`<button class="chip${selDays.includes(d)?' on':''}" onclick="toggleChip('day','${d}')">${d}</button>`).join('');
  document.getElementById('time-chips').innerHTML=TIMES.map(t=>`<button class="chip${selTimes.includes(t)?' on':''}" onclick="toggleChip('time','${t}')">${t}</button>`).join('');
}
function toggleChip(type,val){
  if(type==='region') selRegions=selRegions.includes(val)?selRegions.filter(x=>x!==val):[...selRegions,val];
  if(type==='skill')  selSkills =selSkills.includes(val) ?selSkills.filter(x=>x!==val) :[...selSkills,val];
  if(type==='day')    selDays   =selDays.includes(val)   ?selDays.filter(x=>x!==val)   :[...selDays,val];
  if(type==='time')   selTimes  =selTimes.includes(val)  ?selTimes.filter(x=>x!==val)  :[...selTimes,val];
  renderProfileChips();
}

  if(isEdit&&myProfile){

function closeProfileForm(){document.getElementById('profile-fo').classList.remove('on');}
function onPhotoSelect(inp){const file=inp.files[0];if(!file)return;if(file.size>5*1024*1024){toast('5MB 이하 사진만 가능');return;}picMime=file.type;const r=new FileReader();r.onload=e=>{picBase64=e.target.result.split(',')[1];document.getElementById('f-photo-img').src=e.target.result;document.getElementById('f-photo-preview').style.display='block';};r.readAsDataURL(file);inp.value='';}
function removePhoto(){picBase64=null;picMime=null;document.getElementById('f-photo-preview').style.display='none';document.getElementById('f-photo-img').src='';}

async function saveProfile(){

  const rate=document.getElementById('f-rate').value;
  const bio=document.getElementById('f-bio').value.trim();
  const contact=document.getElementById('f-contact').value.trim();
  if(!nick){toast('닉네임을 입력해주세요');return;}
  if(!selRegions.length){toast('활동 지역을 선택해주세요');return;}
  if(!selSkills.length){toast('보유 기술을 선택해주세요');return;}
  const btn=document.getElementById('pf-save-btn');btn.disabled=true;btn.textContent='저장 중...';
  try{
    const body={anon_id:getAnon(),nickname:nick,regions:selRegions,skills:selSkills,available_days:selDays,available_times:selTimes,experience:Number(exp)||0,daily_rate:Number(rate)||0,bio,contact,avatar_emoji:'👤'};
    if(picBase64){body.photoBase64=picBase64;body.photoMime=picMime||'image/jpeg';}
    const d=await fetch(SERVER+'/api/workers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
    if(!d.success) throw new Error(d.error);
    closeProfileForm();toast('✅ 프로필이 저장됐습니다!');
    loadWorkers();loadMyProfile();
  }catch(e){toast('오류: '+e.message);}
  finally{btn.disabled=false;btn.textContent='저장하기';}
}

// ── 채팅 ─────────────────────────────────────────────────────
async function openChat(){
  if(!curWorker) return;
  const d=await fetch(SERVER+'/api/worker-chats',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({worker_id:curWorker.id,requester_anon_id:getAnon()})}).then(r=>r.json());
  if(!d.success){toast('오류: '+(d.error||'서버 오류'));return;}
  curChatId=d.data.id;lastMsgTime=null;
  const avEl=document.getElementById('ch-av');
  if(curWorker.photo_url){avEl.innerHTML=`<img loading="lazy" src="${esc(curWorker.photo_url)}" alt="">`;avEl.style.background='transparent';}
  else{avEl.innerHTML='👤';avEl.style.background='';}
  document.getElementById('ch-name').textContent=curWorker.nickname;
  document.getElementById('ch-sub').textContent=fmtRate(curWorker.daily_rate)+' · '+(curWorker.regions||[]).slice(0,2).join(', ');
  document.getElementById('ch-ov').classList.add('on');
  document.getElementById('ch-msgs').innerHTML='<div class="ch-empty">불러오는 중...</div>';
  document.getElementById('ch-inp').value='';
  await loadMsgs(true);
  startPoll();
  setTimeout(()=>document.getElementById('ch-inp').focus(),300);
}
async function loadMsgs(reset=false){
  if(!curChatId) return;
  const myAnon=getAnon();
  let url=SERVER+'/api/worker-chats/'+curChatId+'/messages?anon_id='+encodeURIComponent(myAnon);
  if(lastMsgTime&&!reset) url+='&after='+encodeURIComponent(lastMsgTime);
  try{
    const d=await fetch(url).then(r=>r.json());if(!d.success)return;
    const msgs=d.data||[];const c=document.getElementById('ch-msgs');
    if(reset){c.innerHTML=!msgs.length?'<div class="ch-empty">채팅을 시작해보세요 👋</div>':'';}
    msgs.forEach(m=>{
      c.querySelector('.ch-empty')?.remove();
      const isMe=m.sender_anon_id===myAnon;
      const t=new Date(m.created_at);
      const ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
      c.insertAdjacentHTML('beforeend',`<div class="msg-row${isMe?' me':''}"><div class="msg-bubble">${esc(m.content)}</div><div class="msg-time">${ts}</div></div>`);
      lastMsgTime=m.created_at;
    });
    if(msgs.length||reset) c.scrollTop=c.scrollHeight;
  }catch(e){}
}
async function sendMsg(){
  const inp=document.getElementById('ch-inp');const content=inp.value.trim();
  if(!content||!curChatId)return;
  inp.value='';inp.style.height='auto';
  const btn=document.getElementById('ch-send-btn');btn.disabled=true;
  try{
    const d=await fetch(SERVER+'/api/worker-chats/'+curChatId+'/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({anon_id:getAnon(),content})}).then(r=>r.json());
    if(!d.success)throw new Error(d.error);
    const c=document.getElementById('ch-msgs');c.querySelector('.ch-empty')?.remove();
    const msg=d.data;const t=new Date(msg.created_at);
    const ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
    c.insertAdjacentHTML('beforeend',`<div class="msg-row me"><div class="msg-bubble">${esc(content)}</div><div class="msg-time">${ts}</div></div>`);
    c.scrollTop=c.scrollHeight;lastMsgTime=msg.created_at;
  }catch(e){toast('전송 오류: '+e.message);inp.value=content;}
  btn.disabled=false;
}
function startPoll(){stopPoll();pollTimer=setInterval(()=>loadMsgs(false),3000);}
function stopPoll(){clearInterval(pollTimer);pollTimer=null;}
function closeChat(){stopPoll();document.getElementById('ch-ov').classList.remove('on');curChatId=null;}

// ── 초기화 (병렬 로딩) ───────────────────────────────────────
renderFilters();
renderJobFilters();
Promise.all([ loadWorkers(), loadJobs() ]).catch(()=>{});
// URL 파라미터 탭 전환
(()=>{ const p=new URLSearchParams(location.search); const t=p.get('tab'); if(t&&['find','job','my'].includes(t)) switchTab(t); })();
</script>

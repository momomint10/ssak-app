<script>
// 진입 가드 — JWT 검증 + owner 확인
const me = requireAuth();
if (me.role !== 'owner') {
  ssakAlert('관리자(owner) 권한이 필요합니다.').then(() => location.replace('/index.html'));
}
document.getElementById('me-info').textContent =
  (me.name || me.phone) + ' (Owner)';

// toast removed — utils.js 사용 (자동 success/error/info 분류, 2026-05-23)
// fmtPhone removed — utils.js 사용 (2026-05-23)
function fmtTime(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleString('ko-KR', {
    month: 'numeric', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('on', t.getAttribute('data-tab') === name));
  document.getElementById('tab-users').style.display = name === 'users' ? 'block' : 'none';
  document.getElementById('tab-log').style.display = name === 'log' ? 'block' : 'none';
  document.getElementById('fab').style.display = name === 'users' ? 'flex' : 'none';
  if (name === 'log') loadLog();
}

async function loadUsers() {
  const list = document.getElementById('user-list');
  list.innerHTML = '<div class="empty">불러오는 중...</div>';
  try {
    const r = await fetchAuth(SERVER + '/api/admin/users');
    const d = await r.json();
    if (!d.success) throw new Error(d.error);
    if (!d.data.length) {
      list.innerHTML = '<div class="empty">등록된 사용자가 없습니다.</div>';
      return;
    }
    list.innerHTML = d.data.map(u => userCard(u)).join('');
  } catch (e) {
    list.innerHTML = '<div class="empty">오류: ' + (e.message || '') + '</div>';
  }
}

function userCard(u) {
  const roleBadge = u.role === 'owner'
    ? '<span class="badge owner">Owner</span>'
    : '<span class="badge approved">사용자</span>';
  const statBadge = u.status === 'disabled'
    ? '<span class="badge disabled">비활성</span>' : '';
  const isMe = u.id === me.sub;
  const actions = isMe ? ''
    : `<div class="row-actions">
        <button class="btn-mini" onclick="openAdminPin('${u.id}','${esc((u.name||fmtPhone(u.phone_e164)).replace(/'/g,"\\'"))}','${esc((u.phone_e164||'').replace(/'/g,"\\'"))}')">🔢 PIN</button>
        ${u.status === 'active'
          ? `<button class="btn-mini" onclick="toggleStatus('${u.id}','disabled')">비활성</button>`
          : `<button class="btn-mini" onclick="toggleStatus('${u.id}','active')">재활성</button>`}
        <button class="btn-mini danger" onclick="delUser('${u.id}','${esc(u.name||fmtPhone(u.phone_e164))}')">삭제</button>
      </div>`;
  return `<div class="card">
    <div class="user-info">
      <div class="user-phone">${fmtPhone(u.phone_e164)} ${roleBadge} ${statBadge}</div>
      ${u.name ? `<div class="user-name">${esc(u.name)}${isMe?' (나)':''}</div>` : (isMe?'<div class="user-name">(나)</div>':'')}
      <div class="user-meta">
        <span>등록 ${fmtTime(u.approved_at || u.created_at)}</span>
        ${u.last_login_at ? `<span>최근 ${fmtTime(u.last_login_at)}</span>` : '<span style="color:#bbb;">미접속</span>'}
      </div>
    </div>
    ${actions}
  </div>`;
}

function openAdd() {
  document.getElementById('add-phone').value = '';
  document.getElementById('add-name').value = '';
  document.getElementById('add-ov').classList.add('on');
  setTimeout(() => document.getElementById('add-phone').focus(), 200);
}
function closeAdd() {
  document.getElementById('add-ov').classList.remove('on');
}

document.getElementById('add-phone').addEventListener('input', (e) => {
  const n = e.target.value.replace(/\D/g, '').slice(0, 11);
  if (n.length < 4) e.target.value = n;
  else if (n.length < 8) e.target.value = n.slice(0,3) + '-' + n.slice(3);
  else e.target.value = n.slice(0,3) + '-' + n.slice(3,7) + '-' + n.slice(7);
});

async function addUser() {
  const phone = document.getElementById('add-phone').value.replace(/\D/g,'');
  const name = document.getElementById('add-name').value.trim();
  const notify = document.getElementById('add-notify').checked;
  if (!/^01[016789]\d{7,8}$/.test(phone)) {
    toast('휴대폰 번호를 정확히 입력해 주세요');
    return;
  }
  try {
    const r = await fetchAuth(SERVER + '/api/admin/users', {
      method: 'POST',
      body: JSON.stringify({ phone, name, notify })
    });
    const d = await r.json();
    if (!d.success) { toast(d.error || '등록 실패'); return; }
    closeAdd();
    toast(notify && d.sms_sent ? '✅ 등록 + 안내 SMS 발송 완료' : '✅ 등록 완료');
    loadUsers();
  } catch (e) {
    toast('오류: ' + e.message);
  }
}

async function toggleStatus(id, status) {
  const verb = status === 'disabled' ? '비활성화' : '재활성화';
  if (!(await ssakConfirm(`이 사용자를 ${verb}할까요?`))) return;
  try {
    const r = await fetchAuth(SERVER + '/api/admin/users/' + id, {
      method: 'PATCH',
      body: JSON.stringify({ status })
    });
    const d = await r.json();
    if (!d.success) { toast(d.error); return; }
    toast(`✅ ${verb} 완료`);
    loadUsers();
  } catch (e) { toast('오류: ' + e.message); }
}

async function delUser(id, label) {
  if (!(await ssakConfirm(`${label} 사용자를 삭제할까요?\n삭제 후에는 다시 등록해야 합니다.`))) return;
  try {
    const r = await fetchAuth(SERVER + '/api/admin/users/' + id, { method: 'DELETE' });
    const d = await r.json();
    if (!d.success) { toast(d.error); return; }
    toast('✅ 삭제 완료');
    loadUsers();
  } catch (e) { toast('오류: ' + e.message); }
}

// ══════════════════════════════════════════════════
// Admin PIN 설정 — 베타 출시 차단 해소 (260528)
// ══════════════════════════════════════════════════
let _adminPinTarget = null;
function openAdminPin(id, label, phone) {
  _adminPinTarget = { id, label, phone };
  document.getElementById('admin-pin-target').textContent = label;
  document.getElementById('admin-pin-phone').textContent = fmtPhone(phone);
  document.getElementById('admin-pin-input').value = '';
  document.getElementById('admin-pin-alert').style.display = 'none';
  document.getElementById('admin-pin-ov').classList.add('on');
  setTimeout(() => document.getElementById('admin-pin-input').focus(), 200);
}
function closeAdminPin() {
  document.getElementById('admin-pin-ov').classList.remove('on');
  _adminPinTarget = null;
}
function genRandomPin() {
  // 너무 단순한 패턴 회피
  let pin;
  do {
    pin = String(Math.floor(1000 + Math.random() * 9000));
  } while (/^(\d)\1{3}$/.test(pin) || pin === '1234' || pin === '0000' || pin === '1111');
  document.getElementById('admin-pin-input').value = pin;
  document.getElementById('admin-pin-alert').style.display = 'none';
}
async function saveAdminPin() {
  if (!_adminPinTarget) return;
  const pin = document.getElementById('admin-pin-input').value.trim();
  const alert = document.getElementById('admin-pin-alert');
  if (!/^\d{4}$/.test(pin)) { alert.textContent = '4자리 숫자 PIN을 입력하세요'; alert.style.display = 'block'; return; }
  if (/^(\d)\1{3}$/.test(pin) || pin === '1234' || pin === '0000' || pin === '1111') {
    alert.textContent = '너무 단순한 PIN (1234, 0000, 1111 등 금지)'; alert.style.display = 'block'; return;
  }
  const btn = document.getElementById('admin-pin-save');
  btn.disabled = true; btn.textContent = '설정 중...';
  try {
    const r = await fetchAuth(SERVER + '/api/admin/users/' + _adminPinTarget.id + '/pin-setup', {
      method: 'POST', body: JSON.stringify({ pin })
    });
    const d = await r.json();
    if (!d.success) {
      alert.textContent = d.error || '설정 실패';
      alert.style.display = 'block';
      btn.disabled = false; btn.textContent = '설정';
      return;
    }
    // 성공 — PIN 안내 (관리자가 사장님께 전달할 수 있도록)
    const phoneFmt = fmtPhone(_adminPinTarget.phone);
    const msg = `✅ PIN 설정 완료\n\n${_adminPinTarget.label} (${phoneFmt})\nPIN: ${pin}\n\n이 PIN을 SMS·전화·메모 등으로 전달해주세요.\nMY → PIN 변경에서 본인이 바꿀 수 있습니다.`;
    alert.textContent = '';
    alert.style.display = 'none';
    closeAdminPin();
    setTimeout(() => ssakAlert(msg), 100);
    toast('✅ PIN 설정 완료');
  } catch (e) {
    alert.textContent = '서버 오류: ' + e.message;
    alert.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = '설정';
  }
}
async function removeAdminPin() {
  if (!_adminPinTarget) return;
  if (!(await ssakConfirm(`${_adminPinTarget.label}의 PIN을 해제할까요?\n사용자는 SMS 인증으로 다시 로그인해야 합니다.`))) return;
  try {
    const r = await fetchAuth(SERVER + '/api/admin/users/' + _adminPinTarget.id + '/pin', { method: 'DELETE' });
    const d = await r.json();
    if (!d.success) { toast(d.error); return; }
    toast('✅ PIN 해제');
    closeAdminPin();
  } catch (e) { toast('오류: ' + e.message); }
}

async function loadLog() {
  const list = document.getElementById('log-list');
  list.innerHTML = '<div class="empty">불러오는 중...</div>';
  try {
    const r = await fetchAuth(SERVER + '/api/admin/login-log?limit=50');
    const d = await r.json();
    if (!d.success) throw new Error(d.error);
    if (!d.data.length) {
      list.innerHTML = '<div class="empty">로그가 없습니다.</div>';
      return;
    }
    list.innerHTML = d.data.map(L => logRow(L)).join('');
  } catch (e) {
    list.innerHTML = '<div class="empty">오류: ' + (e.message || '') + '</div>';
  }
}

function logRow(L) {
  const meta = {
    otp_sent: ['ok', 'OTP 발송'],
    verify_ok: ['ok', '✅ 로그인 성공'],
    otp_blocked_whitelist: ['fail', '⛔ 미등록 번호 거부'],
    otp_blocked_rate: ['warn', '⏸ 빈도 제한'],
    verify_fail: ['fail', '❌ 인증 실패'],
    verify_expired: ['warn', '⏱ OTP 만료']
  }[L.outcome] || ['', L.outcome];
  return `<div class="log-row ${meta[0]}">
    <span class="log-phone">${fmtPhone(L.phone_e164)}</span> · ${esc(meta[1])}
    <div class="log-meta">${fmtTime(L.created_at)} · ${esc((L.ip||'').slice(0,20))}</div>
  </div>`;
}

async function logout() {
  if (!(await ssakConfirm('로그아웃할까요?'))) return;
  clearJwt();
  location.replace('/login.html');
}

loadUsers();

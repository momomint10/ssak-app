<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>싹싹 — SMS 자동응답</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="싹싹">
<meta name="theme-color" content="#00C896">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #00C896;
  --primary-dark: #00A87A;
  --primary-light: #E6FAF5;
  --secondary: #1A1F36;
  --gray-50: #F8FAFB;
  --gray-100: #F1F4F6;
  --gray-200: #E4E9EE;
  --gray-300: #C8D0DA;
  --gray-400: #9AA5B4;
  --gray-500: #6B7684;
  --gray-700: #3D4A5C;
  --gray-900: #1A1F36;
  --amber: #F59E0B;
  --red: #EF4444;
  --blue: #3B82F6;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { font-family: 'Noto Sans KR', sans-serif; background: var(--gray-50); color: var(--gray-900); }

.shell { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 100px; }

/* ── Header ── */
.header {
  background: #fff;
  border-bottom: 1px solid var(--gray-200);
  padding: 52px 20px 0;
  position: sticky; top: 0; z-index: 50;
}
.header-inner {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 0;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--gray-100); border: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; flex-shrink: 0;
}
.header-title { font-size: 17px; font-weight: 900; }

/* ── Tabs ── */
.tabs {
  display: flex; gap: 0;
  margin-top: 16px;
  border-bottom: 2px solid var(--gray-200);
}
.tab {
  flex: 1; padding: 12px 0;
  text-align: center; font-size: 14px; font-weight: 600;
  color: var(--gray-400); cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all 0.2s;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: inherit;
}
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* ── Content ── */
.content { padding: 20px; }

/* ── Pages ── */
.page { display: none; }
.page.active { display: block; }

/* ── Form ── */
.card {
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 13px; font-weight: 700;
  color: var(--gray-500); margin-bottom: 14px;
  display: flex; align-items: center; gap: 6px;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-group { margin-bottom: 12px; }
.form-group:last-child { margin-bottom: 0; }
.form-label { font-size: 12px; font-weight: 600; color: var(--gray-500); margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-size: 14px; font-family: inherit;
  color: var(--gray-900); outline: none;
  transition: border-color 0.2s; background: #fff;
  -webkit-appearance: none;
}
.form-input:focus { border-color: var(--primary); }
select.form-input { cursor: pointer; }

/* ── Chips ── */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 7px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 500;
  background: var(--gray-100); border: 1.5px solid var(--gray-200);
  color: var(--gray-500); cursor: pointer;
  transition: all 0.18s; font-family: inherit;
  -webkit-user-select: none; user-select: none;
}
.chip.on {
  background: var(--primary-light);
  border-color: var(--primary);
  color: var(--primary-dark);
  font-weight: 700;
}

/* ── Quote result ── */
.quote-result {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 14px;
  color: #fff;
}
.qr-label { font-size: 12px; color: rgba(255,255,255,0.75); margin-bottom: 6px; }
.qr-price { font-size: 36px; font-weight: 900; line-height: 1; margin-bottom: 14px; }
.qr-rows { border-top: 1px solid rgba(255,255,255,0.2); padding-top: 12px; }
.qr-row {
  display: flex; justify-content: space-between;
  font-size: 13px; color: rgba(255,255,255,0.8);
  padding: 4px 0;
}
.qr-row.total {
  color: #fff; font-weight: 700;
  border-top: 1px dashed rgba(255,255,255,0.3);
  margin-top: 6px; padding-top: 10px;
}

/* ── Message preview ── */
.msg-preview {
  background: var(--gray-50);
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  padding: 14px;
  font-size: 13.5px; line-height: 1.75;
  color: var(--gray-700);
  white-space: pre-wrap; word-break: break-all;
  min-height: 120px;
  margin-bottom: 10px;
}
.msg-char { font-size: 11px; color: var(--gray-400); text-align: right; margin-bottom: 12px; }

/* ── Buttons ── */
.btn-primary {
  width: 100%; padding: 16px;
  background: var(--primary); color: #fff;
  border: none; border-radius: var(--radius);
  font-family: inherit; font-size: 15px; font-weight: 700;
  cursor: pointer; margin-bottom: 10px;
  box-shadow: 0 4px 16px rgba(0,200,150,0.3);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s;
}
.btn-primary:active { transform: scale(0.98); }
.btn-secondary {
  width: 100%; padding: 14px;
  background: #fff; color: var(--gray-700);
  border: 1.5px solid var(--gray-200); border-radius: var(--radius);
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s;
}
.btn-secondary:active { transform: scale(0.98); }

/* ── Send options ── */
.send-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.send-opt {
  padding: 12px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--gray-200);
  background: #fff; cursor: pointer;
  text-align: center; font-family: inherit;
  transition: all 0.2s;
}
.send-opt:active { transform: scale(0.98); }
.send-opt.active { border-color: var(--primary); background: var(--primary-light); }
.so-icon { font-size: 20px; margin-bottom: 4px; }
.so-label { font-size: 12.5px; font-weight: 600; color: var(--gray-700); }
.so-desc { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

/* ── Inquiry list ── */
.inq-item {
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex; gap: 12px; align-items: flex-start;
  box-shadow: var(--shadow); cursor: pointer;
  transition: all 0.15s;
}
.inq-item:active { transform: scale(0.98); }
.inq-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px; color: #fff; flex-shrink: 0;
}
.inq-name { font-size: 14px; font-weight: 700; }
.inq-meta { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
.inq-msg { font-size: 13px; color: var(--gray-500); margin-top: 5px; }
.badge {
  display: inline-flex; padding: 2px 9px;
  border-radius: 20px; font-size: 11px; font-weight: 600;
}
.badge-new { background: #FEE2E2; color: #DC2626; }
.badge-wait { background: #FEF3C7; color: #D97706; }
.badge-sent { background: var(--primary-light); color: var(--primary-dark); }

/* ── FAQ ── */
.faq-item {
  background: #fff; border: 1px solid var(--gray-200);
  border-radius: var(--radius); margin-bottom: 8px;
  overflow: hidden; box-shadow: var(--shadow);
}
.faq-q {
  padding: 14px 16px; font-size: 14px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center;
  justify-content: space-between;
}
.faq-arrow { font-size: 12px; color: var(--gray-400); transition: transform 0.2s; }
.faq-item.open .faq-arrow { transform: rotate(180deg); }
.faq-a {
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease, padding 0.2s;
  font-size: 13.5px; color: var(--gray-500); line-height: 1.7;
  background: var(--gray-50);
  border-top: 0px solid var(--gray-200);
  padding: 0 16px;
}
.faq-item.open .faq-a {
  max-height: 300px; padding: 14px 16px;
  border-top: 1px solid var(--gray-200);
}
.faq-copy {
  margin-top: 10px;
  padding: 8px 14px; border-radius: 8px;
  background: var(--primary-light); color: var(--primary-dark);
  border: none; font-family: inherit;
  font-size: 12.5px; font-weight: 700; cursor: pointer;
  margin-bottom: 4px;
}

/* ── Bottom nav ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: rgba(255,255,255,0.95);
  border-top: 1px solid var(--gray-200);
  backdrop-filter: blur(20px);
  display: flex;
  padding: 8px 0 env(safe-area-inset-bottom, 8px);
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px; padding: 4px 0;
  cursor: pointer; color: var(--gray-400); font-size: 10px;
  transition: color 0.15s; font-family: inherit;
  background: none; border: none;
}
.nav-item.active { color: var(--primary); }
.nav-icon { font-size: 22px; line-height: 1; }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 96px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--gray-900); color: #fff;
  padding: 11px 20px; border-radius: 24px;
  font-size: 13.5px; font-weight: 500;
  opacity: 0; transition: all 0.3s;
  pointer-events: none; z-index: 999;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="header">
    <div class="header-inner">
      <button class="back-btn" onclick="history.back()">←</button>
      <div class="header-title">⚡ SMS 자동응답 & 견적</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('quote', this)">견적 계산</button>
      <button class="tab" onclick="switchTab('template', this)">메시지 템플릿</button>
      <button class="tab" onclick="switchTab('inquiry', this)">문의 목록</button>
      <button class="tab" onclick="switchTab('faq', this)">FAQ</button>
    </div>
  </div>

  <div class="content">

    <!-- ── 견적 계산 ── -->
    <div id="page-quote" class="page active">

      <div class="card">
        <div class="card-title">👤 고객 정보</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">고객 이름</label>
            <input class="form-input" id="q-name" placeholder="김OO" oninput="buildMsg()" />
          </div>
          <div class="form-group">
            <label class="form-label">연락처</label>
            <input class="form-input" id="q-phone" placeholder="010-0000-0000" type="tel" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">평수</label>
            <input class="form-input" id="q-size" type="number" placeholder="예: 32" oninput="calcQuote()" />
          </div>
          <div class="form-group">
            <label class="form-label">청소 유형</label>
            <select class="form-input" id="q-type" onchange="calcQuote()">
              <option value="move-in">입주 전 청소</option>
              <option value="move-out">이사 후 청소</option>
              <option value="new">신축 준공 청소</option>
              <option value="life">생활 청소</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">주거 형태</label>
            <select class="form-input" id="q-house" onchange="calcQuote()">
              <option value="1.0">아파트</option>
              <option value="0.95">빌라/다세대</option>
              <option value="1.1">단독주택</option>
              <option value="1.05">오피스텔</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">희망 날짜</label>
            <input class="form-input" id="q-date" type="date" oninput="buildMsg()" />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">✅ 추가 서비스</div>
        <div class="chips">
          <button class="chip" id="opt-balcony" onclick="toggleChip(this); calcQuote()">🪟 발코니 +3만</button>
          <button class="chip" id="opt-window" onclick="toggleChip(this); calcQuote()">✨ 창문 +4만</button>
          <button class="chip" id="opt-hood" onclick="toggleChip(this); calcQuote()">🍳 후드 +2.5만</button>
          <button class="chip" id="opt-ac" onclick="toggleChip(this); calcQuote()">❄️ 에어컨 +5만</button>
          <button class="chip" id="opt-fridge" onclick="toggleChip(this); calcQuote()">🧊 냉장고 +3.5만</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📤 발송 옵션</div>
        <div class="chips">
          <button class="chip on" id="opt-video" onclick="toggleChip(this); buildMsg()">📹 홍보영상</button>
          <button class="chip on" id="opt-booking" onclick="toggleChip(this); buildMsg()">📅 예약링크</button>
          <button class="chip" id="opt-review" onclick="toggleChip(this); buildMsg()">⭐ 후기링크</button>
          <button class="chip on" id="opt-kakao" onclick="toggleChip(this); buildMsg()">💬 카카오</button>
        </div>
      </div>

      <!-- 견적 결과 -->
      <div class="quote-result" id="quote-result" style="display:none;">
        <div class="qr-label">예상 견적금액 (VAT 포함)</div>
        <div class="qr-price" id="qr-price">—</div>
        <div class="qr-rows" id="qr-rows"></div>
      </div>

      <!-- 메시지 미리보기 -->
      <div class="card">
        <div class="card-title">💬 자동 생성 메시지</div>
        <div class="msg-preview" id="msg-preview">평수와 고객명을 입력하면 메시지가 자동 생성됩니다 ✍️</div>
        <div class="msg-char" id="msg-char"></div>

        <div class="send-opts">
          <button class="send-opt active" id="so-sms" onclick="setSendOpt('sms')">
            <div class="so-icon">💬</div>
            <div class="so-label">문자 발송</div>
            <div class="so-desc">복사 후 문자앱</div>
          </button>
          <button class="send-opt" id="so-kakao" onclick="setSendOpt('kakao')">
            <div class="so-icon">💛</div>
            <div class="so-label">카카오톡</div>
            <div class="so-desc">복사 후 카카오</div>
          </button>
        </div>

        <button class="btn-primary" onclick="copyMsg()">📋 메시지 복사 → 바로 발송</button>
        <button class="btn-secondary" onclick="saveInquiry()">💾 문의 저장</button>
      </div>
    </div>

    <!-- ── 메시지 템플릿 ── -->
    <div id="page-template" class="page">
      <div class="card" style="margin-bottom:14px;">
        <div class="card-title">👤 개인화 설정</div>
        <div class="form-row">
          <div class="form-group" style="margin:0;">
            <label class="form-label">고객 이름</label>
            <input class="form-input" id="t-name" placeholder="김OO" oninput="renderTemplates()" />
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">평수</label>
            <input class="form-input" id="t-size" type="number" placeholder="32" oninput="renderTemplates()" />
          </div>
        </div>
      </div>
      <div id="template-list"></div>
    </div>

    <!-- ── 문의 목록 ── -->
    <div id="page-inquiry" class="page">
      <div class="card" style="margin-bottom:14px;">
        <div class="card-title">➕ 새 문의 등록</div>
        <div class="form-row">
          <div class="form-group" style="margin:0;">
            <label class="form-label">이름</label>
            <input class="form-input" id="n-name" placeholder="김OO" />
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">연락처</label>
            <input class="form-input" id="n-phone" placeholder="010-0000-0000" type="tel" />
          </div>
        </div>
        <div class="form-row" style="margin-top:10px;">
          <div class="form-group" style="margin:0;">
            <label class="form-label">평수</label>
            <input class="form-input" id="n-size" type="number" placeholder="32" />
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">유형</label>
            <select class="form-input" id="n-type">
              <option>입주 전 청소</option>
              <option>이사 후 청소</option>
              <option>신축 준공</option>
              <option>생활 청소</option>
            </select>
          </div>
        </div>
        <button class="btn-primary" style="margin-top:14px;margin-bottom:0;" onclick="addInquiry()">+ 문의 추가</button>
      </div>
      <div id="inquiry-list"></div>
    </div>

    <!-- ── FAQ ── -->
    <div id="page-faq" class="page">
      <div id="faq-list"></div>
    </div>

  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-item" onclick="location.href='index.html'">
    <div class="nav-icon">🏠</div><div>홈</div>
  </button>
  <button class="nav-item active">
    <div class="nav-icon">⚡</div><div>견적</div>
  </button>
  <button class="nav-item" onclick="toast('스케줄 화면은 준비 중입니다')">
    <div class="nav-icon">📅</div><div>스케줄</div>
  </button>
  <button class="nav-item" onclick="toast('커뮤니티는 준비 중입니다')">
    <div class="nav-icon">👥</div><div>커뮤니티</div>
  </button>
  <button class="nav-item" onclick="toast('MY 페이지는 준비 중입니다')">
    <div class="nav-icon">👤</div><div>MY</div>
  </button>
</div>

<div id="toast"></div>

<script>
// ── 설정 ──────────────────────────────────
const cfg = {
  company: '서프로클린',
  phone: '010-1234-5678',
  video: 'https://youtu.be/샘플영상링크',
  kakao: 'https://pf.kakao.com/샘플',
  review: 'https://naver.me/후기링크',
  booking: 'https://forms.gle/예약폼링크',
};

// ── 탭 전환 ──────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'template') renderTemplates();
  if (name === 'inquiry') renderInquiries();
  if (name === 'faq') renderFaq();
}

// ── 칩 토글 ──────────────────────────────
function toggleChip(el) { el.classList.toggle('on'); }

// ── 발송 옵션 ─────────────────────────────
let sendOpt = 'sms';
function setSendOpt(opt) {
  sendOpt = opt;
  document.querySelectorAll('.send-opt').forEach(s => s.classList.remove('active'));
  document.getElementById('so-' + opt).classList.add('active');
}

// ── 견적 계산 ─────────────────────────────
const rates = { 'move-in': 1.0, 'move-out': 0.85, 'new': 1.15, 'life': 0.65 };
const typeLabels = { 'move-in': '입주 전', 'move-out': '이사 후', 'new': '신축 준공', 'life': '생활 청소' };
const extraInfo = {
  balcony: { label: '발코니', price: 30000 },
  window:  { label: '창문청소', price: 40000 },
  hood:    { label: '주방후드', price: 25000 },
  ac:      { label: '에어컨', price: 50000 },
  fridge:  { label: '냉장고', price: 35000 },
};

function getBaseRate(size) {
  if (size <= 20) return 8000;
  if (size <= 35) return 6500;
  return 5500;
}

function calcQuote() {
  const size = parseInt(document.getElementById('q-size').value);
  const type = document.getElementById('q-type').value;
  const houseAdj = parseFloat(document.getElementById('q-house').value);

  if (!size) {
    document.getElementById('quote-result').style.display = 'none';
    buildMsg();
    return;
  }

  const base = Math.round(size * getBaseRate(size) * houseAdj * rates[type]);
  let extraTotal = 0;
  let extraItems = [];

  Object.keys(extraInfo).forEach(k => {
    if (document.getElementById('opt-' + k)?.classList.contains('on')) {
      extraTotal += extraInfo[k].price;
      extraItems.push(extraInfo[k]);
    }
  });

  const sub = base + extraTotal;
  const vat = Math.round(sub * 0.1);
  const total = sub + vat;

  document.getElementById('quote-result').style.display = 'block';
  document.getElementById('qr-price').textContent = total.toLocaleString() + '원';
  document.getElementById('qr-rows').innerHTML = `
    <div class="qr-row"><span>기본 청소 (${size}평)</span><span>${base.toLocaleString()}원</span></div>
    ${extraItems.map(e => `<div class="qr-row"><span>+ ${e.label}</span><span>${e.price.toLocaleString()}원</span></div>`).join('')}
    <div class="qr-row"><span>부가세 10%</span><span>${vat.toLocaleString()}원</span></div>
    <div class="qr-row total"><span>최종 합계</span><span>${total.toLocaleString()}원</span></div>
  `;

  buildMsg(size, type, total, extraItems);
}

function buildMsg(size, type, total, extraItems) {
  size = size || parseInt(document.getElementById('q-size').value);
  const name = document.getElementById('q-name').value.trim() || '고객님';
  const date = document.getElementById('q-date').value;
  type = type || document.getElementById('q-type').value;

  if (!size) {
    document.getElementById('msg-preview').textContent = '평수와 고객명을 입력하면 메시지가 자동 생성됩니다 ✍️';
    document.getElementById('msg-char').textContent = '';
    return;
  }

  if (!total) {
    const houseAdj = parseFloat(document.getElementById('q-house').value);
    const base = Math.round(size * getBaseRate(size) * houseAdj * rates[type]);
    const vat = Math.round(base * 0.1);
    total = base + vat;
  }

  const nameStr = name === '고객님' ? '고객님' : name + '님';
  let msg = `안녕하세요, ${nameStr}! 😊\n${cfg.company} 입주청소입니다.\n\n`;
  msg += `━━━━ 견적 안내 ━━━━\n`;
  msg += `🏠 ${size}평 ${typeLabels[type]} 청소\n`;
  msg += `💰 ${total.toLocaleString()}원 (VAT포함)\n`;
  msg += `⏰ 약 ${Math.max(3, Math.ceil(size/8))}~${Math.max(4, Math.ceil(size/6))}시간\n`;
  msg += `👥 2~3명 투입\n`;
  if (extraItems && extraItems.length) {
    msg += `✅ 추가: ${extraItems.map(e => e.label).join(', ')}\n`;
  }
  if (date) msg += `📅 희망일: ${date}\n`;
  msg += `━━━━━━━━━━━━━━\n\n`;

  if (document.getElementById('opt-video')?.classList.contains('on')) msg += `📹 시공영상: ${cfg.video}\n\n`;
  if (document.getElementById('opt-review')?.classList.contains('on')) msg += `⭐ 고객후기: ${cfg.review}\n\n`;
  if (document.getElementById('opt-booking')?.classList.contains('on')) msg += `📅 예약신청: ${cfg.booking}\n\n`;
  if (document.getElementById('opt-kakao')?.classList.contains('on')) msg += `💬 카카오: ${cfg.kakao}\n\n`;
  msg += `📞 ${cfg.phone}`;

  document.getElementById('msg-preview').textContent = msg;
  document.getElementById('msg-char').textContent = `${msg.length}자 (${msg.length > 90 ? 'LMS 장문' : 'SMS 단문'})`;
}

function copyMsg() {
  const t = document.getElementById('msg-preview').textContent;
  if (t.includes('자동 생성')) { toast('평수를 먼저 입력해 주세요!'); return; }
  navigator.clipboard.writeText(t).then(() => toast('📋 메시지 복사 완료! 문자앱에 붙여넣기 하세요'));
}

// ── Toast ─────────────────────────────────

  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
